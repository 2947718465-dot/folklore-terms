<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<meta name="description" content="中国民俗学术语库，收录5769条核心术语，中英对照，涵盖民俗事象、理论术语、学科概念、研究方法、研究关键词、学者与学术体制六大类">
<meta name="theme-color" content="#2E6DA4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<title>中国民俗学术语库 · Folklore Terminology Database</title>
<style>
:root {
  --ink: #1a1a2e; --paper: #fafaf8; --muted: #6b6b7b;
  --border: #e8e8ec; --surface: #fff; --hover: #f5f5f8;
  --accent: #2E6DA4; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.08);
  --radius: 10px; --radius-sm: 6px;
  --font-sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-serif: "Noto Serif SC","Songti SC",Georgia,serif;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
:root.dark {
  --ink: #e4e4ec; --paper: #111118; --muted: #8e8e9e;
  --border: #2a2a36; --surface: #1a1a24; --hover: #22222e;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;transition:background var(--transition),color var(--transition)}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--border);padding:0 24px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background var(--transition),border var(--transition)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--ink);white-space:nowrap;cursor:pointer;user-select:none;transition:opacity var(--transition)}
.logo:hover{opacity:.7}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);transition:transform var(--transition)}
.logo:hover .logo-dot{transform:scale(1.5)}

.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{width:100%;height:40px;padding:0 40px 0 42px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--ink);font-size:14px;outline:none;transition:all var(--transition)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,109,164,.12)}
.search-wrap input::placeholder{color:var(--muted);opacity:.6}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;transition:color var(--transition)}
.search-wrap:focus-within .search-icon{color:var(--accent)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:6px;line-height:1;border-radius:50%;display:none;transition:all var(--transition)}
.search-clear:hover{color:var(--ink);background:var(--hover)}
.search-clear.show{display:block}

/* Search suggestions */
.search-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:4px;box-shadow:var(--shadow-lg);max-height:300px;overflow-y:auto;display:none;z-index:101}
.search-suggestions.show{display:block}
.suggestion-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background var(--transition);font-size:13px}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{background:var(--hover)}
.suggestion-item .suggestion-cn{font-weight:600;color:var(--ink)}
.suggestion-item .suggestion-en{color:var(--muted);font-size:12px;margin-left:8px}
.suggestion-item .suggestion-cat{color:var(--accent);font-size:11px;margin-left:8px}

.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--transition);position:relative}
.icon-btn:hover{background:var(--hover);border-color:var(--muted);transform:translateY(-1px)}
.icon-btn:active{transform:translateY(0)}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* === MAIN === */
.main-wrap{max-width:1400px;margin:0 auto;padding:0 24px}

.hero{padding:36px 0 28px}
.hero h1{font-family:var(--font-serif);font-size:28px;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
.hero p{color:var(--muted);font-size:14px}
.hero .credit{color:var(--muted);font-size:12px;margin-top:4px;opacity:.7}
.hero .credit a{color:var(--accent);text-decoration:none}

/* === STATS === */
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat-item{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--muted);transition:all var(--transition)}
.stat-item:hover{border-color:var(--muted);transform:translateY(-1px)}
.stat-item strong{color:var(--ink);font-weight:600}

/* === CATEGORY PILLS === */
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cat-pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink);cursor:pointer;font-size:13px;font-weight:500;transition:all var(--transition);user-select:none;white-space:nowrap}
.cat-pill:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.cat-pill.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:var(--shadow-lg)}
.cat-pill .count{font-size:11px;opacity:.7;margin-left:4px}
.cat-pill.active .count{opacity:.9}

/* === SUB FILTERS === */
.sub-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;transition:all var(--transition);min-height:0}
.sub-filter{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;transition:all var(--transition);user-select:none}
.sub-filter:hover{color:var(--ink);border-color:var(--muted);background:var(--hover)}
.sub-filter.active{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:500}
.t3-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;transition:all var(--transition);min-height:0}
.t3-filter{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:11px;transition:all var(--transition);user-select:none}
.t3-filter:hover{color:var(--ink);border-color:var(--muted);background:var(--hover)}
.t3-filter.active{background:var(--muted);color:var(--paper);border-color:var(--muted);font-weight:500}

/* === BREADCRUMB === */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:16px;min-height:18px;flex-wrap:wrap}
.breadcrumb .bc-link{cursor:pointer;color:var(--accent);transition:opacity var(--transition)}
.breadcrumb .bc-link:hover{opacity:.7;text-decoration:underline}
.breadcrumb .bc-sep{color:var(--border);margin:0 2px}
.breadcrumb .bc-current{color:var(--ink);font-weight:500}

/* === DISTRIBUTION BARS === */
.distro{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.distro-row{display:flex;align-items:center;gap:10px}
.distro-label{width:140px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.distro-bar-wrap{flex:1;height:18px;background:var(--hover);border-radius:9px;overflow:hidden;position:relative}
.distro-bar{height:100%;border-radius:9px;transition:width .5s ease;min-width:2px;display:flex;align-items:center;padding-left:10px}
.distro-bar span{font-size:10px;color:#fff;font-weight:600;white-space:nowrap}

/* === SEARCH HIGHLIGHT === */
mark{background:#FFE066;color:var(--ink);border-radius:2px;padding:0 1px}
:root.dark mark{background:#5C4A0A;color:#FFE066}

/* === COMPACT MODE === */
.term-grid.compact .term-card{padding:12px 16px}
.term-grid.compact .term-def{display:none}
.term-grid.compact .term-breadcrumb{margin-bottom:0}
.term-grid.compact .term-name{font-size:14px;margin-bottom:0;padding-right:40px}

/* === SORT === */
.sort-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:12px;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:4px}
.sort-btn:hover{background:var(--hover);border-color:var(--muted)}
.sort-btn .arrow{font-size:10px}

/* === CONTROLS === */
.controls-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.controls-left{display:flex;align-items:center;gap:12px}
.result-info{font-size:13px;color:var(--muted)}
.result-info strong{color:var(--ink)}
.view-toggles{display:flex;gap:4px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.view-toggle{padding:6px 12px;border:none;background:var(--surface);cursor:pointer;font-size:12px;color:var(--muted);transition:all var(--transition)}
.view-toggle:hover{background:var(--hover)}
.view-toggle.active{background:var(--accent);color:#fff}

/* === EXPORT DROPDOWN === */
.export-dropdown{position:relative;display:inline-block}
.export-menu{position:absolute;top:100%;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);min-width:160px;display:none;z-index:102}
.export-menu.show{display:block}
.export-menu-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--ink);transition:background var(--transition)}
.export-menu-item:hover{background:var(--hover)}
.export-menu-item:first-child{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.export-menu-item:last-child{border-radius:0 0 var(--radius-sm) var(--radius-sm)}

/* === TERM GRID === */
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:24px}
.term-grid.list{grid-template-columns:1fr;max-width:900px}

.term-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.term-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;transition:all var(--transition);opacity:.3}
.term-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.term-card:hover::before{opacity:1;width:4px}
.term-card.expanded{box-shadow:var(--shadow-lg);cursor:default}
.term-card.expanded::before{opacity:1;width:4px}

.term-card .color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;transition:all var(--transition)}
.term-card:hover .color-bar,.term-card.expanded .color-bar{width:4px;opacity:1}
.term-card .color-bar{opacity:.3}

.term-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px;display:flex;align-items:baseline;gap:8px;padding-right:80px}
.term-en{font-size:12px;color:var(--muted);font-weight:400;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.term-breadcrumb{display:flex;gap:4px;align-items:center;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.term-breadcrumb span{white-space:nowrap}
.term-breadcrumb .sep{color:var(--border);margin:0 2px}
.term-breadcrumb .cat-link{cursor:pointer;color:var(--accent);text-decoration:underline;text-underline-offset:2px;transition:opacity var(--transition)}
.term-breadcrumb .cat-link:hover{opacity:.7}

.term-def{font-size:13px;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:all var(--transition)}
.term-card.expanded .term-def{-webkit-line-clamp:unset;display:block;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

.term-actions{position:absolute;right:12px;top:14px;display:flex;gap:4px;opacity:0;transition:opacity var(--transition)}
.term-card:hover .term-actions,.term-card.expanded .term-actions{opacity:1}
.term-action{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.term-action:hover{background:var(--hover);color:var(--ink);border-color:var(--muted)}
.term-action.copied{background:#3D8B68;color:#fff;border-color:#3D8B68}
.term-action.favorited{color:#E8453C;border-color:#E8453C}

/* === LOAD MORE === */
.load-more{text-align:center;padding:0 0 48px}
.load-more-btn{padding:10px 32px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--ink);cursor:pointer;font-size:14px;transition:all var(--transition)}
.load-more-btn:hover{background:var(--hover);border-color:var(--muted);transform:translateY(-1px);box-shadow:var(--shadow)}
.load-more-btn:active{transform:translateY(0)}
.load-more-btn.loading{opacity:.6;pointer-events:none}
.loaded-all{color:var(--muted);font-size:13px;padding:16px 0}

/* === EMPTY === */
.empty-state{text-align:center;padding:80px 24px;color:var(--muted)}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:15px}
.empty-state .empty-hint{font-size:13px;margin-top:8px}

/* === TOAST === */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--paper);padding:10px 24px;border-radius:20px;font-size:13px;z-index:1000;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* === BACK TO TOP === */
.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border:1px solid var(--border);border-radius:50%;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:50;opacity:0;transform:translateY(20px);pointer-events:none;transition:all var(--transition);box-shadow:var(--shadow)}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{background:var(--hover);transform:translateY(-2px)}

/* === KEYBOARD HELP === */
.kbd-hint{position:fixed;bottom:80px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:11px;color:var(--muted);z-index:49;opacity:0;transition:opacity .4s;pointer-events:none;line-height:2}
.kbd-hint.show{opacity:.9}
.kbd-hint kbd{display:inline-block;padding:1px 6px;border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:inherit;background:var(--hover);margin:0 2px}

/* === LOADING STATE === */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.loading-text{margin-top:16px;color:var(--muted);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* === FOOTER === */
.site-footer{text-align:center;padding:40px 24px 24px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:24px}
.site-footer a{color:var(--accent);text-decoration:none}
.site-footer a:hover{text-decoration:underline}

/* === ANIMATIONS === */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.term-card{animation:fadeUp .35s ease both}
.term-card:nth-child(1){animation-delay:0s}
.term-card:nth-child(2){animation-delay:.02s}
.term-card:nth-child(3){animation-delay:.04s}
.term-card:nth-child(4){animation-delay:.06s}
.term-card:nth-child(5){animation-delay:.08s}
.term-card:nth-child(6){animation-delay:.1s}
.term-card:nth-child(7){animation-delay:.12s}
.term-card:nth-child(8){animation-delay:.14s}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-dots span{animation:pulse 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* === RESPONSIVE === */
@media(max-width:768px){
  .header{padding:0 16px}
  .header-inner{gap:10px}
  .logo{font-size:15px}
  .search-wrap{max-width:none}
  .hero{padding:24px 0 16px}
  .hero h1{font-size:22px}
  .main-wrap{padding:0 16px}
  .term-grid{grid-template-columns:1fr}
  .term-grid.list{max-width:none}
  .cat-pill{padding:6px 12px;font-size:12px}
  .icon-btn:nth-child(3){display:none}
  .search-suggestions{max-height:200px}
  .term-name{padding-right:70px;font-size:15px}
  .term-en{font-size:11px}
  .term-def{font-size:12px}
  .controls-bar{flex-direction:column;align-items:stretch}
  .controls-left{justify-content:space-between}
  .view-toggles{align-self:flex-end}
}
@media(max-width:480px){
  .stats-bar{gap:6px}
  .stat-item{padding:5px 10px;font-size:12px}
  .header-inner{gap:6px}
  .logo{font-size:14px}
  .term-card{padding:14px 16px}
  .term-name{font-size:14px;padding-right:60px}
  .term-breadcrumb{font-size:10px}
  .cat-pill{padding:5px 10px;font-size:11px}
}

/* === LOADING SKELETON === */
.skeleton{background:linear-gradient(90deg,var(--hover) 25%,var(--border) 50%,var(--hover) 75%);background-size:200% 100%;animation:skeleton-loading 1.5s infinite;border-radius:var(--radius-sm)}
@keyframes skeleton-loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:120px;margin-bottom:14px}

/* === IMPROVED SCROLLBAR === */
@media(max-width:768px){
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
}

/* === TOUCH FRIENDLY === */
@media(hover:none) and (pointer:coarse){
  .term-card:hover{transform:none;box-shadow:var(--shadow)}
  .term-card:active{transform:scale(0.98);box-shadow:var(--shadow-lg)}
  .icon-btn:active{transform:scale(0.95)}
  .cat-pill:active{transform:scale(0.95)}
  .term-actions{opacity:1}
  .term-action{width:32px;height:32px}
}

/* === COMPARE MODAL === */
.compare-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.compare-content{background:var(--surface);border-radius:var(--radius);max-width:800px;width:100%;max-height:80vh;overflow:hidden;box-shadow:var(--shadow-lg)}
.compare-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.compare-header h3{font-size:16px;font-weight:600;color:var(--ink)}
.compare-close{width:32px;height:32px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:20px;border-radius:50%;transition:all var(--transition)}
.compare-close:hover{background:var(--hover);color:var(--ink)}
.compare-body{padding:20px;overflow-y:auto;max-height:calc(80vh - 60px)}
.compare-item{padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px}
.compare-item:last-child{margin-bottom:0}
.compare-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
.compare-en{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px}
.compare-def{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.compare-cat{font-size:11px;color:var(--accent)}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载术语库...</div>
</div>

<header class="header">
<div class="header-inner">
<div class="logo" onclick="App.resetAll()" title="返回首页"><span class="logo-dot"></span>民俗学术语库</div>
<div class="search-wrap">
<span class="search-icon">🔍</span>
<input type="text" id="search" placeholder="搜索术语、英文、定义、分类…（按 / 聚焦，Esc 清空）" autocomplete="off">
<button class="search-clear" id="search-clear" title="清空搜索">✕</button>
<div class="search-suggestions" id="search-suggestions"></div>
