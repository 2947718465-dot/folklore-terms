真实的民俗氛围和情绪中讲述的记忆和感受远比在冷却后的回忆访谈中生动和真切。"],["理论创新","theoretical innovation","在既有理论基础上的学术概念和框架创新","研究方法","田野调查","观察与访谈","在批判和创新地继承既有研究基础上提出新的能更好地解释原有理论不能完全解释的迷和事实的概念框架和分析方法的学术创造过程。在民俗学中理论创新被认为应来自深厚的田野经验的提炼和对既有理论局限的诚实面对而非仅来自书斋中的逻辑推理。"],["理论对话","theoretical dialogue","不同理论传统之间的学术交流与互鉴","研究方法","田野调查","观察与访谈","不同理论传统和学派之间为着共同的学术求真目标而进行的跨越范式边界的认真倾听批判性对话和互相吸收和学习的学术交流活动。在中国民俗学中最富有生长力的理论对话发生在钟敬文的本土民俗文化学体系和西方当代民俗学和人类学理论之间。"],["生态博物馆","eco-museum","将文化遗产保留在原生态环境中就地展示的博物馆模式","研究方法","田野调查","观察与访谈","一种非传统的将整个村落和社区——连带其自然环境建筑居民和生产生活——就地原封不动地作为一座无墙露天的活态的博物馆进行保护和展示的文化遗产保护的模式。贵州的梭嘎苗族生态博物馆是中国和挪威共建的第一座生态博物馆。在民俗学中生态博物馆理念是对非遗的博物馆化的脱离语境的抢救的纠正——将民俗留在它原生的社区生态土壤中。"],["田野仪式感","field ritual sense","田野工作者在田野环境中感受到的仪式氛围","研究方法","田野调查","田野伙伴关系","田野工作者在浸入一个社区的传统的仪式性活动中（如参与当地的庙会和祭祖）自身所真实体验到的一种与日常的学术观察和研究工作不同的被当地的集体的宗教的仪式的浓重氛围所感染和触动的深沉的仪式性体验。这种体验是纯认知性的访谈和分析无法获得的珍贵的第一手田野身体经验。"],["田野伦理","Fieldwork Ethics","田野研究中研究者与被研究者的伦理关系","研究方法","田野调查","记录与伦理","田野工作者对被研究者（人）和被研究社区承担的超越纯学术的不能对被研究者的生活造成伤害和剥削的道德责任和行为规范的体系。田野伦理的核心原则包括知情同意不伤害互惠和公平的回报真诚和不欺骗和保护被研究者的隐私和尊严。"],["田野伦理审查","field ethics review","对田野研究计划进行的伦理合规性审查","研究方法","田野调查","记录与伦理","在研究者提交田野研究计划之后和实地出发之前由独立的第三方伦理审查机构/委员会对研究计划可能对被研究者和被研究社区造成的潜在的身体和心理的社会和经济的风险和伤害进行的系统评估和合规审查并要求研究者提供详细的风险防范和应对方案和知情同意的文本。这在西方是田野工作的强制性前置程序在中国民俗学中还处于发展初期。"],["田野体验","field experience","研究者在田野中的亲身经历和感受","研究方法","田野调查","田野伙伴关系","田野工作者在田野的全过程中——包括挫败的文化休克意外的温暖和被当地人真心接纳时的感动——的活生生的肉体感官和情感层面的亲身体验。田野体验不是干扰学术客观性的噪音而是理解他者文化的无法被文字和概念完全捕获的身体和情感的深度知识。"],["田野作业","fieldwork","民俗学最基本的调查方法，深入实地观察记录民俗事象","研究方法","田野调查","观察与访谈","民俗学田野的传统的本土称谓与西方社会科学的田野调查（fieldwork/field investigation）并行。田野作业强调的不是冷冰冰的科学操作而是像农民下田耕作一样的身体的投入和汗水的付出的田野实践。深入田间地头与民同吃同住同劳动是田野作业的经典形态。"],["田野作业过程模式","fieldwork process model","董晓萍提出的从田野关系到田野报告的系统性作业流程模式","研究方法","田野调查","田野伙伴关系","董晓萍提出的中国本土田野工作流程的系统化的模式框架。其涵盖了田野工作者从进入田野前的关系铺垫→进入田野初期的关系建立和磨合→田野中期的深度参与和资料搜集→田野后期的退场和持续的关系维护→以及最终的田野报告的撰写的完整的作业过程的导引性方法论模型。"],["田野关系","field relationship","田野工作者与研究对象之间建立的社会关系","研究方法","田野调查","田野伙伴关系","田野工作者在田野现场通过长期的日常生活和密切交往与当地社区的成员——从关键报道人到普通村民——之间建立的动态的多层次的复杂的人际合作友谊和感情关系网。田野关系不仅仅是为提取信息而建立的工具性的关系——真正的田野关系包含深厚的人的情感和道德纽带。"],["田野准入","field access","研究者进入田野点并获当地认可的途径","研究方法","田野调查","田野伙伴关系","外来研究者进入一个不是无主之地的社区并获其成员和管理者的知情同意和允许进行研究的初始的有时是最为艰难的田野步骤——包括了获得形式上的官方准入（政府和村委的批准）和获得实质性的社区准入（核心人物和普通村民的真心接纳）。没有实质性的社区准入只有形式上的一纸批文的田野是一次注定失败的短访。"],["田野反思","field reflexivity","田野工作者对自身角色和行为的批判性反思","研究方法","田野调查","田野伙伴关系","田野工作者在田野进行之中和之后对其自身作为研究者的角色的权力位置的文化偏见和情感的介入可能以何种方式影响和扭曲田野观察和解读的诚实和系统性的批判性反思和自省的行为。田野反思是从天真的客观主义的田野理念（研究者是一面中性的镜子）向成熟的反思田野理念进阶的标记。"],["田野叙述","field narration","田野工作者对其田野经历的口头或书面叙述","研究方法","田野调查","田野伙伴关系","田野工作者以口头或书面的叙事方式向学术同行和社会公众讲述其田野的经历遭遇和发现的行为和文本。田野叙述不仅是学术成果的传播更是将田野中收获的感激债务向其田野伙伴和社区的公开承兑。"],["田野合作者","field collaborator","在田野调查中协助研究者的当地人员","研究方法","田野调查","田野伙伴关系","在田野现场与研究者建立了超越简单的信息提供人—研究者的工具有偿关系的平等的互信的互惠的合作共赢的田野研究伙伴关系的当地社区成员。田野合作者不仅仅提供信息——他们在研究的整个过程中与研究者一起讨论分析和解读田野的材料和发现。"],["田野回访","field revisit","对原有田野点再次进行访问的实践","研究方法","田野调查","田野伙伴关系","田野工作者在首次田野调查结束后间隔一段时间（数月至数十年）后重新回到原来的田野调查地点对被研究者进行后续的跟踪访问和调查。回访让研究者得以捕捉和记录民俗在同一社区在时间的纵深中的变迁和连续。庄孔韶对林耀华金翼黄村的隔代重访是中国人类学民俗学回访的最为经典的案例。"],["田野地点","field site","进行田野调查的具体地域和社区","研究方法","田野调查","田野伙伴关系","由田野工作者经过系统的个案选点过程后选定的、作为长期田野调查的驻地的具体的村落城镇社区和区域。"],["田野基地","field site","研究者长期定点进行田野调查的固定社区","研究方法","田野调查","田野伙伴关系","田野工作者与之建立了长期的和深度的研究合作关系的固定的基地村落/社区。田野基地不是一次性的短访点——是研究者反复回访跟踪并且其学术的生命的相当一部分已经与该社区发生深度纠缠的家外之家。"],["田野定位","field positioning","研究者对自身在田野中角色和立场的自觉设定","研究方法","田野调查","田野伙伴关系","田野工作者对其自身在田野中——以怎样的身份和角色出现在当地人的面前和心目中（纯粹的外来研究者？半个村里人？地方政府的使者？混饭吃的闲人？）——的自我的有意识的设定和管理。田野定位直接影响田野关系的建立和数据获取的质和量。"],["田野心态","field mentality","田野工作者进入田野时的心理状态和准备","研究方法","田野调查","田野伙伴关系","田野工作者在进入田野前和在田野过程中持有的心理的预期状态的调试和建设。核心是放下学术的傲慢和城市人的优越感以谦逊平等的平常心去拥抱一个可能完全不同于自己习惯的日常生活的世界——一个陌生的有时甚至是困难的田野心态是成功的基石。"],["田野报告","field report","基于田野调查撰写的描述性、综述性学术文本","研究方法","田野调查","田野伙伴关系","基于田野调查获取的一手材料撰写的但尚未达到理论分析的深度的描述性和资料性的田野工作成果的学术文本。田野报告是介于田野笔记和深度研究的学术论文之间的初级学术产品。"],["田野报告小说","field report novel","以小说形式呈现田野调查发现的新文体","研究方法","田野调查","田野伙伴关系","将田野调查的真实材料和对当地人的真实观察与作者的部分虚构的小说化叙事技巧结合起来用来呈现田野生活经验的真实质感和氛围的跨文体实验写作形式——不是让田野为虚构服务，而是让虚构的技术为更逼真地呈现田野的真实质感服务。"],["田野日记","field diary","调查者逐日记录田野见闻和感受的文字","研究方法","田野调查","田野伙伴关系","田野工作者以第一人称日复一日地记录当天的田野经历：做了什么事/观察到了什么/与谁交谈了/遇到了什么问题/自己的心理和身体的状态和感受的私密的田野档案。田野日记是田野笔记的最原生态的形式——是田野体验和尚未被整理和分析的毛坯。"],["田野札记","Field Notes","田野调查中的即时记录文本","研究方法","田野调查","田野伙伴关系","田野工作者在现场随身的笔记本中随手快速潦草记录的关于现场观察的现场访谈和灵光一闪的临时想法和反思的即时性的第一手笔记。札记是不加修饰的此时此地的真实和粗糙的记录。"],["田野民俗志","field ethnography of folklore","基于田野作业的民俗志书写体系","研究方法","民族志方法","民俗志类型","以田野工作——而非仅以文献——为基础的根本性资料搜集方法为来源进行写作的民俗志的体裁和类型。田野民俗志是当代民俗学的民俗志书写的压倒性的主流形态（相比于文献民俗志）。"],["田野民族志","field ethnography","基于田野调查的民族志写作方法","研究方法","田野调查","田野伙伴关系","马林诺夫斯基在特罗布里恩群岛开创的以参与观察法为基石以在田野现场的驻在长期化为保证的现代人类学和民俗学的民族志的科学研究范式和书写模式。田野民族志是民族志的概念从游记和传教士报告向科学民族志的一次彻底的质变。"],["田野素材","field materials","田野调查中获得的各种原始资料","研究方法","田野调查","田野伙伴关系","田野工作者在田野全程中通过所有可用的手段——笔记/录音/录像/拍照/收集物/文献复制——获得的尚未被加工的所有原始的和第一手的研究材料的集合。田野素材是研究和分析的原料——是没有经过工厂加工的原始矿石。"],["田野角色","field role","研究者在田野场景中扮演的身份和角色","研究方法","田野调查","田野伙伴关系","田野工作者在对田野社区的成员的认知中的身份的标签——是纯粹的中立的研究者/是半个自己人（已经在村里住久了）/是上级政府派来的干部的帮手的某种混合。田野角色的认同是对田野关系的度量衡。"],["田野访谈","field interview","在田野作业中对研究对象进行的深度口头访问","研究方法","田野调查","观察与访谈","田野工作者与田野社区的成员在田间地头/火炉边和日常生活的自然场景中进行的以深度了解其民俗实践和日常生活经验为目的的非书面的口头对话和询问的田野调查的核心技术。田野访谈的灵魂在于用当地人的语言谈当地人关心的事。"],["田野调查","field investigation","以民俗学目的进行的范式先行的系统性实地考察","研究方法","田野调查","田野伙伴关系","与传统理解不同的库恩范式理论后的田野调查的新界定——不是凭空的没有理论指导的前范式的瞎转悠，而是在范式理论框架和研究问题的驱动下的系统的第一手经验数据的搜集的科学的田野工作。"],["田野调查提纲","fieldwork outline","田野调查前准备的问题清单和调查框架","研究方法","田野调查","田野伙伴关系","田野工作者在首次进入田野之前准备的系统的问题和事项的提示清单和本次田野调查的重点和边界的大体框架——不是一个没有弹性的死板的问卷，而是一个防止遗漏核心议题和迷失方向的活的提纲。"],["田野采风","field collection","以文学或艺术目的进行的民间作品搜集活动","研究方法","田野调查","田野伙伴关系","与传统的民俗学田野调查和采风在现场实地搜集第一手民俗材料相同的活动但在操作中以搜集文学艺术素材（为创作服务）为主要动机——不同于以学术分析和理论解释为导向的学术田野。文艺界的田野采风与学术界的田野调查在动机和技术上有微妙的差异。"],["电子典藏","digital archiving","将民俗资料进行数字化整理和长期保存的工作","研究方法","数字方法","数字技术","运用专业级的扫描仪数码相机服务器和专门的数字管理系统将传统的纸质的照片和录音磁带等随时光而不断劣化的物理民俗资料转化为数码档案进行永久性的数字保存和方便研究者在线检索使用的基础工作。中国民间文学三套集成的电子典藏项目是国家级的民俗资料数字化工程。"],["知情同意","informed consent","研究对象在充分了解研究目的后同意参与的伦理原则","研究方法","田野调查","记录与伦理","田野调查人员在进行首次访谈和任何形式的记录之前必须向被研究者用通俗的平实的语言清楚地解释本次研究的目的性质研究者与被研究者的关系被研究者可以随时结束参与的权利以及可能的风险和好处等关键信息，并在被研究者自主自愿的同意下才能继续进行的核心研究伦理原则。"],["知识图谱","Knowledge Mapping","可视化呈现知识领域结构和演进的方法","研究方法","数字方法","数字技术","数字人文和科学计量学的前沿工具——以相互连接的节点（如关键词/学者/文献）和边（共现/共被引关系）的网络可视化地图的形式呈现一个知识领域的宏观结构、核心节点、前沿热点和演变路径的方法和技术。在民俗学知识图谱可宏观地展示中国民俗学几十年的研究热点演变。"],["社区参与","community participation","社区成员积极参与文化遗产保护和发展的实践方式","研究方法","田野调查","观察与访谈","在文化遗产的保护和管理中让遗产所在的社区居民不仅作为被动的被研究者而是主动参与到从遗产的认定到保护措施的制定到管理和利益分配的全过程的核心原则。在中国具有法律支持——非遗法明确规定应尊重社区意愿和保障社区参与。"],["社区营造","community building","以社区为单位推动地方文化复兴的社会实践","研究方法","田野调查","观察与访谈","以社区居民为主体以社区独特的地方文化资源（民俗/手工艺/古迹等）为软实力进行的社区的环境美化社会生活活化居民归属感和凝聚力的提升的物质和精神并重的综合性的社区发展和复兴运动。在中国社区营造与非遗保护和乡村振兴战略深度交叉。"],["科学事实","scientific facts","对有效事实做出的经验陈述和专业判断","研究方法","田野调查","观察与访谈","库恩范式理论的概念有别于感觉材料层面的客观事实——科学事实不是自然界本身的赤裸的事实，而是在特定的科学范式的理论和实验实践的框架内被产生被解读和被建制化地接受为真的经过范式加工的学科的事实。"],["突现分析","Burst Detection Analysis","探测关键词短期内频次突增的前沿分析方法","研究方法","田野调查","观察与访谈","文献计量学和数字人文中的一种专用于探测在特定的时间段关键词的出现频次突然非规律性地出现一个急剧蹿升的爆发峰。突现词是研究前沿和学术热点的灵敏探针——某个关键词的突然爆发通常对应着一个重大的学科事件或学术热点的崛起。"],["答谢原则","reciprocity principle","田野调查后向合作者表达感谢和回馈的伦理原则","研究方法","田野调查","田野伙伴关系","田野调查结束后田野工作者必须不悄悄地消失掉，而是用切实的行动——如将研究成果寄回给社区/请关键报道人吃饭/在出版物的致谢中郑重致谢/按互惠的习俗为信息的时间回以适合的礼物——来表达对田野合作者的尊重感谢和对田野互惠伦理的实践和兑付的核心田野伦理原则。"],["类型学研究法","Typological Method","按母题和情节单元对民俗事象进行归类比较的研究方法","研究方法","分析范式","形态与结构","按照特定的分类标准将民俗的文本（如故事）和实践（如仪式）归并为不同母题和类型来对它们进行比较和系统分析的研究方法。AT分类法是全世界最知名的民俗类型学研究法的实例——它将全球的故事归并为三千多个为国际学界公用的类型编号。"],["系谱推定法","Genealogical Method","德国民俗学者以三代以上证据推定传承时间的方法","研究方法","田野调查","观察与访谈","德国民俗学界发展出来的用于在没有确切的文献记载的情况下对某一民俗（特别是民间故事和口头传统）的历史纵深的最低保守年代进行推定的人类学操作。其基本原则是以该民俗在当地的传承谱系中有据可查的连续三代人的最高年龄世代为最小时间单位的保守类推法。"],["结构分析法","Structural Analysis","分析民俗事象内部结构及各要素相互关系的分析方法","研究方法","分析范式","形态与结构","将民俗——不论是口头的还是仪式的——分解为各个相互关联构成部分，然后分析这些部分之间的结构性的关系和位置——什么在前什么在后什么是核心什么是边缘什么是可换的什么是不可缺的——的分析方法。普罗普的故事形态分析是民俗学结构分析法的开山鼻祖。"],["结构化访谈","structured interview","按标准化问题和顺序进行的访谈方式","研究方法","田野调查","观察与访谈","田野访谈中严格按照事先设计和定稿的固定问题清单和选项进行问答的非灵活性的标准化访谈方式。结构化访谈在民俗学的大规模的可比的统计调查（如数千条问卷）中是必需的但在深度的质性田野中过于僵化而不适用。"],["统计法","Statistical Method","运用量化手段对大规模民俗数据进行统计分析的方法","研究方法","数字方法","数据分析","将大规模的数量化的民俗数据输入统计软件运用计量经济学和社会学的统计技术（如回归分析因子分析等）对民俗现象的分布频率和影响因素进行量化的因果检验和相关性分析的方法。适用于大规模的民俗普查数据但不适用于深度的单一个案的理解。"],["考现学","modernology / study of the present","日本柳田国男提出的记录当代民俗现象的方法","研究方法","田野调查","记录与伦理","日本民俗学家柳田国男等人在20世纪初提出的对当代社会中正在发生和变化中的现代民俗现象（而非仅研究古老的过去的遗留的固定了的民俗）进行实时的田野观察和记录的田野方法学和理念。其口号是从考古学走向考现学。"],["聚类分析","Cluster Analysis","将相似关键词归类的知识图谱分析方法","研究方法","数字方法","数据分析","数据挖掘和知识图谱分析中的一个无监督的自动将相关词或相关文献分组的算法技术——将特征相近的词或文献自动聚合为一组而不需要人工预先设定类别。在民俗学中可用于对大量的民俗学文献的摘要进行自动主题分类和聚类。"],["艺术乡建","artistic rural construction","以艺术实践推动乡村文化振兴和社区发展","研究方法","田野调查","观察与访谈","将当代的艺术的创作（如装置和行为艺术的设计和公共壁画的绘制）与乡村的传统文化生态和节庆习俗等当地民俗资源结合起来的以艺术的介入为激活支点的乡村社区振兴和社会发展实践。在中国渠县的碧山项目和石节子美术馆等都是艺术乡建的著名实验案例。"],["节气民俗志","solar term folklorography","以二十四节气为框架记录民俗事象的志书形式","研究方法","民族志方法","民俗志类型","以中国传统的二十四节气的时间框架为经轴以南北各地实际的不同农事和生活民俗事象为纬度进行编排撰写的民俗志和岁时记的非虚构文类体裁。节气民俗志是研究前现代农业社会的完整的年度日常生活节奏的最基础和最全面的资料。"],["范式先行","paradigm first","田野调查必须在理论范式指导下进行的原则","研究方法","田野调查","田野伙伴关系","库恩范式理论在民俗田野方法论中的体现和原则——任何有效的田野调查都必定是在预先的成熟的范式的理论框架和研究的假说的指导和导引下开展的——零理论零假说的瞎转悠无法有效地识别和获取有效事实。"],["范式整合","paradigm integration","融合不同研究范式进行综合学术分析","研究方法","分析范式","实证与假说","面对研究问题的多学科交叉和复杂性，单一的范式往往不足以提供完整的解释，研究者需要有意识地吸纳和整合不同的理论范式的优势来共同对问题进行分析。范式整合不是理论的随意拼凑而是建构一个不同范式能互相补充和增强的有逻辑的系统分析框架。"],["访谈法","Interview Method","通过与被调查者直接交谈获取民俗资料的方法","研究方法","田野调查","观察与访谈","研究者以口头的面对面的直接交谈为手段通过一问一答来获取被访者关于特定民俗主题的资料和观点的田野调查的基础性的定性研究方法。根据结构化程度分为非结构化半结构化和结构化三大类。"],["语境","context","民俗表演和传承的具体社会文化环境","研究方法","分析范式","语境与阐释","民俗学表演理论的一个基石性的概念——指民歌故事的每一次讲述和演唱，或者一个节庆的每一次操演所发生和嵌入的那一个特定的不可复制的具体的社会和文化环境——包括在场的人是谁/是什么日子和时刻/在什么物理和社会空间/之前和随后发生了什么等。"],["语境研究","contextual study","将民俗置于具体社会情境中进行分析的研究取向","研究方法","分析范式","语境与阐释","反对将民俗作为脱离活的日常生活的孤立的文本和碎片来孤立研究，而是坚持将被研究的民俗事象放置在它被实际操演的完整的活的社会文化和历史的语境——谁在什么情况下为了什么目的以什么方式对谁做了什么——中进行系统分析和解读的研究路径和取向。"],["课题边界","research boundary","限定研究范围以保持学术操作有效性的边界设定","研究方法","田野调查","观察与访谈","研究者为自己将要进行的研究预先设定的理论和方法论的有效操作范围和排除在外的边界。划定边界是为了保证在可把控和可完成的范围内完成一个有深度的专题研究而不是在无限的广阔的没有围墙的野地上无目的徘徊。"],["调查法","survey method","通过系统调查收集资料的研究方法","研究方法","田野调查","观察与访谈","以研究者主动出击的调查——而非被动等待信息来——作为资料获取方式的广泛的包括问卷抽样和面对面访谈的系统资料搜集方法和策略的统称。是田野调查的核心操作逻辑。"],["跨文化交际","Inter-cultural Communication","不同文化背景的人们之间的交流与互动","研究方法","田野调查","观察与访谈","在来自不同文化的个体和群体之间进行交流时，由于各自带着不同的文化预设和符号解读系统导致的文化误解的潜在——研究者在田野中与其信息提供人之间的互动本就是一个小型的跨文化交际现场，文化误解和不匹配随时都可能发生。"],["跨文化比较研究","cross-cultural comparative study","对不同文化中的民俗进行系统比较的方法","研究方法","分析范式","历史与比较","民族志和民俗学中被精心设计的最为严谨的文化比较方法——通过选取在关键的社会结构变量（如亲属制度和生计方式）上有系统差异但在其他方面被控制的不同的文化样本，来系统地对比和检验关于人的文化和民俗的因果性和关联性的理论假说。"],["跨文化研究","cross-cultural research","在不同文化之间进行比较和对话的学术研究取向","研究方法","分析范式","历史与比较","以来自两个或以上不同的文化传统的民俗和其他的文化现象为研究对象通过系统的比较揭示文化的变异和共性以超越单一文化的偶然性的研究视角和分析路径的跨学科的研究范式。"],["追踪调查","longitudinal survey","对同一对象进行长期跟踪的田野方法","研究方法","田野调查","田野伙伴关系","田野调查的策略之一（与其相对的是单次调查）——在较长的时段中（数年甚至数十年）对同一田野点的同一社区和同一群关键个人进行多次的有周期的重返和持续的观察和访谈。追踪调查使研究者能够直接观察和记录民俗实践的时间纵深的变迁而非仅靠被访者的回忆。"],["采录","Record and Collect","对民间文学和民俗事象进行忠实采集和文字记录","研究方法","田野调查","记录与伦理","中国民俗学和民间文艺学术语——根据口头来源的讲述和演唱口头民间文学的作品通过追随其实际的口头表演的现场进行忠实的逐字和注音的原始的记录成为可出版的文字和档案材料的工作。不同于一般的随意笔记的采录原则是忠实和完整性。"],["重出立证法","repeated verification method","柳田国男提出的通过多重资料互证的田野方法","研究方法","田野调查","田野伙伴关系","柳田国男在《民间传承论》中提出的日本民俗学田野调查和资料处理的学术方法。其核心逻辑是对任何一个民俗现象的资料不依赖单一的来源和一次性的访谈——而是反复通过不同的地点不同的传承人的关于同一民俗的多个独立的记述进行相互的对照和验证以保证信息的可靠性和非偶然性。"],["问卷法","Questionnaire Method","通过设计标准化问卷大规模收集民俗资料的调查方法","研究方法","田野调查","观察与访谈","以研究者设计并打印的包含一系列封闭式（选择型）和少数开放式的问题的纸质问卷或在线问卷大规模分发和回收并运用统计工具进行数据的量化分析的非面对面的调查方法。问卷法在民俗学的大规模普查中是高效率的但在深度的理解个人的体验中是低效的。"],["问题以中心组织材料","problem-centered material organization","以学术问题而非体裁边界组织论证素材的方法","研究方法","田野调查","观察与访谈","论文写作的一个核心的方法论原则——不是按被研究对象的实体边界（如全村的民俗）去组织文章的结构因为那会导致百科全书式的没有核心论点的泛泛描述，而是以你想回答的核心的学术研究问题和论证逻辑为主线去挑选组织剪切材料。"],["问题优先","problem priority","以研究问题而非研究对象为导向的选题原则","研究方法","田野调查","观察与访谈","与对象先行相对的选题原则——不以某一个我感兴趣的地点/人物/民俗为起点去套一个题目，而以一个经过认真文献回顾和田野初探后提炼出的清晰的有价值的学术问题为选题的唯一出发点。"],["问题意识","problem consciousness","在既定范式中发现并提出有意义学术问题的能力","研究方法","分析范式","语境与阐释","研究者在大量的文献阅读和扎实的田野体验的基础之上对所研究的领域中被既有的研究忽略扭曲和无法解释的迷和空白的敏感度和捕捉力——即能找到在学术上有意义的真问题而非假问题和无聊问题的学术基本功。"],["阐释叙述","interpretive narration","对田野资料进行意义阐释的写作方法","研究方法","分析范式","语境与阐释","研究者在田野材料的整理和分析的基础上运用其在学科的范式中内化的理论解释能力对这些田野材料进行文化和社会的意义解译的写作方法和写作层次——不是停留在发生了什么（田野描述的浅层），而是解释为什么发生和这意味着什么（阐释的深层）。"],["非常事件","extraordinary event","打破日常生活常规、具有突出学术价值的异常现象","研究方法","田野调查","观察与访谈","突然打破了日常生活的有序的重复的节奏——如突发的自然和人为的灾祸/突发的未被预期的节庆般的社会的集体的亢奋等，在这些非常事件发生的时刻日常被默认的文化规则社会结构和权力关系比平时更加充分地暴露在研究者面前——是为民俗学者提供了黄金观察窗口的事件。"],["非结构化访谈","unstructured interview","没有固定问题框架的自由访谈方式","研究方法","田野调查","观察与访谈","田野访谈中最为开放的一种形式——访谈者不预设任何固定的问题和流程仅以一个非常宽泛的开放问题（如请给我讲讲你小时候是怎么过年的？）作为开端，让被访者按照他/她自己的叙事逻辑展开自由联想和漫谈——给研究者完全意想不到的收获的机会但也费时且各人之间缺乏可比性。"],["一夫一妻制","Monogamy","父系社会确立的单偶婚姻制度","民俗事象","社会民俗","人生礼仪",null],["七夕","Qixi Festival","农历七月初七牛郎织女鹊桥相会","民俗事象","社会民俗","岁时节日",null],["三巡会","Sanxunhui / Triple Patrol Festival","明清时期一年三次的城隍出巡和祭厉活动，演变为大规模民间娱乐","民俗事象","精神民俗","民间信仰","明清时期江南地区一年三次的城隍出巡和祭厉的大型民间宗教和娱乐活动。每年的清明、七月半和十月首的城隍巡城是上海开埠前最大规模的市民狂欢。"],["不落夫家","delayed patrilocal residence","新娘婚后暂不入住夫家的婚俗","民俗事象","社会民俗","人生礼仪",null],["世俗生活叙事诗","secular narrative poem","反映普通民众生活的叙事诗歌","民俗事象","语言民俗","史诗",null],["业缘组织民俗","Occupational Organization Folklore","以行业职业为纽带的社会组织民俗","民俗事象","社会民俗","宗族组织",null],["两兄弟型故事","Two Brothers tale type","兄弟冲突与和解的民间故事类型","民俗事象","语言民俗","民间故事",null],["丧歌/挽歌","Funeral Lament","丧葬仪式中哀悼死者的民间歌曲形式","民俗事象","语言民俗","民歌",null],["丧葬仪礼","Funeral Rituals","处理和安葬死者的一系列仪式习俗，体现灵魂观念","民俗事象","精神民俗","民间信仰",null],["中国民间美术","Chinese Folk Art","中国民众创作的具有实用和审美双重功能的视觉艺术形态的总称","民俗事象","游艺民俗","民间美术","中国民众创作的兼具实用和审美功能的视觉艺术形态的总称，包括年画、剪纸、刺绣、泥塑、皮影和木版画等。区别于文人的纯艺术的中国民间美术强调生活的嵌入性和集体的匿名创作。"],["中秋节","Mid-Autumn Festival","农历八月十五赏月吃月饼象征团圆","民俗事象","社会民俗","岁时节日",null],["乡饮酒礼","village drinking ritual","中国古代基层社会以饮酒为形式的礼仪活动","民俗事象","社会民俗","社交礼俗",null],["买卖婚","marriage by purchase","以金钱财物交易为条件的婚姻形式","民俗事象","社会民俗","人生礼仪",null],["五显信仰","Wuxian belief","福建地区崇拜华光大帝华光天王的民间信仰","民俗事象","精神民俗","民间信仰",null],["交通民俗","Transportation Folklore","传统交通运输设施、工具及行业操作规范和禁忌习俗","民俗事象","物质民俗 传统女鞋","民俗事象","物质民俗","服饰民俗",null],["民间文学论坛","Forum of Folk Literature","中国民间文学领域的重要学术期刊","学者与学术体制","学术组织与刊物","学术刊物","农历的十二月二十三或二十四——民间祭灶送灶神上天的日子。为防灶神上天后在玉帝面前说坏话——以糖瓜等甜和黏的食物封灶神的嘴——是年节的序幕。"],["民族艺术","Ethnic Art","研究民族艺术和民间文化的重要学术期刊","学者与学术体制","学术组织与刊物","学术刊物","除夕——农历年的最后一夜——也是守岁的晚上——全家人围坐在一起彻夜不眠——迎接新一年的第一缕阳光。除夕的核心民俗——贴春联挂年画吃年夜饭守岁发压岁钱和放鞭炮——是年味最浓的夜晚。"],["重阳节","Double Ninth Festival","农历九月初九登高赏菊敬老","民俗事象","社会民俗","岁时节日","汉族的最重要的传统的节日——春节——正月初一。以走亲戚的大拜年——晚辈给长辈磕头拜年长辈给晚辈发红包——互相说吉祥话的祝福——将年节的狂欢推向新的一年的开始。"],["腊八节","Laba Festival","腊月初八，喝腊八粥、泡腊八蒜以祈福丰收的佛教与传统融合节日","民俗事象","社会民俗","岁时节日","农历十二月初八——相传为释迦牟尼成道日——煮食以各种谷物和干果熬制的腊八粥——是进入春节的倒计时的第一个重要的节日。"],["上元节","Shangyuan Festival","正月十五元宵节，赏花灯、猜灯谜、吃元宵，春节庆典的压轴高潮","民俗事象","社会民俗","岁时节日","农历正月十五——道教的称呼为元宵节——是春节的压轴的狂欢的终章。全城和全村——赏花灯猜灯谜和吃元宵——是灯和人的海洋。"],["中元节","Zhongyuan Festival","七月十五，道教地官赦罪之日与佛教盂兰盆会融合，祭祖放河灯超度亡灵","民俗事象","社会民俗","岁时节日","见1063中元节的习俗。农历的七月十五三教合一的祭祖和普度孤魂的鬼节。"],["下元节","Xiayuan Festival","十月十五，道教水官解厄之日，祭祀祖先祈求平安消灾","民俗事象","社会民俗","岁时节日","农历正月十五——灯节——是春节最后和最璀璨的高潮——整座城被千万盏花灯的海洋吞没——猜灯谜、吃元宵和游龙灯——元宵节是中国古代的狂欢节——也是古时被礼教禁锢了一年的青年男女唯一被默许在夜里相识的约会之夜。"],["寒食节","Cold Food Festival","清明前禁火冷食纪念介子推","民俗事象","社会民俗","岁时节日","农历正月初一——中华民族最盛大的传统的节日——以一整套从腊月二十三到正月十五的长达近月的连续的仪式——扫尘祭灶贴春联年夜饭守岁拜年和发红包——构成中国社会的集体的年度的节奏的峰顶。"],["满月","full moon celebration","婴儿出生满一月的庆贺仪式","民俗事象","社会民俗","人生礼仪","农历的正月初七——相传为女娲在正月初一至初六造出了六畜后在第七日造出了人类的诞生日——所以初七是人类的共同的生日。"],["百日","hundred-day celebration","婴儿出生满百天的庆贺仪式","民俗事象","社会民俗","人生礼仪",null],["周岁","first birthday celebration","婴儿满一周岁时举行的庆祝仪式，常设抓周之礼以预测幼儿前途志向","民俗事象","社会民俗","人生礼仪","婴儿出生满一周年时举行的——预测孩子未来的性向和职业的抓周的仪式——以笔墨算盘和胭脂等物——让孩子在其满周岁的宴会上去任意地抓取——以第一次抓到之物来占卜其一生的志趣和命运。"],["抓周","zhouzhou","婴儿满周岁抓取物品预测前途","民俗事象","社会民俗","人生礼仪","中国传统的待客和庆典的最高礼仪——以极品的茶叶和专用的茶具——在静雅的茶室中——主人为客人一遍遍冲泡——客人在品茶的间隙——以手指轻叩桌面表示感谢——茶道将喝茶变为一种精神的修行。"],["过寿","longevity celebration","为年长者庆祝生日的传统礼仪","民俗事象","社会民俗","人生礼仪","春节期间——家庭中供奉祖先灵位的主厅——布置的香案和供品——缭绕的香烟和叩拜的子孙——在辞旧迎新之际——将全家的祖先请回家——与子孙一起享用一桌丰盛的年夜饭——祖先是春节的不在现场的最尊的贵客。"],["做寿","birthday rite for elders","为老人操办寿宴的传统习俗","民俗事象","社会民俗","人生礼仪","农历的二月初二——相传蛰伏了一冬的龙在这天抬头——所以称龙抬头。民间有剃龙头吃龙须面和各种以龙命名的食物的习俗——祈求新一年风调雨顺和好运。"],["交表婚","cross-cousin marriage","与父系姐妹或母系兄弟的子女通婚的制度","民俗事象","社会民俗","婚姻家庭",null],["风水","feng shui","中国传统相地之术，追求人地和谐","民俗事象","精神民俗","民间观念","清明节的标志性的食品——以艾草的汁染绿的糯米的皮——包裹着红豆沙或芝麻的馅——蒸熟后色泽碧绿和软糯——吃青团是江南人过清明的——最温柔的味觉的春的仪式。"],["堪舆","geomancy","风水学说的古称，包括相宅相墓","民俗事象","精神民俗","民间观念",null],["祭地","earth sacrifice","祭祀土地/大地的传统仪式","民俗事象","精神民俗","祭祀仪式",null],["祭河神","river deity sacrifice","祭祀河川神灵以求平安的传统仪式","民俗事象","精神民俗","祭祀仪式","农历正月初五——民间接财神的日子——商家和住家在天未亮便敞开大门燃放鞭炮——以最快的速度将五路财神迎进自己的店铺和家——初五这天店铺重新开门——破除了从除夕到初四的一切禁忌——所以也叫破五。"],["祭海神","sea deity sacrifice","沿海地区祭拜海神祈求渔业丰收的仪式","民俗事象","精神民俗","祭祀仪式","农历的三月三——壮族的最盛大的歌圩的传统节日——青年男女身着盛装聚于山间水畔以山歌对唱传情——三月三也是汉族的上巳节的古老的遗存。"],["祭敖包","ovoo sacrifice","蒙古族祭祀石头堆敖包的传统仪式","民俗事象","精神民俗","祭祀仪式",null],["祭日月","sun-moon sacrifice","祭祀日神和月神的传统仪式","民俗事象","精神民俗","祭祀仪式",null],["祭星辰","star sacrifice","祭祀天上星辰的仪式，尤以北斗七星和太岁为核心祭祀对象","民俗事象","精神民俗","祭祀仪式","中国古代皇家的独享的——对日月星辰等天体进行的祭祀——认为是维持宇宙的运行的必须的国家的礼制的仪式的——北京尚存的明清的日坛月坛和先农坛——即为皇家祭星辰的礼制建筑。"],["祭雷","thunder sacrifice","祭祀雷神的仪式，雷神司掌雷电降雨，天旱时举行祈雨","民俗事象","精神民俗","祭祀仪式","农历的八月十五——与春节和端午并列为中国三大节——以天上月圆人间的团圆为节日的唯一和永恒的主题。全家人聚在一起吃月饼赏圆月——在外的游子望月思乡。2006年被列入首批国家级非遗。"],["祭雨","rain sacrifice","祈雨或祭祀雨神的传统仪式","民俗事象","精神民俗","祭祀仪式","中国传统的情人节——农历的七月初七的夜里——女子在庭院的葡萄架下对着织女星穿针引线的乞巧——祈求赐予灵巧的女红的手艺。源自牛郎和织女的一年一次在鹊桥相会的神话。"],["祭井","well sacrifice","祭祀井神祈求水源清洁的传统仪式","民俗事象","精神民俗","祭祀仪式","日本民俗学之父（1875-1962）。以《远野物语》和《民间传承论》等著作开创了日本民俗学。核心概念包括常民和乡土研究——以一乡一土为田野单位探究日本文化的深层。"],["祭仓","granary sacrifice","祭祀仓神祈求五谷丰登的传统仪式","民俗事象","精神民俗","祭祀仪式","农历的七月的每一天——都是鬼门大开——饿了一整年的孤魂野鬼涌入阳间游荡——社区和寺庙举办集体普度的盂兰盆会——在十字路口烧化堆积如山的银纸——乘着月黑风高——将食物撒向荒野——以喂饱——和安抚这些无人祭祀的——好兄弟。"],["祭厩","stable sacrifice","祭祀六畜之神祈求牲畜平安的传统仪式","民俗事象","精神民俗","祭祀仪式","农历的九月初九——以九为阳数的极数——故称重阳。民间在这一天有登高远眺以避灾、赏菊和饮菊花酒和佩戴茱萸的习俗。1989年中国政府将重阳节定为敬老节。"],["历史-地理学派","Historical-Geographical School","芬兰学派，追踪民间故事历史地理流变以研究原型与传播路径","学者与学术体制","学术流派","历史地理学派","农历十月十五——下元节——与正月十五的上元和七月十五的中元合称为三元。下元节是祭祀水官大帝以求解厄的——道教的传统的节日。"],["杨利慧","Yang Lihui","北京师范大学教授，神话学、动态文类观与当代神话学理论提出者","学者与学术体制","中国学者","当代学者",null],["周星","Zhou Xing","日本爱知大学教授（原北京大学），生活革命、民俗主义与都市民俗学研究代表","学者与学术体制","中国学者","当代学者","中国当代人类学家和民俗学家，曾任北京大学教授和日本爱知大学教授。以汉人社会的宗教人类学和消费文化的研究著称，代表作《百年衣装》等。"],["朝戈金","Chao Gejin","中国社会科学院学部委员，民族文学研究所研究员，口头诗学与史诗学研究代表","学者与学术体制","中国学者","当代学者","中国第一大少数民族——壮族的最有代表性的民间的长篇的诗歌。以男女对唱的五言四句的问答——从开天辟地一直唱到和恋人的分离——壮族的歌圩（三月三）是唱嘹歌的自然的舞台。"],["田野笔记","field notes","田野调查中即时记录观察访谈内容和思考的笔记","研究方法","田野调查","记录与伦理","田野工作者的核心生产工具——在现场快速手写记录和每日结束当晚用键盘扩展补充的关于当天田野生动的观察访谈内容和自己的理论反思和情绪的系统的逐日的田野档案。田野笔记是研究者和学术研究之间的第一手的、未加工的管道。"],["古史辨","Discrimination of Ancient History","顾颉刚领衔的疑古学派及其学术运动","学者与学术体制","学术流派","中国学派","费孝通（1910-2005），中国社会学和人类学的主要奠基人。代表作《乡土中国》提出的差序格局和文化自觉等核心概念——虽不是民俗学家但对中国的农村民俗和民间社会的研究提供了不可替代的理论分析工具。"],["三层文化","three-layer culture","钟敬文提出的中国社会中上层中层下层文化的分层理论框架","理论术语","中国本土理论","钟敬文学派","见'三类文化/三层文化'(#0)的详细释义。钟敬文提出的中国社会文化分层理论框架，将中国文化分为上层（精英正统文化）、中层（城市市民文化）和下层（民众民俗文化）三个层次，强调三层之间的互动渗透关系。"],["日常生活转向","everyday life turn","民俗学从传统民俗事象研究转向关注民众日常生活的理论范式转移","理论术语","中国本土理论","本土方法论","民俗学从仅关注'传统民俗事象'（歌谣、故事、节日等被提取出来的、与日常生活分离的文化元素）转向研究民众日常、平凡、重复性的生活实践本身的理论范式转移。日常生活转向的理论基础主要包括胡塞尔-舒茨的生活世界现象学（关注人们理所当然的'自然态度'）、德塞尔托的日常生活实践理论（关注弱势者在日常中的微观抵抗和创造性实践）和鲍辛格的日常文化研究（关注技术世界中民间文化的形态变化）。在中国民俗学中，高丙中和刘铁梁是日常生活转向的主要推动者。"],["仪式过程","ritual process","特纳的仪式分析核心概念，强调仪式作为动态社会过程的整体性","理论术语","仪式与表演理论","仪式类型与机制","维克多·特纳的仪式分析核心概念，指仪式不是一组静止的程序步骤的集合，而是一个在社会时间中动态展开的、经历不同阶段（分离→阈限→聚合）并在此过程中不断转变参与者身份、关系和文化意义的整体社会过程。'仪式过程'概念的特纳的方法论的革命性在于：它将仪式从'结构分析的对象'（静态地分析仪式的各个程序步骤的象征意义）转化为'过程分析的对象'（动态地追踪参与者如何在仪式展开的不同阶段经历了怎样的身份、关系和意义的转变）。"],["阈限","liminality","特纳从范热内普继承的核心概念，指仪式中居于两个社会状态之间的过渡/边缘阶段","理论术语","仪式与表演理论","仪式类型与机制","见'阈限'的详细释义。维克多·特纳从范热内普继承并系统发展的核心概念（拉丁语limen，意为'门槛'），指仪式中居于两个社会状态之间的过渡/边缘阶段——个体已脱离原有的社会身份但尚未获得新身份，处于'既不是这个也不是那个'的模棱两可的、身份模糊的、结构上的'不可见'状态。特纳的核心发现是：阈限状态具有'反结构'特征——日常的等级差异被暂时悬置，所有阈限者处于平等的、无差别的、高度团结的共睦态（communitas）体验中。阈限概念现已远超仪式研究，泛化应用于分析一切社会文化中'之间'（in-between）的过渡状态——如移民的身份阈限、数字时代的虚实阈限。"],["分离礼仪","rites of separation","根纳普过渡礼仪第一阶段，个体脱离原有社会地位和身份","理论术语","仪式与表演理论","仪式类型与机制","范热内普'通过礼仪'三阶段理论的第一阶段。分离礼仪的核心功能是将个体从原有的社会身份、社会关系和社会群体中象征性地'切割'出去——丧礼中为亡者换上寿衣并将其遗体从居住空间移出（标志着亡者从活人社会中的分离），婚礼中新娘离开娘家时跨过火盆（标志着其与娘家身份的分离——尽管只是象征性的），成年礼中将少年送到村外隔离棚中（标志着其与童年身份的分离）。分离礼仪的共同操作是给个体一个明确的'断开'仪式标记。"],["阈限礼仪","liminal rites","根纳普过渡礼仪第二阶段，个体处于过渡/边缘的模棱两可状态","理论术语","仪式与表演理论","仪式类型与机制","范热内普通过礼仪三阶段理论的第二阶段——阈限礼仪——是个体在脱离了旧有的社会身份后但尚未获得新身份的过渡的模糊的危险的仪式阶段。该阶段的个体被视为既不属于此也不属于彼的非人。"],["聚合礼仪","rites of incorporation","根纳普过渡礼仪第三阶段，个体以新的身份重新融入社会","理论术语","仪式与表演理论","仪式类型与机制","范热内普通过礼仪三阶段理论的第三阶段——聚合礼仪——仪式的主体以全新的社会身份被正式地重新接纳进入社会和家庭。如在丧礼后的除服标志着丧家成员回归正常的世俗生活的轨道。"],["表演的艺术","art of performance","鲍曼表演理论核心概念，关注言语艺术在特定语境中的呈现过程","理论术语","仪式与表演理论","表演与展演理论","理查德·鲍曼在《作为表演的口头艺术》（1977）中提出的核心概念和分析框架，关注语言艺术（故事讲述、民歌演唱、祝酒辞令等口头表演）在特定社会文化语境中的动态呈现过程——不仅是'讲出来的内容'（文本），更包括'如何讲'（表演的技巧和策略）、'谁讲给谁听'（表演者和听众的互动关系）、'在什么场合讲'（表演的场合性和适用性）和'讲了以后有什么效果'（表演的社会后果）。'表演的艺术'为民俗学提供了从文本中心论到事件中心论的方法论转换——民俗研究不再是'收集文本—分类整理—分析内容'，而是'观察事件—分析过程—理解互动'。"],["科学民族志","scientific ethnography","马林诺夫斯基确立的基于参与观察法的民族志范式","研究方法","民族志方法","民俗志类型","马林诺夫斯基在特罗布里恩群岛长期的田野驻在（1915-1918）的基础上确立的现代人类学和民族志的科学民族志的写作范式。科学民族志的三大支柱是：参与观察法和当地语言的使用——长期地与当地人一起在日常生活中劳作和生活；关于土著观点的第一手经验呈现；整体论的——不分离的、全面的文化描述。"],["解释人类学","interpretive anthropology","以人类生物性和文化性为研究对象的综合学科","理论术语","社会与群体理论","社会理论与民俗","以克利福德·格尔茨（Clifford Geertz）为代表的美国文化人类学理论流派和学术范式。格尔茨将韦伯的'人是悬在自己编织的意义之网上的动物'命题扩展为文化概念——'文化就是这些意义之网'，人类学的任务不是寻找规律而是'解释'这些意义——通过对具体的文化实践（如巴厘岛的斗鸡、摩洛哥的集市交易）进行'深描'（thick description），层层挖掘日常行为的文化意义结构。解释人类学对民俗学最重要的方法论遗产是'深描'——民俗学家面向一个看似简单的民俗行为（如烧纸钱）时，不是急于给出功能解释，而是深入地理解对当地人来说这一行为承载的经验和意义结构。"],["川菜","Sichuan cuisine","四川菜系麻辣著称八大菜系之一","民俗事象","物质民俗","饮食民俗",null],["鲁菜","Shandong cuisine","山东菜系咸鲜为主八大菜系之首","民俗事象","物质民俗","饮食民俗",null],["粤菜","Cantonese cuisine","广东菜系清淡鲜美八大菜系之一","民俗事象","物质民俗","饮食民俗",null],["苏菜","Jiangsu cuisine","江苏地方菜系，以淮扬菜为代表，刀工精细，口味清鲜平和","民俗事象","物质民俗","饮食民俗","中国传统的四大菜系之一——以淮安和扬州为中心的——以刀工的精绝、火候的中庸和本味的鲜美为最核心的烹饪的美学的——国宴的最常选的基础的菜系。"],["浙菜","Zhejiang cuisine","浙江地方菜系，以杭州菜为代表，鲜嫩软滑，注重原味","民俗事象","物质民俗","饮食民俗",null],["闽菜","Fujian cuisine","福建地方菜系，以福州菜为代表，以汤菜和海鲜见长","民俗事象","物质民俗","饮食民俗",null],["湘菜","Hunan cuisine","湖南地方菜系，以香辣著称，油重色浓，煨炖功夫深厚","民俗事象","物质民俗","饮食民俗",null],["徽菜","Anhui cuisine","安徽地方菜系，以烹制山珍野味见长，重油重色重火功","民俗事象","物质民俗","饮食民俗",null],["京菜","京 cuisine","北京地方菜系，以宫廷菜和清真菜为基础，涮羊肉和烤鸭为代表","民俗事象","物质民俗","饮食民俗","以北京为中心的——融合了明清宫廷的满汉全席和回民的清真和山东菜的——以烤鸭和涮羊肉为代表的中国北方的传统的菜肴的系统。"],["沪菜","沪 cuisine","上海地方菜系，融合各地风味，红烧为本帮菜特色","民俗事象","物质民俗","饮食民俗",null],["东北菜","东 cuisine","东北三省地方菜系，以炖菜和酱制为主，分量足口味浓郁","民俗事象","物质民俗","饮食民俗","以辽宁吉林和黑龙江为中心的中国东北地区的——以猪肉、粉条和酸菜为灵魂的——以大锅的乱炖、锅包肉和小鸡炖蘑菇为代表的——粗犷和硬和分量巨大的——最适合于抵御零下三十度的严寒的丰腴的重口味的北国的民间的菜肴。"],["米饭","米饭 (traditional Chinese food/drink)","中国传统主食，以稻米煮制，南方为主食区，是中国人最基础的日常食物","民俗事象","物质民俗","饮食民俗","中国南方——尤其是长江以南——的最基础的日常的主食。米饭在大米的蒸煮之外——还可制成米粉米线和肠粉等百变的形态——是南方民俗和日常生活的最核心的物质的基础。"],["面条","noodles","中国传统主食之一，以小麦粉制成的细长条状食品，有长寿和顺利的象征意义","民俗事象","物质民俗","饮食民俗","以小麦的面粉为原料——经过和面、醒面和手工的抻拉或刀切——制成的细长的条状的中国的和东亚的最普及的传统的面食。从兰州的拉面到北京的炸酱面——每一种面都是当地民俗的舌头上的名片。"],["馒头","mantou (steamed bun)","中国传统发酵面食，以小麦粉发酵蒸制，北方主食之一，也有祭祀用途","民俗事象","物质民俗","饮食民俗","以小麦的面粉经过自然发酵后蒸制的——蓬松和圆润的半球形的——是中国北方最基础的日常的主食。在民俗中馒头还被用作祭祀的供品——以馒头的圆润喻圆满。"],["包子","baozi (steamed stuffed bun)","中国传统带馅发酵面食，以面皮包裹馅料蒸制而成，品种丰富各地风味各异","民俗事象","物质民俗","饮食民俗","以发酵的面皮包裹着预先调制好的咸或甜的馅料——经过蒸制而成的——带馅的不露馅的面点。天津的狗不理——和上海的南翔的小笼包——是中国包子两座不可逾的高峰。"],["饺子","dumplings (jiaozi)","以面皮包裹馅料的传统面食","民俗事象","物质民俗","饮食民俗",null],["馄饨","wonton","中国传统薄皮包馅食品，以极薄的面皮包裹肉馅煮制，汤清味鲜","民俗事象","物质民俗","饮食民俗","以极薄的非发酵的面皮——包裹微少的肉馅——在沸腾的高汤中快速的一烫即熟的——皮薄馅小汤鲜的面点。四川的红油抄手——和广东的鲜虾云吞面——是馄饨的两个王。"],["粽子","zongzi (sticky rice dumpling)","用粽叶包裹糯米蒸煮端午传统食品","民俗事象","物质民俗","饮食民俗",null],["月饼","mooncake","中秋节传统糕点，圆形寓意团圆，以面粉和各种馅料制成，是中秋佳节最具代表性的食品","民俗事象","物质民俗","饮食民俗","中秋节专属的节令的糕饼——圆如满月——寓意天上和人间的大团圆。广式的皮薄馅靓和苏式的酥皮的千层——是现代月饼的南北的两大阵营。"],["汤圆","tangyuan (glutinous rice balls)","糯米粉制成的球形甜品，元宵节必食，象征家庭团圆美满","民俗事象","物质民俗","饮食民俗","正月十五元宵节专属的节令的甜食——以糯米的外皮包裹着黑芝麻和花生的甜馅——在水中煮沸至漂浮——圆润的汤圆象征着家庭的团圆和美满。"],["年糕","niangao (rice cake)","春节传统食品象征年年高升","民俗事象","物质民俗","饮食民俗",null],["烧饼","shaobing (flatbread)","中国传统烤制面食，以面粉和芝麻等制成，外酥内软，各地有不同变体","民俗事象","物质民俗","饮食民俗","以小麦面粉——通过烤炉的贴壁的烘烤——制成的外酥内软的多层酥脆的扁平的圆形的面饼。从西北的馕、到华北的吊炉烧饼——再至江南的蟹壳黄——烧饼是丝路上旅人的最古老的便携干粮。"],["油条","youtiao (fried dough stick)","中国传统油炸面食，两根面条绞合炸制，常配豆浆成早餐","民俗事象","物质民俗","饮食民俗","以两根绞在一起的面胚——在沸腾的油锅的高温中炸至膨松金黄的——中国全民的早餐的黄金搭档。油条配豆浆——是中国城镇和乡村的最平凡的清晨的味觉的胎记。"],["煎饼","jianbing (savory crepe)","以面糊摊烙而成的薄饼，山东天津等地为日常主食","民俗事象","物质民俗","饮食民俗",null],["茶文化","Tea Culture","围绕茶叶种植制作品饮和礼仪形成的综合文化体系","民俗事象","社会民俗","岁时节日",null],["酒文化","Alcohol Culture","围绕酿酒饮酒酒器和酒礼形成的综合文化体系","民俗事象","社会民俗","岁时节日",null],["白酒","baijiu (white liquor)","以谷物为原料经发酵蒸馏制成的中国传统烈酒","民俗事象","物质民俗","饮食民俗",null],["黄酒","huangjiu (yellow rice wine)","以糯米为原料经发酵酿制的中国传统酿造酒，温饮为佳","民俗事象","物质民俗","饮食民俗",null],["米酒","米酒 (traditional Chinese food/drink)","以糯米发酵制成的低度甜酒，又称酒酿醪糟","民俗事象","物质民俗","饮食民俗",null],["酥油茶","酥油茶 (traditional Chinese food/drink)","以砖茶酥油和盐打制而成的藏族传统饮品","民俗事象","物质民俗","饮食民俗",null],["奶茶","奶茶 (traditional Chinese food/drink)","以茶和奶混合制成的饮品，蒙古族和新疆各民族的日常饮品","民俗事象","物质民俗","饮食民俗","将优质的红茶砖茶和水与鲜奶和盐——在铜壶中反复的扬汤和煮沸——制成的咸味的奶饮。是蒙古族和藏族的牧民每日不可或缺的驱寒解腻和补充维生素的生命之饮。"],["豆浆","soy milk","以大豆磨制的植物蛋白饮品，中国传统早餐的基本组成","民俗事象","物质民俗","饮食民俗",null],["酸梅汤","酸梅汤 (traditional Chinese food/drink)","以乌梅山楂冰糖等熬制的消暑饮品，老北京传统解暑佳品","民俗事象","物质民俗","饮食民俗","以乌梅、山楂、桂花和冰糖在泉水中慢火熬制——冰镇后饮用的——老北京夏日最经典的解暑的传统的饮料。酸梅汤的摊是京城旧时夏日街头的最亲切的记忆。"],["凉茶","凉茶 (traditional Chinese food/drink)","以中草药熬制的清热解毒饮品，广东民间传统保健饮品","民俗事象","物质民俗","饮食民俗",null],["炒","炒 (Social Folklore / Seasonal Festivals)","中国烹饪核心技法之一，食材在热锅中快速翻拌加热成熟，讲究火候和锅气","民俗事象","社会民俗","岁时节日","中国烹饪最核心和最基本的热菜的技法——在烧至高温的炒锅和极少的油中以最迅猛的火力和不停歇的颠勺——在数十秒内将食材的鲜锁定——让蔬菜断生而脆。是中国的家庭厨房的灵魂技艺。"],["蒸","蒸 (Social Folklore / Seasonal Festivals)","中国烹饪基本技法，以水蒸气为热介质将食材制熟，最能保持食材原味和营养","民俗事象","社会民俗","岁时节日","以持续沸腾的水蒸气为热能的介质——非直接浸入水或油中——将食材隔水慢慢地蒸熟——最完好地保存了食物原形的鲜美和营养的——最古老的健康的烹饪技法。"],["煮","煮 (Social Folklore / Seasonal Festivals)","以水或汤汁为介质将食材加热成熟的烹饪技法，汤水共食或弃汤取料均可","民俗事象","社会民俗","岁时节日","以大量的水为导热的介质——将食材全部浸没在水中——持续地加热至沸腾——使食材烂熟——汤水交融。是煲汤和熬粥的不二的基础的烹法。"],["炖","炖 (Social Folklore / Seasonal Festivals)","以小火长时间加热的烹饪技法，使食材酥烂入味汤汁浓郁","民俗事象","社会民俗","岁时节日","以密闭的锅具和微量的水——在长时间的低温和文火的慢攻下——将坚韧的大块的肉和骨头的胶质和骨髓彻底地融化和酥烂为颤巍巍的半透明凝冻的——最耗费时间但也最回馈味道的烹饪之法。"],["烤","烤 (Social Folklore / Seasonal Festivals)","以明火或辐射热将食材直接加热成熟的烹饪技法","民俗事象","社会民俗","岁时节日",null],["炸","炸 (Social Folklore / Seasonal Festivals)","以大量热油将食材浸没加热成熟的烹饪技法","民俗事象","社会民俗","岁时节日",null],["涮","涮 (Social Folklore / Seasonal Festivals)","将薄切食材在沸汤中快速烫熟的进食方式，以涮羊肉为代表","民俗事象","社会民俗","岁时节日","以餐桌的中心的一口持续沸腾的高汤的铜锅为舞台——食客们围炉而坐——亲自夹起切得极薄的鲜羊肉片——在滚汤中快速地涮几下——肉色一变白就立刻夹出——蘸着芝麻酱和韭花酱入口——的极具社交和参与仪式感的北方的冬日的烹饪和饮食的合体的民俗。"],["焖","焖 (Social Folklore / Seasonal Festivals)","将食材加盖以小火加热汤汁收浓至熟的烹饪技法","民俗事象","社会民俗","岁时节日",null],["煨","煨 (Social Folklore / Seasonal Festivals)","以极小火长时间加热使食材酥烂的烹饪技法","民俗事象","社会民俗","岁时节日","以生石灰将一整张牛皮上的毛蚀去——再经晾干刨平和雕刻和彩绘——制成的半透明的极繁复的平面偶人。皮影戏的演员在幕布后以竹签操弄着皮影——背后的灯光将影子投射在幕布——是电影的发明的古老灵感。"],["卤","卤 (Social Folklore / Seasonal Festivals)","以香料酱油等调制的卤水中慢火浸煮食材的烹饪技法","民俗事象","社会民俗","岁时节日",null],["熏","熏 (Social Folklore / Seasonal Festivals)","以烟熏材料产生的烟气熏制食材使其具有特殊风味的技法","民俗事象","社会民俗","岁时节日","以焖烧的茶叶和松柏的枝桠不完全燃烧的芳香的烟——在密闭的熏炉中慢慢地渗透悬挂在上方的已经腌渍过的肉和鱼和豆干——将烟熏的独特的炭火的焦香锁入食材的纤维的——中国传统的保存和增香的烹法。"],["腊","腊 (Social Folklore / Seasonal Festivals)","以盐腌制后风干或烟熏的肉类保存和加工方式","民俗事象","社会民俗","岁时节日",null],["筷子","筷子 (Social Folklore / Seasonal Festivals)","中国传统进食工具，一双两支，以竹木金属等制成，有三千余年使用历史","民俗事象","社会民俗","岁时节日","中国和东亚的饮食文化的最标志性的进食的餐具——以两根等长的细棍——以拇指和食指和中指的协调——夹、拨、挑、拌——代替刀叉和手抓的——在中国的餐桌上的民俗中——筷子不仅是工具更是礼仪和禁忌的载体。"],["碗","碗 (Social Folklore / Seasonal Festivals)","中国传统饮食盛器，以陶瓷制成，圆形象征圆满和谐","民俗事象","社会民俗","岁时节日",null],["碟","碟 (Social Folklore / Seasonal Festivals)","中国传统小型盘状食器，用于盛放菜肴和调味料","民俗事象","社会民俗","岁时节日",null],["砂锅","砂锅 (Social Folklore / Seasonal Festivals)","以陶土烧制的锅状炊具和盛器，保温性好适合煲汤炖菜","民俗事象","社会民俗","岁时节日",null],["火锅","hot pot","以沸水涮煮食材即时食用的饮食方式","民俗事象","物质民俗","饮食民俗",null],["蒸笼","蒸笼 (Social Folklore / Seasonal Festivals)","以竹木制成的层叠蒸食器具，利用蒸汽将食物蒸熟","民俗事象","社会民俗","岁时节日",null],["石磨","石磨 (Social Folklore / Seasonal Festivals)","以两块圆形石盘组成的传统磨制工具，用于将谷物磨成粉或浆","民俗事象","社会民俗","岁时节日","上下两扇圆形的石盘——以人力或畜力和水力驱动——将小麦玉米和黄豆在两石之间被碾磨成粉和浆的——推动了中国几千年农耕的饮食的革命的——中国农村最基础的古朴的加工的工具。"],["碾子","碾子 (Social Folklore / Seasonal Festivals)","以石碾和碾盘组成的谷物加工工具，给谷物脱壳或碾碎","民俗事象","社会民俗","岁时节日",null],["灶台","灶台 (Social Folklore / Seasonal Festivals)","中国传统厨房中以砖石砌筑的烹饪火灶，上方置锅下方生火，灶神居其间","民俗事象","社会民俗","岁时节日","中国农村家庭厨房的核心设备——以砖和土坯砌成的固定的火灶。灶台不仅是烹饪的场所更是灶神的神龛所在——小年祭灶是中国年俗的最核心的仪式之一。"],["火塘","火塘 (Social Folklore / Seasonal Festivals)","设在室内地面中心的火坑，兼具取暖炊煮和社交功能，在西南少数民族中尤为普遍","民俗事象","社会民俗","岁时节日","农历的五月初五——为纪念屈原——以赛龙舟的百舸争流和包裹和食用粽子的清香的竹叶糯米的——并以在门上悬挂艾草和菖蒲以驱邪避瘟的——与春节和中秋并列为中国三大节的——全民的卫生和体育和美食的民俗的大节。"],["年夜饭","年夜饭 (Social Folklore / Seasonal Festivals)","除夕夜全家团聚共享的年度最重要的一餐，菜肴丰盛讲究吉祥寓意","民俗事象","社会民俗","岁时节日","农历除夕——全家族不论多远都要赶回聚在一起的——一年中最重要的一顿晚餐。菜肴的丰盛和团圆的象征意义远超越了果腹——吃的是团圆和辞旧迎新。"],["团圆饭","团圆饭 (Social Folklore / Seasonal Festivals)","重要节日全家团聚共进的餐食，以饮食凝聚亲情和家族认同","民俗事象","社会民俗","岁时节日","强调全家老少全员到齐的——不分家的——象征家庭圆满和和睦的最重要的年节的家宴。年夜饭就是最典型的团圆饭。"],["满汉全席","满汉全席 (Social Folklore / Seasonal Festivals)","清代宫廷最高规格的筵席，融合满洲烧烤和汉族烹饪精华，菜式多达百余道","民俗事象","社会民俗","岁时节日","清朝康熙和乾隆年间——宫廷的御厨将满族和汉族的烹饪的顶级技艺融为一体——共一百零八道菜的庞大的宴席的体系。是中华饮食的奢侈和技艺的巅峰的综合的展示。"],["全羊席","全羊席 (Social Folklore / Seasonal Festivals)","以羊全身各部位制作完整宴席的清真宴式，为回族等穆斯林民族的最高待客之礼","民俗事象","社会民俗","岁时节日","蒙古族的最高规格的传统的宴客的礼仪——以整只的羊为主角——从羊头到羊尾每一部位都有固定的分食的社会等级的规矩——体现了草原民族的待客的最高礼仪和饮食的民俗。"],["长桌宴","长桌宴 (Social Folklore / Seasonal Festivals)","苗族侗族等以长条桌拼成的集体宴席方式，全村共宴不分主客","民俗事象","社会民俗","岁时节日","苗、侗等西南少数民族在重大的节庆时将数十张方桌首尾拼接成数十米的超长的一条龙的宴席——全寨男女老少和宾客在露天沿桌而坐共享盛宴的——无差等的社区的集体的饮食的狂欢。"],["流水席","流水席 (Social Folklore / Seasonal Festivals)","宴席客随到随开随吃随走的流水形式，多见于乡村婚丧大事宴请","民俗事象","社会民俗","岁时节日","农村的婚丧和庙会的大事的宴客的模式——客随到随开席——不分批次的流水般不间断的供应——吃完一批走一批再来一批的——应对农村大客流的最有效率的宴席的模式。"],["祭祀食品","祭祀食品 (Social Folklore / Seasonal Festivals)","用于供奉祖先和神灵的特定食品，祭后分食以分享神祖赐福","民俗事象","社会民俗","岁时节日","专门为供奉神灵和祖先而精心制作的——在日常生活中不常吃的——具有象征意义和特定格式的食物。如祭祖的三牲（猪头、鸡和鱼）和清明的青团等。祭后的分食被视为共享神灵的赐福。"],["节令食品","节令食品 (Social Folklore / Seasonal Festivals)","与特定岁时节日相对应的标志性食品，如元宵、粽子、月饼等","民俗事象","社会民俗","岁时节日","与特定的岁时节日具有唯一的和不可置换的捆绑关系的——过了这个节日就不再食用的——标志性的食品。如元宵节的汤圆、端午的粽子和中秋的月饼。吃节令食品本身就是过节的民俗的核心。"],["秦腔","Qinqiang opera","流行于西北 (Chinese lute)","四弦梨形音箱传统弹拨乐器","民俗事象","游艺民俗","民间音乐",null],["阮","阮 (Chinese musical instrument)","阮，游艺民俗中民间音乐相关的传统乐器","民俗事象","游艺民俗","民间音乐",null],["扬琴","扬琴 (Chinese musical instrument)","扬琴，游艺民俗中民间音乐相关的传统乐器","民俗事象","游艺民俗","民间音乐",null],["古筝","guzheng (Chinese zither)","长方形音箱多弦传统弹拨乐器","民俗事象","游艺民俗","民间音乐",null],["古琴","guqin (seven-string zither)","中国最古老的弹拨乐器之一，七弦十三徽，音色古朴深沉，位列琴棋书画四艺之首","民俗事象","游艺民俗","民间音乐","中国文人最推崇的弹拨的弦乐器——已有三千多年的有文字可考的史。以其清微淡远的音色和繁复的指法——古琴在2003年入选联合国非遗的代表作——居中国四大艺术琴棋书画之首。"],["三弦","三弦 (Chinese musical instrument)","三弦，游艺民俗中民间音乐相关的传统乐器","民俗事象","游艺民俗","民间音乐","中国的传统的瓷质的吹孔的乐器——形似鸡蛋——有多个指孔——吹出的声音古朴和苍凉和幽深——在千年的文物的河南和陕西的古墓中常有出土——是中国最古老的保留至今的泥土的乐器。"],["马头琴","morin khuur (horse-head fiddle)","蒙古族传统拉弦乐器琴头雕刻马头","民俗事象","游艺民俗","民间音乐",null],["冬不拉","冬不拉 (Chinese musical instrument)","冬不拉，游艺民俗中民间音乐相关的传统乐器","民俗事象","游艺民俗","民间音乐",null],["芦笙","芦笙 (Chinese musical instrument)","芦笙，游艺民俗中民间音乐相关的传统乐器","民俗事象","游艺民俗","民间音乐","中国传统乐器的王者——以青铜铸造的巨大编钟——按音律排列悬挂于架上——以木槌敲击——音域宽广音色雄浑——先秦曾侯乙墓出土的六十五件全套编钟是古代音乐的惊世的遗珍。"],["棉纺","棉纺 (Chinese traditional craft)","棉纺，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["麻纺","麻纺 (Chinese traditional craft)","麻纺，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["丝纺","丝纺 (Chinese traditional craft)","丝纺，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺","有两千多年历史的中国最重要的弹拨的弦乐器——以木质的梨形的共鸣箱和四根金属或丝弦——以指甲的弹拨——音色清脆和明亮——是民间的戏曲和说唱的最核心的伴奏的乐器——也是独奏的乐器。白居易的《琵琶行》将其推至了文学的神坛。"],["毛纺","毛纺 (Chinese traditional craft)","毛纺，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺","有两根弦的中国传统的拉弦的乐器——以琴筒和蟒皮的膜和琴弓的马尾的摩擦——发出酷似人声的歌唱的——最善于表现悲哀和深沉的情感。阿炳的《二泉映月》使二胡登上了世界的音乐殿堂。"],["纺车","纺车 (Chinese traditional craft)","纺车，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺","中国传统的拨弦的乐器——以泡桐的木为长方形的共鸣箱——有二十一根弦——筝的音色华丽和明亮——以大幅度的刮奏模拟流水的效果——是古今最受仕女喜爱的弹拨的乐器。"],["织机","织机 (Chinese traditional craft)","以经纬交织原理织造布匹的机械，从腰机到脚踏提综织机的演进推动了中国纺织文明","民俗事象","物质民俗","民间工艺","将棉花和麻和丝的纤维纺成纱线——并将纱线经纬交叉织造成布的——中国几千年农耕文明的最基础的纺织的机械。黄道婆是元代棉纺的织机的改革的传奇。"],["提花","提花 (Chinese traditional craft)","提花，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["印染","印染 (Chinese traditional craft)","在织物上印制花纹图案和染色的传统工艺，包括蜡染扎染夹缬等技法","民俗事象","物质民俗","民间工艺","在天然的棉麻丝的面料上——以蜡染扎染和蓝印花布等传统的防染的技艺——创造出千变万化的蓝白的花纹的——中国民间最古朴和最雅致的纺织的装饰的工艺。"],["蓝印花布","蓝印花布 (Chinese traditional craft)","蓝印花布，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["扎染","tie-dye","以线绳捆扎防染的手工印染工艺","民俗事象","物质民俗","民间工艺",null],["蜡染","batik","以蜡为防染剂的手工印染工艺","民俗事象","物质民俗","民间工艺",null],["夹缬","夹缬 (Chinese traditional craft)","夹缬，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["青瓷","青瓷 (Chinese traditional craft)","施以青色釉的瓷器，以浙江越窑为代表，是中国最早的成熟瓷种","民俗事象","物质民俗","民间工艺","中国最早的成熟的瓷器——在东汉的越窑烧制成功——以铁为呈色剂的青绿色的釉——类玉和似冰——是中国的瓷的母亲。宋代的龙泉青瓷将青瓷的釉的美推至了人类陶瓷史的极限。"],["白瓷","白瓷 (Chinese traditional craft)","胎釉洁白无铁的瓷器，河北邢窑和定窑为代表","民俗事象","物质民俗","民间工艺",null],["青花瓷","blue-and-white porcelain","钴料在白瓷胎上绘制纹饰的陶瓷珍品","民俗事象","物质民俗","民间工艺",null],["粉彩","粉彩 (Chinese traditional craft)","粉彩，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["斗彩","斗彩 (Chinese traditional craft)","斗彩，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["钧窑","钧窑 (Chinese traditional craft)","宋代五大名窑之一，以铜红釉和窑变为特色，产地在河南禹州","民俗事象","物质民俗","民间工艺","宋代五大名窑之一——位于河南禹州——以神奇的窑变——铜在窑火的高温还原中不可预测地幻化为姹紫嫣红的晚霞般的釉彩——入窑一色出窑万彩——为宋代皇家的御用的瓷窑。"],["汝窑","汝窑 (Chinese traditional craft)","宋代五大名窑之首，以天青釉和支钉烧造为特征，存世极罕","民俗事象","物质民俗","民间工艺","宋代五大名窑之首——位于河南汝州——以天青色的釉的雨过天青云破处的极致的含蓄的宋徽宗的美学——烧造仅二十余年便因金兵入侵而断代——全世界现存完整器不足百件——是中国的瓷皇。"],["官窑","官窑 (Chinese traditional craft)","宋代朝廷自置的瓷窑，专门烧造宫廷用瓷","民俗事象","物质民俗","民间工艺",null],["哥窑","哥窑 (Chinese traditional craft)","宋代五大名窑之一，以开片纹和金丝铁线为特色","民俗事象","物质民俗","民间工艺",null],["定窑","定窑 (Chinese traditional craft)","宋代五大名窑之一，以白釉印花和覆烧工艺著称，产地在河北曲阳","民俗事象","物质民俗","民间工艺","宋代五大名窑之一——位于河北曲阳——以白釉的印花和刻花的精美的纹饰著称——是宋代贡瓷中烧造时间最长产量最大的白瓷的窑口。"],["景德镇","景德镇 (Chinese traditional craft)","景德镇，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["宜兴紫砂","宜兴紫砂 (Chinese traditional craft)","宜兴紫砂，物质民俗中民间工艺相关的传统民间工艺","民俗事象","物质民俗","民间工艺",null],["德化白瓷","德化白瓷 (Chinese traditional craft)","福建德化出产的乳白如凝脂的白瓷，以何朝宗的瓷塑佛像最为著名","民俗事象","物质民俗","民间工艺","福建省德化县——明代以来以何朝宗为代表的白瓷的瓷塑——尤其是白瓷的观音和达摩的像——以象牙白的温润如玉的瓷质和飘逸的衣纹——被欧洲人誉为中国白和东方艺术的明珠。"],["龙泉青瓷","龙泉青瓷 (Chinese traditional craft)","浙江龙泉出产的青瓷，以粉青梅子青釉色和厚釉工艺著称","民俗事象","物质民俗","民间工艺","浙江龙泉——以粉青和梅子青的厚釉——失透的如美玉的温润——宋元时期远销亚非欧三大洲的海上瓷器之路的大宗的出口的商品——2009年龙泉青瓷被列入联合国非遗代表作。"],["窑洞","yaodong (cave dwelling)","黄土高原在土崖上挖掘的居住形式","民俗事象","物质民俗","居住建筑",null],["土楼","tulou (earthen building)","以生土夯筑的巨型环形或方形围合式住宅，闽西和粤东客家民居的代表","民俗事象","物质民俗","居住建筑","福建西部客家人聚居的——用生土夯筑而成的——高达四五层的庞大的圆形的和方形的集体的住宅的堡垒。一座土楼即是一个小的宗族的社会——可容纳数百人——2008年被列入世界文化遗产。"],["围龙屋","围龙屋 (Material Folklore / 居住建筑)","客家地区以半圆形围屋和前方池塘构成的聚族而居的大型民居","民俗事象","物质民俗","居住建筑","粤东北的客家人传统的聚居的大屋——以堂屋为中心前半部为半月形的水塘后半部为半圆的围屋——合成一个完整的太极图的圆。是客家人千年的南迁的家族凝聚的不散的堡垒。"],["吊脚楼","diaojiaolou (stilted house)","南方少数民族底层架空的木构住宅","民俗事象","物质民俗","居住建筑",null],["一颗印","一颗印 (Material Folklore / 居住建筑)","云南传统合院式民居，平面方正紧凑似印章，适应高原气候","民俗事象","物质民俗","居住建筑","云南昆明地区的汉族的传统的合院的民居——平面方正紧凑——外墙高耸少窗——如一封印章盖在高原的坝子上——故得名一颗印。"],["碉房","碉房 (Material Folklore / 居住建筑)","藏族和羌族以石砌筑的多层平顶住宅，底层养畜顶层为经堂","民俗事象","物质民俗","居住建筑","青藏高原的藏族的传统的石砌的碉堡式的民居——下宽上窄——外墙极厚——平顶——底层圈牲畜顶层为经堂——外观粗犷如山石——是人与严酷的高原气候搏斗的智慧的结晶。"],["毡房","毡房 (Material Folklore / 居住建筑)","游牧民族以木架和毛毡搭建的可拆卸圆形帐篷，即蒙古包的别称","民俗事象","物质民俗","居住建筑","蒙古和哈萨克等游牧民族的便携的圆顶的毡帐——以木的格框为骨架——外覆厚厚的羊毛毡——可在一小时内拆装——是游牧民跟随水草的移动的家的建筑。"],["蒙古包","蒙古包 (Material Folklore / 居住建筑)","以木架和毛毡搭建的游牧民族圆形可移动住宅","民俗事象","物质民俗","居住建筑",null],["竹楼","bamboo house","以竹子为主要建材的干栏式建筑，适应湿热气候的傣族等传统民居","民俗事象","物质民俗","居住建筑","云南西双版纳的傣族的高脚的干栏式的竹木的民居。底层架空以避潮湿和蛇虫——上层住人——尖耸的歇山的屋顶利于排雨——与热带的雨林融为一体。"],["石板房","stone slab house","以天然薄石板为瓦盖屋顶的山区民居，贵州布依族等地较为典型","民俗事象","物质民俗","居住建筑","贵州和云南的一些山区的居民——以当地的薄层的石板代替瓦片——盖在木的构架上——冬暖夏凉的——不费一砖一瓦的石头的村寨的民居。"],["地坑院","dikengyuan (sunken courtyard)","在黄土塬上向下挖掘形成的下沉式窑洞院落，河南三门峡一带的独特民居","民俗事象","物质民俗","居住建筑","河南和陕西的黄土地上的一种独特的——向地下挖一个方形的深坑作为庭院——四壁再凿出窑洞——从地面看只见树冠不见房屋的——地平线以下的无建筑师的建筑的奇迹。"],["骑楼","qilou (arcade building)","沿街楼房底层退让为有顶人行道的建筑形式，适应南方多雨气候","民俗事象","物质民俗","居住建筑","近代的广东和广西和福建沿海的城镇——临街的楼房——底层退让出一条有顶盖的公共的步行的长廊的廊道——为行人遮阳和避雨的——融合了欧洲的券廊和岭南的湿热气候的需要。"],["弄堂","longtang (lane)","上海等地里弄住宅之间的巷道空间，是上海市民生活的重要公共空间","民俗事象","物质民俗","居住建筑","上海的特色的——十九世纪末到二十世纪中叶建造的——中西合璧的联排的石库门的住宅构成的小尺度的邻里的小巷。弄堂是上海市民的日常生活的——马桶、生煤炉和乘风凉的——五味杂陈的微型江湖。"],["胡同","hutong (alley)","北京和北方城市中连接各个四合院的巷道，是北京城市肌理和文化的重要载体","民俗事象","物质民俗","居住建筑","北京的棋盘式街道的网络——元大都时奠定的基础——以东西向排列的——两侧灰砖的四合院的高墙夹出的——静谧的不宽的巷子。胡同是老北京的毛细血管。"],["犁","犁 (Material Folklore / 生产生计)","以畜力或机械力牵引的翻土农具，是中国传统农业最基本的生产工具","民俗事象","物质民俗","生产生计","以畜力牵引的翻耕土地的古老的农具——铁铸的犁头切开板结的土壤——是人类最早摆脱以人力持耒耜的农耕革命。也是中国数千年农耕文明最不可缺的象征的器物。"],["耙","耙 (Material Folklore / 生产生计)","用于碎土平地的农具，犁翻之后以耙将土块耙碎耙平","民俗事象","物质民俗","生产生计",null],["锄","锄 (Material Folklore / 生产生计)","锄，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["镰","镰 (Material Folklore / 生产生计)","镰，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["扁担","扁担 (Material Folklore / 生产生计)","扁担，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["箩筐","箩筐 (Material Folklore / 生产生计)","箩筐，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["水车","水车 (Material Folklore / 生产生计)","水车，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["风车","风车 (Material Folklore / 生产生计)","风车，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["石碾","石碾 (Material Folklore / 生产生计)","石碾，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["渔船","渔船 (Material Folklore / 生产生计)","从事渔业捕捞的水上作业船只","民俗事象","物质民俗","生产生计",null],["猎具","猎具 (Material Folklore / 生产生计)","猎具，物质民俗中生产生计相关的传统生产民俗","民俗事象","物质民俗","生产生计",null],["轿子","轿子 (traditional transport)","轿子，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["马车","马车 (traditional transport)","马车，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["牛车","牛车 (traditional transport)","牛车，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["独轮车","独轮车 (traditional transport)","独轮车，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["滑竿","滑竿 (traditional transport)","滑竿，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["羊皮筏","羊皮筏 (traditional transport)","羊皮筏，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["竹筏","竹筏 (traditional transport)","竹筏，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["渡船","渡船 (traditional transport)","渡船，物质民俗中的交通出行类民俗事象","民俗事象","物质民俗","交通出行",null],["栈道","栈道 (traditional transpo 日——根据藏历——在正月初一——家家户户制作和食用古突——并举行驱鬼和抢水等独特的民俗。藏历新年是雪域高原的精神和文化的核心的庆典。"],["苗年","Miao New Year","苗族按苗历计算的新年，以芦笙踩堂和长桌宴为核心活动","民俗事象","社会民俗","岁时节日","苗族的最隆重的传统的年度的节日——各地苗年的时间不同——大多在农历的十月至正月间——包括杀年猪打糍粑跳芦笙舞和斗牛等——是苗族敬祖和社区团结的全民族的年度的大节。"],["侗年","Dong New Year","侗族传统新年，以侗族大歌和踩歌堂为核心活动","民俗事象","社会民俗","岁时节日",null],["盘王节","Panwang Festival","瑶族纪念始祖盘王的盛大节日，以跳盘王舞和唱盘王歌为核心活动","民俗事象","社会民俗","岁时节日","瑶族的最盛大的传统的节日——在农历的十月十六日——祭祀瑶族的始祖盘王。盘王节以唱盘王的歌和跳长鼓舞为核心——2006年被列入首批国家级非遗。"],["三月街","Third Month Fair","白族在农历三月举行的大型物资交流和文娱活动盛会","民俗事象","社会民俗","岁时节日",null],["刀杆节","Sword-Pole Festival","傈僳族爬刀杆和下火海的传统节日","民俗事象","社会民俗","岁时节日","云南省石林地区的彝族支系撒尼人——在农历的六月二十四日——点燃篝火和火把绕村游行的盛大的火把的节日。以祭祀火神驱虫和祈福为原初的信仰的内核——现已发展为彝族狂欢和游客云集的盛大的民族节日。2006年列入国家级非遗。"],["目瑙纵歌","Munao Zongge Festival","景颇族最盛大的传统节日，万人同跳目瑙舞祭太阳神","民俗事象","社会民俗","岁时节日","傣族的新年——在傣历的六月——公历的四月中旬——全城和全寨的人互相泼洒象征吉祥和祝福的清水——洗涤过去一年的不顺——泼水节也是傣族青年男女的择偶牵手的最佳的节日。2006年列入国家级非遗。"],["羌年","Qiang New Year","羌族按羌历计算的新年，祭祀天神和祖先","民俗事象","社会民俗","岁时节日","农历的六月二十四日——彝、白、纳西和傈僳等多个民族共庆的火把的节日——点燃松木的火把插在田埂上以驱虫——高举火把巡游村寨——是西南地区最盛大的跨民族的夏季的狂欢的节日。"],["立春","Beginning of Spring","二十四节气之首，标志春季开始，民间有打春牛、咬春等迎春习俗","民俗事象","社会民俗","岁时节日","二十四节气的第一个——太阳到达黄经的三百一十五度——在每年的二月三至五日。立春是春天和农耕的开始的标志——旧时的官府要举行打春牛以劝耕的仪式。"],["雨水","雨水 (Social Folklore / Seasonal Festivals)","二十四节气之二，降水开始增多，民间关注雨水对春耕的影响","民俗事象","社会民俗","岁时节日","二十四节气的第二个——太阳到达黄经的三百三十度——在二月十八至二十日——标志着降雨的增多和春耕的农忙的即将到来。"],["惊蛰","惊蛰 (Social Folklore / Seasonal Festivals)","二十四节气之三，春雷乍动惊醒冬眠虫兽，农事活动全面启动","民俗事象","社会民俗","岁时节日","二十四节气的第三个——太阳到达黄经的三百四十五度——在三月五至七日——春雷开始鸣响——将蛰伏于地下冬眠的百虫和小动物惊醒的节气。"],["春分","春分 (Social Folklore / Seasonal Festivals)","二十四节气之四，昼夜等长，民间有竖蛋、祭日等习俗","民俗事象","社会民俗","岁时节日",null],["清明","清明 (Social Folklore / Seasonal Festivals)","二十四节气之五，扫墓祭祖和踏青郊游的综合性节日","民俗事象","社会民俗","岁时节日",null],["谷雨","谷雨 (Social Folklore / Seasonal Festivals)","二十四节气之六，雨生百谷时节，有采谷雨茶和食香椿的习俗","民俗事象","社会民俗","岁时节日","二十四节气的第六个——太阳到达黄经的三十度——在四月十九至二十一日——雨生百谷——是播种移苗的最佳的时节——也是春季的最后的一个节气。"],["立夏","立夏 (Social Folklore / Seasonal Festivals)","二十四节气之七，夏季开始，有称人和尝新的习俗","民俗事象","社会民俗","岁时节日",null],["小满","小满 (Social Folklore / Seasonal Festivals)","二十四节气之八，麦类灌浆将熟未熟，民间有祭车神和食苦菜习俗","民俗事象","社会民俗","岁时节日","二十四节气的第八个——太阳到达黄经的六十度——在五月二十至二十二日——夏收作物的籽粒开始灌浆饱满——但尚未成熟的将满未满的节气。"],["芒种","芒种 (Social Folklore / Seasonal Festivals)","二十四节气之九，有芒作物成熟抢收，民间送花神迎端午节","民俗事象","社会民俗","岁时节日","二十四节气的第九个——太阳到达黄经的七十五度——在六月五至七日——芒种的芒指的是有芒的麦类的收割——种指的是有芒的稻谷的播种——是一年中最繁忙的夏收夏种的农忙的顶峰。"],["夏至","夏至 (Social Folklore / Seasonal Festivals)","二十四节气之十，白昼最长，民间有吃面和祭地的习俗","民俗事象","社会民俗","岁时节日",null],["小暑","小暑 (Social Folklore / Seasonal Festivals)","二十四节气之十一，暑热渐盛，民间有食新和晒书画的习俗","民俗事象","社会民俗","岁时节日","二十四节气的第十一个——太阳到达黄经的一百零五度——在七月六至八日——暑是炎热——小暑是热但尚未达到极点的节气。"],["大暑","大暑 (Social Folklore / Seasonal Festivals)","二十四节气之十二，一年最热时节，民间饮伏茶烧伏香送暑船","民俗事象","社会民俗","岁时节日","二十四节气之十二——太阳到达黄经一百二十度——七月二十二至二十四日——此时日照最强气温最高——是一年中最酷热的节气的顶点。"],["立秋","立秋 (Social Folklore / Seasonal Festivals)","二十四节气之十三，秋季开始，民间有贴秋膘和啃秋的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十三——太阳到达黄经一百三十五度——八月七至九日——秋季的开始——但立秋不等于天气立刻转凉——秋老虎的酷热往往会持续多日。"],["处暑","处暑 (Social Folklore / Seasonal Festivals)","二十四节气之十四，暑热消退，民间有放河灯和开渔节的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十四——太阳到达黄经一百五十度——八月二十二至二十四日——处是终止——处暑意味着暑天的酷热在此时正式终止。"],["白露","白露 (Social Folklore / Seasonal Festivals)","二十四节气之十五，气温转凉露水凝结，民间有收清露和饮白露茶的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十五——太阳到达黄经一百六十五度——九月七至九日——夜间的水汽在草叶上凝结为白色的露珠——天气开始转凉。古人以白露为秋的金色。"],["秋分","秋分 (Social Folklore / Seasonal Festivals)","二十四节气之十六，昼夜等长，民间有祭月和食秋菜的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十六——太阳到达黄经一百八十度——九月二十二至二十四日——这一天太阳直射赤道——全球各地昼夜几乎相等——平分了秋季。自2018年起秋分被设立为中国农民的丰收节。"],["寒露","寒露 (Social Folklore / Seasonal Festivals)","二十四节气之十七，露水寒冷将凝，民间有登高和赏菊的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十七——太阳到达黄经一百九十五度——十月八至九日——露水更冷即将凝结成霜——是大地从秋向冬过渡的标志性节气。"],["霜降","霜降 (Social Folklore / Seasonal Festivals)","二十四节气之十八，开始降霜，民间有赏红叶和吃柿子的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十八——太阳到达黄经二百一十度——十月二十三至二十四日——气温骤降水汽凝结为白霜——是秋冬的最后的交接。"],["立冬","立冬 (Social Folklore / Seasonal Festivals)","二十四节气之十九，冬季开始，民间有补冬和祭祖的习俗","民俗事象","社会民俗","岁时节日","二十四节气之十九——太阳到达黄经二百二十五度——十一月七至八日——冬季的正式开始——民间在这天有吃饺子以补冬的习俗。"],["小雪","小雪 (Social Folklore / Seasonal Festivals)","二十四节气之二十，开始降雪但未盛，民间有腌菜和吃糍粑的习俗","民俗事象","社会民俗","岁时节日","二十四节气之二十——太阳到达黄经二百四十度——十一月二十二至二十三日——北方开始降雪但雪量尚不大——故称小雪。"],["大雪","大雪 (Social Folklore / Seasonal Festivals)","二十四节气之二十一，降雪量增大，民间有腌肉和封河的习俗","民俗事象","社会民俗","岁时节日","二十四节气之廿一——太阳到达黄经二百五十五度——十二月六至八日——北方已是千里冰封万里雪飘的严冬——大雪标志着仲冬的极盛。"],["冬至","Winter Solstice","二十四节气之一吃饺子汤圆祭祖","民俗事象","社会民俗","岁时节日",null],["小寒","小寒 (Social Folklore / Seasonal Festivals)","二十四节气之二十三，开始进入严寒，民间有探梅和腊祭的习俗","民俗事象","社会民俗","岁时节日","二十四节气之廿三——太阳到达黄经二百八十五度——一月五至七日——小寒标志着一年中最严寒的时段的开始——虽名为小但实际的气温往往比大寒更低。"],["大寒","大寒 (Social Folklore / Seasonal Festivals)","二十四节气之二十四，一年最冷时节，民间有扫尘和备年货的习俗","民俗事象","社会民俗","岁时节日","二十四节气之廿四——太阳到达黄经三百度——一月二十至二十一日——是全年廿四节气的最后一个——极寒的顶点——过完大寒就是新一轮节气循环的立春。"],["地坛庙会","地坛庙会 (Social Folklore / Seasonal Festivals)","北京地坛公园春节期间举办的大型传统庙会","民俗事象","社会民俗","岁时节日",null],["龙潭庙会","龙潭庙会 (Social Folklore / Seasonal Festivals)","北京龙潭湖公园春节庙会，以民间花会表演为特色","民俗事象","社会民俗","岁时节日",null],["白云观庙会","白云观庙会 (Social Folklore / Seasonal Festivals)","北京白云观春节庙会，摸石猴和打金钱眼为特色活动","民俗事象","社会民俗","岁时节日",null],["城隍庙庙会","城隍庙庙会 (Social Folklore / Seasonal Festivals)","各地城隍庙在城隍诞辰等特定日子举行的大型祭祀和集市活动","民俗事象","社会民俗","岁时节日","各城市的城隍庙在城隍诞辰（各地不同）和清明等日举行的盛大的庙会和祭祀的集市。旧时上海城隍庙的庙会是沪上一年中最大的市民的狂欢——三巡会期间万人空巷。"],["药王庙会","药王庙会 (Social Folklore / Seasonal Festivals)","在药王庙举行的祭祀药王孙思邈和药材交易的大型庙会","民俗事象","社会民俗","岁时节日",null],["蟠桃宫庙会","蟠桃宫庙会 (Social Folklore / Seasonal Festivals)","北京蟠桃宫三月三庙会，纪念西王母蟠桃会","民俗事象","社会民俗","岁时节日",null],["妙峰山庙会","妙峰山庙会 (Social Folklore / Seasonal Festivals)","北京妙峰山碧霞元君庙的春季香会和庙会活动","民俗事象","社会民俗","岁时节日",null],["泰山庙会","泰山庙会 (Social Folklore / Seasonal Festivals)","泰山碧霞祠等庙宇的香会和庙会活动，以东岳大帝和碧霞元君为主祀","民俗事象","社会民俗","岁时节日","山东泰安的东岳庙——供奉泰山神——在每年农历的三月二十八（东岳大帝的诞辰）举行的华北最盛大的朝山的庙会——来自数百里外的香客和商贩云集——是泰山信仰的核心的民俗的展示。"],["武当山庙会","武当山庙会 (Social Folklore / Seasonal Festivals)","武当山真武大帝信仰的香会和朝山活动","民俗事象","社会民俗","岁时节日",null],["浚县庙会","浚县庙会 (Social Folklore / Seasonal Festivals)","河南浚县大伾山和浮丘山的正月古庙会，为华北最大的古庙会之一","民俗事象","社会民俗","岁时节日","河南浚县的正月古庙会——从正月初一到二月初二——长达一个月——被称为华北第一大古庙会。以社火表演泥咕咕等民间玩具和烧香拜佛为三大项。"],["雀替","雀替 (Material Folklore / 居住建筑)","柱与梁枋交接处的三角形过渡装饰构件，缩短梁枋净跨并增强节点承载力","民俗事象","物质民俗","居住建筑","中国传统木构建筑中——置于梁或额枋与柱的相交处的——承托梁枋和缩短其净跨的——兼具结构支撑和繁复的透雕的装饰的——三角形的木构件。雀替是中式古建的建筑结构和民俗美学的天衣无缝的结合。"],["藻井","zaojing (caisson ceiling)","建筑内部顶棚向上凹入如井的穹顶状装饰构造，多用于宫殿庙宇重要空间","民俗事象","物质民俗","居住建筑","中国古建的宫殿和寺庙和祠堂的大殿——在神像和宝座上方的天花板正中——以斗拱层层出挑和内收——构造出一个向上凹进的繁复的圆井或多角井——井心雕着盘龙或莲花——是古代室内最华美的顶棚的装饰。"],["飞檐","feiyan (upturned eaves)","中国传统建筑构件或屋顶形式","民俗事象","物质民俗","居住建筑",null],["鸱吻","鸱吻 (Material Folklore / 居住建筑)","正脊两端的龙形装饰构件，相传可以喷水灭火以镇宅辟火","民俗事象","物质民俗","居住建筑","中国古建筑——宫殿和庙宇的正脊的两端——高高翘起的以琉璃或陶瓦烧制的——张口吞脊的龙首形的饰物。相传鸱吻是龙的儿子——好登高和望远和吞火——置之于屋脊以厌胜火灾。"],["吻兽","吻兽 (Material Folklore / 居住建筑)","正脊两端张口吞脊的龙形装饰构件，又称鸱吻或螭吻","民俗事象","物质民俗","居住建筑",null],["瓦当","wadang (roof tile end)","筒瓦最前端下垂的圆形或半圆形构件，上有纹饰或文字，兼具保护和装饰功能","民俗事象","物质民俗","居住建筑","中国古代建筑的檐口——覆盖在每列筒瓦的最前端的——遮风挡雨的——半圆形的陶制的或琉璃的装饰的瓦的构件。瓦当上模印着从秦汉的云纹饕餮到明清的龙纹——是中国古建的最微小的纹样的博物馆。"],["柱础","柱础 (Material Folklore / 居住建筑)","木柱下端的石质基座，防止木柱受潮腐朽并将荷载均匀传至地基","民俗事象","物质民俗","居住建筑","中国传统木构建筑的——承载立柱并将柱脚的湿气与地面隔开——的各式石质的柱子的基座。从简单的覆盆到须弥座的繁复的莲花和力士的雕刻——柱础是中式古建的最稳固的脚也最默默承重的石头。"],["抱鼓石","抱鼓石 (Material Folklore / 居住建筑)","门枕石外侧刻成鼓形的装饰石构件，象征门第尊贵","民俗事象","物质民俗","居住建筑",null],["影壁","yingbi (spirit wall)","大门内外起遮挡和装饰作用的独立墙壁，又称照壁","民俗事象","物质民俗","居住建筑",null],["牌坊","paifang (memorial arch)","以石或木建造的纪念性和标识性门式建筑，表彰功德科第或标示地名","民俗事象","物质民俗","居住建筑","中国的传统的纪念碑式的建筑——以石或木——竖立在城乡的要道、祠堂和墓前——以表彰忠孝节义——是儒家的礼教以凝固的石头的形式教化百姓的——集雕刻和建筑为一体的礼制的构筑物。"],["奠基礼","奠基礼 (Material Folklore / 居住建筑)","建筑动工时举行的祭祀和奠基仪式，祈求工程顺利","民俗事象","物质民俗","居住建筑",null],["上梁礼","上梁礼 (Material Folklore / 居住建筑)","建筑安装正脊大梁时举行的庆贺仪式，抛梁抛馒头以祈福","民俗事象","物质民俗","居住建筑","中国传统木构建筑——在婚礼和上梁的典礼——将最后一段正梁——在匠人的号子和围观村民的喝彩中——缓缓吊装就位——梁上贴着写有紫微高照和上梁大吉的红纸——匠人从屋架上向人群抛洒糖果和馒头——上梁是整个建筑的最神圣的民俗时刻。"],["安门礼","安门礼 (Material Folklore / 居住建筑)","安装大门时举行的仪式，门为气口关系家宅吉凶","民俗事象","物质民俗","居住建筑",null],["安灶礼","安灶礼 (Material Folklore / 居住建筑)","新灶建成时祭祀灶神的仪式，祈求灶神保家庭温饱","民俗事象","物质民俗","居住建筑",null],["乔迁礼","乔迁礼 (Material Folklore / 居住建筑)","搬入新居时举行的庆贺和祭祀仪式，温锅以旺家宅","民俗事象","物质民俗","居住建筑",null],["暖房","暖房 (Material Folklore / 居住建筑)","搬入新居后亲友携礼前来贺喜的社交活动","民俗事象","物质民俗","居住建筑",null],["求子","求子 (life-cycle ritual/custom)","祈求子嗣的信仰与仪式活动，包括拜送子观音、摸钉、拴娃娃等多种形式","民俗事象","社会民俗","人生礼仪","在世界各地和中国的民间——不孕的夫妇——通过朝拜送子观音娘娘庙的拴娃娃、摸神庙门钉和请巫医的法术——渴望诞下子嗣的各种民俗和宗教的非生育医学的替代的操作。求子凸显了传统中国孝道中无后为大的不可承受之重。"],["怀孕禁忌","怀孕禁忌 (life-cycle ritual/custom)","针对孕妇的禁忌行为规范，涉及饮食、行为、视觉等多方面，旨在保护母婴安康","民俗事象","社会民俗","人生礼仪","传统的民俗中对孕妇的各种行为和环境的不成文禁令——如在床上动用剪刀会生兔唇儿和参加丧礼会冲煞——是交感巫术的思维在民间的生殖领域的集中的运作。"],["胎教习俗","胎教习俗 (life-cycle ritual/custom)","孕妇通过行为规范和视听调节对腹中胎儿进行早期教化的传统习俗","民俗事象","社会民俗","人生礼仪","中国古代——早在汉代——就已形成的对孕妇的一套言行举止和视听饮食的系统规范——核心的理念是母亲在孕期的所见所感会通过气直接塑造腹中胎儿的品性和容貌——是外部教化在母腹内的先行。"],["催生礼","催生礼 (life-cycle ritual/custom)","娘家在女儿临产前送去婴儿衣物和食品的礼仪，有催生和祝福双重意义","民俗事象","社会民俗","人生礼仪","中国民间的在孕妇临近预产期——娘家会送来鸡蛋红糖和婴儿的衣物——名为催生——既是物质的补给也是巫术的——以岳母送来的催生礼将迟迟不发动的小生命催出来。"],["洗三","洗三 (life-cycle ritual/custom)","婴儿出生第三天举行的沐浴仪式，有洗净污秽、祈祝健康的象征意义","民俗事象","社会民俗","人生礼仪","婴儿出生后的第三天——为其进行人生第一次的沐浴的隆重的礼俗——用艾叶和槐枝煮汤——边洗边念吉祥的话语——洗三是人生的第一个关口。"],["送粥米","送粥米 (life-cycle ritual/custom)","亲友在产妇生育后送米面鸡蛋等营养品的习俗，表达祝贺和帮扶之意","民俗事象","社会民俗","人生礼仪","中国传统的在婴儿满月——外家要送来粥和米（所以叫送粥米）和婴儿的被褥，亲朋也会送来衣物和银锁——女眷在一起喝满月酒——这是婴儿生命中的第一个公开的社会庆典。"],["剃头礼","剃头礼 (life-cycle ritual/custom)","婴儿满月或百日时剃去胎发的仪式，象征去除污秽迎接新生","民俗事象","社会民俗","人生礼仪","婴儿满月时——为其剃去胎发的第一个仪式的理发——剃下的胎发被制成胎发笔以作终生的留念——标志着婴儿正式脱离母体开始独立的生长的阶段。"],["取名字","取名字 (life-cycle ritual/custom)","为新生儿命名的仪式性活动，名与字承载家族期望和个体命运","民俗事象","社会民俗","人生礼仪","中国传统的在婴儿出生后数日——由祖父或族长——在族谱和八字——和五行的推算中——为新生儿挑选一个——将伴其终生的名和字——命名是家族的权柄——是将一个生物人符号化为家族谱系的一个新节点的神圣和庄重的礼仪。"],["寄名","寄名 (life-cycle ritual/custom)","将孩子名义上过继给神灵或他人以求平安成长的习俗","民俗事象","社会民俗","人生礼仪",null],["认干亲","认干亲 (life-cycle ritual/custom)","为孩子认干爹干妈的习俗，借助虚拟亲属关系扩展社会保护网","民俗事象","社会民俗","人生礼仪","将孩子过继——非法律意义的——而是干亲——给一户与孩子的八字相合的夫妇——让孩子多一重父母的庇护——以跨越命中的劫难——认干亲是以虚拟的亲属的扩大来消灾的民俗的巫术。"],["说媒","说媒 (life-cycle ritual/custom)","由媒人在两家之间撮合婚姻的习俗，是中国传统婚姻的起始环节","民俗事象","社会民俗","婚姻家庭","传统的婚姻的不可或缺的第一个程序——由专业的媒婆或亲友——在双方的家庭之间进行意向的沟通和信息的互换——父母之命媒妁之言——媒婆是传统中国婚姻的锁匠。"],["合八字","合八字 (life-cycle ritual/custom)","将男女双方的生辰八字交算命先生推算是否相合的婚俗","民俗事象","社会民俗","婚姻家庭",null],["下聘礼","下聘礼 (life-cycle ritual/custom)","男方在订婚后向女方家送去聘礼的礼仪","民俗事象","社会民俗","婚姻家庭",null],["送日子","送日子 (life-cycle ritual/custom)","男方择定婚期后通知女方并送去礼物的环节","民俗事象","社会民俗","婚姻家庭",null],["迎亲","迎亲 (life-cycle ritual/custom)","新郎前往女方家迎接新娘的婚礼核心环节","民俗事象","社会民俗","婚姻家庭",null],["入洞房","入洞房 (life-cycle ritual/custom)","婚礼仪式中新郎新娘进入新房的环节，标志着婚姻关系的实质性确立","民俗事象","社会民俗","婚姻家庭","婚礼的压轴的最核心的高潮——新人——在伴娘和亲友的簇拥下——被送入精心布置的新房——共饮合卺酒和吃子孙饽饽——标志婚姻的正式成立和肉体的结合的合法化。"],["开脸","开脸 (life-cycle ritual/custom)","传统婚礼前为新娘子用线绞去面部汗毛的仪式，象征从少女到妇人的转变","民俗事象","社会民俗","婚姻家庭","中国传统的女性出嫁前——在闺房中——由一位全福的妇人用两根线绞去新娘脸上和颈上的汗毛——将少女的绒毛修整为光洁的妇人的脸庞——是少女向少妇的容颜的蜕变。"],["上头","上头 (life-cycle ritual/custom)","婚礼前为新娘梳妆发髻的仪式，将少女发式改为妇人发式，标志身份转变","民俗事象","社会民俗","婚姻家庭","中国传统的女性出嫁前的发式的变更——将少女时代的垂髫——改梳成妇人的高髻——并以簪和钗固定——上头是她在物理的发型上告别了自己的少女时代的最后一步。"],["铺床","铺床 (life-cycle ritual/custom)","婚礼前请全福人为新人铺设新床的习俗，床上撒红枣、花生、桂圆、莲子寓意早生贵子","民俗事象","社会民俗","婚姻家庭","新婚前夜——在布置新房时——要请一位全福的妇女——将红枣花生桂圆和莲子——洒在婚床的被褥下——即早生贵子——以物名和吉祥语的谐音——用巫术的思维来为新人铺一条通往多子多福的路。"],["压床","压床 (life-cycle ritual/custom)","婚礼前请童男在新床上睡一晚的习俗，寓意新郎新娘早生贵子","民俗事象","社会民俗","婚姻家庭","婚礼的前一夜——需请一个父母双全的男孩——在新人的新床上睡一夜——以童男的纯阳来驱除新床可能附着的邪气和防止空房的不吉利——同时也取意于压床求子的吉祥的祝福。"],["停灵","停灵 (life-cycle ritual/custom)","停灵，社会民俗中的丧葬习俗类丧葬民俗事象","民俗事象","社会民俗","丧葬习俗",null],["报丧","报丧 (life-cycle ritual/custom)","报丧，社会民俗中的丧葬习俗类丧葬民俗事象","民俗事象","社会民俗","丧葬习俗",null],["入殓","入殓 (life-cycle ritual/custom)","将遗体放入棺木的丧礼环节","民俗事象","社会民俗","丧葬习俗",null],["守灵","守灵 (life-cycle ritual/custom)","守灵，社会民俗中的丧葬习俗类丧葬民俗事象","民俗事象","社会民俗","丧葬习俗",null],["吊唁","吊唁 (life-cycle ritual/custom)","吊唁，社会民俗中的丧葬习俗类丧葬民俗事象","民俗事象","社会民俗","丧葬习俗",null],["出殡","出殡 (life-cycle ritual/custom)","将灵柩移至墓地的丧礼环节","民俗事象","社会民俗","丧葬习俗",null],["路祭","路祭 (life-cycle ritual/custom)","路祭，社会民俗中的丧葬习俗类丧葬民俗事象","民俗事象","社会民俗","丧葬习俗",null],["下葬","下葬 (life-cycle ritual/custom)","将逝者安葬入土的最终仪式，包括择时、定向、入土、封墓等程序","民俗事象","社会民俗","丧葬习俗","丧礼的最后的一步——将已入殓封钉的棺木——在抬棺的八仙的护送下——运抵预先选好的风水的墓地——以罗盘精确定位后——将棺木缓缓沉入深挖的墓穴中——并以土封堆——完成亡者从阳间 俗学","Economic Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科分支方向","以民俗实践的经济维度——如传统手工艺的市场化、民俗旅游的经济影响和礼物的经济人类学——为核心研究对象的交叉分支。"],["法律民俗学","Legal Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科分支方向","以民间习惯法和国家成文法之间的互动关系为研究对象的交叉分支。关注村规民约、宗族法和民间纠纷调解中的民俗逻辑及其与现代法律体系的碰撞与融合。"],["医疗民俗学","Medical Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科分支方向","以民间的疾病观、治疗仪式、草药知识和民间医疗实践中的民俗文化为研究对象的医学人类学与民俗学的交叉分支。"],["军事民俗学","Military Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科分支方向","以军队和战争中的民俗——如军旅信仰、战前仪式、军中禁忌和战地传说——为研究对象的小众交叉分支。"],["社会事实","Social Fact (Durkheim)","涂尔干社会学核心概念，外在于个体且具有强制性的社会现象","理论术语","社会与群体理论","社会理论与民俗","埃米尔·涂尔干（Émile Durkheim）社会学的基石概念，指存在于个体之外并具有强制性的、约束个体行为的社会现象、规范、制度和集体状态，如法律、道德规范、宗教信仰、语言、货币制度等。社会事实的两个核心特征：外在性（外在于个体——一个人在出生前他的社会已经有了既定的语言、法律和宗教，不是他个人的创造）和强制性（社会事实以不可抗拒的力量塑造和约束个体的行为）。将民俗作为'社会事实'来研究的含义是：民俗不只是个体的爱好和选择，而是具有社会强制力的集体规范——不听劝而不过春节的人将承受巨大的社会压力，这种压力本身就是'民俗作为社会事实的强制性'的表现。"],["集体表象","Collective Representations","涂尔干提出的社会群体共享的观念、情感和认知图式","理论术语","社会与群体理论","社会理论与民俗","涂尔干社会学中的核心概念，指特定社会群体共享的集体性的观念、情感、符号系统和认知图式，是集体意识（collective conscience）的具体内容形式。在民俗学中，集体表象概念为民俗研究的文化维度提供了理论基础：一个村落的居民共享一套关于'祖先''神灵''风水''吉凶'的集体表象，这些共享表象构成了他们开展民俗实践（祭祀、建房、择日）的共同认知基础。不同年龄、性别、阶层的人群可能共享不同的集体表象，从而出现同一村内不同的民俗实践体系。"],["机械团结","Mechanical Solidarity","涂尔干提出的以集体意识和相似性为基础的传统社会整合方式","理论术语","社会与群体理论","社会理论与民俗","涂尔干在《社会分工论》（1893）中提出的两种社会整合方式之一（另一种为'有机团结'），指在传统/前现代社会中，社会成员之间因其高度的相似性（共享相同的信仰、价值观、生活方式和工作内容）而产生的社会凝聚力。在民俗学中，机械团结概念精准地描述了传统村落社会的凝聚机制——全村的成员过同样的节日、遵守同样的禁忌、参与同样的祭祀、说同样的方言、传讲同样的故事，这种高度的文化同一性产生出强烈的'我们都是自己人'的集体认同感。"],["有机团结","Organic Solidarity","涂尔干提出的以社会分工和相互依赖为基础的现代社会整合方式","理论术语","社会与群体理论","社会理论与民俗","涂尔干提出的两种社会整合方式之一，指在现代工业社会中，社会成员不是因其相似性（像传统社会那样大家都一样）而是因其差异性（高度专业化分工导致的相互依赖——医生需要依赖农民、工人、商人）而被粘合在一起的社会凝聚机制。在民俗学中，有机团结对民俗文化的冲击是一个核心的研究课题——当社会整合从'大家都一样'（机械团结）转向'大家互相依赖'（有机团结），失去文化同质性的现代社会如何维持民俗传统的传承？答案是：民俗从'社区一致性'转化为'选择性的文化认同'——你主动选择认同和参与某种民俗传统来建构自己的文化身份。"],["失范","Anomie","涂尔干提出的社会规范和价值体系瓦解导致的个人和社会危机状态","理论术语","社会与群体理论","社会理论与民俗","涂尔干在《自杀论》（1897）中提出的社会学概念（法语anomie），指社会的规范和价值体系在急剧社会变迁中发生动摇、失落或瓦解，导致个体的行为失去道德参照和社会约束力，从而陷入迷茫、疏离和意义危机的社会状态。在民俗学中，失范概念被引入分析传统民俗规范的瓦解过程——当'必须回家过年'从社会强制降低为个人选择，当'丧事不请客会被人说的'从社会压力降为零，传统民俗规范体系的松动伴随着深刻的社会失范现象：人们失去了'应当如何生活'的民俗指引。"],["世俗化","Secularization","宗教对社会制度和个人生活的影响力和权威逐渐减弱的现代化过程","理论术语","社会与群体理论","社会理论与民俗","宗教对社会制度（政治、教育、法律等）和个人生活的全面影响力与控制力随着现代化进程而逐渐减弱的宏观社会过程，其核心表现：宗教从公共领域撤退到私人领域，宗教权威对科学和道德话语的垄断被打破，宗教实践从义务转化为选择。在民俗学中，世俗化直接影响了民俗的宗教维度——很多本来以敬神为动机的民俗活动（如庙会）越来越世俗化为纯娱乐和纯消费活动；但另一方面，世俗化又可以为新形态民俗（如消费主义节日——双十一）提供空间。"],["祛魅","Disenchantment","韦伯提出的现代理性化进程中世界失去神秘性和宗教意义的趋势","理论术语","社会与群体理论","社会理论与民俗","马克斯·韦伯（Max Weber）提出的现代性核心概念（德语Entzauberung），指在西方理性化（rationalization）和智识化（intellectualization）的进程中，世界逐渐失去其神秘性、魔法性和宗教意义的过程——人们不再相信雷雨是龙王爷发怒，而是理解为气象现象；不再相信生病是鬼魂作祟，而是病原体感染。在民俗学中，祛魅是解释传统民俗衰落的核心框架——大量依赖鬼神信仰和魔法思维的传统民俗（如各种驱鬼仪式、符咒、占卜）在科学理性世界中失去了其原有的信仰基础。但'复魅'的反趋势表明，祛魅不是线性单向的终结。"],["复魅","Re-enchantment","对现代性祛魅过程的反思，重新赋予世界以意义和魅力的文化趋势","理论术语","社会与群体理论","社会理论与民俗","对现代性'祛魅'过程的文化反思和逆反趋势，指人们在经历了对世界的理性化、科学化的彻底祛魅（世界变得只剩冷冰冰的事实和因果律，失去了神秘、意义和美感）之后，重新以一种非教条的、个性化的方式为世界'重新注入'意义、神秘性和吸引力——民间信仰的当代复兴、汉服和古风音乐的流行、文化遗产旅游的兴起，均可视为当代社会复魅冲动的具体表现。复魅不同于'回到前现代的迷信'，它是现代人主动的、反思性的、选择性的'文化再着魅'（re-enchantment）行为。"],["文化唯物主义","Cultural Materialism","威廉斯等提出的从物质生产和生活条件出发理解文化实践的理论","理论术语","社会与群体理论","社会理论与民俗","雷蒙德·威廉斯（Raymond Williams）等英国文化研究学者提出的文化分析范式，将'文化'从精神、观念的领域拉回到物质生产和社会关系的土壤中——文化不是从天才的头脑中凭空产生的，而是在特定的物质生产方式、社会关系和日常生活的具体条件下被生产和再生产的。在民俗学中，文化唯物主义对民俗研究的贡献在于：不能只分析民俗的'文化意义'（象征和观念层面），还要分析民俗的'物质基础'——为什么这个村落有龙灯而那个村落没有？原因可能与两村的经济结构和劳动组织方式有关，而不只是'文化传统的差异'。"],["文化相对主义","Cultural Relativism","博厄斯学派的核心立场，主张各文化价值体系只能在其自身语境中理解","理论术语","社会与群体理论","社会理论与民俗","弗朗茨·博厄斯（Franz Boas）及其学派（包括本尼迪克特、米德等）的人类学校心伦理立场和方法论原则。核心主张：每一种文化的信仰、习俗、价值和制度，必须放在该文化自身的历史语境和内部逻辑中去理解和评价，不能以一个外部文化的标准（通常是研究者的西方文化标准）来评判——不存在一个普适的'高级/低级''进步/落后'的文化评级标准。文化相对主义对民俗学最重要的贡献是：为不同于主流文化的民俗传统赋予了学术上的尊严——'他们信神弄鬼'不是'他们愚昧落后'，而是他们的文化以不同于科学理性的方式处理着对世界的理解和应对。"],["文化生态学","Cultural Ecology","文化与其存在环境之间的相互依存和互动关系系统","理论术语","社会与群体理论","社会理论与民俗","以朱利安·斯图尔德（Julian Steward）为代表的人类学理论，关注文化与所赖以存在的特定生态环境之间的相互适应关系和互动机制。文化生态学的核心命题：一个社会的基本文化特征（特别是其谋生方式、技术手段和社会组织），在很大程度上是对其所处的特定生态环境的适应性产物。在民俗学中，文化生态学为解释不同生态环境区域的民俗差异提供了有力的理论框架——山区和平原的民俗差异、沿海和内陆的民俗差异，首先可以从生态适应的维度得到基础性的解释。"],["文化唯物论","Cultural Materialism","哈里斯提出的文化理论，强调物质条件（技术、经济、环境）对文化的决定性作用","理论术语","社会与群体理论","社会理论与民俗","马文·哈里斯（Marvin Harris）提出的文化理论范式，主张文化的核心驱动力存在于物质条件层面——技术、经济生产模式、生态环境和人口压力——而非存在于观念、信仰或符号等上层建筑层面（观念不过是物质基础的'合理化说明'）。哈里斯的力作《母牛、猪、战争与巫术》用文化唯物论解释了多种看似'非理性'的民俗禁忌——印度的'圣牛'禁忌，其物质基础是牛在印度农业和生态系统中具有不可替代的多重物质价值（耕牛、燃料、肥料），宗教禁忌是保护这种物质基础的'文化工具'。"],["文化决定论","Cultural Determinism","认为文化因素在塑造人类行为和社会结构中起决定性作用的理论观点","理论术语","社会与群体理论","社会理论与民俗","一种在文化研究中主张文化因素（价值观念、信仰体系、认知图式等）在塑造人类行为、社会结构和历史进程方面具有决定性而非仅仅辅助或反映功能的理论观点。在民俗学中，文化决定论的极端版本主张'民俗决定了一个社会的一切'——没有春节就没有中国的家国认同。当代民俗学的主流立场是文化互动论——文化既不完全是物质的反映，也不完全是历史的驱动力，文化和社会其他层面（经济、政治、技术）是持续互构的关系。"],["文化模式","Patterns of Culture","民俗行为在反复实践中形成的固定化和标准化模式","理论术语","社会与群体理论","社会理论与民俗","鲁思·本尼迪克特（Ruth Benedict）在同名著作《文化模式》（1934）中提出的文化人类学核心概念，指一种文化将其纷繁多样的文化特质和元素整合进一个由主导性的核心特质、价值取向和心理倾向所贯穿的、具有内在一致性的整体配置中的独特的结构化方式。本尼迪克特以'酒神型'和'日神型'分别概括了两个不同文化模式。在民俗学中，文化模式概念为民俗的整体性分析提供了框架——一个区域或族群的众多民俗事象（节日、饮食、服饰、建筑、仪式等）并不是随机的堆叠，而是被一种深层文化逻辑贯穿的模式化整体。"],["文化人格","Culture and Personality","本尼迪克特和米德等提出的文化模式塑造特定人格类型的理论","理论术语","社会与群体理论","社会理论与民俗","以鲁思·本尼迪克特和玛格丽特·米德（Margaret Mead）等为代表的美国文化人类学派（人格学派），其核心命题为：不同的文化模式通过不同的育儿方式、社会化过程和制度安排，塑造出具有不同群体性格特征和心理倾向的'典型人格'。在民俗学中，此理论框架用于分析民俗在人格塑造中的作用——在什么民俗传统中长大（如严苛的禁忌体系 vs 宽松的节日文化），会在个体的人格结构中留下不同的文化印记。但该理论关于'民族性格'的概念因过度概括化和本质主义嫌疑而受到批判。"],["文化适应","Cultural Adaptation","群体在接触新文化环境时发生的文化和心理调适过程","理论术语","社会与群体理论","社会理论与民俗","群体在新的文化环境中为在保持自身文化核心的同时达至与外部环境的有效互动而进行的一系列调适和改变过程。文化适应不同于'同化'（assimilation）——文化适应是双向的互动调适，同化是单向的被动吸收。在民俗学中，文化适应是理解移民和少数族裔民俗变迁的核心概念——移民群体在新国家的节庆习俗如何调适（中西合璧的春节/圣诞节庆祝方式），家乡的饮食民俗如何在新环境中被改版（中餐在国外被本土化的'桔子鸡'）。"],["解构","Deconstruction","德里达开创的通过对文本内在矛盾的揭示来消解既定意义的分析方法","理论术语","社会与群体理论","社会理论与民俗","雅克·德里达（Jacques Derrida）开创的后结构主义分析方法，通过对文本/概念体系中隐含的内在矛盾、等级对立和'不在场'的中心的揭示，来'解构'（消解、松动）既定的、被视为理所当然的意义结构和二元对立。在民俗学中，解构的分析方法被用于批判性和反思性地检视一系列民俗学的核心预设和二元对立——如'本真vs伪造''传统vs现代''民间vs官方''口头vs书面'等——这些对立不是自然而然的事实，而是学术话语建构出来的，在民俗的现实实践中边界是模糊的、可跨越的。"],["话语","Discourse","福柯理论中构成知识和塑造社会现实的语言实践和规则系统","理论术语","社会与群体理论","社会理论与民俗","米歇尔·福柯（Michel Foucault）知识-权力理论的核心概念，超越了一般语言学中'口语和书面语言的使用'的狭义理解，指向在社会中构成知识和塑造社会现实的整个语言实践系统、言说规则和制度性条件——不是人在说话，而是话语在通过人说自己（你能说什么和不能说什么不是由你决定的，而是由特定社会的话语规则所决定和约束的）。在民俗学中，话语分析的应用包括：国家非遗政策的话语如何定义'什么是非遗、什么是值得保护的、什么是被排除在外的'？学者的话语如何将民俗建构成知识对象？民众自己的话语如何反抗或顺从这些官方话语？"],["权力知识","Power-Knowledge (Foucault)","福柯揭示的知识与权力相互构成、彼此渗透的共生关系","理论术语","社会与群体理论","社会理论与民俗","米歇尔·福柯揭示的现代社会运作的核心机制之一——知识和权力互为一枚硬币的两面，不是'知识独立于权力而后被当权者利用'，而是知识的生产本身就是权力运作的一种方式，同时权力的运作也生产着关于被支配者（如疯癫者、罪犯、性异常者）的知识。在民俗学中，权力知识分析用于批判性地反思：谁有权力来定义'什么是正宗的传统民俗'、谁的知识（学者的、政府的、老人的、年轻人的）在关于民俗的决策中被采纳、这种知识-权力的结合如何塑造了非遗保护中的遗产名录体系和传承人认证制度。"],["规训","Discipline (Foucault)","福柯提出的现代社会通过制度化的身体训练和规范来塑造个体的权力技术","理论术语","社会与群体理论","社会理论与民俗","米歇尔·福柯（Michel Foucault）在《规训与惩罚》（1975）中提出的权力分析核心概念（法语discipline），指现代社会通过制度化的身体训练、时间管理、空间安排和常规范化（normalization）来塑造温顺而有用的身体（docile bodies）的微观权力技术。规训与传统的主权权力（砍头示众）截然不同——它不是压制性的，而是生产性的，它不通过暴力的恐惧，而是通过持续的监视（全景监狱）、标准化的考核（考试）和时间表的编程来使人自觉地服从。在民俗学中，规训概念被引入分析官方如何通过'规范化'对民间生活进行治理和改造——如民国时期的'新生活运动'对民间日常生活行为的规训式改造，当代农村的'移风易俗'项目中蕴含的规训逻辑。"],["异托邦","Heterotopia","福柯提出的现实存在但具有颠覆性功能的另类空间概念","理论术语","社会与群体理论","社会理论与民俗","米歇尔·福柯在1967年一次演讲中提出的空间理论概念。异托邦（heterotopia）不同于乌托邦（utopia）——乌托邦是不存在的完美理想空间，异托邦是现实生活中真实存在的、但以一种特殊方式运作的另类空间，它同时代表、反抗和颠覆社会中所有其他常规空间的秩序。福柯给出的异托邦例子包括：墓地（生者空间中为死者保留的'他者'空间）、博物馆和图书馆（试图容纳所有时代所有文化的'时间的异托邦'）、节日市集（每年固定时间在特定地点出现的暂时性异托邦）。在民俗学中，异托邦概念被用于分析庙会空间、祭祀空间和狂欢节空间的特殊空间性质——它们在日常社会空间中撬开了一个临时的'另类世界'。"],["拟像","Simulacrum","鲍德里亚提出的符号自我复制以致与真实界限消失的后现代文化状态","理论术语","社会与群体理论","社会理论与民俗","让·波德里亚（Jean Baudrillard）在《拟像与仿真》（1981）中提出的后现代文化批判核心概念，指一种不与任何真实指涉物对应的、自我指涉并自我复制的符号和图像的复制品。拟像的演变经历了三个阶段：前现代——符号忠实地指涉真实（地图就是领土的表示）；现代——符号开始脱离真实并遮蔽真实（地图比领土更受信任）；后现代——拟像不再需要真实的指涉物，地图先于领土存在，符号在自身的逻辑中自我繁殖（迪斯尼乐园的城堡不是对任何真实城堡的模仿，而是纯粹的符号生产）。在民俗学中，拟像概念被引入批判'伪民俗'和'民俗主义'——当'原生态民俗歌舞'从录像中复制录像的生产链中产出时，它已不是任何真实的'原生态'的拟像，而是失去指涉的纯拟像。"],["超真实","Hyperreality","鲍德里亚提出的拟像超越真实成为比真实更真实的后现代文化状态","理论术语","社会与群体理论","社会理论与民俗","波德里亚后现代理论的核心概念，指拟像的无限自我繁殖最终导致'真实与虚假''原件与复制品'之间的区分彻底消解的后现代文化状态——迪士尼乐园的'美国历史街区'可能比真实的美国历史街区更'美国'，旅游点的'原生态民俗村'可能被游客认为是比真实的农村更'原生态'的农村，因为拟像呈现的是对'原生态'的符号化浓缩（去掉了泥泞的道路、猪圈的味道、不美观的元素），因此比真实'更真实'。在民俗学中，超真实概念为民俗旅游和文化遗产展示的批判性分析提供了强有力的理论工具。"],["元叙事","Metanarrative","利奥塔提出的现代性的宏大叙事体系，后现代以怀疑元叙事为特征","理论术语","社会与群体理论","社会理论与民俗","让-弗朗索瓦·利奥塔（Jean-François Lyotard）在《后现代状况》（1979）中提出的后现代主义核心批判概念，指现代性中由启蒙理性、历史进步、科学革命、马克思主义等构成的宏大的、整体性的、具有普遍性声称的叙事体系——它们试图用一个统一的故事来解释人类社会和历史的全部意义。利奥塔的核心判断是：后现代的定义就是对元叙事的怀疑——科学不再声称有终极真理，历史不再相信线性进步，意识形态不再相信可以实现人间天堂。在民俗学中，对元叙事的批判意味着：放弃对'民俗发展的普世规律'的宏大理论建构，尊重民俗在具体语境中各自独特的发展路径和意义。"],["后现代状况","Postmodern Condition","对现代性的宏大叙事和基础主义进行全面反思和批判的文化思潮","理论术语","社会与群体理论","社会理论与民俗","利奥塔在1979年同名著作中诊断的当代西方社会知识状况：随着信息技术革命和后工业社会的到来，知识的性质和合法性基础发生了根本性的改变——知识不再是启蒙的自我目的（'为真理而知识'），而是一种可被商品化、计算机化和性能化（'能做什么'替代了'是什么真理'）的信息产品。在民俗学中，后现代状况的后果是双重的：一方面，传统民俗在商品化和性能化的压力下被改造为文化旅游产品；另一方面，后现代对宏大叙事和地方知识的重视反过来为民俗传统提供了新的合法性和生存空间。"],["身体政治","Body Politics","从福柯到巴特勒，关注身体作为权力运作场域和抵抗场所的理论视角","理论术语","社会与群体理论","社会理论与民俗","从福柯到朱迪斯·巴特勒（Judith Butler）等人发展的理论视角，将身体从'自然的生理实体'的认知中解放出来，重新揭示身体作为权力运作的关键场域和抵抗/表演的场所。身体政治的分析核心：身体不是自然的——它被权力通过饮食规范、审美标准（以瘦为美）、行为规范（坐姿、手势、眼神）和性别操演（'像个女孩子'的身体规训）不断地被编码、被塑造、被规范化。在民俗学中，身体政治为民俗的身体维度研究（如女性缠足、男性成年礼的身体考验、身体禁忌、体态礼仪）提供了权力分析的理论框架。"],["埃利亚斯","Ai Li Ya Si","德国社会学家，文明进程理论和型构社会学创立者","学者与学术体制","西方学者","当代时期",null],["布洛赫","Bu Luo He","马克·布洛赫，法国历史学家，年鉴学派创始人之一，著有《国王神迹》《封建社会》等","学者与学术体制","西方学者","当代时期",null],["德勒兹","De Lei Zi","吉尔·德勒兹，法国后结构主义哲学家，与加塔利合著《千高原》《反俄狄浦斯》，提出块茎、褶子等概念","学者与学术体制","西方学者","当代时期","吉尔·德勒兹（1925-1995），法国后结构主义哲学家。代表作《千高原》等。其块茎、游牧和差异等概念被部分民俗学者借用以分析当代民俗的超文本和跨边界的流动和实践。"],["加塔利","Jia Ta Li","费利克斯·加塔利，法国精神分析学家和政治活动家，与德勒兹合作发展精神分裂分析理论","学者与学术体制","西方学者","当代时期",null],["阿甘本","A Gan Ben","吉奥乔·阿甘本，意大利哲学家，以生命政治、例外状态和神圣人概念著称，著有《神圣人》系列","学者与学术体制","西方学者","当代时期","吉奥乔·阿甘本（1942-），意大利哲学家。代表作《神圣人》。其例外状态和赤裸生命等概念为民俗学中的仪式和政治的分析提供了新的理论话语，尤其是在灾难和非常规时期的民俗的分析中。"],["巴丢","Ba Diu","阿兰·巴丢，法国哲学家，以存在与事件的数学本体论著称，著有《存在与事件》等","学者与学术体制","西方学者","当代时期",null],["朗西埃","Lang Xi Ai","雅克·朗西埃，法国哲学家，以政治美学和感性的分配理论著称，《无知的教师》为其代表作","学者与学术体制","西方学者","当代时期","雅克·朗西埃（1940-），法国哲学家。代表作《无知的教师》和《感性的分配》。其关于政治与美学的可感性的分配的论述为民俗 ,null],["毛巧晖","Mao Qiaohui","中国社会科学院民族文学研究所研究员，民间文艺学史研究","学者与学术体制","中国学者","当代学者","中国当代民俗学者，中国社科院民族文学所研究员。以少数民族民俗和民间文学的研究著称，关注多民族民俗的比较和口头传统的田野记录。"],["祝鹏程","Zhu Pengcheng","中国社会科学院文学研究所副研究员，民间文学与网络民俗研究","学者与学术体制","中国学者","当代学者",null],["张多","Zhang Duo","云南大学副教授，彝族民俗与西南少数民族文学研究","学者与学术体制","中国学者","当代学者",null],["郭翠潇","Guo Cui Xiao","中国社会科学院民族文学研究所助理研究员，口头传统研究","学者与学术体制","中国学者","当代学者",null],["惠嘉","Hui Jia","中国社会科学院文学研究所助理研究员，民间信仰研究","学者与学术体制","中国学者","当代学者",null],["彭牧","Peng Mu","北京师范大学副教授，身体民俗与民间医疗研究","学者与学术体制","中国学者","当代学者","中国当代民俗学者，北京师范大学教授。以身体民俗和中医民俗的研究著称，推动了中国民俗学的身体转向——将身体从被忽略的盲点提升为民俗研究的核心的维度。"],["周玥","Zhou Yue","周玥，中国民俗学研究者","学者与学术体制","中国学者","当代学者",null],["田野关系建立","Building Field Relationships","田野调查初期与受访者建立信任与合作关系的过程，涉及伦理、互惠与长期承诺","研究方法","田野调查","田野伙伴关系","田野工作者在进入田野的最初阶段与田野社区的成员——从社区的看门人到普通的村民——通过长期的友善和开放的相处建立最初的信任和工作关系，是田野调查后续一切顺利进展的基础。建立关系需要极大的耐心——着急和索取的心态是毒药。"],["礼物交换","Gift Exchange in Fieldwork","田野调查中以礼物作为建立和维持社会关系的媒介，既是礼仪也是互惠伦理的体现","研究方法","田野调查","田野伙伴关系","田野工作者携带的小礼物（烟酒茶糖果和实用小物件等）被赠予田野社区的关键个人和普通村民——以表达尊重感谢和建立互惠的善意。礼物交换不是赔本的买卖——它是田野关系的人情润滑剂——但必须适度和真诚否则沦为收买。"],["长期田野","Long-term Fieldwork","在田野点进行持续较长时间（通常一年以上）的实地调查方式，以获取深度理解","研究方法","田野调查","田野伙伴关系","人类学和民俗学田野工作的基石——不是短访，而是在选定的田野地点长期地驻扎生活一年或更长时间以跨越该社区的一整个全年的生产-仪式-节日的完整周期。长期田野是深度知识和深度田野关系的最可靠的保障。"],["回访调查","Revisit Study","对同一田野点进行间隔性重返调查的方法，用以观察文化变迁与传承的动态过程","研究方法","田野调查","田野伙伴关系","研究者按照事先规划的回访计划，在首次田野调查结束后间隔数年重回到原田野地点对同一社区的人和事进行再次的追踪回访和对比调查，以此记录自初访以来在时间的纵轴上该社区民俗发生的变迁。"],["合作研究","Collaborative Research","研究者与田野社区成员共同参与知识生产的研究模式，强调当事人视角与平等协作","研究方法","田野调查","田野伙伴关系","研究者与被研究社区及其成员不仅作为信息从被研究者到研究者的单向流动的不平等梯级，而应作为平等的互惠的知识共创的合作伙伴——从设定研究的核心问题到分析资料到合著研究产出的全过程的合作田野工作模式。"],["行动研究","Action Research","以解决实际问题为导向、研究者介入田野社区并推动变革的研究方法","研究方法","田野调查","田野伙伴关系","研究者不仅仅是客观被动地观察被研究社区的现状，而是有意地介入并携同该社区的成员去尝试一起借助学术和非学术的资源来应对该社区面临的某个实际问题（如非遗传承的断代和民俗旅游的负面冲击），同时在这个过程中同步进行研究和记录的积极的、有担当的研究范式。"],["应用研究","Applied Research","将研究成果直接应用于社会实践与公共政策的研究取向","研究方法","田野调查","田野伙伴关系","以将研究产生的知识和发现直接用于解决社会实践——如政策制定/社区发展规划/非遗保护项目的设计和评估——中的真实问题的研究导向。应用研究的产出不是纯理论的期刊文章而是有实际效能的社会干预和解决方案。"],["快速评估","Rapid Assessment","在有限时间内对田野社区基本状况进行快速了解与评估的调查技术","研究方法","田野调查","田野伙伴关系","在时间和经费高度受限无法进行标准的长期田野工作的现实条件下，通过一个紧凑的、高密度的核心方法组合——半结构化访谈和焦点小组和参与观察和二手资料的快速分析——在数天至数周内对一个社区进行基本情况和关键议题的高效摸底和评估的技术。"],["参与式农村评估","Participatory Rural Appraisal (PRA)","PRA，以村民为主体、研究者为协助者的农村社区参与式评估方法","研究方法","田野调查","田野伙伴关系","1980年代以来发展起来的一套以当地村民为主体和中心而非外来专家主导的农村社区发展的参与式的需求评估和规划的系列工具和技术——如社区绘制资源图/农事季节历/问题和解决方案的排序矩阵等，以确保外来的推动者的干预真正反映和符合社区成员自身的意愿。"],["感官田野","Sensory Fieldwork","关注田野中感官体验（声音、气味、触觉、味觉）的民族志方法，拓展了传统以视觉和文本书写为中心的研究范式","研究方法","田野调查","田野伙伴关系","强调研究者不仅仅是作为语言文字和视觉的观察者和听众——而是启用自己全部的五种感官（闻田野的味道/听田野的全景声音/触碰手工制作的材质/和社区一起饮食）来全面地和更深地体察和感受田野中的文化和生活的民族志方法。感官田野拓展了传统的重视觉和文字书写的田野范式的边界。"],["抢救性记录","Salvage Documentation","对濒危非物质文化遗产项目采取紧急记录和抢救保存的保护措施","研究关键词","非遗与遗产","非遗保护","非遗保护中针对传承链条即将不可逆断裂、传承人年老且后继无人的超级濒危的非遗项目的应急的最高优先级的保护手段——集中一切的人力和技术的资源在最短的窗口期内（往往在与时间赛跑）用全息的手段将濒危项目的一切的内容和技艺无死角地记录和保存下来。"],["数字化保护","Digital Preservation","文化资源转化为数字格式并进行数字传播和利用的技术社会过程","研究关键词","非遗与遗产","非遗保护","运用数码相机录音笔三维扫描仪等数字的技术手段将物理载体的民俗的资料（如老照片、模拟信号的录音磁带和快要倒塌的戏台的实物）转化为永久不损坏且可在网络中被无限复制的数字化的档案和产品的技术过程。"],["文化生态保护区","Cultural Ecology Reserve","文化与其存在环境之间的相互依存和互动关系系统","研究关键词","非遗与遗产","非遗保护","以非遗的核心区和其所在的整个自然和人文地理空间为整体——不是抢救一个被隔离的ICU病人的孤立的项目——而是对整个地区的人与自然共同构成的文化的生态系统进行整体性保护的中国独创的保护模式。国家级文化生态保护区已有二十余个。"],["非遗工坊","ICH Workshop","依托非遗代表性项目开展生产、传习和展示的传统工艺作坊或工作室","研究关键词","非遗与遗产","非遗保护","依托被正式认定的非遗的代表性项目——在传承人的主导下——集该项目的生产和传习（带徒授艺）和产品的展示销售为一体的传统的手工艺的作坊或工作室的现代的转型的空间。兼具经济的自我造血和非遗的活态的学校功能的双重使命。"],["非遗进校园","ICH into Schools","将非物质文化遗产项目引入大中小学的教育传承活动和文化推广计划","研究关键词","非遗与遗产","非遗保护","将非遗的代表性传承人以及他们所承载的传统技艺、地方戏曲和民间歌舞等——以校本课程、课后兴趣社团和校园文化节的多样的形式——引入到从小学到大学的大中小学的日常校园的教学和活动中的教育传承和保护的活动。"],["非遗研学","ICH Study Tour","以非物质文化遗产为主题的研学旅行和体验式教育活动","研究关键词","非遗与遗产","非遗保护","以非遗的体验性的学习——亲手跟着传承人学做一张剪纸、学捏一个泥人——为主要的研学旅行的内容的中小学生的校外素质的教育的体验式的移步到非遗工坊和村落的实地旅行和习得的新形态的文旅教育的融合的模式。"],["非遗旅游","ICH Tourism","以非物质文化遗产的体验观赏和参与为核心内容的文化旅游形式","研究关键词","非遗与遗产","非遗保护","以各地的非遗——观摩一场皮影、参加一次火把节和吃一顿正宗的传统宴席——为其招徕游客的核心的卖点和独特的旅游的体验的文化旅游的形态。为当地创造了非遗保护的自造血的经济的循环也隐藏着非遗的过度商品化的风险。"],["内蒙古民俗","Inner Mongolia Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","从辽阔的呼伦贝尔大草原到河套平原的中国北疆内蒙古自治区的以蒙古族为主体汉族和其他多民族共享的——以那达慕大会、蒙古长调、马头琴的音乐和草原的祭敖包的信仰为核心的独特的边疆和草原的民俗的文化的统称。"],["新疆民俗","Xinjiang Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","中国西北新疆维吾尔自治区的以维吾尔族的麦西热甫和十二木卡姆、哈萨克族的阿依特斯和阿肯弹唱、以及各民族的古尔邦节和肉孜节等为核心的多元绿洲和草原民俗的文化。"],["西藏民俗","Tibet Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","中国西南青藏高原的西藏自治区的以藏族为主体的——以藏历新年、雪顿节和望果节以及转经和磕长头等独特的藏传佛教渗透的民俗为核心的雪域和宗教的民俗文化。"],["云南民俗","Yunnan Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","中国西南云贵高原的云南的多达二十五个世居少数民族的——以傣族的泼水节、彝族的火把节和白族的三月街等各具特色又相互影响的彩云之南的灿烂的多元民族民俗的宝库。"],["贵州民俗","Guizhou Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","以苗族侗族布依族等为主体民族的——被誉为百节之乡的——以苗族的芦笙节姊妹节和侗族的大歌等为核心的黔地的深山的少数民族的民俗文化。"],["闽台民俗","Fujian-Taiwan Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","隔台湾海峡相望的福建和台湾汉族社会的——以闽南的妈祖信仰和泉州和台南的普渡的习俗以及客家土楼里的民俗为核心的共享着深层的闽台血缘和民俗的亲缘的文化的区域。"],["客家民俗","Hakka Folklore","民众创造享用和传承的生活文化和风俗习惯","研究关键词","全球化与地方","地方性议题","分布于粤闽赣三省交界山区的客家族群的——以围龙屋和大土楼的聚居和以山歌和祭祖为核心的——在千年的漫长南迁中始终坚守勿忘祖言的坚韧的独特的民系的民俗文化。"],["元宵","元宵 (Social Folklore / Seasonal Festivals)","元宵节吃的糯米球状甜品，有包馅和不包馅两种，又称汤圆","民俗事象","社会民俗","岁时节日","正月十五的元宵节的最关键的元素——以糯米粉包裹的黑芝麻或花生馅的圆球在水中煮至漂浮——因为它的圆的外形和甜的内馅——被赋予全家的团圆和生活的甜蜜的象征——吃元宵是新年从除夕到元宵的最后一顿狂欢的标记。"],["重阳糕","重阳糕 (Social Folklore / Seasonal Festivals)","重阳节吃的多层糕点，糕谐音高，寓意步步登高","民俗事象","社会民俗","岁时节日",null],["腊八粥","腊八粥 (Social Folklore / Seasonal Festivals)","腊八节以多种谷物干果熬制的粥品，源于佛教寺院施粥传统","民俗事象","社会民俗","岁时节日","腊八节专属的——以大米小米红豆绿豆花生红枣桂圆和莲子等八宝——在文火上慢熬成黏稠的香甜的粥——在腊八的清晨全家人喝一碗滚烫的腊八粥——将年的序幕正式地拉开。"],["春饼","春饼 (Social Folklore / Seasonal Festivals)","立春日吃的薄饼卷菜，有迎新之意","民俗事象","社会民俗","岁时节日",null],["青团","青团 (Social Folklore / Seasonal Festivals)","清明节以艾草汁和糯米制成的绿色团子，江南清明时令食品","民俗事象","社会民俗","岁时节日","清明节的标志性食品——以艾草的汁染绿的糯米的皮——包裹着红豆沙或芝麻的馅——蒸熟后碧绿和软糯。吃青团是江南人过清明的——最温柔的春的味觉的仪式。"],["雄黄酒","realgar wine","端午节饮用的雄黄调制酒，传统认为可以驱虫辟邪","民俗事象","物质民俗","饮食民俗",null],["菊花酒","chrysanthemum wine","重阳节饮用的菊花浸泡酒， life-cycle ritual/custom)","为已故先人举办的冥诞纪念活动，表达追思和孝道延续","民俗事象","社会民俗","人生礼仪",null],["过九不过十","过九不过十 (life-cycle ritual/custom)","民间祝寿习俗，逢九庆祝而非逢十，取'九'为阳数之极和长久之意","民俗事象","社会民俗","人生礼仪","中国传统的过生日的忌讳——逢十的大寿（如六十和七十）不过当年——而是提前一年——在五十九和六十九岁时大办——即过九不过十。以阳极必反——避免在满的时候物极必反的智慧的民俗。"],["谐音歇后语","谐音歇后语 (Chinese folk saying/proverb)","利用同音字构成双关的歇后语","民俗事象","语言民俗","谚语谜语",null],["比喻歇后语","比喻歇后语 (Chinese folk saying/proverb)","以后语比喻前语的歇后语","民俗事象","语言民俗","谚语谜语",null],["故事歇后语","故事歇后语 (Chinese folk saying/proverb)","以一个简短故事或典故为后语的歇后语","民俗事象","语言民俗","谚语谜语",null],["双关歇后语","双关歇后语 (Chinese folk saying/proverb)","利用语义双关构成幽默效果的歇后语","民俗事象","语言民俗","谚语谜语",null],["拆字歇后语","拆字歇后语 (Chinese folk saying/proverb)","利用汉字字形拆解构成幽默效果的歇后语","民俗事象","语言民俗","谚语谜语",null],["福禄寿喜","福禄寿喜 (Spiritual Folklore / 民间观念)","福禄寿喜，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["五福捧寿","五福捧寿 (Spiritual Folklore / 民间观念)","五福捧寿，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["喜上眉梢","喜上眉梢 (Spiritual Folklore / 民间观念)","喜上眉梢，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["连年有余","连年有余 (Spiritual Folklore / 民间观念)","连年有余，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["松鹤延年","松鹤延年 (Spiritual Folklore / 民间观念)","松鹤延年，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["龙凤呈祥","龙凤呈祥 (Spiritual Folklore / 民间观念)","龙凤呈祥，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["麒麟送子","麒麟送子 (Spiritual Folklore / 民间观念)","麒麟送子，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["百子图","百子图 (Spiritual Folklore / 民间观念)","百子图，精神民俗中的民间观念类民俗事象","民俗事象","精神民俗","民间观念",null],["八仙过海","八仙过海 (Spiritual Folklore / 民间观念)","八仙各显神通渡海的著名道教传说，后成为各显其能的成语","民俗事象","精神民俗","民间观念","中国民间最脍炙人口的道教的传说的群像——吕洞宾铁拐李汉钟离张果老曹国舅韩湘子蓝采和何仙姑八仙——各持法宝——过东海时各自以法宝渡海——不乘船——八仙过海各显神通是中国人的不依赖他人的独立和互助的成语的出处。"],["暗八仙","暗八仙 (Spiritual Folklore / 民间观念)","以八仙各自持有的法器（如葫芦扇子宝剑等）代表八仙的间接表现方式","民俗事象","精神民俗","民间观念","在中国民间的年画和建筑的雕刻中——为避免直白地刻画八仙——而以画家和匠人——仅雕刻八仙各自的法宝——如吕洞宾的剑和铁拐李的葫芦——而不刻八仙本人的——以法器代人——的民俗美术的含蓄的象征的表达的手法。"],["葛兰言","Ge Lan Yan","马塞尔·葛兰言，法国汉学家和社会学家，以《中国古代的节庆与歌谣》开创中国上古社会礼俗研究","学者与学术体制","西方学者","现代时期","马塞尔·葛兰言（1884-1940），法国汉学家和社会学家，涂尔干学派成员。代表作《中国古代的节庆与歌谣》以《诗经》为材料分析上古中国的节庆和礼俗的社会功能，是西方汉学中民俗研究的经典之作。"],["高延","Gao Yan","扬·雅各布·马里亚·德·赫罗特，荷兰汉学家，以中国宗教体系研究著称","学者与学术体制","西方学者","现代时期",null],["戴遂良","Dai Sui Liang","莱昂·维格，法国耶稣会士汉学家，以中国民间信仰和民俗文献编译著称","学者与学术体制","西方学者","现代时期",null],["沙畹","Sha Wan","爱德华·沙畹，法国汉学家，以中国古代宗教和泰山信仰研究著称，伯希和之师","学者与学术体制","西方学者","现代时期",null],["伯希和","Bo Xi He","保罗·伯希和，法国汉学家和敦煌学家，以中亚考古和中西交通史研究著称","学者与学术体制","西方学者","现代时期",null],["马伯乐","Ma Bo Le","亨利·马伯乐，法国汉学家，以中国古代宗教和道教研究著称","学者与学术体制","西方学者","现代时期",null],["石泰安","Shi Tai An","罗尔夫·石泰安，法国藏学家和汉学家，以格萨尔史诗和西藏宗教研究著称","学者与学术体制","西方学者","现代时期",null],["韩书瑞","Han Shu Rui","韩书瑞，美国汉学家，以中国民间宗教和教派研究著称","学者与学术体制","西方学者","现代时期",null],["欧达伟","Ou Da Wei","欧达伟，美国民俗学家，以中国民间文学和华北乡村研究著称","学者与学术体制","西方学者","现代时期",null],["武雅士","Wu Ya Shi","阿瑟·沃尔夫，美国人类学家，以台湾汉人社会、童养媳制度和民间信仰研究著称","学者与学术体制","西方学者","现代时期",null],["娄子匡","Lou Zikuang","中国早期民俗学家，民间文学与民俗学研究者，台湾民俗学奠基人之一","学者与学术体制","中国学者","第一代奠基者","中国现代民俗学家（1908-1987），杭州中国民俗学会的创办者之一。以民间文学和民俗的搜集出版著称，主编《民俗月刊》和大量民间文学丛书，是中国民俗学民国时期的关键组织者和出版者。"],["杨堃","Yang Kun","中国民族学与民俗学家，中国早期民俗学运动重要参与者","学者与学术体制","中国学者","第一代奠基者","中国现代民族学和民俗学家（1901-1998），中国社会科学院民族研究所研究员。以中国民族学和原始社会史的研究著称，著有《民族学概论》等，是新中国民族学和民俗学的重要奠基者。"],["罗香林","Luo Xiang Lin","中国历史学家，客家学奠基人，华南民族史研究先驱","学者与学术体制","中国学者","第一代奠基者",null],["常惠","Chang Hui","中国民俗学早期倡导者，北京大学歌谣研究会核心成员","学者与学术体制","中国学者","第一代奠基者",null],["魏建功","Wei Jian Gong","中国语言学家，北京大学教授，歌谣运动与早期民俗学推动者","学者与学术体制","中国学者","第一代奠基者","中国现代语言学家（1901-1980），北京大学教授，五四歌谣运动的核心参与者之一。以方言和民间歌谣的音韵研究著称。"],["郑振铎","Zheng Zhenduo","中国现代文学家，俗文学和中国民间文学研究奠基人之一","学者与学术体制","中国学者","第一代奠基者","中国现代文学家和学者（1898-1958），曾任文化部副部长。以中国文学史和民间文学的研究著称，主编《中国俗文学史》等，推动了民间文学进入中国文学的正典。"],["赵景深","Zhao Jingshen","中国民间文学和戏曲史研究学者","学者与学术体制","中国学者","第一代奠基者",null],["林惠祥","Lin Huixiang","中国人类学家，台湾原住民和中国民族考古学先驱","学者与学术体制","中国学者","第一代奠基者","中国现代人类学家和民族学家（1901-1958），厦门大学教授。代表作《文化人类学》是中国最早的人类学教材之一，对民俗和原始宗教的研究有重要的学术贡献。"],["芮逸夫","Rui Yifu","中国民族学家，亲属制度和中国民族研究学者","学者与学术体制","中国学者","第一代奠基者",null],["闻一多","Wen Yiduo","中国现代诗人和学者，神话与古典文学研究者","学者与学术体制","中国学者","第一代奠基者","中国现代诗人和学者（1899-1946），清华大学和西南联大教授。以《诗经》和《楚辞》的研究著称，将神话学和民俗学的方法引入中国古典文学的研究——如其对《伏羲考》等上古神话的跨文化考据。"],["日常生活实践","Practice of Everyday Life","德·塞托理论中民众在日常消费和实践中进行创造性抵抗的策略","理论术语","中国本土理论","本土方法论","米歇尔·德·塞托（Michel de Certeau）在《日常生活实践》（1980）中提出的文化研究核心概念，与福柯对规训权力的分析不同，德·塞托关注的是日常生活中的普通人在看似被权力全面管控的消费社会中如何通过各种微观的、日常的、创造性的'战术'（tactics）——偷懒、走捷径、在给定的文化产品中进行个人的重新编码和意义生产——来展开对权力秩序的'日常抵抗'。在民俗学中，日常生活实践为民俗在限制性条件下的创造力提供了分析框架——在'移风易俗'的压力下，农民不是被动的接受者，他们通过表面的配合和实质的保留在实践中创造性地调整和维系着自己的民俗传统。"],["感受民俗学","Folklore of Feeling","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","当代中国民俗学的前沿探索方向之一，主张民俗学不应仅关注民俗的形态和功能（'民俗是什么、有什么用'），还应关注民俗实践中的主体情感体验和感受层面（'做民俗时主体感受到什么'）。感受民俗学关注的核心问题：在祭祀活动中，人们不仅是'按程序执行一套仪式'，更是真实的悲伤、怀念、敬畏等情感的体验者；在一首歌谣的传唱中，人们不仅是'传承一个文本'，更是情感的共鸣和释放。感受民俗学整合了人类学的'情感转向'和'感官转向'，力图将民俗研究从淡漠的学术观察推向对鲜活的人类体验的深切理解。"],["感官民俗","Sensory Folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","将人的感官体验——视觉（看社火）、听觉（听秦腔、鞭炮声）、嗅觉（香火、年糕的味道）、味觉（年节特色饮食）、触觉（手工技艺的触感）——纳入民俗学研究核心的分析框架。感官民俗的核心主张是：民俗不只是'观念'和'文本'，更是感官的全面体验——一个人对'过年'的记忆可能首先不是观念（如'团圆'），而是嗅觉（鞭炮烟火味+红烧肉的香味）、听觉（春晚的背景声+小孩的尖叫声）和触觉（新衣服的布料感）。感官民俗整合了人类学的'感官转向'（sensory turn），代表人物如彭牧等，将中国民俗学带入了身体性和感官性的全新研究维度。"],["情感转向","Affective Turn","21世纪人文社会科学的重要范式转换，在民俗学中表现为从文本分析转向关注民众情感经验和感受的维度","理论术语","中国本土理论","本土方法论","21世纪以来席卷人文社会科学的跨学科研究范式转移，强调情感和感受不是纯粹私人的、内在的心理状态，而是被社会、文化和权力所塑造和表达的公共文化实践。在民俗学中，情感转向引发了核心方法论的转变——从'民俗的文本分析'转向'民俗中主体的情感经验和感受'，研究聚焦于仪式中的悲伤和敬畏如何被文化所编码和操演、民歌中的情感如何不仅是文本内容而且是表演者和听众之间的情感共鸣事件等。情感转向在当代中国民俗学中的代表性推进包括张士闪对鲁中乡村仪式'哭'的情感分析等。"],["物质性转向","Material Turn","人文社会科学中重新关注物的能动性和物质文化的理论运动，在民俗学中体现为对器物、身体和物质实践的研究","理论术语","中国本土理论","本土方法论","21世纪人文社会科学的前沿理论运动，是对语言学转向中以'文本''话语''表征'为中心的过度强调的批判性回应。物质性转向的核心主张是：物（objects）不是被动的文化意义的承载者（'这个杯子的意义是X'），而是具有自身的物质性、物理性和能动性的行动者，物以其实体存在（大小、重量、材质）积极地参与和塑造着人类的社会实践和文化意义。在民俗学中，物质性转向将研究对象从'民俗的观念和象征维度'扩展至'民俗的物质和身体维度'——一个年糕的意义不在于它'象征'什么，而在于制作年糕时的和面、揉捏、模具压印等身体动作本身就是意义的来源。"],["空间转向","Spatial Turn","社会科学中从历史时间维度转向空间维度分析社会文化现象的理论运动，影响民俗学对地方、空间和景观的研究","理论术语","中国本土理论","本土方法论","20世纪后期以来社会科学从历史时间维度（关注变化和历史过程）向空间维度（关注地方、场所和空间的生产）的分析重心的转移。空间转向对民俗学的影响是多层面的：从对'民俗在时间中的传承'的关注转向对'民俗在地方和空间中的嵌入和实践'的关注；从将民俗定位在民族国家的时间叙事中转向关注民俗的地域性和跨地域的空间网络；从将'田野'视为中性的研究场所转向认识田野作为充满权力关系的争夺性空间。空间转向的代表性理论资源包括：列斐伏尔的'空间的生产'、段义孚（Yi-Fu Tuan）的'地方与空间'概念。"],["流动性","Mobility / Liquidity","鲍曼等提出的现代社会理论概念，指全球化时代人员、资本、信息和文化的高速流动状态，影响民俗学的跨国与移动研究","理论术语","中国本土理论","本土方法论","齐格蒙特·鲍曼（Zygmunt Bauman）在《流动的现代性》（2000）中提出的现代社会特征概念，指全球化时代一切传统的'固态'事物——工作、家庭、社区、国家边界、身份认同——都在加速变得流动、不确定和暂时性。在民俗学中，流动性对传统民俗的根本性挑战是：传统民俗建立在相对稳定的地方社区（固态的'乡土社会'）的基础上，当人和文化都处于加速的流动状态时（农民工每年在城市和乡村间迁徙、年轻人的文化消费在短视频中日夜流转），民俗是否还是'当地人的当地习俗'？还是变成了流动的、脱嵌的、可选择和可DIY的文化资源？"],["媒介化","Mediatization","现代社会中媒介逻辑渗透到日常生活各领域的转型过程，民俗学关注媒介如何改变民俗的传承与展演方式","理论术语","中国本土理论","本土方法论","现代社会中媒介系统（电视、网络、手机、社交平台等）的运作逻辑从专门的'媒介领域'渗透、扩散并重新组织社会生活的几乎所有领域的转型过程。在民俗学中，媒介化分析关注的核心问题：当春节拜年从面对面磕头转变为微信群发红包和短视频拜年，民俗的核心（'面对面的人际互动'）是否已经被媒介逻辑所根本性地重构？媒介化是否在杀死'真正的'民俗，还是在创造一种新形态的'数字原生民俗'？——如网络迷因（meme）、弹幕文化、直播连麦等是否构成新的民俗形态？该分析整合了斯蒂格·夏瓦（Stig Hjarvard）等人的媒介化理论。"],["本真性建构","Construction of Authenticity","民俗文化遗产是否具有原初性和真实性的判断标准","理论术语","中国本土理论","本土方法论","民俗遗产研究中对'本真性'（authenticity）的认识论批判概念，主张'本真性'不是一个民俗事象固有的客观属性（'这是真民俗那个是伪民俗'），而是特定的行动者（学者、政府、旅游开发者、当地社区）在特定历史条件下，为特定目的，通过特定的话语策略（如'原生态''非物质文化遗产''百年传统'）被建构、被协商和被争夺的文化标签。在民俗学中，本真性建构分析拒绝'伪民俗'的简单否定判断（如'这个是假的传统'），转而追问：谁在什么样的权力关系中将什么建构成'本真的'或'非本真的'？这种建构满足了谁的什么需要？"],["仪式化","Ritualization","日常行为被赋予仪式特征和象征意义的过程","理论术语","仪式与表演理论","仪式类型与机制","凯瑟琳·贝尔（Catherine Bell）在《仪式理论与实践》（1992）中倡导的将'仪式'从静态名词转变为动态动词的分析转向，指不是先有了一个叫做'仪式'的东西然后人们去做它，而是某些日常行为在特定条件下被'仪式化'——被赋予了形式的严格性、象征的超载性和社会的重要性——从而成为一个区别于日常生活的仪式事件。仪式化概念将研究从'什么是仪式'的本质主义追问转向'什么行为在什么条件下被仪式化为仪式以及产生了什么效果'的动态过程分析。"],["礼仪化","Ceremonialization","仪式理论和类型学概念","理论术语","仪式与表演理论","仪式类型与机制","与'仪式化'密切关联的概念，特指日常行为和规范在与官方礼制/规范和官方符号体系互动的过程中，被赋予礼仪的特征、形式和合法性，从而被提升为礼仪化行为的社会过程。礼仪化与仪式化的区别在于前者更强调权力维度——礼仪化通常包含一个'向上看齐'的权威认证过程（民间自发的地方祭祀被纳入官方祀典即经历了一个礼仪化过程）。"],["仪式空间","Ritual Space","仪式活动所占据和建构的具有象征意义的物理或观念空间","理论术语","仪式与表演理论","仪式类型与机制","仪式活动所占据和通过实践建构的具有特殊文化意义和象征秩序的空间。仪式空间与日常空间的关键区别在于它是'被划出来的'——通过特定的仪式操作（如焚香洒净水、划线结界）从日常的世俗空间中被分离和圣化的一块特殊空间。仪式空间的分析维度包括：物质空间（祭坛、庙宇、祠堂等建筑空间）、社会空间（仪式空间中的位置分配——主祭位/陪祭位/旁观区——反映并再生产着社会关系）和象征空间（仪式空间在信仰体系中被赋予的宇宙论意义——祭祀空间的中心可能是'世界的中心'）。"],["仪式时间","Ritual Time","仪式活动所遵循的与日常时间不同的神圣或特殊时间结构","理论术语","仪式与表演理论","仪式类型与机制","仪式活动所遵循和建构的与日常世俗时间不同的、具有特殊文化意义、节奏和循环性的时间结构。仪式时间的核心特征：中断日常时间——日常时间中人们工作、睡觉的线性节奏被仪式所中断和重组；循环性——仪式时间具有周期性（每年同一时间举行同样的仪式），这与日常时间的线性序列不同；浓缩性——仪式中可能在几分钟内浓缩和重现了'整个历史'（如黄帝祭典中被浓缩呈现的中华民族起源叙事）。范热内普最早指出过渡礼仪具有其特殊的仪式时间节奏。"],["仪式专家","Ritual Specialist","掌握仪式知识并主持或引导仪式进行的专业人员","理论术语","仪式与表演理论","仪式类型与机制","在特定社区或文化群体中因掌握了系统的仪式知识（如经文口诀、仪式程序、禁忌规则、与神灵沟通的技巧）而被社区成员广泛认可为具有主持/引导/操作各类仪式活动的资格和能力的专门性社会角色——如民间的端公/师公/毕摩/萨满、风水先生、婚礼的'全福人'等。仪式专家的社会特征：其权威基于专门的仪式知识（非基于选举或任命）、其知识通常通过师徒传承或代际传承获得、其角色具有不可替代性（特定仪式必须由特定的仪式专家主持才具有效力）。"],["仪式象征","Ritual Symbol","仪式中使用的具有文化意义和表达功能的符号、动作或物品","理论术语","仪式与表演理论","仪式类型与机制","在仪式活动中被使用的具有特定文化约定意义的符号元素，包括物质符号（祭品、法器、神像、特定的动植物）、身体符号（跪拜、叩首、特定的手势和舞步）、语言符号（咒语、经文、祝词）和空间符号（特定的方位和布局）。特纳对仪式象征的分析揭示了象征的双重结构——象征不仅指向它的'所指'（如某种超自然力），还指向社会关系（如仪式中的性别角色分工）和价值（如'孝道''忠义'）。仪式象征的意义不是固定的字典式的，而是在仪式的展开过程中被动态地揭示、积累和转变的。"],["仪式效能","Ritual Efficacy","仪式在社会和心理层面产生的实际效果和功能","理论术语","仪式与表演理论","仪式类型与机制","仪式在社会结构和个体心理两个层面产生的实际效果和功能，是评判仪式'做成了没有'的核心标准。仪式效能的两个层面：社会效能——仪式是否成功地转换了个体的社会身份（丧礼是否成功地将亡者送走并重新整合了丧家的社会关系）或维持了社会秩序；心理效能——参与者是否在仪式中体验到了预期的情感转化（哀伤→释然）。仪式效能的来源包括：仪式的形式正确性（程序不能出错）、仪式专家的权威性、参与者的真诚投入和社会集体的共同见证。"],["仪式抵抗","Ritual Resistance","通过仪式实践表达对主流秩序的文化抵抗","理论术语","仪式与表演理论","仪式类型与机制","通过仪式实践的方式对主流社会秩序、官方意识形态或压迫性权力结构进行象征性表达、挑战和反抗的文化政治策略。仪式抵抗的典型形式包括：弱势群体在仪式中通过幽默和反串象征性地颠倒权力关系（如庙会社火中平民扮成官老爷的狂欢式讽刺）、被压制的地方信仰在官方严密管控下以隐蔽的微调形式继续操演、农民保护地方仪式传统面对政府'移风易俗'压力时的'表面服从暗地保留'策略。仪式抵抗的分析关注的核心：仪式如何进行权力的象征性重分配？在权力极不对等的条件下仪式抵抗的局限和效力如何？"],["宫殿","palace","帝王居住和理政的大型建筑群，以北京故宫为代表","民俗事象","物质民俗","居住建筑",null],["寺庙","temple","佛教进行宗教活动的建筑群，以山门天王殿大雄宝殿为中轴","民俗事象","物质民俗","居住建筑","供奉佛和菩萨和民间诸神的——由僧侣或庙祝管理的——向信众开放的公共的宗教的建筑。是社区的法会和节庆——和中元普度和庙会的——不可替代的神圣的空间的核心。"],["道观","Daoist temple","道教进行宗教活动的建筑群，以灵官殿三清殿为中轴","民俗事象","物质民俗","居住建筑",null],["书院","书院 (Material Folklore / 居住建筑)","中国传统教育机构的建筑群，以讲堂和藏书楼为核心空间","民俗事象","物质民俗","居住建筑","中国古代的私人的或半官方的教育机构——由著名的学者主持——招收本地和外地的学子——在此研习儒家的经典和准备科举——岳麓书院和白鹿洞是北宋四大书院。书院是儒家礼教——渗透民间的最坚固的堡垒。"],["会馆","会馆 (social custom/organization)","同乡或同业在异地设立的联谊互助性建筑","民俗事象","社会民俗","宗族组织",null],["戏台","戏台 (Material Folklore / 居住建筑)","传统戏曲表演的专用建筑，多建于庙宇祠堂之中面向正殿","民俗事象","物质民俗","居住建筑","中国的城乡——依附于庙宇或祠堂——或独立的——以歇山或卷棚的屋顶和开放的台口的——供社戏、傩戏和地方戏——在神诞和庙会中——搬演酬神和娱人的戏剧的——木构的露天的舞台。"],["茶馆","茶馆 (Material Folklore / 居住建筑)","专供饮茶和社交的公共空间，四川茶馆为其典型代表","民俗事象","物质民俗","居住建筑",null],["酒肆","酒肆 (Material Folklore / 居住建筑)","古代饮酒和社交的商业场所","民俗事象","物质民俗","居住建筑",null],["驿站","驿站 (Material Folklore / 居住建筑)","古代传递公文和接待往来官员旅客的交通机构及其馆舍","民俗事象","物质民俗","居住建筑",null],["桥梁","桥梁 (Material Folklore / 居住建筑)","跨越水域或谷地的交通构筑物，石拱桥廊桥为中国传统桥梁的代表","民俗事象","物质民俗","居住建筑","中国古代——以石拱和木梁——跨过深涧和激流——联通隔绝的两岸的——赵州桥、洛阳桥和卢沟桥——每一座古桥都伴随着一个建桥的神话和义捐的传说——桥是交通的节点也是风水中的锁水口的关隘。"],["塔","pagoda","源于印度窣堵坡的高层佛教纪念性建筑，后演变为风水塔和景观塔","民俗事象","物质民俗","居住建筑","源于印度的佛教的建筑——随着佛教的东传——演变为中国古建的最高的和最抢眼的建筑的类型——塔是供奉佛的舍利和经卷的——也是风水学中镇守水口和关锁的文峰。西安的大雁塔和山西的应县木塔是中国的塔的两个不朽的巅峰。"],["亭","pavilion","有顶无墙的开放式景观建筑，供人休憩赏景","民俗事象","物质民俗","居住建筑",null],["台","terrace","以土石筑起的高平露天构筑物，用于观景祭祀和军事","民俗事象","物质民俗","居住建筑",null],["楼","tower","两层以上的大型单体建筑，多用于观景藏书或居住","民俗事象","物质民俗","居住建筑",null],["阁","pavilion","类似楼的架空干栏式多层建筑，多用于藏书和供奉","民俗事象","物质民俗","居住建筑",null],["轩","轩 (Material Folklore / 居住建筑)","有窗槛的长廊式建筑或园林中的小型敞亮建筑","民俗事象","物质民俗","居住建筑",null],["榭","榭 (Material Folklore / 居住建筑)","建在水边或花畔的开敞建筑，临水观景所用","民俗事象","物质民俗","居住建筑",null],["舫","舫 (Material Folklore / 居住建筑)","建于水中的船形园林建筑，又称不系舟旱船","民俗事象","物质民俗","居住建筑",null],["围棋","围棋 (traditional Chinese game/sport)","中国最古老的棋类游戏之一，黑白对弈以占地多为胜，蕴含深厚哲学思想","民俗事象","游艺民俗","游戏竞技","中国最古老的——有着四千多年文字的记载的——策略的棋类的游戏。以黑白二色的圆形棋子在方格的棋盘上——围地和吃子——是文人的四艺琴棋书画的棋。围棋在中国民间——虽雅但也有不赌钱无白天的市井的博弈和赌博的一面。"],["象棋","象棋 (traditional Chinese game/sport)","红黑双方将死对方为胜的传统棋类","民俗事象","游艺民俗","游戏竞技",null],["军棋","军棋 (traditional Chinese game/sport)","军棋，游艺民俗中的游戏竞技类传统民间游戏","民俗事象","游艺民俗","游戏竞技",null],["跳棋","跳棋 (traditional Chinese game/sport)","跳棋，游艺民俗中的游戏竞技类传统民间游戏","民俗事象","游艺民俗","游戏竞技",null],["麻将","麻将 (traditional Chinese game/sport)","四人以组牌和牌为胜负的传统牌类","民俗事象","游艺民俗","游戏竞技",null],["牌九","牌九 (traditional Chinese game/spo
