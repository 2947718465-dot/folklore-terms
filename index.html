<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中国民俗学术语库 · Folklore Terminology Database</title>
<style>
:root {
  --ink: #1a1a2e; --paper: #fafaf8; --muted: #6b6b7b;
  --border: #e8e8ec; --surface: #fff; --hover: #f5f5f8;
  --accent: #2E6DA4; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.08);
  --radius: 10px; --radius-sm: 6px;
  --font-sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-serif: "Noto Serif SC","Songti SC",Georgia,serif;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
:root.dark {
  --ink: #e4e4ec; --paper: #111118; --muted: #8e8e9e;
  --border: #2a2a36; --surface: #1a1a24; --hover: #22222e;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;transition:background var(--transition),color var(--transition)}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--border);padding:0 24px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background var(--transition),border var(--transition)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--ink);white-space:nowrap;cursor:pointer;user-select:none;transition:opacity var(--transition)}
.logo:hover{opacity:.7}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);transition:transform var(--transition)}
.logo:hover .logo-dot{transform:scale(1.5)}

.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{width:100%;height:40px;padding:0 40px 0 42px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--ink);font-size:14px;outline:none;transition:all var(--transition)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,109,164,.12)}
.search-wrap input::placeholder{color:var(--muted);opacity:.6}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;transition:color var(--transition)}
.search-wrap:focus-within .search-icon{color:var(--accent)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:6px;line-height:1;border-radius:50%;display:none;transition:all var(--transition)}
.search-clear:hover{color:var(--ink);background:var(--hover)}
.search-clear.show{display:block}

.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--transition);position:relative}
.icon-btn:hover{background:var(--hover);border-color:var(--muted);transform:translateY(-1px)}
.icon-btn:active{transform:translateY(0)}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* === MAIN === */
.main-wrap{max-width:1400px;margin:0 auto;padding:0 24px}

.hero{padding:36px 0 28px}
.hero h1{font-family:var(--font-serif);font-size:28px;font-weight:700;letter-spacing:.02em;margin-bottom:4px}
.hero p{color:var(--muted);font-size:14px}
.hero .credit{color:var(--muted);font-size:12px;margin-top:4px;opacity:.7}
.hero .credit a{color:var(--accent);text-decoration:none}

/* === STATS === */
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat-item{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--muted);transition:all var(--transition)}
.stat-item:hover{border-color:var(--muted);transform:translateY(-1px)}
.stat-item strong{color:var(--ink);font-weight:600}

/* === CATEGORY PILLS === */
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cat-pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink);cursor:pointer;font-size:13px;font-weight:500;transition:all var(--transition);user-select:none;white-space:nowrap}
.cat-pill:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.cat-pill.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:var(--shadow-lg)}
.cat-pill .count{font-size:11px;opacity:.7;margin-left:4px}
.cat-pill.active .count{opacity:.9}

/* === SUB FILTERS === */
.sub-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;transition:all var(--transition);min-height:0}
.sub-filter{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;transition:all var(--transition);user-select:none}
.sub-filter:hover{color:var(--ink);border-color:var(--muted);background:var(--hover)}
.sub-filter.active{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:500}
.t3-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;transition:all var(--transition);min-height:0}
.t3-filter{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:11px;transition:all var(--transition);user-select:none}
.t3-filter:hover{color:var(--ink);border-color:var(--muted);background:var(--hover)}
.t3-filter.active{background:var(--muted);color:var(--paper);border-color:var(--muted);font-weight:500}

/* === BREADCRUMB === */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:16px;min-height:18px;flex-wrap:wrap}
.breadcrumb .bc-link{cursor:pointer;color:var(--accent);transition:opacity var(--transition)}
.breadcrumb .bc-link:hover{opacity:.7;text-decoration:underline}
.breadcrumb .bc-sep{color:var(--border);margin:0 2px}
.breadcrumb .bc-current{color:var(--ink);font-weight:500}

/* === DISTRIBUTION BARS === */
.distro{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.distro-row{display:flex;align-items:center;gap:10px}
.distro-label{width:140px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.distro-bar-wrap{flex:1;height:18px;background:var(--hover);border-radius:9px;overflow:hidden;position:relative}
.distro-bar{height:100%;border-radius:9px;transition:width .5s ease;min-width:2px;display:flex;align-items:center;padding-left:10px}
.distro-bar span{font-size:10px;color:#fff;font-weight:600;white-space:nowrap}

/* === SEARCH HIGHLIGHT === */
mark{background:#FFE066;color:var(--ink);border-radius:2px;padding:0 1px}
:root.dark mark{background:#5C4A0A;color:#FFE066}

/* === COMPACT MODE === */
.term-grid.compact .term-card{padding:12px 16px}
.term-grid.compact .term-def{display:none}
.term-grid.compact .term-breadcrumb{margin-bottom:0}
.term-grid.compact .term-name{font-size:14px;margin-bottom:0;padding-right:40px}

/* === SORT === */
.sort-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:12px;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:4px}
.sort-btn:hover{background:var(--hover);border-color:var(--muted)}
.sort-btn .arrow{font-size:10px}

/* === CONTROLS === */
.controls-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.controls-left{display:flex;align-items:center;gap:12px}
.result-info{font-size:13px;color:var(--muted)}
.result-info strong{color:var(--ink)}
.view-toggles{display:flex;gap:4px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.view-toggle{padding:6px 12px;border:none;background:var(--surface);cursor:pointer;font-size:12px;color:var(--muted);transition:all var(--transition)}
.view-toggle:hover{background:var(--hover)}
.view-toggle.active{background:var(--accent);color:#fff}

/* === TERM GRID === */
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:24px}
.term-grid.list{grid-template-columns:1fr;max-width:900px}

.term-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.term-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;transition:all var(--transition);opacity:.3}
.term-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.term-card:hover::before{opacity:1;width:4px}
.term-card.expanded{box-shadow:var(--shadow-lg);cursor:default}
.term-card.expanded::before{opacity:1;width:4px}

.term-card .color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;transition:all var(--transition)}
.term-card:hover .color-bar,.term-card.expanded .color-bar{width:4px;opacity:1}
.term-card .color-bar{opacity:.3}

.term-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px;display:flex;align-items:baseline;gap:8px;padding-right:52px}
.term-en{font-size:12px;color:var(--muted);font-weight:400;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.term-breadcrumb{display:flex;gap:4px;align-items:center;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.term-breadcrumb span{white-space:nowrap}
.term-breadcrumb .sep{color:var(--border);margin:0 2px}
.term-breadcrumb .cat-link{cursor:pointer;color:var(--accent);text-decoration:underline;text-underline-offset:2px;transition:opacity var(--transition)}
.term-breadcrumb .cat-link:hover{opacity:.7}

.term-def{font-size:13px;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:all var(--transition)}
.term-def.has-more::after{content:"  ▼";font-size:10px;opacity:.5}
.term-card.expanded .term-def{-webkit-line-clamp:unset;display:block;margin-bottom:8px}
.term-card.expanded .term-def.has-more{border-bottom:1px dashed var(--border);padding-bottom:12px;margin-bottom:12px}

/* === DETAIL === */
.detail-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;margin-right:4px;flex-shrink:0;animation:fadeUp .3s ease}
.term-detail{display:none;font-size:13px;color:var(--ink);line-height:1.85;padding:0;animation:fadeUp .3s ease}
.term-card.expanded .term-detail{display:block}
:root.dark .term-detail{color:#ddd}

.term-actions{position:absolute;right:16px;top:18px;display:flex;gap:4px;opacity:0;transition:opacity var(--transition)}
.term-card:hover .term-actions,.term-card.expanded .term-actions{opacity:1}
.term-action{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.term-action:hover{background:var(--hover);color:var(--ink);border-color:var(--muted)}
.term-action.copied{background:#3D8B68;color:#fff;border-color:#3D8B68}

/* === LOAD MORE === */
.load-more{text-align:center;padding:0 0 48px}
.load-more-btn{padding:10px 32px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--ink);cursor:pointer;font-size:14px;transition:all var(--transition)}
.load-more-btn:hover{background:var(--hover);border-color:var(--muted);transform:translateY(-1px);box-shadow:var(--shadow)}
.load-more-btn:active{transform:translateY(0)}
.load-more-btn.loading{opacity:.6;pointer-events:none}
.loaded-all{color:var(--muted);font-size:13px;padding:16px 0}

/* === EMPTY === */
.empty-state{text-align:center;padding:80px 24px;color:var(--muted)}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:15px}
.empty-state .empty-hint{font-size:13px;margin-top:8px}

/* === TOAST === */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--paper);padding:10px 24px;border-radius:20px;font-size:13px;z-index:1000;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* === BACK TO TOP === */
.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border:1px solid var(--border);border-radius:50%;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:50;opacity:0;transform:translateY(20px);pointer-events:none;transition:all var(--transition);box-shadow:var(--shadow)}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{background:var(--hover);transform:translateY(-2px)}

/* === KEYBOARD HELP === */
.kbd-hint{position:fixed;bottom:80px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:11px;color:var(--muted);z-index:49;opacity:0;transition:opacity .4s;pointer-events:none;line-height:2}
.kbd-hint.show{opacity:.9}
.kbd-hint kbd{display:inline-block;padding:1px 6px;border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:inherit;background:var(--hover);margin:0 2px}

/* === FOOTER === */
.site-footer{text-align:center;padding:40px 24px 24px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:24px}
.site-footer a{color:var(--accent);text-decoration:none}
.site-footer a:hover{text-decoration:underline}

/* === ANIMATIONS === */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.term-card{animation:fadeUp .35s ease both}
.term-card:nth-child(1){animation-delay:0s}
.term-card:nth-child(2){animation-delay:.02s}
.term-card:nth-child(3){animation-delay:.04s}
.term-card:nth-child(4){animation-delay:.06s}
.term-card:nth-child(5){animation-delay:.08s}
.term-card:nth-child(6){animation-delay:.1s}
.term-card:nth-child(7){animation-delay:.12s}
.term-card:nth-child(8){animation-delay:.14s}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-dots span{animation:pulse 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* === RESPONSIVE === */
@media(max-width:768px){
  .header{padding:0 16px}
  .header-inner{gap:10px}
  .logo{font-size:15px}
  .search-wrap{max-width:none}
  .hero{padding:24px 0 16px}
  .hero h1{font-size:22px}
  .main-wrap{padding:0 16px}
  .term-grid{grid-template-columns:1fr}
  .term-grid.list{max-width:none}
  .cat-pill{padding:6px 12px;font-size:12px}
  .icon-btn:nth-child(3){display:none}
}
@media(max-width:480px){
  .stats-bar{gap:6px}
  .stat-item{padding:5px 10px;font-size:12px}
  .header-inner{gap:6px}
  .logo{font-size:14px}
}
</style>
</head>
<body>
<header class="header">
<div class="header-inner">
<div class="logo" onclick="App.resetAll()" title="返回首页"><span class="logo-dot"></span>民俗学术语库</div>
<div class="search-wrap">
<span class="search-icon">🔍</span>
<input type="text" id="search" placeholder="搜索术语、英文、定义、分类…（按 / 聚焦，Esc 清空）" autocomplete="off">
<button class="search-clear" id="search-clear" title="清空搜索">✕</button>
</div>
<div class="header-actions">
<button class="icon-btn view-btn" id="grid-btn" onclick="App.toggleView('grid')" title="网格视图（G）">⊞</button>
<button class="icon-btn view-btn" id="list-btn" onclick="App.toggleView('list')" title="列表视图（L）">☰</button>
<button class="icon-btn view-btn" id="compact-btn" onclick="App.toggleView('compact')" title="紧凑视图（C）">≡</button>
<button class="icon-btn" id="theme-btn" onclick="App.toggleTheme()" title="切换深色/浅色（D）">🌙</button>
<button class="icon-btn" id="help-btn" onclick="App.toggleHelp()" title="快捷键（?）">?</button>
</div>
</div>
</header>

<div class="main-wrap">
<div class="hero">
<h1>中国民俗学术语库</h1>
<p>Folklore Terminology Database · 收录 5769 条核心术语，中英对照</p>
<p class="credit">编撰：史骞升 · <a href="https://github.com/2947718465-dot/folklore-terms" target="_blank">GitHub</a></p>
</div>

<div class="stats-bar" id="stats"></div>
<div class="distro" id="distro"></div>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="cat-pills" id="cat-pills"></div>
<div class="sub-filters" id="sub-filters"></div>
<div class="t3-filters" id="t3-filters"></div>

<div class="controls-bar">
<div class="controls-left">
<div class="result-info" id="result-info"></div>
<button class="sort-btn" id="sort-btn" onclick="App.toggleSort()" title="切换排序">⇅ <span id="sort-label">名称</span></button>
</div>
<div class="view-toggles">
<button class="view-toggle active" data-view="grid" onclick="App.toggleView('grid')">⊞ 网格</button>
<button class="view-toggle" data-view="list" onclick="App.toggleView('list')">☰ 列表</button>
<button class="view-toggle" data-view="compact" onclick="App.toggleView('compact')">≡ 紧凑</button>
</div>
</div>

<div class="term-grid" id="term-grid"></div>
<div class="load-more" id="load-more"></div>
<footer class="site-footer">
<p>中国民俗学术语库 © 2026 史骞升编撰 · <a href="https://github.com/2947718465-dot/folklore-terms" target="_blank">开源共享</a></p>
<p style="font-size:11px;opacity:.5">内容遵循 CC BY-NC 4.0 协议，转载或引用请注明出处</p>
</footer>
</div>

<div class="toast" id="toast"></div>
<button class="back-top" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>
<div class="kbd-hint" id="kbd-hint">
<kbd>/</kbd> 搜索 &nbsp; <kbd>Esc</kbd> 清空 &nbsp; <kbd>D</kbd> 深色<br>
<kbd>G</kbd> 网格 &nbsp; <kbd>L</kbd> 列表 &nbsp; <kbd>C</kbd> 紧凑<br>
<kbd>S</kbd> 排序 &nbsp; <kbd>?</kbd> 帮助
</div>

<script>
(function(){
"use strict";
var DATA=[["三类文化/三层文化","Three-Tiered Culture","钟敬文提出的中国社会中上层中层下层文化的分层理论框架","理论术语","中国本土理论","钟敬文学派","钟敬文在《民俗学概论》（1998）等著作中系统提出的中国文化分层理论框架。该理论将中国社会文化分为三个层次：上层文化（以儒家经典为代表的正统文化）、中层文化（城市市民与士绅阶层的文化）、下层文化（广大农民与底层民众的民俗文化）。三层文化的核心贡献在于两点：一是突破了传统文化研究只关注上层经典的局限，将民间文化纳入中国文化整体视野；二是强调了层与层之间的互动渗透关系而非静止隔绝——民俗不断上升为上层文化，上层文化也下沉为民间习俗。该理论是钟敬文学派研究范式的基础，对中国民俗学从'民间文学'向'民俗文化学'的学科转型产生了决定性影响，也是理解中国民俗学区别于西方民俗学之本土特色的关键切入点。"],["不可通约性","incommensurability","库恩提出的不同科学范式间理论方法与概念系统无法直接对话比较的性质","理论术语","社会与群体理论","社会理论与民俗","托马斯·库恩（Thomas Kuhn）在《科学革命的结构》（1962）中提出的科学哲学核心概念。指前后相继的科学范式（paradigm）之间不存在共同的衡量标准——不同范式使用不同的概念体系、理论预设和方法论标准，信奉不同范式的科学家群体无法通过中性证据比较两个范式的优劣。库恩强调这不是'不能比较'而是'无共同度量标准'。该概念后被引入社会科学领域，用以分析不同学术传统间的理论对话困难，在民俗学中可用于理解民间文学派、人类学派、实践民俗学派等不同研究范式之间的理论隔阂及其超越可能。"],["丝绸之路","Silk Road","古代连接东西方的陆上贸易通道，重要交通民俗载体","民俗事象","物质民俗","交通出行",null],["中华民族共同体","Chinese National Community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","中国政治学与民族学核心概念，指由中国各民族在长期历史发展中形成的共同历史命运、文化纽带和国家认同所凝聚的统一体。在民俗学语境下，该概念与'多元一体格局'（费孝通，1988）密切关联：中华民族的文化统一性不是单一同质化的，而是建立在各民族民俗文化多样性基础之上的共生整体。各民族共享的节庆（如春节）、饮食、服饰等民俗既是族群认同的载体，也是中华民族共同文化记忆的组成部分。该概念为民俗学提供了超越单一民族框架的宏观视角，尤其在与非遗保护、文化认同、民族交往交流交融等议题结合时具有重要的理论工具价值。"],["二十四节气","Twenty-Four Solar Terms","以天文观测指导农业生产的岁时节气体系","民俗事象","社会民俗","岁时节日",null],["五服","Five Grades of Mourning Attire","斩衰、齐衰、大功、小功、缌麻五等丧服制度","民俗事象","社会民俗","宗族组织",null],["仪式","Ritual","在特定时空按既定程序进行的具有象征意义的规范化行为，是民俗学与人类学的核心概念","理论术语","信仰与观念体系","象征与世界观","民俗学与人类学的核心概念，指在特定时空按既定程序进行的具有象征意义的规范化行为。范热内普（Arnold van Gennep）在《通过礼仪》（1909）中开创仪式研究，将过渡仪式分为分离、阈限、聚合三阶段。维克多·特纳（Victor Turner）在此基础上发展出'阈限'（liminality）和'共睦态'（communitas）概念，揭示仪式的反结构特征。仪式研究关注的核心问题包括：仪式如何生产社会秩序？象征符号如何传递文化意义？仪式表演如何实现身份转换？当代民俗学中，仪式研究从经典的人类学宗教仪式扩展至日常生活中的'类仪式'行为（开学典礼、婚丧嫁娶、节庆仪轨），是民俗学理论中最具解释力的分析工具之一。"],["仪式感","sense of ritual","仪式行为所带来的庄重、神圣等情感体验和意义感受","理论术语","仪式与表演理论","仪式类型与机制","指仪式行为带来的庄重、神圣或特殊的情感体验与意义感受。该概念强调仪式不仅是外在的、可观察的程序化行为，更具有内在的情感维度——参与者通过仪式的空间布置（如祠堂、祭坛）、时间节点（如除夕、清明）、符号系统（如焚香、叩拜）和集体共在（如全村祭祀）获得超越日常的心理体验。仪式感不等同于宗教感，世俗仪式同样可以产生强烈的仪式感。当代大众文化（音乐会、球赛、网红打卡）中的仪式感消费是该概念的新兴研究领域，涉及民俗传统的当代转化。"],["传承","Transmission / Inheritance","民俗文化在代际或群体间传递延续的过程与机制，是民俗学区别于其他学科的核心概念之一","理论术语","社会与群体理论","群体与认同","民俗学区别于其他学科的核心概念之一，指民俗文化在代际或群体间传递、延续的过程与机制。传承不同于一般性的文化传播，强调时间维度上的连续性、特定传承人（如老艺人、故事家、仪式主持者）的中介作用，以及传承过程中的创造性变异。传承路径包括家族传承（祖传技艺）、社区传承（村落祭祀）、师徒传承（曲艺行当）和制度性传承（学校教育、非遗传习所）。传承研究的核心问题是：什么样的民俗能被传承？传承的条件是什么？传承中断的原因是什么？刘魁立提出的'传承机制'研究和马林诺夫斯基的功能论解释是该领域的两大理论脉络。"],["传承文化","Inherited Culture/Traditional Culture","通过世代传承得以延续的文化形态，强调文化在时间维度上的连续性与稳定性","理论术语","记忆与传承理论","传统与传承","通过世代传承得以延续的文化形态，强调文化在时间维度上的连续性与稳定性。在民俗学中，传承文化相对于'创新文化'或'外来文化'而言，构成一个社会文化认同的根基。关键特征包括：口头性（依赖口耳相传而非文字）、群体性（非个人创造而是集体智慧的积淀）、模式性（形成稳定的表达和操演形式）、变异性（传承中不断被改造以适应新语境）。当代非遗保护运动的核心目标正是维系传承文化的活力。该概念与'口头传统''文化记忆''传统技艺'等术语高度关联，是民俗学文化理论的基石。"],["传统知识","traditional knowledge","社区和群体在长期生活实践中积累的知识技能和智慧体系","理论术语","社会与群体理论","社会理论与民俗","又称'本土知识''地方性知识'，指特定社区和群体在长期生活实践中积累的知识、技能和智慧体系。包括民间医药知识、农业耕作经验、生态适应策略、手工技艺诀窍等。其核心特征是实践性（从实践中产生，为实践服务）、口头性（主要通过口传心授）、社区共有性（非个人专利）和动态更新性（随环境变化不断调适）。世界知识产权组织（WIPO）和联合国教科文组织已将传统知识纳入文化遗产保护框架。在民俗学中，传统知识研究关注的是知识与权力的关系、现代科学知识与传统知识体系的张力与互补。"],["儿童民俗","Children's Folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","群体与认同","儿童群体创造、传承和享用的民俗文化形态，与成人主导的民俗传统并行并具有显著差异。其核心特征为：群体自治性（儿童自行制定游戏规则、创作和传播童谣）；口头性（主要依赖口耳相传而非文字或成人教学）；变异性（同一游戏在不同时空有大量异文）；地域性（'马兰开花二十一'等跳皮筋童谣在不同城市有不同版本）。布赖恩·萨顿-史密斯（Brian Sutton-Smith）是英语学界儿童民俗研究的奠基者，关注儿童游戏中的文化创造力。国内研究以游戏民俗（跳绳、踢毽子、过家家）、语言民俗（童谣、谜语、颠倒歌、绕口令）和校园民俗为主要领域，近年来儿童数字游戏成为新兴议题。"],["儿童民俗实践","Children's Folklore Practice","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","儿童群体在日常生活中的民俗创造和操演活动，包括游戏规则的协商与执行、童谣的创编与改编、秘密社团的组织运行等。不同于成人民俗的仪式化与制度化倾向，儿童民俗实践具有强烈的在场性（即兴发挥）、反权威性（对成人规则的戏仿和颠覆）和自组织性（无外部干预的自我管理）。该概念在方法论上强调'从儿童视角看民俗'而非'从成人视角看儿童'，与教育人类学中的'儿童本位'研究取向相呼应。钟敬文曾指出童谣研究不能仅关注文本，更要关注儿童的'表演情景'。"],["儿童群体","children's group","以未成年人为实践主体的民俗群体","研究关键词","身份与权力","身份与权力","以未成年人为实践主体和核心成员的社会群体，是儿童民俗产生和传承的社会基础。儿童群体制定的自主规则体系和非正式的社会结构为儿童社会化提供了重要的训练场。"],["共享文化符号","shared cultural symbols","在特定群体中被共同认知和使用的具有文化意义的符号系统，包括仪式符号、语言符号、物质符号等","理论术语","信仰与观念体系","象征与世界观","在特定群体中被共同认知和使用的具有文化意义的符号系统。民俗学中的文化符号可分三类：仪式符号（焚香＝沟通神灵，叩拜＝表示臣服）、语言符号（咒语、吉利话、禁忌语）和物质符号（红色＝喜庆，白色＝丧葬，龙凤＝吉祥）。其运作机制遵循皮尔斯（Charles Peirce）符号学的三分法——像似符（图样与实物的相似）、指示符（烟与火的关系）、规约符（文化约定，如红＝喜）——但民俗符号更强调群体的共享规约而非个体解释。共享文化符号是维系群体认同和集体记忆的核心机制，也是仪式得以有效运作的符号基础。"],["凝聚功能","cohesive function","社会文化现象在整体系统中发挥的作用和效能","理论术语","社会与群体理论","社会理论与民俗","社会文化现象的诸多功能之一，指其增强群体内部团结、强化集体认同、维系社会整合的效应。涂尔干（Émile Durkheim）在《宗教生活的基本形式》（1912）中最先系统论证了集体仪式的社会凝聚功能——共同参与仪式产生'集体欢腾'（collective effervescence），使个体超越自我利益，感受到与群体的紧密联结。在民俗学中，凝聚功能被视为民俗的核心社会功能之一：岁时节日凝聚家族与社区，祭祀仪式凝聚宗族，民间文艺活动凝聚地域群体。当代研究中注意避免功能主义的过度解释——并非所有民俗都有凝聚功能，也可能有排斥和区隔功能。"],["变异","variation","民俗在传承过程中因时空、语境、传承人差异而产生的形态与意义变化，是民俗生命力之所在","理论术语","记忆与传承理论","传统与传承","民俗在传承过程中因时空转换、社会语境变迁和传承人个体差异而产生的形态与意义变化。变异是民俗生命力之所在，也是民俗区别于文人和官方文化的关键特征。变异的主要驱动力包括：地理因素（同一故事在不同地区的异文）、时代因素（传统节俗在当代的简化与创新）、传承人因素（个体记忆偏差和创造性发挥）、媒介因素（口头→文字→数字媒介转换带来的形式变化）。芬兰历史-地理学派的AT分类法是最早系统处理变异的理论工具。当代民俗学不再将变异视为'讹误'，而是视为民俗创造性和适应性的体现。"],["口头创作","oral creation","民间文学以口语方式而非文字媒介进行创作的特征","理论术语","叙事与口头传统","口头理论","民间文学区别于作家文学的核心特征之一，指民间文学作品以口语方式而非文字媒介进行的现场创作。帕里-洛德理论（Parry-Lord Theory）通过研究南斯拉夫史诗歌手，揭示了口头创作的运作机制：歌手并非逐字背诵固定文本，而是依赖'程式'（formula）——在相同的格律条件下表达特定基本观念的固定词语组合——进行每次不同的即兴创编。口头创作的每次表演都是一次'再创作'，不存在一个'原始正本'。这一发现深刻改变了民间文艺学对口头文本与书面文本关系的理解。钟敬文晚年着力倡导民间文艺学的口头性研究。"],["口头流传","oral transmission","民间文学以口语方式在民众中传播和代代传承","理论术语","叙事与口头传统","口头理论","民间文学作品以口语方式在民众中代代传播和传承的过程特征，是口头性的时间维度表达。与口头创作（共时维度）不同，口头流传强调传承的时间纵深——一首民歌如何从祖辈唱到孙辈而不失其核心结构。口头流传依赖两个机制：记忆（传承人对文本结构的稳定储存）与变异（每次讲述/演唱时的语境化调整），二者构成动态平衡。杰克·古迪（Jack Goody）和瓦尔特·翁（Walter Ong）揭示了书写技术的引入如何从根本上改变了口头流传的认知基础。在非遗保护语境下，口头流传面临书面化和数字化带来的传承形态转型问题。"],["可持续发展","sustainable development","既满足当代人需求又不损害后代满足其需求能力的发展模式","研究关键词","非遗与遗产","可持续发展","1987年联合国布伦特兰委员会提出的全球发展理念的核心概念，指既能满足当代人的需要又不危及后代人满足其需要的能力的发展模式。在非遗领域可持续发展要求保护民俗的同时保证社区的当代发展权。"],["和平与安全","peace and security","社会免于暴力和冲突的稳定状态及其保障机制","研究关键词","非遗与遗产","可持续发展","社会免于暴力和武装冲突的稳定状态及其保障机制。在民俗学中和平不仅指无战争，还指社区内部通过民俗的协商和共享化解矛盾维持和谐的和平的文化基础。"],["地域性","regionality","民俗文化表现出地域差异的特性","研究关键词","全球化与地方","地方性议题","民俗在广袤的地理空间中表现出的因地而异的差异特性。同一节庆在相隔百里的两个村落中截然不同的形式和意义正是地域性的生动体现。"],["地方","place / locality","承载特定文化和意义的地理空间单元","研究关键词","全球化与地方","地方性议题","承载特定文化和意义的地理空间单元，不仅是物理位置的坐标更是附着在空间上的社会关系集体记忆和文化认同的总和。在民俗学中地方是民俗事象的空间锚点。"],["女性民俗","women's folklore","以女性为主体的民俗文化实践","研究关键词","身份与权力","性别研究","以女性为主体创造和实践的民俗文化的总称，涵盖女性生命礼仪（哭嫁歌等）、女性手工技艺（纺织刺绣女红）和女性特有的信仰和禁忌等领域。女性民俗研究是性别研究进入民俗学的最重要的学术议题之一。"],["娱乐功能","entertainment function","民俗活动提供的娱乐消遣功能","学科概念","功能与结构","社会功能","民俗在社会心理层面承担的重要功能之一——通过游戏的参与、故事的聆听、节庆的狂欢和戏曲的欣赏等非功利性的民俗活动为民众提供劳动之余的集体放松、精神宣泄和审美愉悦。民俗的娱乐功能与社会稳定相关——周期性的集体娱乐是对辛苦和压抑的日常生活的周期性补偿和心理之阀的安全释放。"],["学术共同体","academic community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","由共享特定学科知识、研究范式、学术信念和价值标准的学者组成的专业社群，是知识生产和社会化的核心场域。库恩的范式理论指出，学术共同体的运作依赖成员对基本理论前提和方法论标准的共识。在民俗学语境下，学术共同体包括：中国民俗学会及地方分会、各高校民俗学学科点（北京师范大学、中山大学等）、《民俗研究》《民间文化论坛》等核心期刊编委会和审稿人群体、以及师承网络（钟门、顾门等）。学术共同体的核心机制是同行评议和学术传承，其健康与否直接决定学科的知识生产质量和范式演进能力。"],["学术口碑","academic reputation by word-of-mouth","学者在非公开场合口口相传的真实学术评议","学科概念","学科元概念","学科属性与定位","在非正式、非公开的学术场合——如走廊交谈、饭局闲聊、师门内部讨论中——学者之间流传的、关于其他人（包括同事和竞争对手）的学术能力和人品的、不加粉饰的真话和不留情面的评论。学术口碑是公开的精致化的学术书评的暗面的补充——在公开的学术评论中不便直说的话通过口碑私密网络传递。"],["学术圈子","academic circle","由学术兴趣、师承关系或研究领域相近的学者形成的非正式学术社群，如钟门弟子圈","理论术语","社会与群体理论","群体与认同","由学术兴趣、理论取向、师承关系或研究领域相近的学者形成的非正式学术社群。与制度化的学会和学科点不同，学术圈子以私人关系（师生、同门、学友）和学术对话习惯为基础，其边界模糊、成员资格非正式。在中国民俗学界，典型的学术圈子如'钟门弟子圈'——以钟敬文为核心形成的师承网络，涵盖刘魁立、乌丙安、高丙中、萧放等几代学者。学术圈子的积极功能是促进深度学术对话和学术传承，消极面是可能导致学术封闭和'小圈子'评价。施爱东近年对学术圈子和学术派系的社会学分析引起广泛讨论。"],["学术对话","academic dialogue","基于共同知识结构的学者间学术讨论与交流","理论术语","社会与群体理论","社会理论与民俗","基于共同知识结构和学术信念的学者间学术讨论与交流活动，是学术共同体运作的基本方式。学术对话不同于一般性交谈，要求对话双方共享研究范式的基本前提、使用精确的学科术语、遵守学术论证规范，并以推进知识理解为目标。在民俗学中，学术对话的主要载体包括：学术期刊的商榷和讨论、学术会议的口头报告与评议、师门 seminar 的讨论、私人学术通信（如顾颉刚与钱穆的来往书信）等。当下中国民俗学界面临的一个问题是跨范式（如民间文学范式与中国人类学范式）之间的有效对话不足。"],["学术工匠","academic craftsman","作为普通劳动者的学者，其行业习俗与生存状态","学科概念","学科元概念","研究对象范畴","将被当代科研的繁重的考核和量化的压力挤压下的广大的普通的没有闪耀的光环的学术界生存者——作为一个辛勤的文字劳工（而非光环缭绕的知识大师）——的日常学术劳作和在夹缝中生存的行业习俗与生存状态作为严肃的学术研究对象的本土化的民俗学的元反思概念。"],["学术泡沫","academic bubble","量化管理机制下大量产出的低质重复性学术成果","学科概念","学科元概念","学科属性与定位","在当代高校和科研机构的以数量为王的量化考评机制（C刊/SSCI的篇数和项目的级别和金额）的巨大压力下被大量批量生产的、缺乏实质的学术创新和知识增量的、徒具论文的格式的空壳而思想空洞的低质的重复性的学术泡沫产品。学术泡沫的泛滥不仅是学者个人学术道德的危机更是科研管理体系的评价机制的深层失灵和异化的反映。"],["学术版图周圈论","circles theory of academic territory","以文化中心为圆心、圈层递推描述学术影响力的理论","学科概念","文化与认同","文化概念","以地理上的核心学术中心和其外围的学术边缘地区之间的学术影响力的梯度扩散的圈层递推的模形（如同石头投入水中的一圈圈扩散的水波）来描述和解释学术影响力的空间不均的分布的本土的理论的概念。"],["学术生态","academic ecology","学术界的生存状态、行业习俗与运作机制","研究关键词","全球化与地方","地方性议题","学术界作为一个相对自足的微型社会系统中的生存状态行业习俗和运作机制。包含了从导师-研究生的权力关系到发C刊的压力和学术会议的非正式交流等。施爱东等学者以民俗学方法研究学术自身的行业习俗的学术生态研究开辟了新领域。"],["学术酒吧","academic bar","学术活动进入公共休闲空间的新文化现象","研究关键词","当代社会文化","当代转型","近年来出现的学术讲座和学术沙龙等学术活动进入城市的酒吧咖啡馆等公共消费和休闲空间的新的社会和文化现象。它将学术从戒备森严的学院围墙中解放出来降落在日常消费空间的烟火气之中。"],["学术革命","academic revolution","以新范式替代旧范式、重立学术偶像的学科变革","学科概念","学科元概念","学科属性与定位","库恩的范式理论的革命性的概念——当一个旧的占统治地位的学术范式已经被积累的异常和反例彻底地耗尽了它的解题的能力，不再有能力为新一代的学者提供有前途的未解决的谜题从而被一群年轻的反叛学者提出的全新的革命性的竞争的范式所击败和替代的整个学科的认知的世界观和操作的方法论的激烈的根本性的颠覆和重置。"],["学术领袖","academic leader","在学科领域具有权威地位和广泛影响力的核心学者，能引领研究方向与学术范式","理论术语","社会与群体理论","群体与认同","在学科领域具有权威地位和广泛影响力的核心学者，能够引领研究方向、设定学术议程、培养学术人才并塑造学科形态。典型特征包括：原创性的理论贡献（如钟敬文的'三层文化论'）、系统的学科建设实践（如钟敬文建立北师大民俗学学科点）、广泛的学术号召力（能组织全国性学术会议和研究项目）、深厚的师承网络（培养大批后继学者）。学术领袖与行政领导不同——其权威来自学术同行自发的认可和追随，而非行政任命。在知识社会学视角下，学术领袖的角色包括'守门人'（gatekeeper，审定学术成果的标准）和'引路人'（pathfinder，开辟新的研究领域）。"],["学科危机","disciplinary crisis","研究范式过度操作导致学术生长点枯竭的学科状态","学科概念","学科元概念","学科属性与定位","库恩的范式理论描述的一个学科在其旧范式下的常规研究已经过度的开发和穷尽了该范式的理论的潜力——学者们发现他们已经提不出在该范式下可解的新的有意义的谜题——学术的生长点被挖尽导致的学科无法再常规发展和召唤着范式革命的危机的状态。"],["学科本位","disciplinary autonomy","民俗学以自身学科立场和研究范式凝聚研究深度的自觉意识","学科概念","学科元概念","学科属性与定位","在跨学科的合作越来越常态和学术的专业化分工极度细化的当代的学术大格局下，民俗学要清醒地、坚定地保有和维护自己的独立的、不可替代的学科的核心的本位的自觉意识——不迷失在多学科的风潮中将民俗学的学科底色稀释和融化在人家的学科中。"],["宣泄功能","cathartic function","民俗活动提供情感宣泄渠道的功能","学科概念","功能与结构","社会功能","民俗活动在社会成员心理上提供的合法的和安全的压力宣泄渠道——如丧仪上的集体的嚎哭、社火表演中对权力者的无害的讽喻模仿和节日中打破日常禁忌的狂欢——这些是被社会认可的释放压抑的窗口。"],["常民","ordinary people / folke","柳田国男提出的日本民俗学核心概念指日常生活中的普通民众","理论术语","中国本土理论","本土方法论","日本民俗学奠基人柳田国男提出的核心概念，指日常生活中的普通民众——既不是贵族精英，也不是目不识丁的底层，而是构成社会主体的'平常人'。'常民'不是阶级概念而是文化概念，强调其作为民俗文化承载者和传承者的身份。柳田国男将民俗学定义为研究常民生活文化的历史科学，这一界定使日本民俗学从一开始就区别于官方史学和文化精英主义。该概念对中国民俗学的'民众''民'等核心概念的界定有重要影响，也引发过'民俗学之民究竟是谁'的持续讨论——黄强等学者提出'非官方之民'的界定，试图超越柳田的常民概念。"],["常规研究","normal research","在既定范式框架内对现象提出问题并解答的学术工作","学科概念","学科元概念","学科属性与定位","库恩的范式理论中在范式革命之间的漫长的和平时期——广大科学家在一个已被确认的共同承认的范式的安稳的旧框框内进行的不挑战核心的理论假设的——在范式提供的确定的理论的图景下进行的一种解谜的就像拼图游戏一样的聚精会神的推进的工作。"],["性别平等","gender equality","不同性别在权利、机会和责任上的平等状态","研究关键词","身份与权力","性别研究","不同性别在社会政治经济和文化中享有平等的权利机会责任和尊严的理想状态和持续的社会过程。在民俗领域中性别平等的诉求指向的是在非遗传承人的认定社区仪式的主持权等环节中消弭性别的不平等。"],["情感共同体","emotional community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","指通过共享情感经验而非仅靠理性契约维系的群体形态。该概念源于涂尔干对集体欢腾的分析，在当代情感社会学和人类学中得到进一步发展。在民俗学中，情感共同体解释了民俗活动的深层凝聚力来源：不是物质利益或法律契约，而是共同参与的仪式（如清明节扫墓）中产生的集体情感（哀思、怀念、归属感）将群体凝聚在一起。该概念与'想象共同体'（安德森）、'感觉结构'（雷蒙·威廉斯）存在理论上的对话关系。在当代社会原子化趋势下，民俗活动作为情感共同体的再生产机制具有特殊的社会意义。"],["文化交流","cultural exchange","不同文化之间进行的互动和沟通","学科概念","文化与认同","文化概念","两种以上的不同文化——通过商贸的往来旅行的迁徙和跨国的媒体的传播——彼此接触并相互地给予、交流、吸收和影响对方的文化元素和文化实践的互动的过程的总称。丝绸之路是历史和民俗的文化交流的经典案例。"],["文化传承","cultural transmission","文化在社会成员和代际之间的传递过程","理论术语","社会与群体理论","社会理论与民俗","文化在社会成员和代际之间的传递过程，是文化再生产的基础机制。与一般意义上的'传承'相比，文化传承更强调传承内容的文化属性（知识、价值、技能、习俗等）而非物质属性。文化传承的三种基本模式：垂直传承（祖辈→父辈→子辈的纵向传递）、水平传承（同辈群体间的横向传递）、斜向传承（非直系亲属或社区长辈向年轻一代的传递）。在民俗学中，文化传承研究关注传承媒介（口传、仪式、技艺示范）和传承机制（模仿、记忆、制度化教学）的变迁及其对民俗活力的影响。"],["文化创造","Cultural Creation","民众在日常生活实践中不断生产新的文化形式与意义的过程，强调民俗的动态创新性","理论术语","记忆与传承理论","传统与传承","民众在日常生活实践中不断生产新文化形式与意义的过程，强调民俗的动态创新性而非静态重复。该概念直接回应对民俗学'向后看'的刻板批评——民俗不是已经逝去的'活化石'，而是持续被创造和再创造的活态文化。文化创造的主要机制：传统资源的创造性转化（如老歌填新词）、跨文化元素的创造性混合（如洋节本土化）、新媒介催生的新民俗形式（如微信红包）。持该立场的代表性学者包括鲍辛格（Hermann Bausinger）和国内的高丙中、徐赣丽等。"],["文化包容性","cultural inclusiveness","文化体系接纳和融合差异的能力","研究关键词","全球化与地方","全球化议题","一种文化体系在面对与异文化的接触和接纳社会内部的多元性时具有的开放性胸襟和对差异的尊重容纳和与之共生的能力和意愿。非遗公约中尊重文化多样性原则即是包容性的国际法体现。"],["文化多样性","cultural diversity","不同文化形态和传统的多样性存在","研究关键词","全球化与地方","全球化议题","全球不同民族不同地区和社群的千差万别的文化形态和传统以各自的独特方式存在下去的权利和事实。联合国教科文组织2005年《保护和促进文化表现形式多样性公约》将文化多样性提升为人类的共同遗产。"],["文化空间","cultural space","民俗活动和传统文化得以存续的特定时空场域","研究关键词","全球化与地方","地方性议题","联合国教科文组织非遗公约中定义的关键概念，指民俗活动和传统文化集中发生和得以存继的特定的时空场域——不仅是物理空间（庙会广场/戏台）还包括该空间在特定周期性时间的文化激活（节庆日）。"],["文化自信","cultural confidence","对自身文化价值的充分肯定和坚定信念","学科概念","文化与认同","文化概念","与西方中心论的文化自卑的近代以来的历史包袱相对的新时代中国文化政策的核心的提法——对自身的民族的文化的独特的价值、生命力以及在全球化的大背景下的竞争力抱有充分的和坚定的自信的态度的正面的情绪和信念。"],["文化遗产","cultural heritage","人类创造并世代传承的对当代和未来具有价值的有形和无形文化财富","理论术语","记忆与传承理论","传统与传承","人类创造并世代传承的、对当代和未来具有价值的有形与无形文化财富。1972年联合国教科文组织《保护世界文化和自然遗产公约》确立有形遗产保护框架，2003年《保护非物质文化遗产公约》将民俗纳入国际文化遗产体系。从民俗学视角看，'文化遗产'概念的引入带来了双重影响：积极面是为民俗保护提供了法律和资金保障，消极面是'遗产化'可能导致民俗脱离原有生活语境而成为观赏化的'文化展品'。中国已建立国家-省-市-县四级非遗保护体系，截至2023年共有43个项目入选联合国教科文组织非遗名录。"],["文本","text","可作为分析和解读对象的文化表达载体","学科概念","文化与认同","文化概念","在民俗学中从狭隘的书面文字文本的早期界定逐渐扩展至包括口头叙述、仪式的表演、舞蹈的身体动作、服饰的穿着、甚至是整个的庙会的全景——凡是人类的象征实践可被当作一个连贯的、可以被系统和多层的解读意义的文化构造品，都可以被作为民俗分析的文化文本。"],["旅游文化热","tourism culture fever","旅游产业带动的地方民俗文化复兴热潮","研究关键词","当代社会文化","城市与乡村","随着国内旅游产业的蓬勃发展而带动的地方民俗文化的复兴和再包装的社会热潮。地方政府将本地的民俗传统经过挑选和舞台化加工升级为吸引游客的文化旅游产品。"],["族群","ethnic group","具有共同文化特征和历史记忆","理论术语","社会与群体理论","群体与认同","具有共同文化特征（语言、宗教、习俗）、历史记忆和祖先认同的社会群体，是文化人类学和民俗学的基础分析单位。族群不同于种族（以生物特征区分）和民族（以政治-领土边界定义），更强调主观的文化认同和社会边界——用弗雷德里克·巴斯（Fredrik Barth）的经典论断：族群的边界是社会建构的，不是文化差异本身决定的，而是哪些差异被视为有意义的。在民俗学中，族群研究关注民俗如何塑造、表达和再生产族群认同：饮食禁忌、服饰符号、祭祀仪式、起源神话等都是族群边界维持的重要文化机制。"],["族群认同","Ethnic Identity","族群成员对自身文化归属和集体身份的认知与认同","理论术语","社会与群体理论","群体与认同","族群成员对自身文化归属和集体身份的认知、情感与确认，是个体'我是谁'和群体'我们是谁'的复杂建构过程。民俗在族群认同中扮演双重角色：对内凝聚——共享的民俗活动（如苗族的芦笙节、彝族的火把节）是'我们是自己人'的情感触发机制；对外区隔——独特的民俗符号（如回族的清真饮食、藏族的转经）标记'我们与他们'的边界。该概念在当前人类学民俗学的前沿研究中从本质主义（族群认同是固定不变的）转向建构主义（族群认同是情境化的、可协商的、多元的）。"],["族际共同语","inter-ethnic common language","郝苏民提出的花儿作为西北各民族跨族际交流语言的概念","研究关键词","身份与权力","身份与权力","郝苏民提出的花儿作为中国西北的汉族回族藏族撒拉族等不同民族共享的民歌——在各个民族之间充当的跨越民族边界的跨族际的共同交流和情感表达的通用语的独特社会沟通功能。"],["无形学院","invisible college","由学术共同体内部非正式交流网络构成的隐性知识生产机制，超越正式学术机构边界","理论术语","社会与群体理论","群体与认同","科学社会学家戴安娜·克兰（Diana Crane）提出的概念，指由学术共同体内部非正式交流网络构成的隐性知识生产机制，超越正式学术机构的边界。无形学院的运作依赖：私人通信、会议交流、预印本传阅、师门讨论等非正式渠道。在民俗学中，无形学院的典型表现包括：学者在正式发表之前在会议上分享田野发现，师门间传承未成文的田野经验和研究策略，同行私下交换未发表的研究手稿。数字时代，学术微信群、学术微博和线上读书会已成为新颖的无形学院形式。"],["日常生活","Everyday Life","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","中国本土理论","本土方法论","民俗学从研究'非常'（节庆、仪式、祭祀等特殊时刻）转向关注民众日常、平凡、重复性生活实践的理论取向和研究范式。该转向受到现象学社会学（舒茨）、日常生活史（德塞尔托）和实践理论（布迪厄）的深刻影响。刘铁梁提出'标志性文化'概念，将研究目光投向村落生活中的日常组织与运作。高丙中以'日常生活的民俗学'倡导在民众的柴米油盐和家长里短中捕捉文化逻辑。该研究取向的核心方法论主张是：不是把日常生活作为对象去'研究'，而是进入日常生活去'理解'。"],["模式化","patterned / formalized","民俗行为在反复实践中形成的固定化和标准化模式","理论术语","社会与群体理论","社会理论与民俗","民俗行为在反复实践中形成的固定化、标准化的表达和行为模式。模式化是民俗区别于即兴个体行为的基本特征之一：不是每个人按自己的方式过年，而是大家共享一套拜年、贴春联、吃年夜饭的模式。模式化的表现形式包括语言模式（固定的故事开头'从前有座山'）、行为模式（祭祀中的固定跪拜程序）、空间模式（祠堂的建筑形制）和时间模式（节日的固定日期）。模式化与变异构成一对辩证张力——模式提供稳定性，变异提供适应性。"],["模式性","patterned nature","民俗在内容和形式上具有稳定模式的特性和规律","理论术语","记忆与传承理论","传统与传承","民俗在内容和形式上具有稳定模式的特性和规律，是民俗的基本特征之一。与'模式化'（动态过程）不同，模式性指的是民俗作为'已成之物'所呈现的规律性和可重复性。普罗普（Vladimir Propp）在《民间故事形态学》（1928）中发现的31种功能项是民俗模式性研究的最著名案例——不同故事角色、不同情节的具体内容千差万别，但其功能序列（缺席→禁令→违禁→加害→……）是高度模式化的。模式性的发现为民俗的分类学和比较研究提供了科学基础。"],["民众","the folk / common people","民俗学的研究对象，创造和传承民俗的主体人群","研究关键词","身份与权力","身份与权力","民俗学最核心的研究对象——创造享用和传承生活文化的普通人的统称。关于民是什么人的争论贯穿了民俗学史，从19世纪的欧洲农民到黄强的非官方之民的界定再到当代的全部社会成员均有民俗。"],["民众知识","folk knowledge / popular knowledge","民众在日常生活实践中积累和传承的经验知识和智慧","理论术语","中国本土理论","本土方法论","民众在日常生活实践中积累和传承的经验知识体系，包括生产生活技能（农耕、养殖、手工）、社会交往知识（礼仪、人情世故）、环境知识（物候、气象、草药的辨识使用）等。与'传统知识'相比，民众知识更突出承载主体的'民'这一身份——不是专家、文人或官方知识系统中的知识，而是普通民众的知识。在民俗学中，民众知识研究的核心张力是：这种知识在现代科学评价体系中的地位（常被视为'落后''不科学'）与其在民众实际生活中的持续有效性之间的矛盾。"],["民俗","Folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","记忆与传承理论","传统与传承","民俗学的核心研究对象，指民众（folk）创造、享用和传承的生活文化，包括口头传统（神话、传说、故事、歌谣）、风俗习惯（节庆、仪式、人生礼仪）、物质文化（民间建筑、服饰、饮食、工艺）和表演艺术（民间戏曲、曲艺、舞蹈）。'民俗'概念在中国经历了从1846年汤姆斯（William Thoms）创制'folklore'一词，到1920年代北京大学歌谣研究会以'民俗'对译，再到钟敬文将其界定为'民众的生活文化'的演进。当代民俗学的趋势是将民俗从'遗留物'定位转向'活态实践'定位，关注其当代创造力和日常嵌入性。"],["民俗主体","Folklore Subject","民俗的创造者、享有者和传承者，即广大民众","研究关键词","身份与权力","身份与权力","民俗的创造者享有者和传承者即广大的民众。民俗主体论将研究焦点从民俗事象本身转移到创造和操演这些事象的主体——有脸有名字的活生生的人——的身上。"],["民俗事象","Folklore Item/Folklore Phenomenon","民俗活动中的具体表现形态和存在方式","学科概念","学科元概念","研究对象范畴","传统民俗学研究的最基本的、不可再被细分的最小的分析单位——如一个具体的节日、一则有编号的民间故事的类型、一套固定程序的祭祀和一件传统的刺绣纹样。事象研究聚焦于这些被从活的日常生活中人工提取和分离出来的孤立的民俗碎片进行形态上的描述和分类。"],["民俗事项","folklore item","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","与民俗事象相似的传统民俗学的分析单位——但更强调被剥离出来的民俗项目作为一个静态的被分门别类的、可以被清单化罗列和描述的事物的物化的概念——活态的实践被冻结为一个在纸上被分析的很方便的标本。"],["民俗传承","Folklore Transmission","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","群体与认同","民众创造、享用和传承的文化在代际和空间上的传递过程，涉及谁传承（传承人）、传承什么（传承内容）、如何传承（传承方式）、为什么传承（传承动力）等核心问题。柳田国男最早将'传承'确立为民俗学的核心概念，将其定义为'使某种文化事象从上一代传递到下一代的行为及其结果'。中国民俗学在马林诺夫斯基功能论影响下，一度偏向于用'社会需要'解释传承动力；当代研究则更关注传承中的主体性——传承人不是被动的文化搬运工，而是主动的文化选择者和创造者。非遗代表性传承人制度是传承研究最重要的当代实践场域。"],["民俗共同体","folk custom community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","指共享特定民俗传统（节日、仪式、习俗等）并因此形成文化认同的社会群体。与族群不同，民俗共同体的边界由具体的民俗实践而非宏观的族裔归属来界定——同一个村庄的居民共享同一套年节习俗，即构成一个民俗共同体。民俗共同体的规模弹性极大：可以是一个村落（共享祭祖仪式）、一个方言区（共享地方戏曲）、甚至是全国的春节庆祝者。该概念在非遗保护的社区（community）界定中有直接的政策意义——谁是该非遗项目的'民俗共同体'？"],["民俗分类","folklore classification","将民俗事象按一定标准进行分类的方法论","学科概念","学科元概念","研究对象范畴","将田野中遇到的无数的纷繁复杂的单个的民俗的事象和资料依照一套预设的有层级和逻辑的分类体系的标准（如钟敬文的物质/社会/精神/语言的四大类的经典骨架）进行系统性的分门别类的归类和处理的方法。分类为民俗的比较和系统的知识积累提供了不可缺的科学和信息的基础。"],["民俗功能","Functions of Folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","社会理论与民俗","民俗在人类社会中承担的各项作用和效能，功能学派民俗学（以马林诺夫斯基、拉德克利夫-布朗为代表）的核心研究对象。经典功能划分包括：教育功能（通过故事传递道德规范）、娱乐功能（节庆和游戏提供精神放松）、凝聚功能（仪式强化群体团结）、规范功能（禁忌和习俗约束社会行为）、心理调适功能（丧葬仪式帮助克服哀伤）等。功能分析的局限在于容易陷入'存在即合理'的循环论证——一切民俗都因有功能而存在。当代研究强调功能的多重性（同一民俗有竞争性功能）和功能的变迁（传统功能消失，新功能产生）。"],["民俗协商","folk negotiation/customs consultation","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","权力与治理","指民俗在传承和实践过程中，传承人、社区、权力机构等多元主体之间围绕民俗的解释权、操演权和变革权进行的互动、博弈与协调过程。该概念强调民俗不是静态不变的、由外部研究者单方面定义的'文化遗留物'，而是民众在日常生活中不断重新协商其意义和实践方式的动态文化场域。在非遗保护、乡村振兴、旅游开发等当代场景中，民俗协商尤为突出——村民、政府、开发商、学者对同一个民俗项目（如某种传统节日）的使用方式和意义阐释往往是竞争性的，最终的结果是在多方力量的协商中形成的。"],["民俗学学科群","folklore discipline cluster","以民俗学为核心，包括民间文学、民族学、人类学、社会学等在内的关联学科体系","学科概念","学科元概念","学科属性与定位","不以一门单独的孤立的单打独斗的学科来看待民俗学——而是将其看做一个以民俗文化为核心的研究对象的多学科（民俗学、民间文艺学、民族学、文化人类学和社会文化史等）协同作业的和彼此交叉滋养的学科群的领头的核心学群。"],["民俗学科","folklore discipline","民俗学作为独立学科的制度化存在","学科概念","学科元概念","学科属性与定位","在国家高等教育的学科分类和管理的法规和政策的正式体系中，民俗学作为一门被正式认证的、有合法的地位、可独立授予从学士到博士的各级学位的、并在各大学有实体研究所和院系编制的独立的人文学科。"],["民俗文化","Folk Culture","以民众日常生活实践为核心的活态文化形态，区别于精英书写文化和制度性文化","学科概念","学科元概念","学科属性与定位","钟敬文的核心的概念的界定——民俗不是被从生活的大地上连根拔起的只存在于档案馆里的死的遗留物，而是以广大的民众真实的日常的生活实践为基地和血液的营养的、仍在他们日常的劳作、吃饭、过节、祭祀和闲谈中活的并被不断地传承和创新的一种活态的文化。"],["民俗标志物","folk symbolism","民众创造享用和传承的生活文化和风俗习惯","理论术语","信仰与观念体系","象征与世界观","在特定民俗事象中被赋予超越其物理功能的象征意义的物品、图案、色彩等形式元素，是民俗符号系统的物化体现。民俗标志物的核心特征是'双层结构'：第一层是物的物理属性（如红色是一种颜色），第二层是文化赋予的象征意义（红色＝吉祥、喜庆、辟邪）。民俗标志物的意义是社会约定俗成的而非天然的——春联的红色和交通灯的红色具有完全不同的符号逻辑。在田野调查中，识别和解读民俗标志物是理解当地文化意义世界的关键入口。"],["民俗活动","folk activity","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","民间大众在各种日常和非日常（节日和危机）的场景——家庭、宗族、村庙和节庆的现场——中聚集并共同展示、操演和参与的各种民俗性的文化实践的行为和事件的统称。民俗活动是将静的民俗事象的清单上的一条条死词条点活为活生生的动态事件的行为的引擎。"],["民俗热","folklore fever","特定时期民俗文化受到社会广泛关注的潮流现象","研究关键词","当代社会文化","城市与乡村","在特定的社会和文化条件的催发下（如非遗热潮和国潮运动）社会各界对传统民俗文化忽然产生的广泛关注和热情参与的社会潮流和文化现象。"],["民俗特征论","Theory of Folklore Characteristics","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","社会理论与民俗","关于民俗基本特征的系统理论概括，是民俗学术语体系的基础建设。中国民俗学界最具代表性的特征论是钟敬文的'五性'说——民俗具有集体性（非个人创造）、传承性（代代相传）、扩布性（空间传播）、稳定性（相对不变的模式）和变异性（传承中变化），后续学者补充了类型性和规范性。西方民俗学传统则以口头性、传统性和匿名性为三大基本特征。特征论的学术价值在于为民俗与其他文化形态（如文学、官方文化、流行文化）划界，但其局限在于静态分类可能遮蔽民俗的复杂性和动态性。"],["民俗生活","folk life","民众以民俗方式组织和体验的生活","学科概念","学科元概念","学科属性与定位","民众不只是拥有和操演一些零散的民俗的片段——而是整体性的以民俗的这种文化的方式来组织、体验他们的日常的整个的生活的世界的途径。民俗生活这种说法强调了民俗不是贴在生活表面的装饰，而是生活这整个大厦的承重的柱和粱。"],["民俗生活共同体","folk life community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","指以共同的民俗生活方式为纽带形成的有机社会共同体。该概念融合了滕尼斯（Ferdinand Tönnies）'共同体'（Gemeinschaft）理论与中国民俗学的'民'论传统。民俗生活共同体的特征包括：面对面的直接交往（非匿名）、共享日常生活节奏（如共同的年节周期）、无形的道德约束（非法律强制）、深厚的归属感和情感纽带。费孝通笔下的'乡土社会'是民俗生活共同体的典型形态。但在城市化进程中，传统民俗生活共同体趋于瓦解，新型的'趣缘共同体'（如汉服圈、古风音乐社群）是否构成新的民俗生活共同体是当代研究的热点。"],["民俗社会学","Folklore Sociology","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","社会理论与民俗","以民俗现象的社会属性、社会功能和社会过程为研究对象的民俗学分支方向。与偏重文本分析的民间文艺学不同，民俗社会学关注民俗与社会结构（阶级、性别、族群）、社会变迁（现代化、城镇化、全球化）和社会制度（家庭、社区、权力体系）的互动关系。中国民俗学的社会学转向始于1990年代，代表性学者包括刘铁梁（村落民俗志研究）、高丙中（社团与社会研究）。民俗社会学的方法论特征是大规模田野调查和定性分析，强调将微观的民俗事象置于宏观社会结构中进行理解。该方向与人类学民俗学有交集但在方法论和理论资源上各有侧重。"],["民俗社区","folk custom community","以共同民俗传统为纽带的乡土社会和聚落形态","研究关键词","全球化与地方","地方性议题","以共同的民俗传统——共享的年节仪式祭祀体系和饮食习俗——为纽带形成的有机的乡土社会和聚落共同体。比一般的社区更强调以民俗实践为核心凝聚力的共同体的特殊的子类型。"],["民俗精英","folk elite","民众创造享用和传承的生活文化和风俗习惯","理论术语","叙事与口头传统","叙事类型与形态","指在地方社会中掌握民俗知识话语权、主导民俗实践方向的少数核心人物，是民俗传承的关键节点。民俗精英不同于政治精英或经济精英，其权威主要来源于：对民俗事象（仪式程序、禁忌规则、祖传技艺）的深度掌握；社区对其民俗知识正统性的公认；以及其在重大民俗活动中不可替代的角色（如祭祖主祭、庙会组织者、歌谣领唱者）。民俗精英的存在是民俗得以在无文字社会中高质量传承的核心机制。在当代非遗保护语境下，'传承人'制度本质上是对民俗精英的官方认定和赋权，但也带来了民俗精英从社区内部权威向体制化认证转化的张力。"],["民俗群体","folk group","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","群体与认同","以共同的民俗实践为纽带形成的社会群体，是民俗学的基础分析单位和基本研究对象。丹·本-阿莫斯（Dan Ben-Amos）在1971年提出了著名的定义转向——'民俗是小群体中的艺术性交流'——将民俗群体置于民俗定义的核心。民俗群体的特征：至少共享一个共同因素（地域、职业、信仰、年龄等）并因此产生共同的民俗传统。民俗群体的类型包括：地域性群体（村落）、职业性群体（渔民、矿工）、年龄性群体（儿童、老年）、信仰性群体（香客、教众）和虚拟性群体（网络亚文化圈）。一个人可以同时属于多个民俗群体，具有多重的民俗身份。"],["民俗表演","Folk Performance","民众创造享用和传承的生活文化和风俗习惯","理论术语","仪式与表演理论","表演与展演理论","理查德·鲍曼（Richard Bauman）在《作为表演的口头艺术》（1977）中系统阐发的分析框架，将民俗交流重新定义为'一种言说的模式，一种交流性展示的方式'。表演理论的核心转向是：从关注民俗文本（text）本身转向关注民俗事件（event）——文本之外，演唱者的声音、表情、眼神交流、与听众的互动、场景布置等，都是民俗意义的构成部分。关键概念包括：表演的'标定'（keying，通过特定信号暗示'现在进入表演状态'）、表演的'新生性'（emergent quality，每次表演都是不可复制的独特事件）、表演者的'责任'（accountability，表演者对听众承担着展示能力的责任）。表演理论深刻影响了当代中国民俗学，从事象研究转向事件研究。"],["民族","ethnic group / nation","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","理论术语","社会与群体理论","群体与认同","在历史上形成的具有共同语言、地域、经济生活和文化的稳定人群共同体，斯托林（Stalin）1913年的经典定义至今仍有广泛的学术影响。在民俗学中，民族是研究民俗认同和文化边界的基本单位。关键理论张力在于'原生论'与'建构论'之争：原生论认为民族认同基于真实的共同祖先、共同历史和共同文化；建构论（以安德森、盖尔纳为代表）认为民族是'想象的共同体'——现代印刷媒介和标准化教育建构了共同的历史叙事和民族认同。中国民俗学在民族议题上具有特殊的学术资源：五十六个民族的民俗多样性是世界范围内罕见的'民族民俗博物馆'。"],["民族性","ethnicity / national character","民俗文化中反映和体现的民族特质和民族心理","理论术语","社会与群体理论","群体与认同","民俗文化中所反映和体现的特定民族的集体心理特质、思维方式和价值取向，是民族作为文化共同体的深层特征。民俗学意义上的民族性不是生物学或政治学概念，而是一个文化概念——通过民俗事象（如春节的'团圆'、重阳节的'敬老'、民间故事的'善恶有报'母题）可解读出一个民族深层的文化逻辑。跨文化民俗比较是揭示民族性的重要方法：对比不同民族对同一民俗母题（如洪水神话、龙蛇崇拜）的不同处理方式，可看到文化逻辑的差异。研究民族性时需注意避免本质主义的静态民族性格说，民族性是流动的、构建的。"],["民间","Folk","与官方制度性文化和精英书写文化相对的民众日常生活文化领域，是民俗学的基本研究对象","理论术语","社会与群体理论","群体与认同","与官方（official）、制度性（institutional）、精英（elite）文化相对的民众日常生活文化领域。'民'的界定是民俗学史上最持久的争论之一——美国民俗学将'民'从19世纪的'农民'扩展至任何共享至少一种共同因素的群体（邓迪斯），德国民俗学在鲍辛格影响下从Volk转向Mensch（人），日本民俗学以柳田国男'常民'为核心。当代中国民俗学对'民间'的界定经历了从'劳动人民'（阶级话语）到'非官方之民'（黄强）到'全部有民俗之民'的演变，反映了学科对自身研究对象的持续反思和调适。"],["民间习俗","folk custom","民众在长期生活中形成的习惯和风俗","学科概念","学科元概念","研究对象范畴","在一个特定的地域的和族群的社区内部、在漫长的历史的共同生活的积累中，民众成员之间逐渐形成并约定俗成地代代共同遵守的关于生产、社会交往、人生礼仪和信仰的一套不成文惯习与行为的风俗的总称。"],["民间传承","folk transmission","民众在日常生活中通过口传心授、行为示范等非正式途径进行的文化传递方式","理论术语","记忆与传承理论","传统与传承","民众在日常生活中通过口传心授、行为示范、参与模仿等非正式途径进行的文化传递方式，区别于学校教育式的正式传承。民间传承的主要特征：嵌人性（传承与日常生活实践不可分离，如母亲边做年糕边教女儿）、即兴性（非刻板的照本宣科，每次传承都有语境化的调整）、情境性（传承在具体的仪式/劳动/娱乐场景中完成）、口碑性（传承内容的权威性来自'老人说的''祖上传下来的'而非成文法规）。在非遗保护框架下，民间传承面临的核心挑战是如何在不切断其生活嵌入性的前提下实现有效保护。"],["民间信仰","folk belief","民众自发形成并实践的、区别于制度性宗教的信仰形态，包括自然崇拜、祖先崇拜、鬼神信仰等","理论术语","信仰与观念体系","信仰根源与形态","民众自发形成并实践的、区别于制度性宗教（佛教、道教、基督教等制度化宗教）的信仰形态，是中国民俗学最核心的研究领域之一。民间信仰的内容体系包括：自然崇拜（天、地、山、河、树木）、祖先崇拜（祭祖、祠堂、族谱）、鬼神信仰（善鬼庇佑/恶鬼作祟的观念与实践）、行业神崇拜（鲁班、药王、文昌）和灵物崇拜（石头、古树、泉水）。民间信仰的关键特征：弥散性（无独立教义和教会组织，融入日常生活）、功利性（'有求必应'才拜）、包容性（佛道混杂、多神并存）、地域性（每个地方有自己独有的地方神）。"],["民间信仰活动","Folk Belief Practice","民众围绕民间信仰开展的祭祀、祈祷、庙会等仪礼性实践活动","理论术语","信仰与观念体系","信仰根源与形态","民众围绕民间信仰开展的具体实践活动，是信仰从观念层面落实到行为层面的载体。包括：祭祀活动（向神明/祖先供奉祭品、焚香跪拜）、祈祷活动（口头或默念的祈福许愿）、庙会活动（以庙宇为中心的大规模集体信仰集会）、占卜和法术活动（求签、打卦、看风水）。民间信仰活动的核心分析维度：仪式层面（固定的程序和象征符号）、社会层面（谁组织、谁参与、谁被排除）、经济层面（香火钱、庙产管理和分配）、政治层面（国家对民间信仰活动的政策在管控与利用之间的摇摆）。"],["民间医学","Folk Medicine","民众在长期生活实践中积累的、区别于现代生物医学体系的疾病认知与治疗知识系统","民俗事象","游艺民俗","民间医药","民众在长期生活实践中积累的、区别于现代生物医学体系的疾病认知与治疗知识系统。包括民间诊断方法（观气色、看舌苔）、民间药物知识（草药偏方）、民间治疗技术（针灸拔罐刮痧）和民间医疗信仰（祝由、叫魂）。2018年中医针灸被列入联合国非遗代表作名录。"],["民间文化","Folk Culture","中下层民众创造和传承的文化","学科概念","学科元概念","研究对象范畴","与精英阶层的书写的高雅文化和官方的典章制度相对——由社会的广大的中下层的广大民众在日常生活中自主地创造、享有的并以口耳和行为为媒介代代传承的一套非正式的和弥散的大众的文化传统。"],["民间知识","folk knowledge","民众在日常生活实践中积累和传承的、区别于现代科学知识体系的本土知识系统","民俗事象","精神民俗","民间观念","民众在日常生活中积累和传承的、区别于现代科学体系的地方性和实践性的本土知识。涵盖气象预测、农耕时令、草药辨识、建筑风水等，是民俗智慧和民间经验的总和。"],["民间社会","folk society","区别于官方国家领域的民众自发组织的社会空间","学科概念","学科元概念","研究对象范畴","与有正式的组织结构、官方的授权和国家的科层体系所覆盖的官方的国家治理社会相对的——由普通民众在没有（或在较少的）官方的正式干预下自发形成的、以民间的惯习规矩和人情网络为运行动力的非正式的市民或乡民的自组织的社会空间和领域。"],["民间科学知识","Folk Scientific Knowledge","民众基于日常生活观察与实践经验形成的关于自然、社会与身体的认知体系","民俗事象","精神民俗","民间观念","民众基于日常观察和实践形成的关于天文气象动植物和人体等自然现象的朴素认知体系。如二十四节气、民间气象谚语和传统农业经验等。"],["民间组织","folk organization","民众自发形成的社会组织形态，如宗族、行会、香会等，区别于官方行政组织","民俗事象","社会民俗","宗族组织","民众自发形成的非政府的社会组织形态，包括宗族组织、行会、香会和庙会组织等。以血缘地缘业缘和信仰为纽带，承担着社会整合和民俗传承的核心功能。"],["活态传承","living transmission","非物质文化遗产在民众生活中活态流变的传承方式","研究关键词","非遗与遗产","非遗保护","非遗保护的核心概念和保护范式——与将非遗做成标本放入博物馆的静态保存相反，活态传承强调非遗必须在民众真实的日常生活中仍被实际操演：仍在过年仍在祭祀仍在唱山歌——才是真正的保护。"],["活态遗产","living heritage","在当代生活中仍具生命力的文化遗产","研究关键词","非遗与遗产","保护理念","在当代人的日常生活和社会实践中仍然有生命力——没有被连根拔起放进玻璃展柜——仍在被所在地的社区主动传承和不断创新的活的（而非死亡）的文化遗产。"],["活的资料库","living archive","钟敬文提出的核心概念，指民间传承人在民俗实践中承载和传递的活态文化知识与记忆体系","理论术语","中国本土理论","田野范式","钟敬文提出的中国民俗学本土化核心概念，指民间传承人（故事家、歌手、仪式主持者、工匠艺人等）在其身体和记忆中承载并可通过实践激活的活态文化知识体系，区别于以文字或其他媒介保存的'死的资料库'（档案馆、图书馆）。'活的资料库'概念的历史背景是20世纪80-90年代中国民俗学从文本中心论向田野转向的过程中，钟敬文意图建构中国民俗学自己的方法论语言。其理论贡献在于：将传承人的身体和记忆从方法论的工具（'信息提供者'）提升为认识论的本体（'活的资料库'本身即为知识体系）。这与联合国教科文组织2003年非遗公约中'以人为本'的保护理念存在深刻的呼应。"],["流散民民俗","Diaspora Folklore","流散群体在异文化中保持的民俗传统","研究关键词","全球化与地方","全球化议题","离开原居地散居在世界各地的流散族群在异国他乡的新的社会环境中保持、移植和再创造其在故土的民俗传统的跨国的民俗现象。海外唐人街的春节就是流散民民俗的最庞大的实践场。"],["游戏群体","play group","以共同游戏活动为纽带形成的儿童社交群体","理论术语","社会与群体理论","群体与认同","以共同游戏活动为纽带形成的社会群体，是儿童民俗研究的基本分析单位。游戏群体的特征：自愿性（非强制加入）、年龄梯度性（不同年龄玩不同游戏）、性别分化（跳皮筋多为女孩、弹球多为男孩）、规则自治性（游戏规则由群体内部协商决定和执行）、流动性（群体边界灵活，随时接纳或排除成员）。游戏群体是儿童社会化的重要场域——在其中学习规则遵守、冲突协商、合作竞争等社会技能。当代数字游戏（手机游戏、在线联机）正在重塑游戏群体的形态：物理共在性减弱、匿名性增强、规模扩大。"],["灵魂","soul / spirit","民间信仰和宗教观念中认为寓于人体并可脱离肉体独立存在的精神实体","理论术语","信仰与观念体系","信仰根源与形态","民间信仰和宗教观念中认为寓于人体并可脱离肉体独立存在的精神实体。泰勒在《原始文化》（1871）中将对灵魂的信仰界定为宗教的最基本定义和万物有灵论（Animism）的核心。中国民间信仰中的灵魂观念具有复杂的层次：'魂'和'魄'的区别（魂主精神，魄主形体）、三魂七魄说、投胎转世与阴间审判。灵魂观念对民俗实践的影响深远：丧葬仪式旨在引导死者灵魂顺利离开阳间前往阴间，祭祖仪式则维持生者与祖先灵魂的持续关系。灵魂观念是理解中国丧葬礼俗、祭祀传统和民间道德秩序（善恶报应、前世今生）的关键。"],["熵增","entropy increase","研究范式被过度操作后趋于饱和、无新意的状态","学科概念","学科元概念","学科属性与定位","从热力学第二定律引入物理学概念的学术比喻。在民俗学的范式分析中，指一个一度富有潜力的学术范式在经历其鼎盛的解题能力的巅峰之后逐渐因被无度地开采，其内部的理论活力趋于饱和热能散尽和学术的生长点枯竭的耗散的热寂状态的范式的老化。"],["物质民俗","Material Folklore","民众在物质生产与消费中重复的模式性活动及其产品形式","学科概念","学科元概念","研究对象范畴","钟敬文四大类民俗分类学的第一大类——涵盖了民众在日常生活中直接与满足人类肉体的基本生存和温饱的物质性的需求相关的——所有的民俗活动与产物：包括生产（农、渔、猎、工等）和消费（衣、食、住、行等）方面的大全套的民间的物质文化的实践及其成形的形形色色的物质的产品。"],["物质生产民俗","Material Production Folklore","民众在生态环境中创造、享用和传承的物质生产文化事象","研究关键词","全球化与地方","地方性议题","民众在特定的地域生态环境中为了满足其肉身的生存和温饱而创造、代代享用和不断改进的物质性的生产——农渔猎牧工等劳动——的整套知识和习俗的体系。"],["物质生活世界","material life world","民众日常物质生产和消费的文化世界","研究关键词","当代社会文化","当代转型","民众日常生产物质和消费物质的看得见摸得着的、由器具建筑饮食和农田河流等物质元素所构成的日常的实践着的物质的文化世界。"],["物质生活民俗","Material Life Folklore","包括饮食、服饰、居住、建筑及器用等方面的生活民俗","学科概念","学科元概念","学科属性与定位","民众日常的物质生活——即人们怎么解决衣食住行的每天的对于肉身的供给和安顿——的整一套的策略和智慧。它包括了获取原材料的生产民俗到加工制作工艺到最后的在日常消费中的使用的全部链环的活的全景。"],["生活传承","life transmission","钟敬文民俗学理论概念，指民俗文化在日常生活中的活态传承方式，区别于文本传承和制度传承","理论术语","中国本土理论","本土方法论","钟敬文民俗学理论中的核心概念，指民俗文化在日常生活中通过实践（做）、参与（看）、模仿（学）进行的活态传承，区别于以文本记录、学校教学或博物馆收藏为中介的非活态传承。生活传承的关键在于'做中学'——不是先学会再去做，而是在做的过程中学会。生活传承的条件包括：传承场域的日常性（厨房、田间、祭坛而非教室）、传承关系的亲密性（母子、师徒、邻里，非制度化的师生关系）、传承节奏的自然性（跟着年节气候走，而非按课程表）。该概念在当代非遗保护中的政策含义是：保护非遗的核心不是把它记录下来，而是维持它得以生活传承的社区条件。"],["生活文化","life culture","以民众日常生活为载体的文化形态，是民俗学最核心的研究对象，钟敬文将其界定为'民众的生活文化'","理论术语","中国本土理论","本土方法论","以民众日常生活为载体的文化形态，是民俗学最核心的研究对象。钟敬文将民俗学界定为'研究民众生活文化的科学'，使'生活文化'成为中国民俗学的纲领性概念。生活文化的三个层面：物质生活文化（衣食住行、生产工具）、社会生活文化（家庭组织、村落制度、岁时节令）、精神生活文化（信仰观念、审美意识、价值伦理）。生活文化的整体性特征意味着不能把某一民俗事象（如春节吃饺子）孤立地当作一个'事项'来研究，而要放在整体生活文化系统中理解其意义。该概念与德国民俗学鲍辛格的'日常文化'、法国年鉴学派的'物质文明'有理论亲近。"],["田野文化","fieldwork culture","田野工作者与研究对象共同创造的临时性文化生态","研究关键词","全球化与地方","地方性议题","田野工作者和其被研究社区的对象之间在田野合作的密切的日常互动和共同生活中共同创造的一种短暂的、不能持续的但极度特殊的跨文化的两人/两群体共享的混合的田野生长的文化的小生态。"],["知识传承","knowledge transmission","群体认同和身份的理论概念","理论术语","社会与群体理论","群体与认同","代际和群体间知识传递的过程与机制，是文化再生产和社会延续的基础。在民俗学中，知识传承不是狭义的'学校教育中的知识传授'，而是指广义的文化知识——生产知识（如何种地、如何捕鱼）、生活知识（如何做年糕、如何办婚礼）、信仰知识（如何祭祀、如何看风水）、艺术知识（如何唱民歌、如何剪纸）——在日常生活情境中的非正式传递。知识传承的主要特点：默会性（大量知识是'只可意会不可言传'的技能性知识）、情境性（脱离具体情境难以传授）、权威性（'老人说的'即是不必论证的真理）。"],["研究范式","research paradigm","库恩提出的学术共同体公认的理论方法和经典范例的集合","理论术语","社会与群体理论","群体与认同","托马斯·库恩在《科学革命的结构》（1962）中提出的科学哲学核心概念，指学术共同体公认的、在一定时期内为研究者提供典型问题和解答的理论框架和方法论集合。研究范式包含四个层面：形而上学层面（关于研究对象是什么的基本信念）、理论层面（被接受的解释框架）、方法论层面（研究应该怎么做）、范例层面（经典研究案例作为示范）。在民俗学中，可识别的主要范式包括：文本-历史范式（以文献考证和故事类型学为主）、田野-民族志范式（以参与观察和深度描写为主）、实践-理论范式（关注民众能动性和社会建构）。范式转换（paradigm shift）意味着学科的基本世界观和研究方式发生根本性变革。"],["礼俗互动","ritual-custom interaction","研究国家礼制与民间风俗双向互动互构关系的中国民俗学理论范式","理论术语","社会与群体理论","权力与治理","中国民俗学近年来最具影响力的本土理论范式之一，由张士闪系统提出和阐发。其核心命题是：中国传统社会的文化秩序不是在'国家 vs 民间'的二元对立中形成的，而是在礼（国家礼制、儒家正统规范）与俗（民间风俗、地方传统）的双向互动、互构、互渗中持续生成的。'礼俗互动'超越了'大传统/小传统'的垂直传递模型，强调两个层面的对等互动——礼向下渗透转化为俗（如官方祭祀节日的民间化），俗向上提升进入礼（如地方民间信仰被纳入国家祀典）。该理论为理解中国社会文化的深层运作机制提供了不同于西方理论的本土解释框架，在民俗学、历史学、人类学中产生了广泛的跨学科影响。"],["礼俗关系","Ritual-Custom Relationship","官方礼仪规范与民间风俗习惯之间相互影响相互转化的关系","理论术语","社会与群体理论","权力与治理","官方礼仪规范（礼）与民间风俗习惯（俗）之间相互影响、相互转化的关系，是中国民俗学和社会史研究的核心议题之一。礼与俗的关系不是简单的'礼自上而下教化俗'，而是双向的：礼制吸纳民间习俗以获取合法性（如汉代采诗以观民风），民间习俗模仿礼制以提升地位（如民间丧礼中借用官式仪仗）。礼俗关系的历史演变——先秦'礼不下庶人'的严格区隔→宋明以后礼俗互渗的日常化→当代非遗保护中国家与民间的再度协商——反映了中国社会权力结构的长时段变迁。"],["礼俗社会","Ritual-Custom Society","以礼制与民俗双向互动为特征的中国传统社会形态","理论术语","社会与群体理论","权力与治理","以礼制（国家层面的规范体系）与民俗（民间层面的生活传统）双向互动为核心特征的中国传统社会形态。该概念强调中国传统社会的文化整合机制不是单向的自上而下的强制（如法律治理），也不是纯粹的自下而上的自发秩序，而是二者之间持续不断的协商和互构。礼俗社会的典型运作机制：国家通过科举制度和儒学教化将官方价值观渗透到基层，民间通过宗族组织和乡约实践将国家礼制内化为日常行为规范。费孝通的'礼治秩序'、瞿同祖的'法律儒家化'等概念均指向同一现象的不同侧面。"],["社会民俗","Social Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","钟敬文四大民俗分类学的第二大类——涵盖了维持人类社会自身的基本的组织结构（家族、宗族、村落和民间社团）的运转、调解和维系社会内部人际关系的规范（人生礼俗和岁时节日的总称）和从出生到入土的完整的各人生阶段的过渡的礼俗。"],["社会生态志","socio-ecological ethnography","以民俗志方式书写普通学术工作者生存状态的体裁","研究关键词","全球化与地方","地方性议题","将民俗志的书写方法移植到对学术界自身的普通学者和科研工人的日常的学术劳作和在学术体制的夹缝中的生存状态的描述上的一个新名词的实验。"],["社会生活世界","social life world","胡塞尔现象学的核心概念，指人们在其中生活、行动并赋予意义的日常经验世界，后经舒茨引入社会科学","理论术语","社会与群体理论","社会理论与民俗","埃德蒙德·胡塞尔（Edmund Husserl）现象学的核心概念，指人们在其中生活、行动并赋予意义的日常经验世界——被直接体验的、理所当然的、非反思的生活领域。阿尔弗雷德·舒茨（Alfred Schütz）将生活世界引入社会科学，强调日常生活的'自然态度'是社会科学研究的起点。在民俗学中，生活世界理论为民俗的'日常性'研究提供了哲学基础：民俗不是生活的装饰品，而是构成生活世界本身的要素。高丙中的'生活世界'转向将中国民俗学从'遗留物研究'推向'日常生活实践研究'，在方法论上主张研究者必须进入民众的生活世界才能理解民俗的意义。"],["社会组织民俗","Social Organization Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","隶属于社会民俗的大类的、聚焦于民间——而非官方和政府——的以血缘、地缘、业缘和信仰为纽带的、自发形成的各种形式的民间的人们的社会组织的产生、内部的结构和管理的规则、仪式和运行逻辑的民俗事象的集合。"],["社区","community","在特定地域范围内具有共同纽带和社会互动关系的社会群体","理论术语","社会与群体理论","社会理论与民俗","在特定地域范围内具有共同纽带（血缘、地缘、业缘或趣缘）和社会互动关系的社会群体。滕尼斯区分了'共同体'（Gemeinschaft，以情感和传统为纽带）与'社会'（Gesellschaft，以契约和利益为纽带），民俗学所研究的社区主要是前一种形态。中国民俗学以村落社区为经典田野单位——一个自然村落的居民共享同一套年节习俗、祭祀体系和方言传统，构成一个自然的民俗共同体。在非遗保护中，'社区'是核心概念之一：非遗的认定和保护必须以社区成员的意愿和参与为基础，而非外部专家的单方面界定。然而在城市化进程中，传统社区的瓦解和新型社区的兴起对民俗学研究提出了'谁的民俗、谁的社区'的新问题。"],["祈福禳灾","Praying for Blessings and Averting Disasters","文化观念和解释的理论概念","理论术语","信仰与观念体系","观念与解释","中国民间信仰中最普遍的宗教诉求和行为动机，指向民众通过特定仪式活动（祭祀、祈祷、法术）祈求福祉降临和灾祸远离的双重宗教行为。祈福禳灾构成了民间信仰实践的底层逻辑：祈福的正面诉求（求子、求财、求健康、求丰收）与禳灾的负面诉求（避邪、驱鬼、消灾、解厄）是一体两面。具体表现：春节贴门神驱邪纳福、端午挂艾草避瘟、清明扫墓求祖先保佑、庙会烧香许愿还愿。人类学解释认为，祈福禳灾反映了人类在不确定性和不可控性面前寻求象征性控制的基本心理需求。"],["祖师崇拜","founder worship","各行工匠对本行业开创者或技艺超群者的祭祀崇拜","学科概念","学科元概念","学科属性与定位","中国民间行业文化中最普范的信仰的形态——每一行的手艺人和从业者（木匠拜鲁班/药商拜药王等）尊奉传说中或历史上的本行业的开创者或以此业技艺达到神化境界的某位先人为祖师视为本行的在天的精神技艺的保护神——在本行每年的特定日子举行隆重的祭祀典礼。"],["离散族群","diaspora community","离开原居地散居各地的族群群体","研究关键词","全球化与地方","全球化议题","因为战争、殖民、灾荒和经济压力等被迫或自愿离开其原始居住的地理空间散落到全球各地，但在异乡仍保持原族群的认同和核心民俗传统的跨国界的移民群体。与流散民接近。"],["类型性","typological nature","民俗事象在内容和形式上具有相似类型特征和归类规律","理论术语","叙事与口头传统","叙事类型与形态","民俗事象在内容和形式上具有相似类型特征和归类规律，是民俗学分类学和比较研究的基础概念。类型性与模式性相关但不完全相同：模式性强调同一民俗内部的固定范式，类型性强调不同民俗之间的相似归类。类型性研究的两大经典范式：芬兰历史-地理学派的AT分类法（对民间故事按母题和类型进行全球标引）和普罗普的故事形态学（31种功能项的类型学分析）。类型性的认识论价值在于：它为民俗的分类、比较和跨文化研究提供了科学基础；但其局限在于可能为了追求分类的整洁而忽视民俗的个体独特性和语境复杂性。"],["粮食安全","food security","所有人任何时候都能获得充足、安全、营养的食物","研究关键词","非遗与遗产","可持续发展","所有人能在任何时间和不费力地获得数量和质量上充足安全和营养的食物以维持生命和健康的生活。从民俗学的角度看粮食安全关乎传统的农耕仪式饮食禁忌和土地伦理的民俗智慧的传承。"],["精神民俗","Spiritual Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","钟敬文四大民俗分类法的第三大类——包括了民间自发的、不成系统教义的、非制度的各种信仰（鬼、神和祖先）与崇拜（自然和祖先和行业神等）的观念与仪式、民间的各种禁忌巫术迷信和占卜的占验之术的全范畴的精神信仰世界的文化总和。"],["精神生活世界","spiritual life world","生活世界理论在精神文化领域的延伸，指民众精神生活如信仰、审美、价值观念所构成的经验世界","理论术语","中国本土理论","礼俗互动谱系","指民众在精神生活领域——信仰、审美、价值观念——中构成的经验世界，是对胡塞尔'生活世界'概念的民俗学延伸。精神生活世界关注的核心问题是：在民众的主观经验中，神灵是否真实？仪式的神圣感如何被体验？善恶好坏的判断标准从何而来？理解精神生活世界的意义在于：它要求研究者暂时搁置科学理性的评判框架（'鬼神不存在''仪式只是表演'），转而理解民众自己的意义世界——在他们看来，祖先确实在场，祭品确实被神灵享用了。这一方法论立场与格尔茨的'深描'和现象学人类学的'从当地人观点看'一脉相承。"],["艺术民俗","art folk custom","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","社会理论与民俗","民众在日常生活实践中创造的具有艺术性的民俗文化形态，是民俗与艺术的交汇领域。艺术民俗与'精英艺术'的区别在于：创作者匿名（非署名的艺术家）、情境嵌入（艺术产生于民俗活动而非独立的艺术展演）、群体性（集体创作和集体享用）。经典的艺术民俗形态包括：民间歌谣与音乐（号子、山歌、小调）、民间舞蹈（秧歌、舞龙、舞狮）、民间美术（剪纸、年画、刺绣）、民间戏曲（社戏、皮影、木偶）、民间工艺（陶艺、编织、雕刻）。当代民俗学关注艺术民俗与创意产业、文化旅游的结合过程中出现的去语境化和再语境化问题。"],["艺术生活世界","artistic life world","生活世界理论在艺术领域的延伸，指民众艺术实践如民间歌舞、手工艺、戏曲等所构成的经验世界","理论术语","中国本土理论","礼俗互动谱系","指民众在艺术实践领域——民间歌舞、手工艺、戏曲表演等——中构成的经验世界。与'精神生活世界'关注信仰层面不同，艺术生活世界更关注审美体验和创造性表达。其核心特征是：审美与生活的未分化——剪纸既是装饰（审美）也是仪式用品（驱邪），民歌既是娱乐（审美）也是劳动协调（功能）。当代艺术民俗研究的一个关键问题是：当民间艺术从日常生活的艺术生活世界中被'提取'到舞台和展览空间时，其原有意义发生了怎样的转变？这部分研究的代表性学者包括张士闪（关注秧歌从乡村仪式到舞台表演的异化过程）和徐赣丽（关注民间手工艺从日常用品到文化商品的转变）。"],["范式危机","paradigm crisis","旧范式无法提出新问题、解题模式趋于穷尽的状态","学科概念","传承与变异","变异与创新","库恩的范式理论中，在一个旧范式的常规研究所给出的难题已经被本范式的解题工具竭力解到了尽头、剩下了过量的反常的累积而范式自身又无法在自身的理论的框架内消化那些顽固的反常的、已经逐步失去最重要的学术市场的份额和生源的范式崩溃前的深重学科危机的临界期。"],["薪火与香火","torch and incense","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","中国民俗传承研究中具隐喻色彩的本土分析概念，以'薪火'（柴薪之火，隐喻世俗层面的文化传递）和'香火'（祭祀之香，隐喻信仰层面的血脉延续）两个意象来把握中国民俗传承的完整结构。香火的传承指向宗族延续——传宗接代、延续祠堂祭祀、保持祖先的祭祀不中断，是'纵向'的时间维度；薪火的传承指向文化延续——技艺、知识、习俗的代际传递，是'横向'的文化维度。二者共同构成中国传统社会中'传承'的完整含义：传承不仅是文化的传递，更是生命的延续。该概念在分析传统村落民俗传承动力时尤具解释力。"],["行业民俗","occupational folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","群体与认同","特定行业或职业群体在长期生产劳动实践中形成的特殊民俗文化形态，是职业共同体的文化表达。行业民俗包括：行业神崇拜（木匠拜鲁班、中医拜华佗、梨园行拜唐明皇）、行业禁忌与行话（矿工忌说'塌'、船民忌说'翻'）、行业仪式（拜师礼、出师礼、开山礼）、行业技艺传承规范（传男不传女、三年学徒两年效力）。行业民俗的社会功能：维系行业认同与行会组织、控制技艺传承的质量（通过严格的拜师出师仪式）、调节行业内部竞争与合作。在现代化进程中，传统手工业衰退导致大量行业民俗消失，但新兴职业群体（程序员、快递骑手）也在形成自己的行业民俗。"],["补偿功能","compensatory function","民俗对日常生活缺失进行精神补偿的功能","研究关键词","身份与权力","身份与权力","民俗在日常的艰辛和压抑的劳作与生活中为广大的底层民众提供了合法和出格的精神的补偿和麻醉——如在庙会的狂欢中暂时地颠倒那些在社会现实中不可撼动的贫和富的等级——的替代性满足的功能。"],["西北民俗","Northwest folklore","中国西北地区各民族民俗文化的统称","研究关键词","全球化与地方","地方性议题","从陕西的黄土高原到甘肃的河西走廊到青海的河湟谷底到新疆的天山南北的中国西北广袤地区的汉族和各少数民族的多元并存的民俗文化的统称。花儿和社火等是其最著名的共享的民俗。"],["西北民族走廊","Northwest ethnic corridor","费孝通提出的中国三大民族走廊之一，指河西走廊经河湟至天山南北的多民族交错聚居与迁徙通道，历史上丝绸之路的核心地段，汉族、回族、藏族、蒙古族、维吾尔族等多民族和多宗教交汇共存的文化地理空间","研究关键词","全球化与地方","地方性议题","费孝通晚年提出的中华民族多元一体格局中的三条纵向的民族走廊（另有藏彝走廊和南岭走廊）之一。沿河西走廊到河湟谷地至天山南北，是自古以来汉回藏蒙维等众多民族迁徙交汇碰撞和交融的活态的民族博物馆。"],["规范性","Normativity","民俗作为约定俗成的行为规则对社会成员的内在约束力","理论术语","社会与群体理论","社会理论与民俗","民俗作为约定俗成的行为规则对社会成员的内在约束力，是民俗的社会控制功能的核心机制。规范性不同于法律的外在强制——法律靠国家暴力保证执行，民俗靠社会舆论和内心道德保证遵守。规范性的运作机制：社会期待（'大家都这样做'）→从众压力（'不这样做会被人说'）→内在化（'这样做才是对的'）。中国民俗中规范性最强的事项包括：人生礼仪（不办婚礼'不正式'）、节日行为规范（过年必须团圆）、祭祀义务（清明必须扫墓）。当代社会中民俗规范性的减弱（'那都是老黄历了'）既是个人自由的增加，也引发了社会道德失范的焦虑。"],["认同","identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","群体与认同","个体或群体对自我所属的文化共同体和社会类别的归属意识与情感承诺，是社会科学和民俗学共享的核心概念。认同的多层次性：个人认同（我是谁）、群体认同（我们是XX村的人）、族群认同（我们是XX族人）、国家认同（我们是中国人）。民俗在认同建构中扮演关键角色：民俗活动是认同的操演仪式（苗族的芦笙节＝'我们苗族'的集体展演），民俗符号是认同的边界标志（独特服饰＝'我们不是他们'）。在全球化时代，民俗认同面临双重压力——全球同质化的侵蚀和地方传统复兴的反弹——二者共同构成当代认同政治的民俗维度。"],["语言民俗","Linguistic Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","研究对象范畴","钟敬文四大民俗分类法的第四大类和最后的压轴的类——广大的民众在日常的社会交往和信息传递中长期形成的口头语言系统——范围涵盖全部的口传的文学（神话、传说、民间故事、史诗和歌谣等）和民间非文学的日常和仪式的修辞、俚语、称谓、行话和各种语言的禁忌与避讳等。"],["调节功能","Regulatory Function","社会文化现象在整体系统中发挥的作用和效能","理论术语","社会与群体理论","社会理论与民俗","民俗活动对社会成员心理和行为的调适和规约作用，是功能分析的经典议题。调节功能的主要表现：心理调节（丧礼中的哭丧仪式帮助亲属宣泄悲痛）、社会调节（庙会中的平等参与暂时消解日常的等级差异）、生态调节（禁忌习俗约束对自然资源的过度开发）、伦理调节（善恶报应故事传递道德规范）。特纳的'共睦态'（communitas）概念深刻描述了仪式调节等级社会的机制：在仪式阈限阶段，日常的身份等级被暂时悬置，所有参与者都是平等的，这为高度等级化的社会提供了一个'安全阀'。"],["跨国民俗事象","Transnational Folkloric Phenomena","跨越国家边界的民俗实践和文化事象","研究关键词","全球化与地方","全球化议题","不局限在一个国家的疆界内，而是在两个以上国家共同共享和共同申报的跨国界的民俗的文化事象和实践。如中蒙联合申报的蒙古长调和中国与中亚国家共享的丝绸之路沿线的共享的非遗项目。"],["过日子","getting by / everyday living","中国民众日常生活的本土表述，指向以家庭为中心、在日复一日的生活实践中展开的生存智慧和生命哲学","理论术语","中国本土理论","本土方法论","中国民众日常生活的本土表述，指向以家庭和生计为中心、在日复一日的实践中展开的生存智慧和生活哲学。'过日子'是人类学民俗学近年关注的核心本土概念之一，代表学者包括吴重庆等。'过日子'不是简单的'living'，它承载了中国民众对生活的深层理解：以家庭为单位（'我们一家人过日子'），在长时段的时间节奏中展开（'日子一天天过'），追求平顺安稳而非激烈变革（'好日子'＝平稳富足），蕴含着克己、勤劳、积累、忍耐等伦理价值。该概念为民俗学的日常生活研究提供了真正本土化的概念工具。"],["都市民俗","Urban Folklore","以城市为场域的民俗及其研究","研究关键词","当代社会文化","城市与乡村","以现代城市的广场住宅小区地铁车厢和商业综合体等为田野空间的民俗研究分支。城市的都市传说、广场舞和小区的新邻里习俗等都是都市民俗的在新兴空间的田野。"],["集体记忆","Collective Memory","哈布瓦赫提出的群体共享的关于过去的集体性记忆和知识建构","理论术语","记忆与传承理论","文化记忆","莫里斯·哈布瓦赫（Maurice Halbwachs）在1925年提出的社会学核心概念，指群体共享的关于过去的集体性记忆和知识建构，后经扬·阿斯曼（Jan Assmann）和阿莱达·阿斯曼（Aleida Assmann）发展为系统的文化记忆理论。记忆理论的两层结构：'交往记忆'（communicative memory）是三代人以内通过口述传递的日常记忆，持续约80-100年；'文化记忆'（cultural memory）通过仪式、节日、纪念碑、经典文本等制度化媒介传递的遥远过去。民俗学中，民间节日和仪式是文化记忆最重要的操演机制——端午节复现屈原投江、清明节重建与祖先的关系、庙会复演地方历史——这些周期性操演不断重新激活和再生产集体记忆。"],["非官方性","non-official nature","民俗学中\"民\"的判断标准，指非官方立场","学科概念","学科元概念","学科属性与定位","黄强等当代中国民俗学家提出的关于民俗学之民的核心判准——将民界定为非官方的人们的实践性的概念。以此将民俗学的研究对象与人——即所有具有非官方的身份和日常生活中实践非官方文化的全部的社会成员——相统一。"],["非物质文化遗产","intangible cultural heritage","被社区视为文化遗产的各种实践、表演和知识体系","研究关键词","非遗与遗产","非遗保护","联合国教科文组织2003年公约的核心理念——被各社区群体和个人视为其文化遗产组成部分的各种社会实践表演知识和技能（包括口头传统、节庆、仪式及传统手工艺等）。在中国日常生活中通常简称为非遗。"],["非遗传承","ICH transmission","非物质文化遗产的代际传递和延续","研究关键词","非遗与遗产","非遗保护","非遗在师与徒、父与子和社区的共同参与中从上一代到下一代的代际传递的过程。不同于物质遗产的物理完整性的保持，非遗传承的重心是人的传递——年轻的传承人从老一辈传承人的身心中把技艺和知识接到自己的身心中。"],["非遗传承人","ICH bearer / inheritor","被认定的具有非物质文化遗产传承能力的个人","研究关键词","非遗与遗产","非遗保护","在非遗保护体系中被国家各级文化主管部门按照一定的程序和标准筛选认定并登记的、被官方承认的掌握并愿意持续传承某一项非遗的核心知识和技艺的活态的个人的官方的身份。传承人是非遗保护的活的核心。"],["非遗保护","ICH Safeguarding","对非物质文化遗产的抢救、保护与传承工作","研究关键词","非遗与遗产","非遗保护","对非物质文化遗产进行抢救保护和传承的系统性工作的总称。中国的非遗保护始于2004年加入联合国教科文组织非遗公约后建立了国家-省-市-县四级的非遗代表性项目名录和传承人认定制度，截止2023年已有43个项目列入联合国非遗名录。"],["非遗名录","ICH list / inventory","各级非物质文化遗产代表性项目名录","研究关键词","非遗与遗产","非遗保护","各级文化主管部门按照法定程序评定并公布的具有代表性的非物质文化遗产的项目清单。中国建立了国家-省-市-县四级的非遗代表作名录的管理体系。入选名录意味着获得官方认定和资金支持。"],["非遗学科","ICH discipline","以非物质文化遗产为研究对象的学科领域","研究关键词","非遗与遗产","非遗保护","以非遗为专门研究对象的新兴的交叉的学科领域。在中国教育部2021年将非遗保护列为普通高校本科专业。非遗学科的建设整合了民俗学人类学博物馆学和法学等多学科的资源。"],["非遗教育","ICH Education","将非遗纳入教育体系的传承与传播实践","研究关键词","非遗与遗产","非遗保护","将非遗的知识和技艺系统地纳入从小学到大学的各级正式和非正式教育体系的教育传承实践。包括非遗传承人进校园开设课程、编写非遗的乡土教材和在高校设置非遗专业等。"],["非遗文本","ICH text / intangible heritage text","非物质文化遗产的记录文本和档案资料","研究关键词","非遗与遗产","非遗保护","非遗的记录性文本和档案资料的总称，包括申报书、田野调查报告、传承人的口述史的录音转写以及申报片的脚本和影像档案等。非遗文本的制作和归档是非遗保护的基础性工作。"],["非遗社区","ICH community","非物质文化遗产存续和传承的社区群体","研究关键词","非遗与遗产","非遗保护","非遗项目实际存续和传承的特定的地域的和人群的社区的群体。根据联合国教科文组织非遗公约非遗的认定和保护必须以相关社区的意愿和参与为核心和前提，而非外部专家的独断。"],["风俗","Lore/Custom","社会群体在语言、行为和心理上的集体习惯和传承模式","学科概念","学科元概念","研究对象范畴","在广袤地理和文化范围内——在一个地方和民族的集体中——在很长的一段历史时期中自发形成的并为全体成员世世代代共享并默认为当然的、关于人们日常的行为的规范：怎么过活、怎样相互社交和在特殊日子做什么的集体的心理定式和习惯的民俗的同义词。"],["万物有灵论","Animism","泰勒提出的认为自然界万物皆有灵魂和精神存在的原始信仰观念","理论术语","信仰与观念体系","信仰根源与形态","爱德华·泰勒（Edward Burnett Tylor）在《原始文化》（1871）中提出的关于宗教起源的经典理论，认为原始人类从梦境、幻觉、死亡等经验中推导出灵魂的存在，进而将灵魂观念扩展到自然万物——树木有灵、石头有灵、河流有灵——形成了最早的宗教信仰形态。万物有灵论是泰勒建构的宗教进化链条的第一阶段：万物有灵→多神教→一神教→科学。虽然泰勒的单线进化论框架已被当代人类学所放弃，但万物有灵论作为描述性概念仍具解释力——中国民间信仰中的树神、石敢当、河伯、山神等均体现了万物有灵的思维逻辑，尤其是少数民族的原始信仰中更为常见。"],["世俗性","secularity / profane","与神圣领域相对的日常、凡俗、非宗教的社会生活特性","理论术语","信仰与观念体系","信仰根源与形态","与神圣（sacred）领域相对的社会生活特性，指日常生活中凡俗的、非宗教的、实用的领域。涂尔干的'神圣/世俗'二分法是理解仪式的基石——仪式的作用正是将参与者从世俗世界带入神圣世界，然后再将其送回世俗世界。在民俗学中，世俗性是理解民俗与宗教关系的关键概念：大量的中国民俗（饮食、服饰、居住、交通）属于世俗领域，但它们通过符号化可以和神圣领域建立关联（年夜饭不是普通的饭，而是神圣化的家庭团圆仪式；花轿不是普通的交通工具，而是婚礼中神圣化的'轿'）。近年学术取向倾向于强调'神圣与世俗的连续性'而非二分法。"],["个人叙事","Personal Narrative","以个体亲身经历和生活经验为内容的叙事类型","理论术语","叙事与口头传统","叙事类型与形态","以个体亲身经历和生活经验为内容的叙事类型，是近年来民俗学口头叙事研究的热点领域。个人叙事区别于传统民间叙事（神话、传说、故事）之处在于：叙事者与叙事内容的同一性（我讲我的事而非别人讲古人的事）、叙事时间的相对近时性（讲的是一生之中而非远古时代）、叙事的纪实性宣称（'这是真的'而非'我们不知道是不是真的'）。个人叙事研究的理论突破：不在于它是否'真实'，而在于叙事者如何选择和编排素材以建构一个关于自我的有意义的叙述。灾难叙事、疾病叙事、移民叙事是个人叙事研究的主要子领域。"],["个体化","individualization","现代社会个体从传统集体结构和束缚中脱嵌的社会过程","理论术语","社会与群体理论","社会理论与民俗","现代社会中个体从传统集体结构（家庭、宗族、村落、阶级）中脱嵌出来、成为独立自主行动者的社会过程。乌尔里希·贝克（Ulrich Beck）的'个体化'理论是理解现代社会变迁的核心框架。在民俗学中，个体化对民俗传统产生了深远影响：传统民俗以集体性为基础（全村一起过年、整个宗族一起祭祀），个体化瓦解了这种集体性——个人可以'选择'过什么节、怎么过节、甚至不过节。但个体化并不必然导致民俗消亡：新型的'选择性传统'（如个人化的婚礼仪式）和'文化DIY'（如个人对传统元素的重组创新）正在形成。"],["中国特色民俗学","Chinese-characteristic folklore","立足中国本土经验构建的民俗学理论体系","研究关键词","全球化与地方","地方性议题","以中国社会和历史的深厚的本土的田野经验为根基的、不简单地套用西方理论——而是建构符合中国本土实际的民俗学的学术话语和理论体系的学术努力和方向。钟敬文是中国民俗学本土化的奠基人。"],["主体性激活","subjectivity activation","在民俗实践中激活传承者和参与者的主体意识","研究关键词","身份与权力","身份与权力","在民俗传承和非遗保护的实践过程中通过赋权给传承人和社区成员让他们从被动的被研究的客体和被保护的对象转变为主动的文化实践的主体——有表达的欲望和行动的权利——的过程。"],["主体间性","intersubjectivity","主体与主体之间的互识和共在关系，现象学核心概念","研究关键词","身份与权力","身份与权力","现象学的核心概念之一——不是孤立的主体的个人的意识，而是在人与人之间——在主体与主体的对话和共同在场的互动中——分享和被共同建构起来的共有的意义和体验的领域。田野工作本质上是主体间性的工作。"],["习惯法/不成文法","Customary Law","民间社会中自发形成具有约束力的非成文行为规范体系","理论术语","社会与群体理论","权力与治理","民间社会中自发形成、具有约束力但未经国家立法程序正式颁布的非成文行为规范体系，是法律民俗学和社会人类学的核心研究对象。习惯法的表现形式包括：村规民约（如对偷伐集体山林者的处罚规定）、宗族法（族规中关于继承、婚姻、处罚的条款）、行业惯例（如行会关于定价和竞争的规定）。梅因（Henry Maine）的'从身份到契约'命题解释了习惯法在现代法律体系面前的历史性衰落。但在中国乡村社会，习惯法仍与国家成文法并存，构成法律多元主义（legal pluralism）的生动案例。民俗学关注习惯法不仅作为规范性文本，更关注其在实际民俗生活中运作和变通的实践逻辑。"],["乡土研究","local native studies","日本柳田国男倡导的以乡土为单位的民俗研究","研究关键词","全球化与地方","地方性议题","日本民俗学奠基者柳田国男倡导的以一乡一土为单位的不追求宏大的国家的面的铺开而是深度地沉浸在具体的乡里的田野中的田野模式。乡土研究不只是研究乡土而是以乡土的眼光研究整个日本的文化。"],["乡村民俗学","rural folklore","以乡村社会和农村民俗为研究对象的学术方向","研究关键词","当代社会文化","城市与乡村","以广袤的中国农村地区和农业社会的民俗为主要的研究田野的民俗学的传统的核心方向。在急速的城镇化和空心村的背景下乡村民俗学的紧迫任务是抢救那些即将人去村空的传统村落中的活态的民俗。"],["事件民俗学","event-centered folklore","打破日常生活常规具有突出学术分析价值的非常事件","理论术语","中国本土理论","本土方法论","打破日常生活常规、具有突出学术分析价值的非常事件的研究取向，区别于将民俗视为稳定、重复性模式的常态研究。事件民俗学关注的核心类型：灾难事件（地震、洪灾后的救助和纪念民俗）、冲突事件（村落间的械斗、仪式的争夺和博弈）、庆典事件（大型庙会、国家级非遗展演）、发明事件（新民俗的创生过程）。方法论上，事件民俗学强调事件的'放大效应'——日常状态下隐而不显的社会关系、权力结构和文化逻辑在事件中急剧显现，为研究者提供了难得的观察窗口。"],["事项民俗学","item-centered folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","以孤立的民俗'事项'（如一种歌谣、一个节日、一项技艺）为基本分析单位的传统民俗学研究取向。事项民俗学的方法论特征是：田野调查中去收集某一特定民俗事项的文本和变体，然后脱离其生活语境进行形态分类和比较分析。它与事件民俗学和日常生活民俗学构成对比：事项是去语境的文本，事件是活态的、嵌入社会关系的文化实践。中国民俗学在方法论反思中批评事项民俗学'见物不见人'——只关心故事文本的AT编号而不关心讲故事的人是谁、在什么场合讲、讲给谁听、为什么讲。"],["二手民俗","second-hand folklore","脱离原生语境被商业化再生产的民俗产品","研究关键词","当代社会文化","当代转型","脱离了其原本生长的社区的日常生活的活的土壤和活态的语境——被人为地从原生地连根取走，在旅游景点和城市的商业舞台中为异地的消费者重新包装和再次贩售的失去了原生意义的民俗的仿造品。"],["互动仪式","interaction ritual","戈夫曼提出的微观社会互动中具有仪式化特征的行为分析概念","理论术语","仪式与表演理论","仪式类型与机制","欧文·戈夫曼（Erving Goffman）在《日常生活中的自我呈现》（1956）等著作中提出的微观社会学概念，指人们在面对面互动中所操演的具有仪式化特征的行为模式——问候、道歉、恭维、告别等日常交流都具有仪式的结构和功能。戈夫曼将社会互动比喻为戏剧表演，个体在'前台'遵循社会脚本进行角色扮演以维护'面子'。互动仪式维系着社会秩序的微观基础：每一次成功的问候和微笑都在再生产社会的道德秩序和人际关系。该概念深刻影响了民俗学对日常生活仪式性的关注，尤其是寒暄礼仪、餐桌礼仪等日常交际民俗的研究。"],["互动仪式链","interaction ritual chains","柯林斯提出的以面对面互动仪式为核心情感能量驱动的社会机制理论","理论术语","仪式与表演理论","仪式类型与机制","兰德尔·柯林斯（Randall Collins）在其2004年同名著作中提出的社会学理论，将戈夫曼的'互动仪式'从单一事件扩展为串联性的社会机制。核心命题：成功的互动仪式产生'情感能量'（emotional energy）——一种驱动个体主动寻求参与新的互动仪式的积极情感驱动力。情感能量如资本一般积累和流通：一次成功的宗教仪式产生强烈的情感能量，驱动参与者下一次继续参加，形成互动仪式链。该理论为民俗研究提供了重要的解释框架——庙会、歌圩、节日等民俗活动的周期性反复，其深层驱动力正是互动仪式链产生和积累的情感能量。"],["互文性间隙","intertextual gap","民间叙事文本之间存在的互文性差异和意义生产空间","理论术语","叙事与口头传统","叙事类型与形态","民间叙事研究中指文本与文本之间存在的差异及其生产新意义的空间。在口头传统研究中，布莱斯（Richard Bauman）指出叙事的每次再讲述都与前一次讲述存在差异，这种互文性间隙（gap）不是叙事的缺陷，而是意义生产的创造性空间——讲述者可以在间隙中引入新的元素、回应新的语境、表达新的立场。在田野研究中，研究者通过比较同一故事家在不同场合讲述的同一故事的不同版本，可在互文性间隙中捕捉到叙事者的创意轨迹和社会关系的微妙变化。"],["互补性","complementarity","不同理论或方法之间相互补充和增强而非排斥的性质","理论术语","社会与群体理论","社会理论与民俗","不同理论范式或研究方法之间相互补充和增强而非排斥的性质。在民俗学中，互补性的核心主张是：不存在可以包揽一切研究问题的单一万能理论，不同理论适合不同层面的分析——结构功能论适合分析民俗的社会功能，象征理论适合分析民俗的文化意义，表演理论适合分析民俗的过程性维度。一种成熟的民俗学研究往往是在互补的多理论框架中进行的。然而互补性不等于理论的随意拼凑——各种理论之间需要能构成一个逻辑自洽的解释体系。"],["交叉学科性质","Interdisciplinary Nature","民俗学与文化人类学社会学历史学民族学等学科之间的密切联系","理论术语","社会与群体理论","社会理论与民俗","民俗学作为一门学科天然具有的跨学科属性。民俗学自诞生起就在多学科交叉地带生长：与文化人类学共享田野调查方法，与史学分享文献处理技术，与文学批评共同面对文本分析问题，与社会学一起聚焦群体和制度，与民族学同行处理族群议题。交叉学科性质是民俗学的认识论优势——民俗事象本身不按学科边界存在，理解一个乡村庙会需要同时具有宗教研究、社会网络分析、表演研究和经济人类学的视角。但交叉学科性质也带来了学科边界模糊和'什么都是、什么都不是'的学科认同危机，是民俗学学科建设的长期结构性矛盾。"],["交往交流交融","interaction-exchange-integration","中国民族政策核心理念各民族交往交流交融的简称","理论术语","社会与群体理论","群体与认同","中国民族事务核心理念'各民族交往交流交融'的简称，指通过促进各民族在日常生活中的交往（空间接触）、交流（文化互鉴）和交融（深度互嵌），构建中华民族共同体。在民俗学的视野下，民族交往交流交融最生动地体现在民俗共享层面：各民族的饮食互鉴（如西北地区汉、回、藏等民族的面食传统共享）、节庆互渗（泼水节从傣族节日扩展为云南多民族共庆）、民间信仰的杂交（如西南地区佛、道与本土信仰的混合）。民俗学为理解民族交往交流交融的文化机制提供了微观的、生活层面的实证路径。"],["交感巫术","Sympathetic Magic","弗雷泽提出的基于相似律和接触律的超自然控制技术理论","理论术语","信仰与观念体系","象征与世界观","詹姆斯·弗雷泽（J.G.Frazer）在《金枝》（1890）中提出的巫术理论，将巫术分为基于两大定律的两大类型：1）相似律/顺势巫术——同类相生，相似的行为产生相似的结果（如扎小人模拟伤害敌人）；2）接触律/感染巫术——曾经接触过的事物在分离之后仍能互相影响（如使用某人的头发作法）。中国民俗中交感巫术的案例极为丰富：春节贴门神（相似律——以画像的威严驱赶真实的鬼怪）、端午挂艾草（接触律——艾草的特殊气味转移给戴者以驱邪）、求雨仪式中泼水（相似律——模拟下雨）等。"],["交流式民俗志","Communicative Folk Ethnography","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","田野范式","中国民俗学田野方法的本土化概念，强调民俗志不是研究者单方面的'观察记录'，而是研究者与民俗实践者在田野中的双向交流和意义共建的产物。交流式民俗志的核心原则：研究者在田野中不是'收集资料'的科学观察者，而是与村民一起生活、一起讨论民俗意义的对话伙伴；最终的民俗志文本应呈现这种对话性而非独白性。该方法论立场与后现代人类学的'对话式民族志'（dialogical ethnography）相呼应，在中国实践民俗学和'朝向人民的民俗学'讨论中具有重要的方法论意义。"],["交融","communitas","特纳提出的仪式阈限阶段中的平等共同体状态（communitas）","理论术语","仪式与表演理论","仪式类型与机制","维克多·特纳（Victor Turner）在《仪式过程》（1969）中提出的核心概念，拉丁语Communitas的译名，指在仪式阈限阶段中出现的一种特殊的群体关系状态——日常的社会等级、身份差异被暂时消解，所有参与者处于一种平等、团结、情感高度共鸣的共同体体验中。特纳区分了三种交融形态：存在性交融（spontaneous communitas，不可预测的自发共同体体验）、规范性交融（normative communitas，被制度化的共同体形态）和意识形态交融（ideological communitas，乌托邦式的共同体理想）。该概念是对涂尔干'集体欢腾'（collective effervescence）的系统化和结构化发展。"],["人类学","Anthropology","以人类生物性和文化性为研究对象的综合学科","理论术语","社会与群体理论","社会理论与民俗","以人类的生物性（体质人类学）和文化性（文化人类学）为研究对象的综合学科，是民俗学最亲密的姊妹学科。民俗学与人类学的关系存在两种典型模式：美国模式——民俗学作为人类学的子学科（'文化人类学中的民俗学'）；中国模式——民俗学作为独立学科但与人类学深度交叉。人类学为民俗学提供的最重要方法论遗产是田野调查和参与观察法，最重要的理论遗产是文化整体论和文化相对主义。中国民俗学的'人类学转向'始于1990年代，以高丙中为代表，引介了大量西方人类学理论资源。"],["他者","the Other","女性主义理论中女性被视作与男性相对的从属性和异质性存在","研究关键词","身份与权力","性别研究","后殖民和女性主义理论中与自我构成具有权力不平等关系的对立面的存在。在民俗学中他者的问题表现为——研究者将偏僻的村民视作被研究的他者（他们很奇特），忘却了自己也是他者眼中的他者。"],["以人民为中心","people-centered approach","以民众为主体的民俗学研究和实践导向","研究关键词","身份与权力","身份与权力","当代中国党和政府的核心的文化工作和发展的导向口号——在民俗和非遗的保护中强调民众不是被研究和被保护的消极客体而是文化的主人——民俗的保护和发展都是为了人民。"],["以俗入礼","integrating custom into ritual","民间风俗被上层社会吸纳和改造为国家礼制规范的文化过程","理论术语","社会与群体理论","权力与治理","中国礼俗关系理论中的核心概念，指民间风俗被上层社会和官方体系吸纳、承认并改造为国家礼制或正式制度规范的文化过程。典型案例包括：汉武帝时期将民间淫祀中的部分正统化神祇纳入国家祀典，汉代乐府机构采集民间歌谣'观风俗、知得失'，历代王朝将地方民间信仰中的英烈人物追封为'正神'由国家定期致祭。以俗入礼反映了中国政治文化的特有运作逻辑——国家权力不完全排斥民间文化，而是通过选择性吸纳来扩展其合法性基础和文化覆盖面。"],["以礼化俗","Confucianizing customs through ritual","国家通过礼制规范和教化手段引导和改造民间风俗","理论术语","社会与群体理论","权力与治理","中国礼俗互动理论的核心概念，指国家通过礼教体系（儒家经典教育、科举制度、乡约宣讲）和行政手段（旌表、礼制规定）引导和改造民间风俗的文化工程。典型案例包括：宋代以后理学家的'化民成俗'实践——将儒家的孝道、贞节等观念通过旌表节妇、劝孝诗文、乡约制度等方式渗透进民间婚丧习俗；明代官方推行《朱子家礼》以取代民间'不合礼'的婚礼丧礼仪式。以礼化俗反映了中国文化史上国家权力与民间文化之间持续不断的张力和互动。"],["仪式与社会变迁","ritual and social change","郭于华提出的分析仪式在社会转型期功能变迁的理论框架","理论术语","仪式与表演理论","仪式类型与机制","郭于华（1992）提出的分析框架，关注仪式在社会转型过程中功能、形式和意义的演变。其核心发现是：在传统社会中，仪式（如丧礼、祭祖）主要承担社会整合和意义赋予的功能；在社会急剧变迁时期，既有仪式经历'功能替代'——旧的意义消退、新的功能产生（如婚礼从宗族认可仪式演变为消费展示）；同时新仪式不断被创造出来以适应新社会条件（如公祭黄帝、国庆阅兵）。该理论为中国快速城镇化背景下传统民俗仪式的当代变迁提供了重要的分析工具。"],["仪式展演","ritual performance","仪式在特定时空中的表演性和过程性呈现方式","理论术语","仪式与表演理论","仪式类型与机制","仪式在特定时空中的表演性和过程性呈现方式。仪式展演区别于仪式的静态文本描述——展演强调的是仪式在身体操演、声音呈现、空间调度和观众互动中的活态展开过程。谢克纳（Richard Schechner）将'表演'从戏剧领域扩展到仪式领域，认为仪式和戏剧共享一个'表演连续体'。仪式展演研究关注的核心问题：谁在表演（表演者的身份与权威）、表演给谁看（神明？祖先？围观群众？）、在什么场合表演（神圣/世俗空间）、如何表演（身体技术、声音运用、道具使用）。鲍曼的表演理论为该领域提供了系统的分析工具。"],["仪式性","ritualization / ritual character","行为具有仪式的形式化、重复性和象征性等特征","理论术语","仪式与表演理论","仪式类型与机制","行为或事件具有仪式的形式化（formalization）、重复性（repetition）和象征性（symbolism）等特征的概念，指向仪式与非仪式之间的渐变地带。仪式性概念的学术贡献在于打破了'仪式 vs 日常生活'的二元对立——许多日常行为（开学典礼、公司年会、饭局敬酒）虽非标准的宗教信仰仪式，但具有明显的仪式化特征。凯瑟琳·贝尔（Catherine Bell）在《仪式理论与实践》（1992）中提出'仪式化'（ritualization）作为动词概念，推动研究从'什么是仪式'转向'什么行为被仪式化，如何被仪式化，以及为什么'。"],["仪式语言","ritual language","仪式活动中使用的具有象征性和程式化特征的言语表达形式","理论术语","仪式与表演理论","仪式类型与机制","仪式活动中使用的具有象征性、程式化和表演性特征的言语表达形式，是仪式得以运作的核心符号工具。仪式语言区别于日常语言的特征：固定性（咒语必须逐字准确，念错必须重来）、有效性宣称（'天灵灵地灵灵'宣称接通神灵的效力）、表演性（说出话语本身就完成了行动，如'礼成'宣告仪式结束）。奥斯汀（J.L.Austin）的'言语行为理论'（以言行事）为仪式语言的分析提供了理论基础。中国民间仪式中丰富的仪式语言种类包括：咒语、祝词、祭文、香赞、口诀。"],["传承性","Transmissibility/Traditionality","民俗文化在代际时间轴上的连续传递特性","理论术语","记忆与传承理论","传统与传承","民俗文化在代际时间轴上的连续传递特性，是民俗的基本特征之一。传承性不同于一般文化传播，强调在时间纵深中的连续性——一种民俗能在几十代人中持续流传且保持其核心结构（如元宵吃汤圆、端午赛龙舟）。传承性的维持依赖一套完整的传承机制：传承人（谁来传）、传承场域（在什么地方传）、传承方式（如何传——口传心授还是制度化教学）、传承动力（为什么愿意传——信仰驱动还是利益驱动）。在非遗保护中，传承性是否中断是判断一个项目是否具有'活态性'的关键指标。"],["传统文化说","Traditional Culture Theory","西方学界将民俗主要限定于传统社会中遗留的文化事象的普遍观点","理论术语","信仰与观念体系","象征与世界观","西方民俗学早期的主流定义取向，将民俗限定为传统社会（主要是前工业化的农民社会）中遗留下来的文化事象的'遗留物'（survivals）。这一观点的理论基础是泰勒的'文化遗留物'概念——民俗是早期文化阶段在现代社会中的残余和遗迹。在中国的语境中，'传统文化说'将民俗等同于'传统文化'——民间节庆、民俗技艺、传统故事等被视为需要被保护的'文化传统'。当代民俗学的批判认为此观点将民俗静态化、博物馆化，忽视了民俗的活态创造力和当代存在。"],["伦理-审美","ethico-aesthetic","民俗文化中伦理规范与审美体验的统一","学科概念","学科元概念","学科属性与定位","张士闪所界定的中国乡土民俗学的美学伦理特征——在民俗活动之中伦理（关于对错善恶和孝的规范）与审美（关于美和感人的体验）不是像康德美学那样截然二分的独立领域，而是像缠合的双螺旋的缠结在一起不可被分离的礼俗的深刻的文化的一种内在结构。"],["伪民俗","fake folklore / fakelore","人为制造或篡改的、非真正的民俗文化现象","研究关键词","当代社会文化","当代转型","由理查德·多尔逊提出的民俗学的核心批判术语——指出于非民间的商业和政治的动机由外部的个人或机构人为地刻意地伪造或严重篡改的并作为真民俗来兜售给大众的假冒的民俗的文化产品。"],["低微理论","low theory","不追求宏大叙事而关注日常生活微观层面的民俗学理论取向","理论术语","中国本土理论","本土方法论","中国民俗学语境下的方法论主张之一，指不追求建立宏大普适的理论体系，而是脚踏实地关注日常生活微观层面中的具体民俗实践的学术立场。'低微理论'的哲学基础是：民俗学的知识生产应从'解释整个中国社会文化'的宏大目标后退一步，先诚实地理解和描写一个具体村落中具体的人在具体场合中如何实践和谈论他们的民俗。这一方法论立场与西方日常实践的哲学（德塞尔托）、微观史学有理论亲缘，在中国民俗学中主要体现为田野志的高质量书写和个案研究的方法论自觉。"],["佛教","Buddhism","源自印度深刻影响东亚文化包括中国民俗的世界性宗教","理论术语","信仰与观念体系","信仰根源与形态","源自印度、深刻影响东亚文化包括中国民俗的世界性宗教。佛教对中国民俗的影响是全方位的：节日层面（腊八节源自佛教、盂兰盆节的中元化）、仪式层面（丧礼中引入佛教的超度法事、为亡者诵经）、观念层面（因果报应、轮回转世深刻塑造了中国民间善恶报应观）、民间故事层面（目连救母等佛教故事已成为中国民间故事的核心类型）。佛教与中国本土的儒教道教在民间信仰中深度融合——普通信众在同一个庙里拜佛、拜老君、拜孔子而不知其异，形成了中国民间信仰弥散性、混合性的核心特征。"],["俗化之礼","customization of ritual","国家礼制和上层文化下沉为民间日常习俗和生活方式的过程","理论术语","社会与群体理论","权力与治理","礼俗互动理论的概念之一，指国家礼制规范和上层文化在长期历史过程中逐渐为民间所接受、内化并转化为日常习俗和生活方式的过程。典型案例：皇家的祭祀仪式（如祭天）的仪轨在民间宗族祭祀中被简化借用，官方推崇的孝道观念通过二十四孝故事和劝孝文渗入民间丧葬习俗。俗化之礼从礼到俗的转化往往伴随形式简化（官方复杂仪轨被简化为民间可操作版本）、功能转化（从政治合法性展示转为家族凝聚工具）和意义重组（从国家话语转为日常道德）。"],["保护带","protective belt","支撑硬核、可被修正和反驳的辅助假设层","研究关键词","非遗与遗产","保护理念","拉卡托斯的科学研究纲领方法论中与硬核构成对子的概念——当研究的纲领遇到反常的经验事实时被允许和需要被修正和调整的是外围的辅助假说的保护带而不是不可触动的硬核本身。"],["借礼行俗","using ritual to practice custom","民众借用国家礼制框架实践地方风俗的策略","研究关键词","全球化与地方","地方性议题","礼俗互动论的一个重要的实践机制——弱势的民间的地方的社区在官方的强大的礼制和法规的不可挑战的大框架下，不是去正面抵抗而是巧借官方的礼的名义和形式在官方的规则内以民俗的实质去填充和实现自己地方的文化诉求的策略。"],["儒家","Confucianism","以孔子为代表的深刻影响中国礼俗传统的思想体系","理论术语","记忆与传承理论","传统与传承","以孔子为代表的深刻影响中国礼俗传统的思想体系，是中国传统社会文化秩序的核心建构力量。儒家的礼教思想对民俗形成的塑造体现在三方面：一、礼治理想——以礼而非以法维持社会秩序，使民间社会形成了重人情、讲面子、守规矩的文化性格；二、孝道伦理——'生事之以礼死葬之以礼祭之以礼'，直接塑造了中国丧葬祭祀民俗的核心框架；三、宗法制度——儒家将宗族组织理论化，使宗族成为中国传统民俗的重要载体。费孝通的'差序格局'概念精确描述了儒家伦理对中国人际关系和民俗交往方式的深层塑造。"],["儿童社会化","child socialization","儿童通过参与和实践民俗活动习得社会规范和文化的过程","理论术语","社会与群体理论","社会理论与民俗","儿童通过参与和实践民俗活动习得社会规范、价值观念和文化技能的渐进过程。与通过正式教育的社会化不同，以民俗为媒介的社会化具有以下特征：身体性（通过模仿大人行为的身体实践来学习，而非通过课堂讲授）、情境性（学习发生在真实的民俗情境中——在真实的婚礼中学会婚礼礼仪，在真实的祭祀中学会祭祀规范）、愉悦性（大量儿童民俗——如游戏、歌谣——是儿童自愿参与的内驱力）、非强制性（没有人'考试'儿童的民俗能力，社会化效果体现为长大以后'自然就会了'）。"],["先验反思","transcendental reflection","康德和胡塞尔哲学中先于经验并使之可能的条件","理论术语","中国本土理论","礼俗互动谱系","康德和胡塞尔哲学中的重要方法论概念，指在经验之前（先验的，a priori）对使经验成为可能的条件进行反思。在民俗学中，先验反思被引入为一种方法论立场——吕微等学者主张对民俗学研究的前提条件（研究者凭什么可以理解'他者'的文化？民俗学的研究对象是如何被建构的？）进行哲学的反思。先验反思不关注具体的民俗事象是什么，而是追问民俗学知识何以可能——即民俗学知识得以成立的认识论条件是什么。这一哲学化取向在当代中国民俗学中引发了关于民俗学学科性质的激烈讨论。"],["先验现象学","transcendental phenomenology","康德和胡塞尔哲学中先于经验并使之可能的条件","理论术语","社会与群体理论","社会理论与民俗","埃德蒙德·胡塞尔（Edmund Husserl）创立的哲学方法，力图通过'悬置'（epoché）对世界存在的自然态度，回溯到构成一切经验意义的先验主体性来揭示意识构造世界的本质结构。在民俗学中，先验现象学被部分学者（特别是吕微）引入为民俗学知识论的基础，主张民俗学必须首先追问'民众的民俗世界是如何被民俗学研究者构成的'这一认识论前提，而非直接投入经验田野。这一立场在民俗学界引发了'哲学民俗学'与'经验民俗学'的学术分歧——前者认为缺乏认识论反思的经验研究是盲目的，后者认为脱离田野的哲学反思是空洞的。"],["克里斯玛","charisma","韦伯提出的具有超凡魅力和感召力的个人权威类型","理论术语","信仰与观念体系","观念与解释","马克斯·韦伯（Max Weber）提出的权威类型学中的一种权威形式（另两种为传统型权威和法理型权威），指个体因其超凡的个人魅力和感召力而被追随者承认的统治合法性。克里斯玛的核心特征是：反常规性（打破既定规则和传统）、情感性（追随者不是基于理性计算而是情感投注）、不稳定性和可传递的困难性（克里斯玛型领袖去世后如何'常规化'为制度权威是一个经典难题）。在民俗研究中，民间宗教领袖、仪式主持者、民间艺人群体中的'师傅'等人物形象的权威基础往往具有克里斯玛的成分。"],["全球化","globalization","经济政治文化在全球范围内相互联系和一体化的宏观过程","研究关键词","当代社会文化","当代转型","自二十世纪末加速的世界的经济政治和文化在跨越国界的网络中的不可逆的相互连接和一体化的宏观历史的过程。对民俗的影响是双刃的——既在传播民俗也在造成文化的同质化威胁。"],["全观口头诗学","holistic oral poetics","从口头传统的声音社会关系网络理解民众文学活动的理论体系","理论术语","仪式与表演理论","表演与展演理论","从口头传统的声音维度、社会维度和关系网络整体性地理解民众口头文学活动和知识生产体系的研究框架和理论视角。全观口头诗学主张口头文学不能像书面文学那样被还原为'文本'——其意义不仅在于词句的内容，还在于谁在唱、对谁唱、用什么声音唱、在什么社会关系网络和权力结构中唱。该学者团队（以巴莫曲布嫫和朝戈金为代表的中国史诗研究群体）将帕里-洛德口头理论与中国少数民族活态史诗传统相结合，发展了具有中国学术特色的口头诗学理论。"],["公共性","publicness","文化实践和空间面向公众开放共享的社会属性","理论术语","社会与群体理论","社会理论与民俗","文化实践和公共空间面向公众开放、共享和参与的社会属性，是哈贝马斯公共领域理论在文化领域的延伸。民俗学中的公共性议题关注：传统民俗从'私域'（家庭、宗族内部）走向'公域'（公共节日、非遗展演）的过程中，民俗的性质发生了怎样的变化——原来以血缘和地缘为基础的'内部民俗'转变为面向所有观众的'公共展演'。高丙中提出的'民俗的公共化'概念描述了中国当代社会民俗从私人生活走向公共文化的结构性转型，并指出公共性是民俗在当代社会中获得合法性和生命力的重要条件。"],["公共文化","public culture","面向公众开放和共享的文化服务和文化实践","理论术语","社会与群体理论","权力与治理","面向公众开放和共享的文化服务和文化实践，是国家文化治理和公民社会建设的重要内容。高丙中将民俗学的当代使命重新界定为'为公民社会的公共文化建设服务'——民俗不应被封闭在博物馆和学院里，而应进入公共空间成为公民共享的文化资源。公共文化视野下，民俗经历了从'私人生活传统'到'公共文化遗产'再到'公民文化权利'的重新定义过程。这一转向的实践表现包括：传统节日从家庭活动扩展为社区公共活动，民间艺术从师徒传承转化为公共美育课程，非遗从地方私产上升为国家公共文化资源。"],["公共民俗学","public folklore","面向公众服务社会和文化遗产保护实践的民俗学分支","学科概念","学科元概念","学科分支方向","面向学术界的高墙之外的社会广大公众和文化政策的制定者/文化遗产的管理者的应用性的民俗学分支——以公共的民俗节日展演和文化遗产的博物馆策展以及非遗的保护和政策的公共咨询等为工作重心的走出象牙塔的接地气的实践和应用。"],["公民日常的文化科学","Cultural Science of Civic Daily Life","高丙中提出的将民俗学重新定位为公民日常生活的文化科学","理论术语","中国本土理论","本土方法论","高丙中提出的中国民俗学学科重新定位的纲领性表述，主张将民俗学从研究'过去遗留的民众文化'的学科转型为研究'当代公民日常文化生活'的科学。这一重新定位的核心转变：从'民'到'公民'——研究对象从充满社会学意涵的'民'（农民、底层）转向具有政治法律意义的'公民'；从'俗'到'日常文化'——研究内容从被界定的'民俗事象'清单扩展为公民的全部日常文化生活实践。该定位整合了当代西方民俗学的日常生活转向（如德国民俗学的鲍辛格传统）和中国实践民俗学（吕微等）的诉求。"],["共同在场","mutual focus of attention","互动仪式链中参与者注意力集中于共同的焦点","研究关键词","身份与权力","身份与权力","柯林斯的互动仪式链理论的两个最关键的仪式触发条件之一——所有仪式的参与者将他们的全部的注意力都聚拢和交汇在同一个共同的对象或活动（如神像/舞台上的歌手/赛龙舟的比赛）之上。"],["再生产","reproduction","布迪厄提出的社会结构、文化和不平等通过实践被不断维系和再生产的机制","理论术语","社会与群体理论","社会理论与民俗","皮埃尔·布迪厄（Pierre Bourdieu）在《再生产》（1970）等著作中提出的社会学核心概念，指社会结构、文化规范和不平等的社会关系不是静态存在的，而是通过人们在日常实践中的反复操演被不断维系和再生产的动态过程。布迪厄的核心概念工具——'惯习'（habitus）、'文化资本'（cultural capital）和'场域'（field）——共同描述了再生产的微观机制。在民俗学中，再生产分析回答了'民俗为什么能稳定存在'的结构性问题：祭祀仪式每年重复举行，不断再生产宗族等级和性别秩序；节庆活动中不断复演的传统角色分工，持续再生产和自然化社会分工。"],["写文化","writing culture","群体认同和身份的理论概念","理论术语","社会与群体理论","群体与认同","詹姆斯·克利福德（James Clifford）和乔治·马库斯（George Marcus）主编的1986年标志性文集《写文化》（Writing Culture）所命名的后现代人类学核心议题，指民族志书写不是对文化的透明'再现'（representation），而是修辞性、政治性的'建构'（construction）。写文化讨论深刻影响了民俗志书写：研究者不是民俗事象的'客观记录者'，而是通过选择特定的叙事策略（如现实主义叙事、多声部叙事、第一人称反思）建构了一个关于该民俗的特定版本。'写文化'要求民俗学研究者在书写民俗志时，对自身的写作策略和权力位置保持反思性自觉。"],["农文旅融合","agri-culture-tourism integration","农业文旅产业融合发展模式","研究关键词","当代社会文化","城市与乡村","当下中国推动乡村振兴和农村经济发展的核心的产业融合发展的政策——将传统农业、乡土文化和文旅产业三者融为一体相互借力以激活乡村的经济。非遗手艺成为旅游纪念品的产业化即是典型。"],["创编","oral composition","口头传统中表演与创作合一的动态过程","理论术语","叙事与口头传统","口头理论","口头传统研究中表演与创作合一的核心概念，指口头表演者（歌手、故事家）并非逐字背诵固定的文本，而是在每次表演中依据程式（formula）和主题（theme）进行即兴的创造性重组（recomposition）。帕里-洛德理论对民间文艺学的最根本冲击在于：否定了'口头有一固定原稿'的假设——每一次演唱都是一次创作。这意味着研究者不应去寻找一个文本的'原始正本'，而应关注创编的规则（什么可改什么不可改）和创编中体现的个人风格。"],["功能","function","社会文化现象在整体系统中发挥的作用和效能","理论术语","社会与群体理论","社会理论与民俗","社会文化现象在整体社会系统中发挥的作用和效能，是功能学派人类学和民俗学的核心研究范式。马林诺夫斯基（Bronislaw Malinowski）提出'功能'的核心方法——要理解任何一个文化元素（如一根木棍、一首歌谣），必须追问它在整个文化系统中'做什么'（做什么用）。在民俗学中，功能分析的最经典案例是马林诺夫斯基对特罗布里恩群岛巫术的分析——巫术不是'错误的科学'，而是在人类技术无法保证确定性的领域（如深海捕鱼vs近海捕鱼）提供心理安全感的功能。功能论的局限在于容易陷入'一切存在的都有功能'的循环论证，但作为分析工具至今仍具有实用价值。"],["动态文类观","dynamic genre perspective","将文类视为动态生成和流变过程而非固定分类的研究视角","理论术语","叙事与口头传统","叙事类型与形态","将文类（genre）视为动态生成、流动变化的过程而非固定静态的分类范畴的研究视角。传统民俗学的文类观念（神话→传说→故事→民歌→……）倾向于将每个文类视为一个'抽屉'，研究者的工作是判断一个文本该放入哪个抽屉。动态文类观的核心批判：在民众的口头实践中，文类边界是模糊的、可跨越的——一个叙事在不同场合可以被处理为传说，在另一个场合则被处理为神话。文类不是文本的固有属性，而是讲述者和听众在具体的交流情境中共同协商的产物。"],["动态象征分析","dynamic symbolic analysis","特纳在仪式过程分析中对象征符号进行动态阐释的方法","理论术语","信仰与观念体系","象征与世界观","维克多·特纳在仪式过程分析中对仪式象征符号进行动态的、多层次的解释性分析方法。与传统静态的象征分析不同，动态象征分析的核心主张是：一个象征符号的意义不是固定在词典式的单一解释中的，而是在仪式展开过程中被逐步揭示、积累和转化的——同一面旗帜在仪式开头、高潮和结尾可能有不同的含义。特纳通过恩登布人（Ndembu）的案例展示了象征的'意义三极'：解释意义（当地人说的）、操作意义（仪式中实际做的）、位置意义（在整体象征系统中与其他符号的关系），三者构成动态的意义结构。"],["包容性社会发展","inclusive social development","确保所有社会成员平等受益的社会发展模式","研究关键词","非遗与遗产","可持续发展","联合国2030可持续发展议程的核心理念之一——社会发展不能只追求经济总量的增长而将部分弱势群体（如农村留守老人和残疾人）排挤出发展的受益圈外——必须确保所有人公平地享受社会发展的全部利益。"],["包容性经济发展","inclusive economic development","确保不同群体公平参与和分享成果的经济发展模式","研究关键词","非遗与遗产","可持续发展","确保不同地区、不同性别和不同阶层的社会群体都能公平地参与国家的经济增长的过程并公平地分享增长带来的就业和收入提升的果实的经济的社会正义的理念模型。"],["历史化","historicization","将文化事象置于历史过程中加以理解和阐释的方法","学科概念","文化与认同","文化概念","史料学和文化史的核心方法论——将任何一个当下被静态地视为没有时间性的民俗的文化事象放回到真实的具体历史的长河中，通过文献和实物证据追溯它在时间轴上的整个来龙去脉和历史变迁的谱系图。"],["历史学","History","以人类过去的事件和社会变迁为研究对象的人文学科","理论术语","社会与群体理论","社会理论与民俗","以人类过去的事件和社会变迁为研究对象的人文学科，是民俗学的重要学科资源。民俗学与历史学的关系主要有三种模式：一、民俗史料研究——利用历史文献考证古代民俗的渊源和演变（如顾颉刚的孟姜女故事研究）；二、口述史方法——利用口头访谈重建底层民众的历史记忆以补文字史料之缺；三、民俗的历史人类学——将民俗事象本身作为历史研究的对象，理解长时段的民俗变迁模式（如赵世瑜的华北庙会研究）。顾颉刚的'层累地造成的中国古史'说是民俗学与历史学交叉的最经典成果。"],["历史民俗学","historical folklore studies","从历史角度研究民俗发展变迁的学术方向","学科概念","学科元概念","学科属性与定位","在钟敬文学科体系中从时间的纵深体的维度——不是田野的共时的横截面——以民俗在几千年的中国文明史中的历史性的起源、在历代的衍变和被历代的文人的记录的文献的累积的史学方法和史学视角来研究民俗的分支的学科。"],["历史记忆","historical memory","群体对过去历史事件的选择性集体记忆和社会传承","理论术语","记忆与传承理论","文化记忆","群体对过去历史事件的集体性记忆和经选择的社会传承，是文化记忆理论的关键概念。历史记忆与客观历史的关系不是镜像反映而是建构关系——群体不是被动地'记录'历史，而是主动地'选择'和'编排'哪些历史事件被记住、以什么方式被记住、被赋予什么意义。在民俗学中，历史记忆的典型载体包括：民间传说（如'梁祝传说'承载了地方社会对自由爱情的历史想象）、祭祀仪式（如黄帝祭典是中国文明起源的历史记忆的年度复现）、地名和风物传说（地方的一棵树一块石被赋予了历史叙事功能）。"],["原始信仰","primitive belief","人类早期社会的万物有灵自然崇拜等原始宗教形态","理论术语","信仰与观念体系","信仰根源与形态","人类早期社会中最基础的信仰形态，以万物有灵论、自然崇拜、图腾崇拜为核心内容，是宗教人类学和民俗学对信仰起源和早期形态的研究领域。至今在民俗中仍保留着大量的原始信仰元素：对大树的祭祀（树神）、对特定山石和泉水的崇拜（石敢当、神泉）、对特定动物的敬畏和禁忌（蛇、黄鼠狼）、对自然力的拟人化信仰（雷公、风伯、雨师）。原始信仰研究的学术争议来自泰勒的单线进化论框架——'原始'一词暗示着'落后'和'会被更高级的宗教形态取代'，这一进步主义预设已被当代学界抛弃。"],["原真性","original authenticity","文化遗产保护中强调的原始真实性和历史完整性的核心标准","研究关键词","非遗与遗产","保护理念","文化遗产保护的核心的标准和理念——强调在文物的保护和修复中对遗产的原初的历史的真实的原始的状态的最大化尊重和最小化的现代人工的干预。在非遗的语境中原真性被社区的活的实践所取代。"],["反结构","anti-structure","特纳提出，仪式阈限阶段暂时超越日常社会等级结构的平等状态","理论术语","仪式与表演理论","仪式类型与机制","维克多·特纳提出的仪式理论核心概念，与'结构'（structure）构成辩证对立。在仪式的阈限阶段，日常的社会结构（阶级、性别、职位、贫富差异）被暂时悬置，所有参与者处于一种'反结构'状态——平等的、无差别的、超出日常等级秩序的共同体体验。特纳将反结构视为社会的'辩证法'——结构提供秩序和稳定，反结构释放被结构性压抑的情感和能量，二者交替维持社会的动态平衡。这一理论为民俗节庆的'集体狂欢'（如春节、庙会、泼水节的平等和放纵）提供了深层解释。"],["变异性","Variability","民俗在传承和扩布中发生的自发和渐进的形态变异特性","理论术语","记忆与传承理论","传统与传承","民俗在传承和空间扩布过程中发生的自发、渐进、微小积累的形态和意义变化特性。变异性和传承性构成一对基本的理论张力：传承性保证了民俗在时间中的持续存在，变异性保证了民俗对不断变化的社会语境的适应能力。变异性在口头传统中最为显著——没有文字固定的口头文本，每次再讲述都是一次微小的再创造。在民俗学理论史上，变异研究经历了三个阶段：搜集异文（早期的文本校勘）、解释变异规律（历史-地理学派）、正面评价变异的创造性（当代的动态研究）。"],["口头程式理论","Oral Formulaic Theory","帕里-洛德创立的分析口头史诗创作中程式化表达规律的理论","理论术语","叙事与口头传统","口头理论","米尔曼·帕里（Milman Parry）和阿尔伯特·洛德（Albert Lord）在20世纪通过对南斯拉夫史诗歌手的研究创立的口头文学理论体系，是20世纪人文学科最重要的理论突破之一。其核心发现：口头史诗歌手并非逐字记忆数万行的史诗文本，而是掌握了一套'程式系统'——在不同格律条件下表达特定基本观念的固定词语组合（如'飞毛腿阿喀琉斯''攻城的赫克托尔'），每次演唱时用这些程式如积木般即时组装出全新的诗句。这一发现彻底颠覆了'荷马问题'——荷马史诗不是某一个天才作家的书面创作，而是长期的口头传统在某个时刻被文字记录下来的结果。该理论对中国少数民族史诗（如《格萨尔》《玛纳斯》《江格尔》）的研究产生了深远影响。"],["口头诗学","oral poetics","从声音的社会关系网络理解民众文学活动的理论体系","研究关键词","当代社会文化","数字化与媒体","见口头诗学的释义——从口头传统的声音的社会关系和表演的网络的活态的维度全面理解民众口头文学活动的理论体系。中国学术的朝戈金尹虎彬巴莫曲布嫫合称是三驾马车。"],["可供性","affordance","环境提供给行动者的行为可能性，吉布森提出","研究关键词","全球化与地方","地方性议题","美国心理学家詹姆斯·吉布森（James Gibson）在生态心理学中提出的关键概念——一个给定的物体的和环境对于行动者所提供的可能的行动的机会。在民俗学中一件器物的可供性是它在当地人的日常的实践中的使用的可能。"],["可持续发展目标","Sustainable Development Goals (SDGs)","联合国2030年议程提出的17项全球发展目标","研究关键词","非遗与遗产","可持续发展","联合国全体成员国在2015年一致通过的2030年可持续发展议程的核心——17项覆盖从消除贫困到气候行动和平等教育等全领域的全球发展目标。非遗的保护在SDG目标11中明确提及。"],["可持续性","sustainability","系统或过程能够长期维持和延续的能力","研究关键词","非遗与遗产","可持续发展","一个社会生态经济系统在不透支下一代的资源和福利的前提下长期地自我维持和延续自身的运行的能力。在非遗领域指传统的民俗和手工艺在市场经济的环境下不依赖外部输血的自发的自主的可持续的存续的生态。"],["后传承时代","Post-Inheritance Era","传统传承方式发生根本性变迁后的民俗学新研究语境","理论术语","记忆与传承理论","传统与传承","当代民俗学的前沿概念之一，指传统口语传承方式（代际口传心授）在社会结构根本性变迁（城镇化、数字化、家庭结构核心化）中受到系统性弱化甚至中断后，民俗学所面临的全新研究语境。在'后传承时代'，民俗传承发生了根本性变化：传承媒介从口头转为数字（抖音上学做年糕取代了跟奶奶在灶台边学），传承场域从家庭/村落转向学校/培训机构（周末非遗课堂），传承动力从生活需要转为文化自觉（'我要保护传统'）。这一概念对民俗学的理论挑战在于：如果传承方式发生了质变，民俗学需要重新定义'传承'本身。"],["后现代女性主义","postmodern feminism","吸收后现代理论、批判本质主义性别观的女性主义理论流派","研究关键词","身份与权力","性别研究","1990年代以后受到后现代和后结构主义理论深刻重塑的女性主义理论的流派。反对本质主义的单一的女性的概念——批判将女性视为铁板一块的统一范畴遮蔽了种族阶级和性取向等内部的巨大差异。"],["哥白尼革命","Copernican revolution","户晓辉用以比喻民俗学从经验到先验的方法论转变","学科概念","学科元概念","学科属性与定位","借用康德在哲学上的方法论革命的比喻（从客体的中心到以主体的认知条件为中心）——被户晓辉用于表达和实践他的中国民俗学的从纯经验的田野描述哲学到以先验的反思的（追问民俗学何以可能的认识论的条件）为核心的学科的方法论上的根本性的自我的颠覆和革命。"],["哲学","Philosophy","以存在知识和价值等为研究对象的基础学科","理论术语","社会与群体理论","社会理论与民俗","以存在（是什么）、知识（如何知）和价值（应该做什么）为研究对象的基础人文科学学科，为所有学科的自我反思提供认识论和方法论工具。哲学在民俗学中的介入主要表现为：民俗学的学科性质辩论（民俗学属于人文学科还是社会科学？）、民俗学知识论反思（民俗学如何生产关于民众生活的可靠知识？）、田野伦理的哲学基础（研究者对研究对象负有什么样的伦理责任？）。吕微等学者近年来着力推动中国民俗学的哲学化自觉，提出民俗学的'先验转向'——不先追问经验问题（某村有什么民俗），而是先追问认识论问题（民俗学如何可能？）。"],["回族民俗学","Hui folklore studies","以回族民俗文化为研究对象的民俗学分支","学科概念","学科元概念","学科属性与定位","以回民——中国广大的信仰伊斯兰的十个少数民族的统称——的在中华文明的大环境下生成的特色的清真的饮食、以开斋节和古尔邦节为核心的节庆体系以及婚丧的独特民俗文化为学科的研究对象的民俗学的分支的研究方向。"],["国家与社会","state and society","权力关系和治理的理论概念","理论术语","社会与群体理论","权力与治理","社会科学和政治社会学中的核心分析框架之一，关注国家权力机构与社会组织和群体之间的互动关系、边界消长和权力配置。在民俗学中，国家与社会的关系研究主要聚焦于：国家如何通过政策影响民俗（如非遗认定体系的标准化效应）、民俗如何作为社会的自我表达与国家权力互动（如民间信仰争取合法化）、国家隐喻在民间叙事中的呈现方式（如民间故
