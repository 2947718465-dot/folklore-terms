ion/sorcery)","通过诵念特定咒语以达到超自然效果的巫术行为","民俗事象","精神民俗","巫术占卜",null],["画符","画符 (folk divination/sorcery)","以朱砂墨在黄纸上书写笔画屈曲的符箓以驱邪祈福的道教法术","民俗事象","精神民俗","巫术占卜","道士和民间巫师——以朱砂——在黄纸上——书写和勾画——常人无法解读的——天上的云篆的符文——加盖法印——焚烧于水中——令求符者服下或佩戴——画符是道教以文字的超自然的力量——驱邪和治病和祈福的巫术。"],["请神","请神 (folk divination/sorcery)","以仪式请神灵降临附体或显灵的宗教行为","民俗事象","精神民俗","巫术占卜",null],["送神","送神 (folk divination/sorcery)","以仪式恭送降临的神灵回归天庭或原位","民俗事象","精神民俗","巫术占卜",null],["观星","观星 (folk divination/sorcery)","通过观察星象变化以推断人事吉凶的数术","民俗事象","精神民俗","巫术占卜",null],["观气","观气 (folk divination/sorcery)","通过观察气的形态颜色变化以推断地理人事的数术","民俗事象","精神民俗","巫术占卜",null],["面相","面相 (folk divination/sorcery)","以面部五官和形态气色推断人的性格和命运的数术","民俗事象","精神民俗","巫术占卜",null],["手相","手相 (folk divination/sorcery)","以手掌纹路和形状推断人的性格和命运的术数","民俗事象","精神民俗","巫术占卜",null],["骨相","骨相 (folk divination/sorcery)","以触摸骨骼形态推断命运的相术","民俗事象","精神民俗","巫术占卜",null],["声相","声相 (folk divination/sorcery)","以声音的音质和节奏推断性格和命运的数术","民俗事象","精神民俗","巫术占卜",null],["八字算命","八字算命 (folk divination/sorcery)","以出生年月日时的干支推断人生命运的最普遍的中国传统命理术","民俗事象","精神民俗","巫术占卜","中国的传统——以人的出生年月日时辰的八字的天干地支——排出四柱——以五行的生克制化——推算一生的吉凶祸福和婚姻的合与克的——批八字算命的方术。八字算命——是中国人的宿命的罗盘。"],["姓名学","姓名学 (folk divination/sorcery)","以姓名汉字的笔画和五行属性推断命运的数术","民俗事象","精神民俗","巫术占卜",null],["文化原型","Cultural Archetype","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","荣格（Carl Jung）分析心理学的核心概念，指人类集体无意识中跨文化普遍共有的原始意象和基本故事模式，如英雄原型智慧老人原型大地母亲原型等。在民俗学中为民俗叙事的跨文化雷同提供了不同于传播论的心理结构的解释。"],["集体无意识","Collective Unconscious","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","荣格提出的深层心理学核心概念——位于个体无意识之下的更深的无意识层面，不是个人经验的沉淀而是人类作为物种共有的先天的心理遗传和普遍的心理结构。集体无意识通过民俗的神话传说仪式和梦幻的象征意象被表达。"],["神话原型批评","Myth-Archetypal Criticism","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","以荣格的分析心理学特别是集体无意识和原型理论为基础发展起来的文学和民俗学的批评和分析方法。其核心操作是在民间叙事文本中识别和分析反复出现的跨文化的原型意象母题和模式。"],["仪式象征主义","Ritual Symbolism","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","以维克多·特纳等人为代表的将仪式的程序符号和操作作为象征体系进行意义解读的理论范式。仪式象征主义的核心命题是仪式的每一个元素——从焚香到跪拜——都不仅是动作而且是承载着多层次文化意义的象征符号。"],["符号人类学","Symbolic Anthropology","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","以格尔茨和特纳等人为代表的以文化的符号和象征体系为分析焦点的人类学分支方向。其核心主张是人不是生活在一个纯物质的世界中而是悬在自己编织的文化符号和意义之网上的动物——文化就是这些意义之网。"],["深描理论","Thick Description","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","克利福德·格尔茨在《文化的解释》（1973）中从吉尔伯特·赖尔（Gilbert Ryle）借用的核心方法论概念。赖尔的例子说明了深描与浅描的区别——同样是眼皮抽搐，浅描只记录生理动作而深描区分出是生理性抽搐还是对朋友递的暗号性的眨眼还是对暗号性眨眼的讽刺性模仿。在民俗学中深描要求研究者不是停留在民俗行为的外在描述而是层层挖掘行为背后的多层次文化意义。"],["文化文本","Cultural Text","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","文化研究和民俗学中将物质实践和社会行为作为像文学文本一样可以被阅读/解释其文化意义的分析概念。一场庙会的整个仪式程序就是一个文化文本——研究者需要像解读者解读文学文本一样层层理解这个文化文本的每一个元素的文化编码意义。"],["意义之网","Webs of Significance","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","格尔茨对文化的关键定义比喻——文化就是人自织并悬挂在其中的意义之网（webs of significance）——人类学/民俗学的工作不是寻找规律而是解释这些网的意义。"],["象征丛林","Forest of Symbols","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","特纳在对恩登布人仪式象征系统的研究的经典比喻——恩登布人的仪式现场是一个充满了丰富密集的象征符号的丛林研究者一步一步地在其中穿行和辨识各个象征的多层意义和它们之间的关系。"],["圣俗二元论","Sacred-Profane Dualism","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","涂尔干建立的宗教社会学和人类学的核心分析框架——所有人类社会都将世界划分为神圣（被禁忌隔离和崇拜的超凡领域）和世俗（凡俗的日常生活）这两个基本类别。圣俗二元论是理解仪式的根本性分析工具。"],["神圣时空","Sacred Time and Space","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","被从世俗的日常时间和空间中通过仪式操作被分离出来并赋予神圣性的独立的时空维度——仪式时间不同于日常时间（除夕不是普通的一天的结束而是神圣的新旧交替的时刻）；仪式空间不同于日常空间（祭坛不是普通的桌子而是神灵所在的神圣空间）。"],["永恒回归","Eternal Return","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","米尔恰·伊利亚德（Mircea Eliade）在《永恒回归的神话》（1949）中提出的宗教学概念——古代人的仪式和神话的核心操作是通过周期性重演创世之初的神的原初行动（in illo tempore，在那个时候）来周期性地回到神圣的时刻使世界得以周期更新。在民俗学中为节日和仪式的周期性重复的根本文化逻辑提供了宗教哲学的解释。"],["显圣物","Hierophany","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","伊利亚德宗教现象学的核心概念——神圣通过世俗的物体和事件向人类显现和启示自己的过程和显现物。一块石头一棵树一座山在显圣的那一刻就不再是普通的石头树山而是神圣自身在世界中的自我显现。在民俗学中为民俗中的神石圣树圣山等圣物的崇拜提供了宗教现象学的理论基础。"],["宗教现象学","Phenomenology of Religion","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","以奥托（Rudolf Otto）的《论神圣》和伊利亚德的《神圣与世俗》为代表的宗教研究学术传统，核心操作是暂时搁置对宗教的真假判断（宗教是真是假），转而直接描述人类的宗教经验本身的结构——神圣是如何在人的经验中被体验为既令人恐惧又令人着迷的完全他者的。"],["洁净与危险","Purity and Danger","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","玛丽·道格拉斯（Mary Douglas）同名著作（1966）提出的象征人类学经典分析框架。其核心命题：洁净/肮脏/污染的规则不是卫生学问题而是象征分类的问题——肮脏的是那些在一个社会的分类体系中找不到适当位置（处在类别之间）的模棱两可的东西，洁净规则是社会维持分类秩序和边界的手段。在民俗学中为民俗禁忌和洁净习俗提供了颠覆性的理论解释。"],["分类的象征","Symbolic Classification","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","道格拉斯等发展的象征人类学核心概念，社会通过物的分类——洁净/不洁净可食/不可食神圣/世俗——来建构象征性的分类体系，这种体系与社会本身的分类（我们/他们上层/下层男/女）是结构同源的。"],["自然象征","Natural Symbols","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","道格拉斯的另一核心概念，指人的身体是一个自然的象征——社会对人体（最可及的物理对象）的规则（吃什么/怎么穿戴/怎么处理身体排放物）是社会自身秩序和边界的微小模型。"],["身体象征学","Body Symbolism","民间观念和意义解释的理论概念","理论术语","信仰与观念体系","观念与解释","将人体及其部位姿态和修饰作为文化象征的分析视角——身体的不洁部分（如脚踝在某些穆斯林社会被视为羞体必须遮盖）不是生物学的事实而是文化的象征性标记。"],["表演民族志","Performance Ethnography","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","以表演理论为方法论基础整合了民族志的田野方法和表演分析的民族志书写方式——将研究和书写本身视为一种表演性的实践而非纯描述。在民俗学中是表演理论的最新发展之一。"],["展演性","Performativity","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","源自奥斯汀言语行为理论和巴特勒性别研究的核心概念——语言和符号不只是表述世界，更是在表述的同时实施和创造着它们所表述的现实。展演性在民俗学中的应用是仪式言语的以言行事功能——宣告你们现在是夫妻这句话不是描述一个既成事实而是通过宣告本身创造了一个新的社会事实。"],["述行性","Performativity","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","与performative/performativity的不同中译为展演性。指行为和语言具有执事和施事的效力——说话/做动作本身就是做了一件事（完成了行为）而不仅是说了/做了动作。在民俗学中咒语和婚礼宣言口头契约都是述行言语的经典案例。"],["以言行事","How to Do Things with Words","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","奥斯汀（J.L.Austin）在哈佛大学同名讲座（1955年）后出版的经典语言哲学著作的核心概念——言语不仅陈述事实（constative utterances），同时也在实施行为（performative utterances）——当牧师说我宣布你们为夫妻时不是在描述一个事件而是在执行一个行为。为民俗中仪式语言的效力提供了哲学基础。"],["言语行为理论","Speech Act Theory","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","奥斯汀创立后由塞尔（John Searle）等系统发展的语言哲学核心理论——言语行为的三层结构：言内行为（说了什么字句）、言外行为（说话者在说话时意在做什么——如承诺请求警告宣告）、言后行为（说话在听者身上产生了什么效果）。为民俗中口头言语（咒语祈祷祝辞宣誓）的分析提供了系统的理论工具。"],["框架分析","Frame Analysis","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","戈夫曼（Erving Goffman）在《框架分析》（1974）中创立的用以分析和解释人们如何在日常互动中通过解释框架来确定发生的社会情境的本性的社会学方法——同一个物理动作（一拳击打）在不同框架中是不同的社会行为（街头斗殴vs拳击比赛中的攻击vs朋友之间的打闹）。在民俗学中为民俗表演空间的跨框架性提供了分析工具。"],["表演框架","Performance Frame","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","鲍曼表演理论中运用戈夫曼框架分析发展的关键概念——民俗表演事件通过特定的话语标记和暗示（如传统的故事开头的从前有座山）建构出一个将表演与周围的日常交谈隔离开的表演框架，在此框架内观众按照不同于日常交谈的规则来倾听和评估表演。"],["反身性","Reflexivity","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","社会科学中关于知识能动地反馈并改变其所描述社会现实的过程的核心概念。吉登斯特则强调现代性中社会的反身性的激化——现代社会不断地监测和解释自身并根据这些解释来调整和改造自身。在民俗学中为民俗学者研究对民俗本身的干预效应提供了反思性的分析。"],["元交际","Metacommunication","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","贝特森（Gregory Bateson）提出的关于沟通和交流的层级的核心概念。元交际是在沟通的同时对正在进行的沟通的性质进行定性和编码——如一个眨眼作为元交际信息把这个动作定性为开玩笑。在民俗学中为民俗表演中的表演标定提供了理论基础。"],["信号理论","Signaling Theory","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","进化生物学和社会科学的交叉理论——人类和动物的许多行为（如复杂的仪式展示高档消费）可以被分析为向他人发送的关于自己的质量/资源和意图的昂贵的信号。在民俗学中为民俗的炫耀性消费如婚礼和庙会的排场提供了进化论的解释。"],["口头表演","Oral Performance","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","鲍曼表演理论中区别于书面文学分析的民俗口头表演的完整事件——口头叙事的文本和现场的表演二者不可分离地综合为一体的一个活的文化事件。口头表演分析超越了文本分析的局限将声音身体和互动都纳入分析范围。"],["演述中的创编","Composition in Performance","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","帕里-洛德口头程式理论核心概念——口头史诗歌手不是在复述一个记忆中固定的文本，而是在当众演述的过程中利用程式系统（oral formulaic system）即时地创编和重组诗句。演述中的创编是口头性的最核心的一个机制。"],["新生性","Emergence / Emergent Quality","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","鲍曼表演理论的核心概念——指每一次民俗表演的不可完全复制的独特性和不可预测的事件性——同一个故事由同一个讲述者在不同的日子讲给不同的听众，都会是一个独特的新生的（emergent）事件而不会是上一次表演的精确复本。新生性是口头民俗区别于书面文学的标志性特征。"],["传统指涉性","Traditional Referentiality","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","口头传统研究的关键概念——史诗和口头叙事中的大量表达和情节结构不是讲述者的个人创新，而是对群体的共享的口头传统库（traditional pool of oral expressions）的有意识的指涉和再运用。在传统指涉性的分析中一次新的讲述是传统和创新的结合。"],["表演的复现","Reperformance / Restoration of Behavior","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","谢克纳（Richard Schechner）表演理论的核心概念——表演是人类行为的一种二次行为/被恢复的行为，即表演不是原始自发行为而是对已经存在的行为的再次施行——婚礼表演不是第一次结婚，而是对无数前人的婚礼的复现。"],["中国的民俗学","Folklore Studies in China","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文对中国民俗学学科定位和学术传统的总纲领性表述——中国的民俗学不等于西方的民俗学（folklore studies），它是在中国特定的历史条件和文化土壤上根据钟敬文本人及学派的系统学术建构和体制化努力成长起来的一门具有独特的学科架构研究对象和理论体系的独立的人文学科。"],["民俗学结构体系","Structural System of Folklore Studies","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文为中国民俗学建构的系统化学科架构，涵盖民俗文化学（以民俗文化整体为研究对象）、民间文艺学（以民间文学为研究对象分支）、民俗学原理（学科基本理论和概念的体系化）、民俗学史（学科历史的研究）四大模块组成的多层次学科结构体系。"],["民间文艺学体系","System of Folk Literature Studies","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文建构的民俗学下属的专门分支学科体系，以中国民间文学的口头传统——神话/传说/民间故事/民歌/谚语/谜语/史诗——为研究对象，以民间文艺的整体性和口头性为核心方法论的独立完整的学术研究体系。民间文艺学在钟敬文的学科蓝图中是民俗学的最优先和最基本的分支。"],["中国的民间文化","Folk Culture of China","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文学派的核心研究对象界定——不是世界各国的所谓民间文化，而是特定于中国的、在数千年的历史中积淀形成的中华民族的民间文化传统。钟敬文强调中国的民间文化的特殊性——其历史深度系统性和整体性是其他国家难以比拟的学术宝藏。"],["口头文学的特性","Characteristics of Oral Literature","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文终其一生系统阐发和完善的关于民间文学的最根本特征的理论概括。口头文学的区别性特征包括：口头性（以口语而非文字为媒介）、集体性（非个人署名创作）、变异性（在传播中不断变异而无固定文本）、传承性（代代口传）。这四大特性的系统理论化是中国民俗学民间文艺学的基础理论支柱。"],["民俗学方法论体系","Methodological System of Folklore","钟敬文学术思想及学派理论","理论术语","中国本土理论","钟敬文学派","钟敬文为中国民俗学建构的系统化研究方法体系——包括田野调查法（实地采风搜集第一手口头传统材料）、文献考证法（用历史文献考证民俗的历史渊源和变迁）、比较研究法（跨地区跨民族的民俗比较）三大方法的有机结合和一体化运用，三者不可偏废。这是中国民俗学的综合研究方法的特色。"],["文化霸权","Cultural Hegemony","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","葛兰西（Antonio Gramsci）在《狱中札记》中提出的核心政治理论概念。文化霸权不是通过暴力的直接统治而是统治阶级通过文化和意识形态的渗透和弥漫使被统治者自愿地内化和认可了统治者的世界观和价值观作为常识和理所当然的普遍真理的同意/共识性的统治方式。在民俗学中文化霸权为民俗中被统治群体表面上对官方话语和节日的顺从提供了分析。"],["反霸权","Counter-hegemony","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","对葛兰西霸权理论的应用概念——被支配群体通过对主文化的对抗性再解读创造性的改编和另类文化实践对主流文化霸权进行的抵抗和去合法化的文化政治过程。在民俗学中为弱势群体的民间信仰在官方的强力禁止下通过隐蔽和编码的策略持续存活和反霸权提供了理论框架。"],["支配与抵抗","Domination and Resistance","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","社会理论的核心二元分析框架——社会关系被权力和冲突贯穿：支配方运用各种权力资源维持和加强其对被支配方的控制，同时被支配方也在不断地通过多种方式——从公开的叛乱到隐蔽的日常抵抗——进行着对支配的抵抗。在民俗学中为民俗在权力不平等的条件下的实践中的政治维度提供了总分析框架。"],["庶民研究","Subaltern Studies","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","以南亚历史学家（古哈/查特吉等）为代表的1980年代兴起的后殖民研究学术运动。其核心转向是将历史分析中的研究焦点从精英（殖民者和本地精英）转移到被边缘化的庶民/底层群体（农民/工人/低种姓/妇女）的自发的政治行动和文化实践。在民俗学中庶民研究的底层视角极强地影响了民俗对底层民众的文化政治的分析。"],["底层政治","Subaltern Politics","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","与精英政治相对的以底层民众为政治行动主体和在非正式的/非制度性的场域中进行的政治行动——不是选举和议会辩论，而是日常生活中悄然进行的集体行动/仪式/叙事和象征实践。在民俗学中底层政治为民俗的抵抗性生活维度提供了政治分析的理论工具。"],["文化抵抗","Cultural Resistance","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","被支配群体运用其自身的文化资源——民歌/民间戏曲/节庆/仪式/日常习俗——来对主文化的价值和规则进行质疑挑战和转化的文化政治实践。民族民俗和阶级民俗都可作为文化抵抗的武器——黑人灵歌对抗奴隶制/陕北民歌对抗封建压迫。"],["弱者的武器","Weapons of the Weak","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","斯科特的同名经典著作（1985）。通过对马来西亚农民日常生活的深入田野研究揭示的弱者在无力进行公开的组织化的政治抵抗的严重不平等条件下所开展的隐蔽的、日常的、非对抗形式的（怠工/偷懒/暗中偷窃/装傻/说闲话）微型的抵抗武器。其在民俗学中的重要启示是许多民俗实践乍看之下是习俗传统实质上是弱者的抵抗武器的日常运用。"],["隐藏的文本","Hidden Transcript","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","斯科特在《支配与抵抗的艺术》（1990）中与公开的文本构成对子关系的核心概念。隐藏的文本是弱势群体在权力者的视线之外（在私下/在后台/在同阶层小群体中）对权力者的批评嘲讽和怨言的私下谈论——权力者在公开的文本中假装被服从，弱者在隐藏的文本中公开挑战权力者，但二者都在同时维护公开的文本的表面秩序。在民俗学中弱者的民歌和幽默偷段子往往是隐藏的文本的民俗表达。"],["公开的文本","Public Transcript","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","斯科特支配与抵抗框架中与隐藏的文本构成对子的概念——权力者和弱势者在公开的权力情境中共同表演的——权力者表现权威和仁慈/弱势者表现服从和恭敬——双方都心照不宣但这出戏对维持社会表面的秩序和等级至关重要。在民俗学中民俗节庆的公开仪式场合往往就是公开的文本的操演。"],["象征权力","Symbolic Power","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","布迪厄提出的权力理论核心概念。象征权力是被误识（méconnaissance）和认可的权力——它不是通过赤裸裸的暴力和强迫来运作，而是通过符号和象征体系（如教育体系和文凭的神圣性）的运作使被支配者自愿地认可和接受了支配者统治秩序的正当性和合法性。在民俗学中为民俗中的等级秩序如何通过仪式的象征运作被自然化和合法化提供了理论工具。"],["符号暴力","Symbolic Violence","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","布迪厄提出的补充象征权力的概念——通过象征和符号系统施加的没有人意识到这是一场权力运作的软性暴力——如教育体系通过文凭的分配将阶级的不平等伪装成天赋能力的不等从而使被淘汰者自认不如而非质疑教育体系的不公正。在民俗学中为分析民俗中内化的社会等级歧视提供了工具。"],["误识","Misrecognition (Méconnaissance)","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","布迪厄实践理论的核心概念之一——社会行动者将权力的任意性（社会秩序不是自然的而是人为的权力建构的）误识/不承认/当作是自然的理所当然的和正当的认知操作。误识（méconnaissance）是象征权力得以运作的认知前提。在民俗学中为民俗的实践者对其自身民俗实践中的权力结构的盲视和无意识提供了分析。"],["合法化","Legitimation","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","通过话语实践和制度操作赋予特定的社会秩序权力结构身份和行为模式以合法和正当地位的社会文化过程。在民俗学中合法的分析关注民间信仰等民俗如何经历合法化过程从被打压的迷信转变为被国家认可的合法文化遗产。"],["正当性","Legitimacy","文化与权力关系的理论概念","理论术语","社会与群体理论","权力与治理","韦伯社会学中的核心概念——社会秩序和权力结构的被被支配者自愿认可和接受而不仅仅是靠暴力强制维持的正当性和合法性基础。韦伯区分了正当性的三种理想型基础：传统的（因为是世代相袭的）、克里斯玛的（因为领袖超凡的个人魅力）和法理的（因为是按照公正的法律和程序产生的）。"],["民俗的创造性转化","Creative Transformation of Folklore","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","在保持民俗传统核心文化基因的前提之下结合当代社会的新的需求和媒介对传统的形式和内容进行适应性的创意改革和活化的创新性转化过程。"],["传统的再生产","Reproduction of Tradition","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","传统不是天然存在、固定不变地代代自动传递的死物——而是通过每一个当代人的日常选择和民俗实践的积极参与被每时每刻地主动再生产的社会过程。"],["民俗创新","Folklore Innovation","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","民俗的传统不是一成不变的静态的复刻而是不断地吸收新的时代元素进行形式和内容的创造性翻新和组合——如用嘻哈风格改编陕北民歌的实践。"],["文化发明","Invention of Culture","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","个人和群体在特定历史条件下完全新创一套之前不存在的话语和仪式——却以悠久的传统的外衣和叙事来包装和论证其古老性——的民俗的文化发明的社会过程。霍布斯鲍姆的传统发明是该理论的核心来源。"],["传统的重构","Reconstruction of Tradition","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","在传统因社会剧变而被打断或被边缘化之后，当代的社区和文化群体通过有意识地从历史碎片中重新拣选重组和再解读过去的遗产来重构一个新的看似承接过去的传统。"],["民俗的现代化","Modernization of Folklore","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","分析传统民俗在遭遇工业化城镇化和全球化的现代性的冲击下经历的形式简化功能的收缩和新的现代民俗的生成的双重的适应和改变的长期的过程。"],["民俗的适应性变迁","Adaptive Change of Folklore","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","民俗在现代社会的环境——而非被动等死——主动地调整其形式和社会功能以继续在新的环境中存活和发挥作用的进化的过程。这是一种变中求生而非以死守旧的策略。"],["文化转型","Cultural Transformation","民俗传承中的变异与创新机制","学科概念","传承与变异","变异与创新","一个社会的整体文化模式——从经济基础到价值观念——发生根本性的结构性的质变的过程。民俗在此大潮中既是转型的对象也被转型的力量所带动和裹挟。"],["大传统与小传统","Great Tradition and Little Tradition","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","罗伯特·雷德菲尔德在1956年提出的分析文明社会中文化分层的一对核心概念。大传统指都市精英的以学校和典籍为传承媒介的反思性文化，小传统指乡村农民社群的以口头和习俗为传承媒介的非反思的民俗文化。"],["精英文化与民间文化","Elite Culture and Folk Culture","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","一个社会的内部的文化分层的两个极。精英文化指学院和文人所创造和在典籍中以文字记载的文化的正统，民间文化指广大的不识字的底层民众在田野和作坊中以口头和行为传承的生活的文化。二者不可割裂——精英文化大量的原材料来源于民间。"],["上层文化与下层文化","Upper Culture and Lower Culture","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","与精英文化与民间文化分别对应的中国版本的本土分析概念——上层以儒家的礼制和科举考试的文化为正统，下层以民间的祭祀庙会和农事习俗为生活的活的文化。钟敬文的三层文化将中间层区分出来。"],["文化圈","Cultural Circle / Kulturkreis","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","德奥传播学派的经典概念——世界上几个有限的文化发源中心在特定的地域范围内扩展形成一组相联系的文化特质的地理分布的圈层。每个圈有其独特的文化特质的组合——如非洲的鼓文化圈和太平洋的独木舟文化圈。"],["文化层","Cultural Stratum","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","考古学和地质学和文化人类学的共享的分析概念——一个特定地域在数千年的历史中从底层到表层积累的不同时代的文化的残存的地层。最底层是最远古的遗存。民俗学也借用文化层的概念来比喻当代民俗中同时存在不同历史时期的民俗的遗存和累积。"],["文化区","Culture Area","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","美国历史学派的博厄斯和威斯勒等人创立的分析概念——北美原住民的文化因其对不同生态环境的适应而在地理上形成了不同的——每一文化区有其一整套的物质社会和精神文化特质的区域整体。文化区不是硬的政治疆界。"],["文化丛","Culture Complex","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","一组在功能上相互关联——如稻作农业和其伴随的水利和祭祀和农具——的成套的文化特质组成的一个紧密的功能的集合体。在一个文化丛中单独割裂取出一个元素无法独立地存活。"],["文化特质","Culture Trait","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","文化的最小的不能再被细分的基础分析单位——如筷子这一种进食的具体方式。一系列有内在功能关联的文化特质组合成一个文化丛。"],["涵化","Acculturation","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","两种或以上不同的文化系统在长期的持续的和深入的第一手的接触中发生的双向的大幅度的文化的改变——不是单方面的同化而是双方都经历了质变的过程。中国的佛教本土化即是涵化的一个规模宏大的历史案例。"],["濡化","Enculturation","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","个体在其成长过程中从其所属文化通过观察模仿和非正式的参与中无意识地活得了该文化的行为规范价值观和世界观的人的社会化和文化化过程。儿童的年俗的濡化即是通过跟随大人一起过年而学会过年的民俗。"],["文化接触","Culture Contact","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","之前彼此隔离的两个文化系统首次（或再次增强）发生直接或间接的互动的历史的和社会的接触过程。丝绸之路是东西方文化大接触的里程碑。"],["文化断裂","Cultural Rupture","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","文化的传承链条在历史的某个节点被暴力的力量不可逆转地打断——如殖民者强制禁止土著语言和习俗和文革的破四旧——造成的文化传统不能按原有的方式继续传承的深重并且代际难以弥合的断层面。"],["文化复兴","Cultural Revival","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","在文化断裂或长期的边缘化和衰落之后当代人自觉和有组织地重新激活复原和发扬光大其祖先的被中断和衰落的传统文化——如汉服运动的当代复兴——的有目的的复兴的文化运动和社会过程。"],["文化挪用","Cultural Appropriation","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","一个文化群体在未经另一文化的成员同意或在不对等的权力关系下，将该另一文化的文化元素（如民族服饰宗教符号和仪式等）抽出其原有的文化土壤和削弱其作为文化抵抗的工具性并将其殖民性地商品化为异国情调的商品和旅游观赏的展品和时尚元素的充满争议的行为。"],["文化本真性","Cultural Authenticity","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","民俗学和文化遗产研究的核心争议概念之一。关于一件民俗的物品和活动——是否为真实的古老的、非伪造的、非商业包装的真正的原生传统的争论。霍布斯鲍姆的传统的发明理论带来了对本真性概念的根本解构。"],["文化政治","Cultural Politics","民俗学与文化研究的基本概念","学科概念","文化与认同","文化概念","文化——包含民俗节庆宗教信仰和日常的生活方式——不再是脱离权力的纯粹审美，而是政治斗争的场域——争夺对传统的定义权和争夺谁能代表真正的民族的文化的权力的政治的斗争和协商的场域。"],["灾害民俗学","Disaster Folklore","民俗学的交叉学科分支方向","学科概念","学科元概念","学科分支方向","以自然和人为灾害——地震洪水瘟疫和战争——中的灾民的民俗应对灾难记忆和灾后重建仪式为研究对象的民俗学的新的分支。汶川地震后的相关研究推动了中国灾害民俗学的起步。"],["环境民俗学","Environmental Folklore","民俗学的交叉学科分支方向","学科概念","学科元概念","学科分支方向","研究人的民俗系统与周边的自然环境和生态系统——如传统的生态禁忌民间自然资源管理和生态知识——之间的互动和相互的形塑关系的民俗学的新分支。"],["空间民俗学","Spatial Folklore","民俗学的交叉学科分支方向","学科概念","学科元概念","学科分支方向","随着人文学科的空间转向而兴起的民俗学交叉方向——将研究的 ypology","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","将全世界的口头叙事的文本按照其整体的叙事的情节结构——而非单个的母题——归为有限数量的固定的类型（AT分类法中每个类型有唯一的编号如AT510灰姑娘型），然后对此同一类型在全球各地的不同异文的版本进行历史和地理的比较和传播路径的分析和重朔的民俗学经典的研究方法。"],["功能分析法","Functional Analysis","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","以马林诺夫斯基为代表的功能主义的分析方法——不是以形态学的眼光问这个故事的结构是什么，而是功能主义地问这个故事在这个社会中发挥着什么社会学的功能（如解释社会制度的起源与认可现存的秩序等）。"],["共时分析","Synchronic Analysis","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","索绪尔在《普通语言学教程》中确立的结构语言学的方法在民俗研究中的应用——不问一个民俗在时间中的历史变化（历时性），只关注其在某一特定时间点的内在的结构关系（共时性），如同对一门语言的语法进行共时的分析一样。"],["历时分析","Diachronic Analysis","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","与共时分析构成互补的研究维度——对民俗的研究不只停滞在它的某一时间横截面的结构分析上，而是将时间的纵向的维度打开——研究该民俗形式和功能在历史上的历时的演变链条和路径。如芬兰历史-地理学派的版本比较法的整套操作即为历时分析。"],["形态学方法","Morphological Method","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","普罗普（1928）开创的关于民间故事的共时的纯形式的结构分析的全套方法论的系统的实践——不是以故事的具体的内容而是以其抽象的情节的功能项和其不变的功能序列为研究对象的叙事分析的形态学的范式。"],["类型学方法","Typological Method","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","以按类型分类和归类为基本操作的比较研究的范式的统称——将来自不同地域和社会背景的民俗事象按照它们的相似的特征进行归类（类型），然后以类型为比较和分析的单位进行横向的跨文化比较分析。"],["文类分析法","Genre Analysis","形态学与结构分析的研究方法","研究方法","分析范式","形态与结构","分析口头文学和民俗的实践不是作为无差别的整体而是按照它们所属的不同的民间的地方的文类（如传说和故事和笑话——它们各自有不同的讲述的规则和真实的声称）来进行分类研究的方法。不同文类不可被以同一尺度来衡量和分析。"],["历史文献法","Historical Document Method","历史研究与比较研究的方法范式","研究方法","分析范式","历史与比较","利用封存在历史档案地方志正史文人笔记和碑刻中的关于各地各时代的民俗的零星和碎片化的书面文献的原始记录作为研究该民俗的历史的来龙去脉的第一手的文字资料的基础性的史料学的方法。"],["历史溯源法","Historical-Genetic Method","历史研究与比较研究的方法范式","研究方法","分析范式","历史与比较","与文献法为姐妹法——由现存的民俗形态和传世的文献中的片断记录为起点，顺着历史的时间轴逆向（向上游）一层一层地剥去后代的附加和改编的层累的累积以图恢复和重建该民俗事项在其更早期乃至最原初形态的一种历史重构的方法。"],["历史重构法","Historical Reconstruction Method","历史研究与比较研究的方法范式","研究方法","分析范式","历史与比较","针对文献严重不足或缺乏的领域——如远古的无文字时代的民俗——通过将考古的实物证据和后世的可信的文献中零星的遗存片段以及跨文化的人类学比较的几个独立的来源的碎片像考古学家复原一只碎成百片的陶罐一样，综合审慎地拼合出一个理论上的合理的历史形态。"],["跨文化比较法","Cross-cultural Comparison","历史研究与比较研究的方法范式","研究方法","分析范式","历史与比较","以文化为单位对两个以上的不同民族、社会和国家的民俗大系统中相似和相异的现象进行系统比较、以排除单一社会中的偶然性和地方性进而揭示人类文化的更深刻的统一性和变异的规律的研究方法。"],["区域比较法","Regional Comparison","历史研究与比较研究的方法范式","研究方法","分析范式" function $(id){return document.getElementById(id)}
function $$(sel){return document.querySelectorAll(sel)}

// Filter
function doFilter(){
  var r=DATA;
  if(state.cat) r=r.filter(function(t){return t[3]===state.cat});
  if(state.sub) r=r.filter(function(t){return t[4]===state.sub});
  if(state.t3) r=r.filter(function(t){return t[5]===state.t3});
  if(state.query){
    var q=state.query.toLowerCase();
    r=r.filter(function(t){
      return t[0].toLowerCase().indexOf(q)!==-1||(t[1]||"").toLowerCase().indexOf(q)!==-1||
        t[2].toLowerCase().indexOf(q)!==-1||t[3].indexOf(q)!==-1||t[4].indexOf(q)!==-1||t[5].indexOf(q)!==-1||
        ((t.length>=7&&t[6])?t[6].toLowerCase().indexOf(q)!==-1:false);
    });
  }
  allFiltered=r;

  // Apply sort
  if(state.sort==="name"){
    r=r.slice().sort(function(a,b){return a[0].localeCompare(b[0],"zh")});
  }else if(state.sort==="category"){
    r=r.slice().sort(function(a,b){return (a[3]+a[4]+a[5]).localeCompare(b[3]+b[4]+b[5],"zh")});
  }

  return r;
}

// Highlight matching text
function hl(text,q){
  if(!q||!text) return text;
  var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return text.replace(re,'<mark>$1</mark>');
}

    h+='<span class="cat-link" onclick="event.stopPropagation();App.selectSub(\''+sub+'\')">'+sub+'</span>';
    h+='<span class="sep">›</span>';
    h+='<span>'+t3+'</span>';
    h+='</div>';
    h+='<div class="term-def'+(detail?' has-more':'')+'">'+dfH+'</div>';
    if(detail){
      var detailH=q?hl(detail,q):detail;
      h+='<div class="term-detail">'+detailH+'</div>';
    }
    h+='</div>';
  }
  grid.insertAdjacentHTML("beforeend",h);

  // Load more button
  if(end<total){
    var remaining=total-end;
    $("load-more").innerHTML='<button class="load-more-btn">加载更多 <span style="opacity:.5;font-size:12px">(剩余 '+remaining+' 条)</span></button>';
  }else if(total>0){
    $("load-more").innerHTML='<div class="loaded-all">— 已显示全部 '+total+' 条 —</div>';
  }else{
    $("load-more").innerHTML="";
  }

  if(resetScroll) window.scrollTo({top:0,behavior:"instant"});
}

// Load more (global for onclick)
window.doLoadMore=function(){
  var btn=$("load-more").querySelector(".load-more-btn");
  if(!btn||btn.disabled) return;
  btn.disabled=true;
  btn.textContent="加载中…";
  state.loaded=Math.min(state.loaded+BATCH,allFiltered.length);
  render(false);
};

// Infinite scroll (load more when near bottom)
var scrollTimer;
window.addEventListener("scroll",function(){
  var btn=$("load-more").querySelector(".load-more-btn");
  if(!btn||btn.disabled) return;
  var rect=btn.getBoundingClientRect();
  if(rect.top<window.innerHeight+300){
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(doLoadMore,200);
  }
},{passive:true});

// Category pills
function renderCats(){
  var cats=["民俗事象","学科概念","理论术语","研究关键词","研究方法","学者与学术体制"];
  var colors={"民俗事象":"#B8403D","学科概念":"#4B4D9E","理论术语":"#2E6DA4","研究关键词":"#3D8B68","研究方法":"#9B7B2C","学者与学术体制":"#8B3A5E"};
  var icons={"民俗事象":"🏛","学科概念":"📐","理论术语":"📖","研究关键词":"🔑","研究方法":"🔬","学者与学术体制":"🎓"};
  var counts={};
  for(var i=0;i<DATA.length;i++) counts[DATA[i][3]]=(counts[DATA[i][3]]||0)+1;
  var h='<button class="cat-pill'+(state.cat===null?" active":"")+'" onclick="App.selectCat(null)">全部<span class="count">'+DATA.length+'</span></button>';
  for(var i=0;i<cats.length;i++){
    var c=cats[i],a=state.cat===c;
    h+='<button class="cat-pill'+(a?" active":"")+'" onclick="App.selectCat(\''+c+'\')"';
    if(a) h+=' style="background:'+colors[c]+'"';
    h+='>'+icons[c]+' '+c+'<span class="count">'+(counts[c]||0)+'</span></button>';
  }
  $("cat-pills").innerHTML=h;
}

function renderSubs(){
  if(!state.cat){$("sub-filters").innerHTML="";return}
  var subs={};
  for(var i=0;i<DATA.length;i++)
    if(DATA[i][3]===state.cat) subs[DATA[i][4]]=(subs[DATA[i][4]]||0)+1;
  var ks=Object.keys(subs).sort();
  var h='<button class="sub-filter'+(state.sub===null?" active":"")+'" onclick="App.selectSub(null)">全部子类</button>';
  for(var i=0;i<ks.length;i++){
    var s=ks[i],a=state.sub===s;
    h+='<button class="sub-filter'+(a?" active":"")+'" onclick="App.selectSub(\''+s+'\')">'+s+' ('+subs[s]+')</button>';
  }
  $("sub-filters").innerHTML=h;
}

function renderT3s(){
  if(!state.sub){$("t3-filters").innerHTML="";return}
  var t3s={};
  for(var i=0;i<DATA.length;i++){
    if(DATA[i][3]===state.cat&&DATA[i][4]===state.sub)
      t3s[DATA[i][5]]=(t3s[DATA[i][5]]||0)+1;
  }
  var ks=Object.keys(t3s).sort();
  var h='<button class="t3-filter'+(state.t3===null?" active":"")+'" onclick="App.selectT3(null)">全部</button>';
  for(var i=0;i<ks.length;i++){
    var s=ks[i],a=state.t3===s;
    h+='<button class="t3-filter'+(a?" active":"")+'" onclick="App.selectT3(\''+s+'\')">'+s+' ('+t3s[s]+')</button>';
  }
  $("t3-filters").innerHTML=h;
}

// View toggle sync
function syncViewBtns(){
  $$(".view-btn").forEach(function(b){b.classList.toggle("active",b.id===state.view+"-btn")});
  $$(".view-toggle").forEach(function(b){b.classList.toggle("active",b.dataset.view===state.view)});
}

// Full reset and re-render
function fullRender(){
  state.loaded=Math.min(BATCH,allFiltered.length||DATA.length);
  $("term-grid").innerHTML="";
  render(true);
  syncViewBtns();
  renderSubs();renderT3s();
}

// App
window.App={
  selectCat:function(c){
    state.cat=c;state.sub=null;state.t3=null;renderCats();renderSubs();renderT3s();fullRender();
  },
  selectSub:function(s){
    state.sub=s;state.t3=null;renderSubs();renderT3s();fullRender();
  },
  selectT3:function(t){state.t3=t;renderT3s();fullRender()},
  toggleCard:function(card){
    var was=card.classList.contains("expanded");
    // Close all others
    $$(".term-card.expanded").forEach(function(c){if(c!==card)c.classList.remove("expanded")});
    if(!was)card.classList.add("expanded");
    else card.classList.remove("expanded");
  },
  toggleView:function(v){
    state.view=v;fullRender();
    $("sort-btn").style.display=(v==="compact"?"none":"");
  },
  toggleSort:function(){
    state.sort=state.sort==="name"?"category":"name";
    $("sort-label").textContent=state.sort==="name"?"名称":"分类";
    fullRender();
  },
  loadMore:function(){doLoadMore()},
  toggleTheme:function(){
    var r=document.documentElement;
    r.classList.toggle("dark");
    var is=r.classList.contains("dark");
    localStorage.setItem("ftheme",is?"dark":"light");
    $("theme-btn").textContent=is?"☀":"🌙";
  },
  toggleHelp:function(){
    var h=$("kbd-hint");
    var was=h.classList.contains("show");
    h.classList.toggle("show",!was);
    if(!was) setTimeout(function(){h.classList.remove("show")},3000);
  },
  copyCard:function(btn){
    var card=btn.closest(".term-card");
    var cn=card.querySelector(".term-name").childNodes[0].textContent.trim();
    var found=DATA.find(function(t){return t[0]===cn});
    if(!found) return;
    var text=found[0]+(found[1]?" ("+found[1]+")":"")+"\n\n【释义】"+found[2];
    if(found.length>=7&&found[6]) text+="\n\n【详细释义】"+found[6];
    text+="\n\n——"+found[3]+" › "+found[4]+" › "+found[5];
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(function(){
        btn.classList.add("copied");
        btn.textContent="✓";
        setTimeout(function(){btn.classList.remove("copied");btn.textContent="📋"},1500);
        App.toast("已复制到剪贴板");
      });
    }
  },
  toast:function(msg){
    var t=$("toast");t.textContent=msg;t.classList.add("show");
    clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove("show")},1800);
  },
  resetAll:function(){
    state.cat=null;state.sub=null;state.t3=null;state.query="";state.loaded=BATCH;
    $("search").value="";$("search-clear").classList.remove("show");
    renderCats();renderSubs();renderT3s();$("term-grid").innerHTML="";render(true);
  }
};

// Back to top visibility
window.addEventListener("scroll",function(){
  $("back-top").classList.toggle("show",window.scrollY>600);
},{passive:true});

// Search
var st;
$("search").addEventListener("input",function(){
  var v=this.value;
  $("search-clear").classList.toggle("show",v.length>0);
  clearTimeout(st);
  st=setTimeout(function(){state.query=v;fullRender()},200);
});
$("search-clear").addEventListener("click",function(){
  $("search").value="";this.classList.remove("show");
  state.query="";fullRender();$("search").focus();
});

// Click outside to close cards
document.addEventListener("click",function(e){
  if(!e.target.closest(".term-card")){
    $$(".term-card.expanded").forEach(function(c){c.classList.remove("expanded")});
  }
});

// Keyboard shortcuts
document.addEventListener("keydown",function(e){
  var tg=e.target.tagName;
  if(tg==="INPUT"||tg==="TEXTAREA"){
    if(e.key==="Escape"){$("search").value="";$("search-clear").classList.remove("show");state.query="";fullRender();$("search").blur()}
    return;
  }
  if(e.key==="/"){e.preventDefault();$("search").focus()}
  if(e.key==="Escape") App.resetAll();
  if(e.key==="d"||e.key==="D") App.toggleTheme();
  if(e.key==="g"||e.key==="G") App.toggleView("grid");
  if(e.key==="l"||e.key==="L") App.toggleView("list");
  if(e.key==="c"||e.key==="C") App.toggleView("compact");
  if(e.key==="s"||e.key==="S"){e.preventDefault();App.toggleSort()}
  if(e.key==="?"){e.preventDefault();App.toggleHelp()}
});

// Load more delegation
$("load-more").addEventListener("click",function(e){
  if(e.target.closest(".load-more-btn")) doLoadMore();
});

// Init
(function init(){
  var s=localStorage.getItem("ftheme");
  if(s==="dark"){document.documentElement.classList.add("dark");$("theme-btn").textContent="☀"}
  var detailCount=DATA.filter(function(t){return t.length>=7&&t[6]!==null}).length;
  $("stats").innerHTML='<div class="stat-item">📚 <strong>'+DATA.length.toLocaleString()+'</strong> 条术语</div><div class="stat-item">📂 <strong>6</strong> 个大类</div><div class="stat-item">🔤 中英双语</div>'+(detailCount>0?'<div class="stat-item" style="color:var(--accent)">📝 <strong>'+detailCount.toLocaleString()+'</strong> 条有详细释义</div>':'');

  // Distribution bars
  var cats=["民俗事象","学科概念","理论术语","研究关键词","研究方法","学者与学术体制"];
  var colors={"民俗事象":"#B8403D","学科概念":"#4B4D9E","理论术语":"#2E6DA4","研究关键词":"#3D8B68","研究方法":"#9B7B2C","学者与学术体制":"#8B3A5E"};
  var counts={}; var max=0;
  for(var i=0;i<DATA.length;i++){var c=DATA[i][3];counts[c]=(counts[c]||0)+1;if(counts[c]>max)max=counts[c]}
  var db="";
  for(var i=0;i<cats.length;i++){
    var c=cats[i],cnt=counts[c]||0,pct=Math.round(cnt/DATA.length*100);
    db+='<div class="distro-row"><div class="distro-label">'+c+'</div><div class="distro-bar-wrap"><div class="distro-bar" style="width:'+pct+'%;background:'+colors[c]+'"><span>'+cnt.toLocaleString()+' ('+pct+'%)</span></div></div></div>';
  }
  $("distro").innerHTML=db;

  renderCats();state.loaded=BATCH;render(true);
})();

})();
</script>
</body>
</html>
