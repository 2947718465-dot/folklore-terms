tom/organization)","邻里亲友间日常的闲谈话语活动，看似随意却承载着社会关系维系和信息传播功能","民俗事象","社会民俗","社交礼俗","中国农村——邻里之间——在非正式的——饭后的暑夜的树荫下——以闲聊家常的——谁家娶媳妇了和谁家婆媳吵架了的——口头的信息的交换——的非正式的日常的交换。拉家常——是村子的社会舆论的信息的交换站。"],["认亲","认亲 (social custom/organization)","通过仪式确认亲属关系的社会活动，包括认干亲、结拜等","民俗事象","社会民俗","社交礼俗","传统的中国——两个没有血缘的家庭——通过结拜为干亲——建立起虚拟的亲属的关系的社会仪式。认亲将非血缘的陌生人之间的互动套入了亲属的义务和情感的模具中。"],["结拜","结拜 (social custom/organization)","非血缘关系的人通过盟誓结成兄弟或姐妹关系，又称拜把子、换帖","民俗事象","社会民俗","社交礼俗","中国民间——两个或多个非血缘的男性——通过焚香和歃血以及跪拜天地和盟誓——结为异姓的兄弟——不求同年同月同日生但求同年同月同日死的——以拟血缘的盟誓——重建一个最紧密的忠诚的共同体的民间的仪式。"],["换帖","换帖 (social custom/organization)","结拜时互换写有姓名生辰的帖子作为信物，象征双方结为异姓兄弟","民俗事象","社会民俗","社交礼俗","结拜——即2000结拜——时——双方互换写有各自的姓名籍贯和生辰八字的——作为盟约的文本和终生的信物——的金兰的谱帖。换帖是结拜的文本化的契约。"],["拜把子","拜把子 (social custom/organization)","中国传统社会中非血缘男性通过盟誓结为异姓兄弟的习俗","民俗事象","社会民俗","社交礼俗","见2000结拜的释义。中国民间——以焚香盟誓结为异姓的兄弟。刘关张的桃园三结义是拜把子的永远的经典模板。"],["想象的共同体","Imagined Communities","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","群体与认同","本尼迪克特·安德森（Benedict Anderson）在1983年同名著作中提出的关于民族主义研究的革命性理论概念。其核心命题为：民族（nation）是一个'想象的共同体'——它不是基于成员之间真实的面对面互动，而是通过印刷资本主义（印刷语言和媒体）在数以百万计的、彼此从未见过也不可能见到的陌生人之间创造出的一种'我们是同一民族'的集体想象和情感归属。安德森的分析揭示了民族认同的核心媒介基础——报纸和小说通过标准化的民族语言将分散在不同地理空间的陌生人同步连接在一起。在民俗学中，该概念被引入分析'民俗传统'如何被作为建构民族认同的文化资源——被统一的全国性节庆（春节在全国电视晚会的同步播出）如何在一亿中国人中创造了'我们一起在过年'的想象共同体体验。"],["传统的发明","Invention of Tradition","霍布斯鲍姆提出的近现代为特定目的而人为建构的看似古老的传统","理论术语","社会与群体理论","群体与认同","埃里克·霍布斯鲍姆（Eric Hobsbawm）和特伦斯·兰格（Terence Ranger）在1983年主编的同名文集中系统论述的历史社会学核心概念。其核心命题为：许多看似源自远古、源远流长的'古老传统'——如苏格兰高地人的方格裙（kilt）、英国的君主加冕典礼、非洲部落的'传统酋长制'——其实是在相当近的过去（主要是19世纪末到20世纪初）被刻意地'发明'出来的，发明者给它们披上'自古以来'的历史外衣以论证当下的政治诉求。在民俗学中，'传统的发明'具有双重的学术价值：一是对本真性话语的祛魅——'百年传统'很可能是50年前才发明的；二是对民俗学的反思——民俗学者在现代民族国家建设中的共谋角色（民俗学家经常参与了'发明传统'的工作）。"],["被发明的传统","Invented Tradition","群体认同和身份的理论概念","理论术语","社会与群体理论","群体与认同","同'传统的发明'，霍布斯鲍姆和兰格提出的分析概念，特指那些在相对近的时期被刻意创造（或大量改造和标准化），却以'源远流长''自古以来'的表象和历史叙事来论证其存在合法性的传统文化实践和符号。被发明的传统的识别特征包括：对其古老历史的高度强调和仪式化重复、与一个特定的历史英雄和重大事件的叙事绑定、被国家权力和法律赋予正式的官方地位。中国案例包括：黄帝故里祭典的当代复兴和国家级非遗化——这一宏大仪式尽管有古代的渊源，但以今日的形制和规模呈现是最近三十年的产物。"],["族群边界","Ethnic Boundaries","具有共同文化特征和历史记忆","理论术语","社会与群体理论","群体与认同","弗雷德里克·巴斯（Fredrik Barth）在1969年主编的《族群与边界》文集中提出的革命性族群理论概念，颠覆了之前将族群定义为自足的、拥有固定文化特征清单的实体的本质主义族群观。巴斯的核心论点是：族群的边界不是由'族群内部有什么文化特征'来决定的，而是由族群间的'边界维护'过程——在互动的界面上哪些文化差异被标记为'我们 vs 他们'的区别性特征——来建构和维持的。关键是'边界的维护'，而不是'边界内的文化内容'。在民俗学中，族群边界理论解释了一个关键现象：两个接触密切、文化日趋于相似的族群，为什么在一些民俗细节上（如特定的节庆、禁忌或饮食限制）刻意地保持甚至夸大差异作为族群边界的'标记'？"],["文化亲密性","Cultural Intimacy","群体认同和身份的理论概念","理论术语","社会与群体理论","群体与认同","迈克尔·赫兹菲尔德（Michael Herzfeld）提出的文化人类学核心概念，指一个群体的成员之间共享的、那些被他们对外部世界刻意隐藏或对外人轻描淡写的、实际上是其文化身份和团结感核心来源的日常习惯、民俗行为和社会实践——即那些内部人彼此心照不宣而对外部世界感到不好意思的'家丑'和'非官方'的文化实践。文化亲密性的经典例子：一个村落的居民可能在正式场合对外宣称他们是'不信鬼神的现代人'，但回到村里后家家都在悄悄地遵守一套复杂的丧葬禁忌和祭祀体系——这一'表面上否认暗地里遵守'的民俗实践不是虚伪，而是外部压力（如现代性和国家话语对迷信的批判）与内部文化需要之间的协商，正是这种协商构成了这个群体的文化亲密性。"],["社区主导","Community-led","在特定地域范围内具有共同纽带和社会互动关系的社会群体","研究关键词","非遗与遗产","保护理念","非遗保护的核心伦理和管理的原则——在非遗的认定、保护和发展的全部环节当中——主导的力量和最终的决策权必须属于相关的社区的成员自身而不是外来的政府和学者。"],["以社区为中心","Community-centered","在特定地域范围内具有共同纽带和社会互动关系的社会群体","研究关键词","非遗与遗产","保护理念","与社区主导互通的核心的非遗的保护理念——一切的保护措施和政策的制定和实施都必须将对相关社区的意愿利益的尊重和参与作为一切行动的根本的中心和出发点。"],["名录制度","Listing System","通过设立保护名录对非物质文化遗产进行确认和保护的管理制度","研究关键词","非遗与遗产","保护理念","联合国教科文组织2003年非遗公约所建立的——各国须建立各自的非遗的清单（名录）并从中选拔申报列入联合国的两个名录和一个名册的——国际非遗保护的基础性的法定的工具和制度的框架。"],["代表作名录","Representative List","联合国教科文组织人类非物质文化遗产代表作名录","研究关键词","非遗与遗产","保护理念","联合国教科文的《人类非物质文化遗产代表作名录》——旨在提升全球对于非遗的重要性的认知并彰显世界文化的多样性和人类的创造力的展示性的名录。截止2023年中国有35个非遗项目列入此名录。"],["急需保护名录","Urgent Safeguarding List","非物质文化遗产项目及传承人的正式名录登记制度","研究关键词","非遗与遗产","保护理念","与强调展示和荣耀的代表作名录的宗旨相对——专门为那些传承链条极其脆弱的面临即刻消亡的风险的超级濒危的非遗项目设立的国际紧急的抢救和援助的机制的联合国教科文组织的名录。截止2023年中国有7个项目列入此名录。"],["优秀实践名册","Register of Good Practices","联合国教科文组织评选的非物质文化遗产优秀保护实践案例汇编，全称优秀保护实践名册","研究关键词","非遗与遗产","保护理念","联合国教科文组织非遗保护框架下的第三个名册——收录各国在非遗的保护和传承的实践当中被国际评审认可为卓有成效和值得被全球推广的最优的保护的范例的和最好的经验的集锦。"],["潍坊风筝","潍坊风筝 (Recreational Folklore / Folk Fine Arts)","潍坊风筝，游艺民俗中的民间美术类民俗事象","民俗事象","游艺民俗","民间美术",null],["南通板鹞","南通板鹞 (Recreational Folklore / Folk Fine Arts)","南通板鹞，游艺民俗中的民间美术类民俗事象","民俗事象","游艺民俗","民间美术",nul 生产和维持的。"],["结构化","Structuration","吉登斯提出的核心概念，指社会结构既是行动的中介又是行动的结果，结构与能动在实践中的二重性","理论术语","社会与群体理论","社会理论与民俗","安东尼·吉登斯（Anthony Giddens）在《社会的构成》（1984）中系统阐述的社会理论核心概念，指社会结构不是外在于人类行为的静态框架，而是由人类的社会实践在时间和空间中不断地生产和再生产出来的动态过程——结构二重性（duality of structure）是结构化理论的核心命题。结构化理论对民俗学最重要的贡献是为民俗的'传承与变异'提供了严密的理论语言：民俗既作为结构/传统在每一个民俗实践的时刻被传承（复制），也在同一个时刻被实践者的能动性所微妙地修改（变异），传承与变异不是时间上分开的两个阶段而是同一实践过程中同时发生的结构化。"],["现代性","Modernity","与传统社会相对的现代工业社会的制度文化","理论术语","社会与群体理论","社会理论与民俗","与传统社会相对的以工业化和资本积累为核心的现代社会的制度文化形态，其核心特征包括：工业化、城镇化、理性化、科层制度、民族国家体系和全球化趋势。吉登斯将现代性的动力机制归结为三大要素：时空分离（时间和空间从地方情境中被抽象出来）、脱嵌机制（社会关系从地方语境中抽离并在更广大时空中重组）、和知识的反思性运用（社会对自身知识进行制度化反思并据此不断调整社会制度）。在民俗学中，现代性对传统民俗提出了根本性的存在性挑战——传统民俗赖以生存的'地方性'（固定的时间节奏、共在的社区、面对面的人际传播）在现代性的条件下被系统地解构。"],["后现代性","Postmodernity","与传统社会相对的现代工业社会的制度文化","理论术语","社会与群体理论","社会理论与民俗","对现代性的核心假定——如理性进步、历史线性发展、元叙事和终极真理——进行全面反思和批判的文化和学术运动。后现代性的核心主张：宏大叙事（如'人类历史必然进步'）已然瓦解；真理是多元的、地方性的和建构的；身份是流动的和表演性的；高级文化与低级文化的区分已然消解。在民俗学中，后现代性为民俗传统提供了新的合法性论证——后现代对主流叙事的怀疑和对'边缘''地方''少数'的重视，使民俗从被边缘化的'低级文化'获得了被重新评价甚至反转为文化前沿的空间。"],["晚期现代性","Late Modernity","与传统社会相对的现代工业社会的制度文化","理论术语","社会与群体理论","社会理论与民俗","安东尼·吉登斯对当代西方社会阶段的命名，与后现代性（postmodernity）概念不同，吉登斯认为西方社会并未超越现代性的根本制度逻辑而进入一个全新的后现代阶段，而是处于现代性自身的激进化发展阶段——即现代性的四个制度维度（资本主义、工业主义、监控和军事力量）达到了前所未有的全球性广度和深度。在民俗学中，晚期现代性分析的核心问题是：当全球化达到前所未有的深度（连最偏远的村落都有快手和抖音），传统的民俗是否在'被晚期现代性杀死'，还是被赋予了新的生存形态——如'数字时代的民俗'？"],["全球在地化","Glocalization","全球化与地方化相互渗透和交织的双向过程","理论术语","社会与群体理论","社会理论与民俗","罗兰·罗伯逊（Roland Robertson）提出的关于全球化与地方化关系的理论概念（结合global和local而成），拒绝将全球化简单视为'全球同质化消灭地方差异'的单向过程，主张全球化和地方化是全球化这一个硬币的两面——全球化的力量在每一个具体地方都被本土化地改编和应用（如麦当劳在全世界都卖汉堡但在不同国家有截然不同的菜单和营销策略），同时地方性的实践和文化在全球传播时也经历本土化适应。在民俗学中，全球在地化为当代民俗的跨国传播提供了分析框架——如中国春节在全球各国的'在地化'改造。"],["脱嵌","Disembedding","吉登斯概念，指现代社会关系从地方性互动情境中抽离出来，在无限时空中重组","理论术语","社会与群体理论","社会理论与民俗","安东尼·吉登斯现代性理论的核心概念，指现代社会的关系和制度从其原有的地方性互动情境和时空限制中被系统地'抬升'和'抽离'出来，通过抽象系统（如货币、法律、专家知识系统）在无限广阔的时空范围内被重新组织和运作。前现代社会的社会关系是嵌在（embedded）特定的地方情境中的——你只认识和信任你见过面的人；现代社会的社会关系被脱嵌——你信任并依赖你不认识的、在千里之外的、通过抽象系统（如银行系统、食品安全标准）保证的陌生人。在民俗学中，脱嵌概念解释了传统民俗在当代面临的最深层的危机——民俗赖以生存的'嵌入性'（民俗是特定地方特定群体的面对面文化实践）在现代性的脱嵌力量面前被系统性地瓦解。"],["再嵌入","Re-embedding","吉登斯概念，指脱嵌后的社会关系在新的时空情境中的重新锚定与整合","理论术语","社会与群体理论","社会理论与民俗","吉登斯现代性理论中与'脱嵌'构成辩证对子关系的概念，指已经通过脱嵌机制从地方语境中被抬升和抽离出来的社会关系和制度，在新的、不同于原有地方语境的时空情境中被重新锚定、重新本土化和重新与具体的社会关系网络接合的过程。在民俗学中，再嵌入为民俗在当代社会中的'不死'提供了理论解释——乡村的祭祖仪式从实地祖坟'脱嵌'（祖先被存放在殡仪馆的格子中），但通过网络祭祀平台（云祭祀）'再嵌入'了现代城市中产家庭的数字生活世界中。这不是民俗的消亡，而是民俗的再嵌入和转型。"],["信任","Trust","吉登斯现代性理论的核心概念，对个人或系统的可靠性持有的信心，是本体性安全的基础","理论术语","社会与群体理论","社会理论与民俗","吉登斯现代性理论中的核心概念，指对特定的人（如亲属、朋友）或对抽象系统（如银行系统、医疗体系、交通规则）的信赖性持有信心和积极期望的心态，是人类在社会世界中生存和行动所必需的本体性安全的基础。信任的核心悖论是：现代社会中人们越来越依赖他们对其一无所知的抽象系统（如飞机的乘客对航空工程学一无所知却敢坐飞机），这依赖的不是对具体人的信任，而是对抽象系统通过标准化和专业认证所保证的可靠性的'系统信任'。在民俗学中，信任从对人的信任转变为对系统的信任的分析框架，为民俗从'熟人社会'（信任基于人际关系）向'陌生人社会'（信任基于法律和契约）的历史性转变提供了社会学的解释路径。"],["本体性安全","Ontological Security","吉登斯概念，个体对自我认同及社会与物质环境之恒常性所具有的基本信心","理论术语","社会与群体理论","社会理论与民俗","吉登斯现代性理论中的核心心理-社会概念，指个体对自我身份的持续同一性和对社会生活与物质世界的稳定可预测性所持有的、大部分时间处于意识阈限之下的基本安全感和信心，是日常生活正常运作的根本心理条件。本体性安全的对立面是'存在性焦虑'——当日常生活的基本可预测性被灾难事件（如亲人突逝、战争、社会崩溃）突然打破时，个体将陷入深刻的焦虑和意义丧失中。在民俗学中，本体性安全为人生的民俗仪式——尤其是丧礼——提供了深刻的解释：丧礼的核心文化功能是修复死亡造成的生活世界的断裂，通过仪式的有序过程重建个体的本体性安全。"],["自我认同","Self-identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","吉登斯在《现代性与自我认同》（1991）中系统分析的社会心理学概念，指个体对自己持续作为一种特定的人（具有特定的经历、价值、关系和未来规划）的反身性的理解和叙事建构——自我认同在现代条件下不是被动继承的而是主动的、一生持续的'自传体工程'。在民俗学中，自我认同与民俗的关系是当代研究的前沿：个体在传统社会中的自我认同大致由出生的社区、家庭和阶层所决定（天生为本村人、本族人），在当代社会中个体越来越多地通过主动选择和实践特定的文化传统（如选择加入某个汉服社群、选择学某种快失传的民间手艺）来建构自己的自我认同。"],["生活政治","Life Politics","吉登斯概念，关注后传统社会中自我实现、生活方式选择与生命伦理的政治形态","理论术语","社会与群体理论","社会理论与民俗","吉登斯在《现代性与自我认同》（1991）和《超越左与右》（1994）中提出的关于后传统社会（后匮乏社会）的政治形态概念，区别于以阶级划分和财富再分配为核心的'解放政治'。生活政治不关注'谁得到什么资源'（传统分配的议题），而关注'在已经基本摆脱匮乏的条件下人应当如何生活'——选择什么样的生活方式、如何处理与身体、自然、性别关系和后嗣的关系等。在民俗学中，生活政治为民俗学的社会维度分析提供了理论语言——人们选择回归和实践某种传统文化（如学习古琴、穿汉服、过传统节日），这不是被传统的强制性所逼迫，而是出于一种自我实现的生活方式选择——文化自信可以被理解为生活政治的一个维度。"],["解放政治","Emancipatory Politics","吉登斯概念，以消除剥削、不平等和压迫为目标的传统政治形态，区别于生活政治","理论术语","社会与群体理论","社会理论与民俗","吉登斯对以消除压迫、剥削和不平等为核心的现代政治的命名，与关注生活方式选择和自我实现的'生活政治'构成对比。解放政治的经典形态是工人运动、女权运动、反殖民运动和民权运动——共同目标是将人从不公正的社会结构中解放出来获得自由和平等。在民俗学中，解放政治的角度为民俗研究揭示了一个被忽视的维度：底层民众通过民俗活动（如民间戏曲中的讽刺台词、革命民歌中的反抗叙事、少数民族节庆中的身份宣示）进行的文化政治行动，不是单纯的'娱乐'和'传统'，而是一种用他们仅有的文化工具进行的象征性的解放政治行动。"],["亲密关系变革","Transformation of Intimacy","吉登斯概念，现代社会亲密关系从传统制度约束中解放，转向纯粹关系和汇流爱的民主化过程","理论术语","社会与群体理论","社会理论与民俗","吉登斯在《亲密关系的变革》（1992）中分析的核心现代社会命题，指在两性平等、避孕技术的普及和传统道德约束力的松动等条件下，亲密关系——包括婚姻、恋爱、亲子关系——从传统的制度性安排（婚姻由父母之命媒妁之言决定）中'解放'出来，转化为个体之间自由选择和持续协商的'纯粹关系'（pure relationship）。在民俗学中，亲密关系变革为民俗核心领域——婚恋民俗——的研究提供了翻天覆地的分析框架：从'父母之命媒妁之言'到自由恋爱相亲APP，婚恋民俗不是从'有民俗'变成'无民俗'，而是从一种民俗形态（制度性婚恋民俗）彻底转型为另一种民俗形态（自由选择的婚恋民俗——如网恋奔现、相亲角、婚恋真人秀）。"],["纯粹关系","Pure Relationship","吉登斯概念，不依赖外部社会经济条件、仅凭关系本身维系的情感纽带","理论术语","社会与群体理论","社会理论与民俗","吉登斯亲密关系理论的核心概念，指一种不依赖于任何外部的社会经济条件（如家庭压力、经济依附、社会舆论）的约束，而仅凭关系参与双方在关系中得到的持续的情感满足和相互认可来维系的人际关系。纯粹关系的特征是：当关系无法再产生足够的情感满足给任何一方时，这一方即可退出关系——关系不是被外部义务所绑定的。在民俗学中，纯粹关系概念对传统婚恋民俗提出了根本性的分析挑战——传统婚姻靠的是外部结构（宗族、经济、舆论）而不只是两人的感情，当代的婚恋民俗已经不可逆转地从'结构支撑的婚姻'转向'纯粹关系维系的情感伴侣关系'，这导致了婚恋民俗的深刻转型。"],["汇流爱","Confluent Love","吉登斯概念，现代社会中以平等的情感给予与接受为基础的爱的关系形态","理论术语","社会与群体理论","社会理论与民俗","吉登斯亲密关系理论的核心概念，相对于传统婚姻中不均衡的性别关系的'浪漫爱'的理想形态，指建立在性别平等、情感给予和接受的相互性和开放性沟通的基础之上的现代伴侣的爱的关系形态。汇流爱（confluent love，如两条河流汇合）的核心是'给予和接受的平衡'——不只是一方付出另一方享受，而是双方的动态的、持续的相互的情感投入。在民俗学中，汇流爱替代了传统民俗中的'嫁鸡随鸡嫁狗随狗'的水远不均衡的婚姻模式，导致了整个婚恋——从父母之命到自由恋爱、从出嫁从夫到平等伴侣、从'婚姻不可离'到'不合适就离'的全面民俗转型。"],["风险社会","Risk Society","贝克提出的概念，现代社会的核心问题从财富分配转向风险分配，风险具有全球性和人为性","理论术语","社会与群体理论","社会理论与民俗","乌尔里希·贝克（Ulrich Beck）在1986年同名著作中提出的关于现代社会转型的核心理论概念。贝克的核心命题：传统（工业）社会的核心社会冲突围绕着'财富的分配'（谁得到多少蛋糕），而当代（风险）社会的核心社会冲突围绕着'风险的分配'（谁来承担环境污染、核泄露、金融危机等全球化风险）——风险具有'飞去来器效应'，最终不会放过任何人（包括制造风险的富人最终也无法幸免于全球气候变暖）。在民俗学中，风险社会为民俗的当代功能提供了新的分析框架——传统民俗（如祭祀风调雨顺、禁忌约束资源开发）中蕴含的'风险管理'的文化逻辑，在当代生态危机面前获得了被重新评估和重视的当代价值。"],["第二现代性","Second Modernity","与传统社会相对的现代工业社会的制度文化","理论术语","社会与群体理论","社会理论与民俗","乌尔里希·贝克对当代社会阶段的命名，与'后现代性'和吉登斯的'晚期现代性'构成竞争性概念。贝克认为第一次现代性（工业现代性）的核心特征是民族国家、核心家庭和终身全职工作等制度的稳定性，而第二次现代性（反思性现代性）的特征是这些制度的溶解和个体的被迫'自我负责'。在民俗学中，第二现代性标志着民俗生存环境的根本性改变——第一次现代性时期民俗还能以'乡村文化遗产'的形式被国家保护；第二次现代性的全球化、数字化和个体化条件下，民俗已不能在传统的稳定性框架中存在而必须被个体化地选择和重塑。"],["自反性现代化","Reflexive Modernization","社会行动者对社会条件与自身实践进行反思和调整的能力","理论术语","社会与群体理论","社会理论与民俗","乌尔里希·贝克和安东尼·吉登斯等人共同建构的分析现代社会动态的核心概念，指现代社会的基本特征之一是反身性——社会的运作不断地产生关于社会自身的新知识和信息，这些知识和信息又现代被社会行动者吸收，从而改变了社会的运作方式（知识反身性地改变着被知识所描述的对象）。通俗地说：经济学家预测经济会衰退，这个预测本身导致人们的消费和投资行为改变，结果真的造成了经济衰退。在民俗学中，自反性现代化分析民俗面临的一个核心悖论：民俗学家研究某个村落的民俗并出版了一本书，村民们读了这本书以后，他们对自己民俗的研究和认知发生了改变（原来我们的习俗是这样的），并据此开始有意识地'表演'和'经营'自己的民俗——这一刻民俗就已经不再是'无意识的传统'而转变成了'有意识的文化资源'。"],["制度个体化","Institutional Individualization","现代社会个体从传统集体结构和束缚中脱嵌的社会过程","理论术语","社会与群体理论","社会理论与民俗","乌尔里希·贝克个体化理论的核心概念，指现代社会特有的悖论——个体从传统的社会约束（家庭、阶级、性别角色）中解放出来，但同时被纳入现代制度（教育体系、劳动市场、社会福利系统）的标准化调节中，形成一种'制度驱动的个体化'——你不是从所有约束中解放，而是从传统约束中被转移进现代制度的标准化模具中。在民俗学中，制度个体化为民俗传承的转型提供了精密的解释：现代人不是不参与民俗，而是被从家族宗族的时间节奏中'个体化'出来，被重新嵌入学校和职场的标准化时间节奏中——所以不是人不爱过年了，而是过年的传统社区节奏与现代制度的时间节奏脱节了。"],["亲属制度","Kinship System","人类学核心概念，以血缘和婚姻为基础的社会关系分类体系，包括继嗣、联姻等基本结构","理论术语","社会与群体理论","社会理论与民俗","社会人类学的核心分析框架，指以血缘（consanguinity）和婚姻（affinity）为两条主轴组织起来的人类社会关系最基本的分类和制度体系，是传统社会组织的骨架结构。亲属制度的核心分析维度：继嗣规则（如何追溯血统——父系/母系/双系）、居住规则（婚后居住在夫家/妻家/或独立居住）、称谓系统（对不同亲属使用什么称谓）、婚姻交换规则（谁可以与谁结婚/谁不可与谁结婚）。在民俗学中，亲属制度是所有家族/宗族民俗（祭祖、婚嫁、分家、丧葬）的基础结构——不理解一个社会的亲属制度就无法理解该社会的民俗运作逻辑。"],["继嗣","Descent","人类学概念，依据血缘关系追溯代际传承的社会制度，包括父系、母系和双系继嗣","理论术语","社会与群体理论","社会理论与民俗","社会人类学中亲属制度分析的核心概念之一，指依据社会公认的血缘关系追溯规则——父系继嗣、母系继嗣或双系继嗣——来确定个体在社会中的亲属归属、财产继承权和权利义务的制度。在民俗学中，继嗣制度是理解大量宗族民俗的根本性结构框架——父系继嗣社会中清明节祭祖由男性子孙执祭（因为祖先的血脉沿父系传递），母系继嗣社会中（如摩梭人）则由母系的女性成员主持家祭——之所以有不同的祭法，是因为有不同的血统追溯法。"],["联姻","Alliance (Marriage)","人类学概念，通过婚姻建立的不同亲属群体间的社会联盟关系","理论术语","社会与群体理论","社会理论与民俗","结构主义人类学的核心分析概念，克洛德·列维-斯特劳斯在《亲属制度的基本结构》（1949）中提出，指婚姻不只是两个人之间的私人结合，更是通过交换女人（或男人）在两个亲属群体之间建立的持久的社会联盟关系——婚姻是一个政治事件而不仅是感情事件。在民俗学中，联姻概念为民间的婚嫁民俗提供了根本性的分析框架——娉礼和嫁妆不只是财产转移，更是两个家族/亲属群体之间建立和巩固联盟关系的仪式化交换，因此婚俗的每一个细节都承载着深刻的社会结构和政治意涵。"],["交换","Exchange","人类学核心概念，社会关系通过物品、服务与人员的流动而建立和维持，莫斯的礼物理论为其经典","理论术语","社会与群体理论","社会理论与民俗","社会人类学的核心分析概念，马塞尔·莫斯在《礼物》（1925）中作出了最经典的理论阐述——社会关系的建立和维系，根本上不是通过市场交换（以货币为中介的匿名交换）或法律契约（以国家强制力为保障的明文协定），而是通过给予、接受和回报礼物这样一个社会性的、道德的、义务性的三重循环过程。在民俗学中，交换概念为民俗活动中无数的'礼物/交换/回馈'现象——节日的馈赠、婚丧的随礼、人情往来——提供了深刻的理论解释：这些不是'浪费'和'铺张'，而是作为社会结构的看不见的骨架的礼物交换体系的运作。"],["礼物","The Gift","莫斯的核心概念，礼物交换包含给予、接受和回报三重义务，是社会团结的基石","理论术语","社会与群体理论","社会理论与民俗","马塞尔·莫斯（Marcel Mauss）在1925年发表的经典论文《礼物》中系统论述的人类学校心概念。莫斯通过对全球各类社会的礼物交换实践的比较分析揭示出——'原始社会'和古代社会的礼物交换与现代社会中的商品交换截然不同：礼物不是无条件的自愿馈赠，而是承载着三重强制义务的社会行为——给予的义务、接受的义务和回报的义务。拒绝给予、拒绝接受或拒绝回报都是社会性的严重冒犯，暗示着关系的断绝。礼物的力量（hau）在于它带有给予者的精神和人格——回礼不是等价物的偿付，而是关系的确认和再生。在民俗学中，礼物理论是理解中国人情社会（随礼、孝敬、红包、请客吃饭）的最核心理论工具。"],["互惠","Reciprocity","人类学概念，交换双方相互给予与回报的对等性原则，是传统社会整合的核心机制","理论术语","社会与群体理论","社会理论与民俗","社会人类学中分析交换和社会整合的核心概念，指交换双方在给予和回报之间应保持的对等性原则——我给你一些东西，你在将来（可以不同形式）还给我大致相当的东西。萨林斯（Marshall Sahlins）区分了互惠的三种类型：普遍性互惠（generalized reciprocity，不求等值也不计时间的分享，如核心家庭内的共享）、平衡互惠（balanced reciprocity，在约定时间内大致等值的回馈，如邻里互助）和负性互惠（negative reciprocity，试图以最小付出换取最大回报，如陌生人的交易）。在民俗学中，互惠为民俗中大量给予回报行为——如谁家办事你去了你家办事他也要来的乡村人情循环——提供了基础的理论解释框架。"],["库拉","Kula","马林诺夫斯基记述的特罗布里恩群岛跨岛礼物交换体系，以贝壳项圈和臂镯的仪式性流转维持社会网络","理论术语","社会与群体理论","社会理论与民俗","布罗尼斯瓦夫·马林诺夫斯基（Bronislaw Malinowski）在《西太平洋的航海者》（1922）中经典记述的特罗布里恩群岛岛屿间的仪式性礼品交换体系。库拉的核心机制是：两种礼仪性礼品——红贝壳项圈（soulava，沿逆时针方向）和白贝壳臂镯（mwali，沿顺时针方向）——在广阔的跨岛航线中不断地被交换循环。库拉的根本目的不是物品的实用价值（这些贝壳没有实用用途），而是通过礼仪性交换的网络建立和维护跨岛的广泛社会关系、声望体系和政经联盟。在民俗学中，库拉为中国的庙会互市、乡村仪式中的集体礼物交换等现象提供了精彩的跨文化比较参照。"],["夸富宴","Potlatch","博厄斯记述的西北海岸印第安人的仪式性财富分配与炫耀性消费制度","理论术语","社会与群体理论","社会理论与民俗","弗朗茨·博厄斯（Franz Boas）最早记述、马塞尔·莫斯在《礼物》中系统分析的北美西北海岸印第安人（特别是夸扣特尔人/Kwakiutl）的独特社会制度——在特定的仪式场合（如酋长继位、婚礼、丧礼），主人通过大量分发或公然毁坏巨量财富（毛毯、铜板、独木舟、食物）来展示自己的地位、挑战对手和建立社会声望的竞争性赠予仪式。夸富宴的核心悖论是：不是积累财富越多地位越高，而是'浪费'（分发和毁坏）财富越多地位越高。在民俗学中，夸富宴为理解中国乡村婚丧中'越铺张越有面子'的挥霍式消费的社会逻辑提供了不可替代的理论启示——这不是经济性的浪费，而是社会性的投资（面子和声望的积累）。"],["塔布","Taboo","波利尼西亚社会中对神圣事物的禁止与规避制度，后成为人类学分析禁忌现象的通用术语","理论术语","社会与群体理论","社会理论与民俗","源自波利尼西亚社会（特别是汤加和夏威夷），由英国航海家库克船长在18世纪引入欧洲词汇的人种学概念（tabu/tapu），后成为人类学分析禁忌现象的通用术语。塔布的核心结构：某些人、物、行为和空间因被赋予神圣性或危险性而被严厉禁止常人接触、食用或进入——违反塔布将受到超自然的（神灵的惩罚）或社会性的（社区放逐）制裁。弗雷泽和马林诺夫斯基等早期人类学家试图从功能论解释塔布（维护社会秩序和资源保护），玛丽·道格拉斯（Mary Douglas）在《洁净与危险》（1966）中则从象征分类的角度重新解释塔布——不洁的不是肮脏的东西，而是'跨类'的（不能在分类体系中找到适当位置）模棱两可的东西（如猪在犹太-伊斯兰分类体系中是'分趾却不反刍'的跨类动物，因此被塔布化为'不洁的'）。在民俗学中，禁忌为民间的饮食禁忌、节庆禁忌、丧葬禁忌等一系列规范体系提供了基础的分析概念。"],["玛纳","Mana","美拉尼西亚和波利尼西亚社会中一种非人格化的超自然力量，附着于人物和事物之上","理论术语","社会与群体理论","社会理论与民俗","美拉尼西亚和波利尼西亚社会中一个关键而玄妙的宗教-社会概念，由传教士和人类学家科德林顿（R.H.Codrington）在19世纪末最早系统记述。马纳是一种非人格化的、弥漫性的超自然力量和效力，不是某个特定神灵的意志，而是像电/磁场一样弥漫在宇宙中的不可见的力量——特定的人（如酋长、战士、巫师）、特定的物（如圣石、法杖）和特定的仪式（如巫术程序、祭祀）因其拥有较高浓度的马纳而具有超凡的效力。马纳是'因成功而神圣'（而非'因神圣而成功'）的——一个战士连战连胜不是因为幸运，而是因为他'有马纳'。在民俗学中，马纳概念对于理解民间信仰和巫术中'灵力''法力''气场'等弥漫性、非人格化力量的本土概念提供了极有价值的跨文化理论参照。"],["宗教","Religion","人类学核心概念，涂尔干定义为与神圣事物相关的信仰与仪式体系，具有社会整合功能","理论术语","社会与群体理论","社会理论与民俗","社会人类学和民俗学共享的核心研究领域。涂尔干在《宗教生活的基本形式》（1912）中给出了最具影响力的社会学定义：宗教不是关于神的存在的问题，而是与神圣事物相关的信仰体系与仪式实践的合一，其根本功能是将社会/道德共同体凝聚为一个'教会'——一个共享同一套信仰和实践的道德共同体。在民俗学中，涂尔干的宗教定义直接打通了'宗教'与'民俗中的民间信仰'之间的壁垒——中国的民间祖先崇拜、庙会祭祀完全符合'神圣事物+仪式实践+道德共同体'的宗教结构，唯一的区别是没有独立的教会组织和经典文本（即'制度性宗教' vs '弥散性宗教'的区别，杨庆堃的著名区分）。"],["通过礼仪","Rites of Passage","范热内普提出的核心概念，个体在生命周期中转换社会身份的仪式，包括分离、阈限和聚合三阶段","理论术语","社会与群体理论","社会理论与民俗","阿诺德·范热内普（Arnold van Gennep）在1909年同名著作中提出的仪式分析奠基性理论概念，指伴随人生各阶段的关键身份转换——出生、成年、结婚、就职、死亡——的仪式体系共同遵循的普遍三阶段结构：分离（从原有身份中割离）、阈限/过渡（处于身份模糊的过渡状态）、聚合（以新身份被重新接纳进社会）。在民俗学中，通过礼仪是人类学的仪式分析对中国民俗研究影响最深的概念框架——中国民俗中丰富的人生礼仪（满月/百日/周岁/冠笄/婚礼/丧礼）均可被纳入通过礼仪的分析框架中进行系统的比较和分析。"],["生命礼仪","Life-cycle Rituals","伴随个体出生、成年、结婚、死亡等生命周期关键节点举行的仪式","理论术语","社会与群体理论","社会理论与民俗","伴随个体生命周期的关键转折节点——出生（满月/百日/周岁）、成年（冠礼/笄礼/出花园/度戒）、婚嫁（婚礼）、死亡和葬礼——而举行的具有身份转化和社会关系重组功能的仪式体系。生命礼仪在社会学上的核心功能：它不是庆祝个体的私人事件，而是社会对个体身份转变的正式宣告、见证和合法性赋予——'全村人都参加了你的婚礼'意味着'全村人都承认你们现在是夫妻了'。在当代城镇化进程中，传统生命礼仪面临的形式简化（如一桌饭替代整套仪式程序）和社会功能的弱化（如仪式从社区事件缩水为纯家庭聚会）是民俗学关注的核心问题。"],["强化礼仪","Rites of Intensification","在群体面临危机或周期性节点时举行的增强社会凝聚力的集体仪式","理论术语","社会与群体理论","社会理论与民俗","人类学仪式类型学（以埃利奥特·查普尔/Eliot Chapple和卡尔顿·库恩/Carleton Coon的分类为代表）中的一种仪式类型，与'通过礼仪'（针对个体的身份转换）相对，强化礼仪在群体面临危机（如旱灾、瘟疫、战争）或处在关键的周期性节点（如播种前、丰收后、一年之始之末）时举行，其核心功能是通过集体的仪式活动增强群体的凝聚力、士气和对自己有能力抵御危机的信心。典型的强化礼仪包括：天旱求雨的集体祭祀（强化面对自然灾害的集体团结）、战争前的誓师仪式（强化军队士气）和除夕的集体守岁（强化家庭/家族的凝聚和辞旧迎新的心理整合）。"],["禳解礼仪","Rites of Affliction","以消除灾害、疾病或不幸为目的的仪式行为","理论术语","社会与群体理论","社会理论与民俗","以消除和化解灾害、疾病、倒霉和不幸事件为直接目的的仪式行为的总称，是民间信仰实践中最常见的仪式类型之一。在中国民俗中，禳解礼仪的种类极为丰富多样：驱邪禳解——通过逢凶化吉的仪式操作（如跳神、贴符、洒符水）将恶灵和晦气赶走；化解禳解——通过仪式性操作（如'破太岁''安土'）化解预知的灾祸；替身禳解——用替身（如纸人）替代病人承受疾病。禳解礼仪的人类学逻辑是：不幸不是偶然的物理事件，而是社会关系和超自然力量失衡的结果，必须通过仪式来重新恢复平衡。"],["年度礼仪","Calendrical Rites","按照年度周期定期举行的仪式，如岁时节日和农事仪式","理论术语","社会与群体理论","社会理论与民俗","按照自然年度和社会年度（农历、宗教历、节气）的固定周期定期循环举行的仪式体系，其典型形态是岁时节日和相关的农事仪式。年度礼仪的核心特征是：时间性——每年的固定时间循环重复（如每年的中秋节固定在中秋那天）；集体性——以群体（家族、全村、全国）为单位而非个体为单位举行；功能的复合性——同时承载着农业节律的调控（农事仪式）、社会关系的维护（彼此登门拜贺）、宇宙秩序的更新（辞旧迎新——年是一个小终结和重新开始）。中国丰富密集的年中礼仪体系（春节→元宵→清明→端午→七夕→中元→中秋→重阳→冬至→除夕）是世界上最密集的年度礼仪体系之一。"],["危机礼仪","Crisis Rituals","在突发危机（如旱灾、瘟疫）时举行的应急性仪式活动","理论术语","社会与群体理论","社会理论与民俗","在非预期的突发性危机事件（如突发的旱灾、洪灾、瘟疫、地震、战争）发生后紧急举行的特殊应急性仪式活动，区别于周期性循环的年度礼仪。危机礼仪的心理-社会功能：在人们感到对事态完全失控和极度无力的危急时刻，通过仪式操作给人们一种'我们在采取行动''我们做了能做的一切'的心理安慰和控制感——即使仪式本身不直接改变危机的物理过程（下雨与否不由祭祀决定），但它给了面临危机的人们必不可少的心理支撑和集体团结。"],["神圣","Sacred","涂尔干宗教社会学的核心概念，与世俗相对，是被禁忌隔离并受崇拜的超凡事物领域","理论术语","社会与群体理论","社会理论与民俗","涂尔干宗教社会学的核心二元概念的一极（另一极为'世俗/profane'），指在社会中被建立起来的通过禁忌被隔离和保护的、被敬畏和崇拜的、绝对超越于日常凡俗领域的事物和领域。涂尔干的革命性论点是神圣性不是事物自身的固有性质（'石头本身不神圣'），而是社会将神圣性赋予（投射到）特定事物上——一面国旗因被社会赋予神圣性而变得不可亵渎。在民俗学中，神圣概念为民问信仰的逻辑提供了根基性的理论框架——为什么一棵老树不能砍（不是因为它有药用价值，而是因为被赋予了神圣性），为什么祭祖时不能大声喧哗（因为祭品和仪式因为禁忌而与世俗日常行为被严格地隔离开）。"],["世俗","Profane","涂尔干概念，与神圣相对的日常生活领域，二者构成了社会分类的基本框架","理论术语","社会与群体理论","社会理论与民俗","涂尔干宗教社会学二元概念中与'神圣'相对的一极，指日常生活中普通的、凡俗的、非宗教的、未经禁忌隔离和保护的事物和生活领域——世俗的一切可以自由地讨论、接触、消费和使用，不会引起超自然的惩罚或道德的谴责。世俗与神圣的二分是所有人类社会共有的最基本的分类操作——将世界的万物分为'可以随便碰的'（世俗）和'不能乱碰的，必须通过仪式程序才能接触的'（神圣）两大类。在民俗学中，世俗-神圣二分框架为理解民俗活动的运作逻辑提供了根基性的分析工具——一个结婚戒指与一个普通戒指的唯一区别就是前者被婚姻仪式赋予了社会性的神圣性（不可随意丢弃不可随意由他人佩戴）。"],["共同体","Community","共享特定文化传统情感纽带或社会认同的群体","理论术语","社会与群体理论","社会理论与民俗","费迪南·滕尼斯（Ferdinand Tönnies）在《共同体与社会》（1887）中提出的社会学核心概念（德语Gemeinschaft），指以情感纽带（血缘、地缘、友谊）、共享传统和面对面的直接互动为基础的有机的、紧密的社会结合形态，与以理性计算、契约关系和匿名性的间接互动为基础的'社会'（Gesellschaft）构成对比。在民俗学中，共同体是民俗存在的根本社会条件——民俗不是个体行为的随机集合，而是一个共同体的共享的文化实践。传统村落是民俗共同体的典范——全村的居民共享同一套节日、祭祀、禁忌、方言体系，形成了滕尼斯所说的'命运共同体'的感觉。"],["communitas","Communitas","维克多·特纳提出的核心概念，指仪式阈限阶段中社会结构暂时消解、参与者平等交融的反结构状态","理论术语","社会与群体理论","社会理论与民俗","维克多·特纳（Victor Turner）仪式理论的核心概念（拉丁语），指在仪式阈限阶段出现的特殊的反结构状态——日常社会的等级、身份、角色和差异被暂时悬置，所有参与者处于一种平等、高度情感共鸣、无差别的、强烈的'我们是一体'的共同体体验中。特纳将communitas翻译为'交融'/共睦态以区别于日常的机制化的共同体（community）。特纳的分析最经典的案例是朝圣——不同阶级、不同种姓、不同职业的朝圣者在朝圣路上临时地形成平等的'liminal communitas'。在民俗学中，communitas为民俗活动中周期性的'集体狂欢'（如春节、庙会、泼水节中临时性的平等和融和）提供了不可替代的理论解释。"],["常人方法论","Ethnomethodology","加芬克尔创立的社会学研究方法，研究普通人如何在日常生活中运用方法和规则建构社会秩序","研究方法","分析范式","实证与假说","哈罗德·加芬克尔（Harold Garfinkel）在1960年代创立的微观社会学研究方法和理论。其核心是研究普通人如何在日常生活的面对面的互动中运用一套被视作理所当然的未明言的常识性方法和实践来持续地建构和维系社会现实和秩序。常人民族方法学为民俗学日常互动和实践提供了微观的分析方法论资源。"],["会话分析","Conversation Analysis","萨克斯等创立的质性研究方法，通过对日常会话的精细转录和分析揭示社会互动规则","研究方法","分析范式","实证与假说","哈维·萨克斯（Harvey Sacks）等人在1970年代创立的常人民族方法学的经验研究技术——通过对录制的日常口头交谈和互动的精细到每个语气词停顿和重复的文字转写和微观的序列分析来发现和揭示互动参与者在每个微观的时刻运作的未明言的次序和规则的系统的互动组织方法。"],["成员分类分析","Membership Categorization Analysis","常人方法论的分支，研究社会成员如何在日常互动中对他者进行类别化","研究方法","分析范式","实证与假说","常人民族方法学的下属分析领域，分析人们如何在日常交谈和互动的每一个当下时刻通过显性或隐性地将人分类（如男老人/外地人等）来借力于社会共享的关于这些类别的常识和刻板认知来理解周围的人和事件并进行互动的方法和分析。"],["工作研究","Workplace Studies","常人方法论的工作分支，通过对工作场所实践的详细观察研究职业活动的组织方式","研究方法","分析范式","实证与假说","常人民族方法学在劳动社会学和技术社会学领域的应用和延伸——通过对特定职业的工作现场（如空中管制中心的手术室的地铁调度站的）的微观的日常工作和互动流程的精细录像分析来揭示这些专业人员的复杂的实践知识。"],["民族方法学","Ethnomethodology","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","分析范式","实证与假说","常人民族方法学的另一不常见的中文译名。同常人方法论。核心假设是社会秩序不是由外部的宏大结构决定的而是由普通人在微观的日常互动中通过常人的方法每时每刻地创造和维持的。"],["质性研究","Qualitative Research","以理解社会现象的意义和过程为目标、非量化的实证研究方法体系","研究方法","分析范式","实证与假说","与定量研究构成方法论对子的一大研究范式——不追求数量的统计和因果的检验，而以深入地理解社会现象对于亲历者本身的主观的意义和过程为目标——核心包括深度访谈参与观察口述史等田野方法。中国民俗学的田野工作的基本范式即是质性研究。"],["扎根理论","Grounded Theory","格拉斯和斯特劳斯发展的质性研究方法论，强调从经验数据中系统归纳生成理论","研究方法","分析范式","实证与假说","格拉斯（Barney Glaser）和斯特劳斯（Anselm Strauss）在1967年出版的《扎根理论的发现》中提出的质性研究的方法论——不预先带着一个既成的理论套子进入田野，而是直接从田野的系统的第一手数据中通过持续的循环比较（不断地在数据之间和在数据和新生的初始概念之间来回比较）逐步归纳和精炼出根植于数据本身的中层理论。在民俗学中扎根理论是从田野素材到理论的一种严谨的方法论路径。"],["现象学","Phenomenology","胡塞尔开创的以意识活动和意识对象为研究核心的哲学方法","理论术语","社会与群体理论","社会理论与民俗","埃德蒙德·胡塞尔（Edmund Husserl）在20世纪初开创的哲学方法和运动，其核心操作是通过'现象学还原'——将我们对世界存在的自然态度（'理所当然存在'）'悬置'（加括号）起来——回到事物本身（zu den Sachen selbst），即回到事物在意识中被给予（被经验到）的'现象'本身的描述和分析。在民俗学中，现象学为民俗学的日常生活转向和研究者立场提供了哲学基础：不是站在科学的外部去评价民众的民俗实践（'这个习俗是愚昧的封建迷信'），而是回到民众自己的经验态度中去理解这些实践在民众的'生活世界'（Lebenswelt）中的本来面貌和意义。"],["解释学","Hermeneutics","以理解和阐释文本意义为核心的方法论传统","理论术语","社会与群体理论","社会理论与民俗","以理解（Verstehen）和阐释（Interpretation）文本/人类行为/文化实践的意义为核心的哲学方法论传统，起源于对圣经和法律文本的阐释方法论，在施莱尔马赫（Schleiermacher）和狄尔泰（Dilthey）手中被发展为一般性的人文科学方法论，在伽达默尔（Gadamer）的《真理与方法》（1960）中被提升为哲学的'本体论'——理解不是方法论的技术问题，而是人存在于世的基本方式。在民俗学中，解释学的核心贡献是'视域融合'（Horizontverschmelzung）概念——研究者只有在进入民众自身的视域并与其达成'视域融合'之后，才能理解民俗活动的意义，而不是将民俗削足适履地套入研究者的学术视域。"],["叙事研究","Narrative Research","以故事和叙事为分析对象的质性研究方法，对个人叙述和集体叙事进行系统分析","研究方法","分析范式","实证与假说","以个体或群体（口头和书面）讲述的故事和人生的叙事为分析材料的质性研究方法。叙事研究不关注叙事的真假（历史的真实性），而关注叙事者如何选择性地编排和组织那些零散的记忆碎片为具有连贯起承转合和最终寓意的人生故事——以此揭示叙事者的自我认同/社会位置和文化逻辑。"],["个案研究","Case Study","对一个或多个案例进行深入全面考察的研究方法，适用于复杂社会现象的理解","研究方法","分析范式","实证与假说","对一个或少数几个被有目的地选取的特定分析对象——可以是一个村子一位传承人一个庙会——进行深度的、多维度的考察和分析以达至对复杂性和特殊性的深入解剖的研究策略。个案研究不追求广的概括力而是追求对个案的深度和复杂的全面剖解。"],["参与式研究","Participatory Research","研究者与研究对象共同参与知识建构的研究模式，强调合作与赋权","研究方法","分析范式","实证与假说","研究者不再是外部的权威的专家，而是作为推动者和协调者和当地社区的成员一起平等地共同参与从研究问题的设定到数据的搜集分析到行动的规划的全过程的合作模式的研究范式。参与式研究赋予社区研究和行动的决定权——确保研究服务于社区的真实需要。"],["多模态分析","Multimodal Analysis","整合视觉、听觉、文本等多模态数据的综合分析方法","研究方法","分析范式","实证与假说","采集和综合分析来自两种或以上不同感官通道（视觉的照片和影像/听觉的口述录音/书写的文字）的数据——不将田野材料按照媒介类型分开独立分析，而是综合所有模态——在同一个分析框架下对田野现象进行多层次多维度的解读。"],["视觉方法","Visual Methods","以摄影、录像、绘图等视觉媒介为数据采集和分析工具的研究方法，包括影像民族志和视觉叙事分析","研究方法","分析范式","实证与假说","将摄影照片/录像/手绘图和社区成员自己拍摄的影像等一切类型的视觉媒介作为田野工作的核心的数据采集-分析-呈现的工具——而非仅作为文字的辅助插图——的田野研究路径和方法。视觉方法拓展了民俗学向来以文字为书写核心的传统——一段编辑的影片可以独立构成一篇视觉形式的民俗学的论文。"],["传统音乐","Traditional Music","非物质文化遗产的重要类别，包括民歌器乐宗教音乐等传统音乐形式","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖民歌（花儿、信天游等）、民族器乐（古琴、马头琴等）和宗教和仪式音乐的——以非专业化的民间自发的音乐的传统为对象的非遗的门类。"],["传统舞蹈","Traditional Dance","非物质文化遗产的重要类别，包括各民族世代传承的民间舞蹈形式","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖各民族的从龙舞狮舞到秧歌和各类少数民族的舞蹈的——以非专业化的在节庆和仪式中群众跳的传统的集体的舞蹈为对象的非遗的门类。"],["传统戏剧","Traditional Theater","非物质文化遗产的重要类别，包括京剧昆曲及各地方戏曲剧种","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖京剧、昆曲、秦腔和大大小小数百种的汉和各少数民族的地方的戏曲的传统表演的——中国非遗名录中最丰富也最具代表性的戏曲的门类。"],["曲艺","Quyi / Folk Performing Arts","非物质文化遗产的重要类别，包括相声评书快板等民间说唱艺术形式","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——以口头的说和唱为主要的表演形式——如苏州的评弹和北方的相声和快板——的非物质文化遗产的门类。"],["传统体育","Traditional Sports","非遗中的传统体育竞技","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖武术、太极拳、和各种民族的传统体育的——中国非遗名录中极具身体性和竞技观赏性的体育的非遗的门类。"],["游艺与杂技","Games and Acrobatics","非物质文化遗产的重要类别，包括传统游戏竞技和杂技表演","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖传统的魔术（古彩戏法）、杂技（吴桥杂技）和各类民间的游戏的——非遗名录中极具观赏和娱乐性的游艺的类别的集合。"],["传统美术","Traditional Fine Arts","非物质文化遗产的重要类别，包括年画剪纸雕塑刺绣等民间造型艺术","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——以年画、剪纸、刺绣、泥塑和各类民族的民间的视觉的平面和立体的美术工艺——区别于纯美术学院的——为对象的非遗的重大门类。"],["传统技艺","Traditional Craftsmanship","非物质文化遗产的重要类别，包括各类传统手工技艺和生产技术","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖紫砂壶和陶瓷（景德镇）的烧制、景泰蓝和各种民族的纺织印染和锻制等——直接以一双巧手的精湛功夫为本的非遗的最庞大的门类。"],["传统医药","Traditional Medicine","非物质文化遗产的重要类别，包括中医中药及各民族传统医疗知识和实践","研究关键词","非遗与遗产","非遗保护","在中国国家级非遗的十大门类中——涵盖了中医的针灸、藏医药和蒙医药以及各民族的传统的诊断和治疗的体系的非遗的门类。尤其在2020年新冠疫情中针刺麻醉等传统技艺被世界卫生组织肯定。"],["表演艺术","Performing Arts","非遗中的表演艺术领域","研究关键词","非遗与遗产","非遗保护","联合国教科文组织非遗的五大领域之一——涵盖音乐舞蹈戏剧和曲艺等——以人身体的现场的声音和动作为唯一媒介的且在没有文字和录音的时代仅靠身体的相传的表演的非遗领域的总称。"],["社会实践","Social Practices","民众在社会生活中进行的实践活动","研究关键词","非遗与遗产","非遗保护","联合国教科文组织非遗的五大领域之一——涵盖了仪式、节庆和日常生活中反复进行的有固定的结构和社区共享的意义的集体的社会的实践的领域——是在非遗公约的体系中最具有社会凝聚力的一个领域。"],["节庆活动","Festive Events","非物质文化遗产的重要类别，包括传统节日庆典和周期性群众聚会活动","研究关键词","非遗与遗产","非遗保护","节日和庆典的非遗的领域——从中国的春节和端午节到各民族的泼水节和火把节——这些社区每年固定时间共同重复操演的集体的庆典是社区凝聚力和身份的年度再生产的关键的社会时刻。"],["有关自然界和宇宙的知识和实践","Knowledge and Practices Concerning Nature and the Universe","非遗中有关自然界和宇宙的知识和实践","研究关键词","非遗与遗产","非遗保护","联合国教科文组织非遗的五大领域之一——指传统的民间对于天象、气候、地理、动植物的生态的认识和与这些认识相伴随的一套传统的实践的智慧的体系——如中国的二十四节气的知识的体系。"],["传统手工艺","Traditional Handicrafts","非遗中的传统手工艺领域","研究关键词","非遗与遗产","非遗保护","与非遗十大门类中的传统技艺（2610）构成一定重叠——但在联合国框架下更强调手工艺的产品的作为文化的表达和社区的标识的独特的符号和美学的非纯经济功能的——手工的产品的非物质的遗产的领域。"],["传统体育竞技","Traditional Sports and Games","非遗中的传统体育竞技","研究关键词","非遗与遗产","非遗保护","在中国国家 null],["乌纱帽","乌纱帽 (traditional Chinese clothing)","以黑色纱罗制成的官帽，明代成为官员的标准冠戴","民俗事象","物质民俗","服饰民俗",null],["顶戴","顶戴 (traditional Chinese clothing)","顶戴，物质民俗中服饰民俗相关的传统服饰","民俗事象","物质民俗","服饰民俗",null],["花翎","花翎 (traditional Chinese clothing)","花翎，物质民俗中服饰民俗相关的传统服饰","民俗事象","物质民俗","服饰民俗",null],["阴阳学说","Yin Yang Xue Shuo","中国传统哲学与医学的基础理论，认为宇宙万物由阴阳两种对立统一的力量构成和推动","理论术语","信仰与观念体系","观念与解释","中国传统宇宙论和自然哲学的基本理论框架，以阴阳两种对立、互补和相互转化的基本力量——阴（阴暗、柔弱、寒冷、月）与阳（明亮、刚强、炎热、日）——的交互作用来解释宇宙万物、人体健康和自然节律的生成、运行和变化。阴阳学说通过《易经》被典籍化和系统化，后渗透到中医学、风水学、武术和民间信仰的各个层面。在民俗学中，阴阳学说是理解大量中国民间信仰和仪式操作的基础理论——丧礼中亡者从阳间传入阴间/祭礼中阴阳的沟通/禁忌习俗中阴阳失衡是不祥的理论根源——不理解阴阳就无法理解大量本土民俗实践背后的文化逻辑。"],["五行学说","Wu Xing Xue Shuo","中国传统哲学与医学的核心理论，以木、火、土、金、水五种元素的相生相克解释自然与人体的运行规律","理论术语","信仰与观念体系","观念与解释","中国传统哲学和自然哲学的又一核心理论体系，以木、火、土、金、水五种基本元素/过程/力量的'相生'（木生火→火生土→土生金→金生水→水生木的正面循环）和'相克'（木克土→土克水→水克火→火克金→金克木的制约循环）的双重循环机制来解释宇宙、自然、人体和社会的运行、变化和平衡。五行学说与阴阳学说互为表里，合称为'阴阳五行'，渗透进中医药、堪舆（风水）、命理、择日和民间信仰的各个层面。在民俗学中，五行学说是解读大量民俗分类和操作的核心密码——如中国传统节日和仪式的时间选择（择吉）遵循五行相生相克的逻辑运作。"],["藏象学说","Cang Xiang Xue Shuo","中医核心理论，研究人体内脏腑的生理功能、病理变化及其外在表现（象）的学说","理论术语","信仰与观念体系","观念与解释","中医基础理论的核心体系之一，以整体观念和动态平衡为方法论的指导，研究人体内部五脏（心、肝、脾、肺、肾）和六腑（胆、胃、小肠、大肠、膀胱、三焦）的生理功能、病理变化及其通过经络系统在身体外表（面色、舌象、脉象等）的表现（'象'）和关联。在民俗学与民间医学的交叉领域，藏象学说为民间的食疗法、养生禁忌（如什么病忌吃什么）和民间健康习俗提供了理论基础——过年要吃红色的食材以'补心'（赤入心），对应着中医的五色配五脏的理论框架。"],["气血津液","气血津液 (traditional remedy)","中医基础理论中构成和维持人体生命活动的基本物质","民俗事象","游艺民俗","民间医药",null],["经络学说","Jing Luo Xue Shuo","中医核心理论，认为人体存在气血运行的通路系统（经络），连接脏腑与体表，是针灸推拿的理论基础","理论术语","信仰与观念体系","观念与解释","中医的另一核心基础理论体系，经络被认为是人体内运行气血和连接脏腑与体表的通道网络系统——十二正经（左右对称分布，各联系一个主要的脏腑）和奇经八脉（如任脉、督脉）构成了人体的'道路网'。在民俗和民间医学交叉的领域，经络学说是理解大量的民间治疗和民间非医疗实践——如艾灸、拔罐、刮痧、按摩和武术中的点穴——的理论基础。在民间信仰中，经络也被吸收进气功、内丹修炼和某些民间教派的修炼体系中。"],["病因病机","病因病机 (traditional remedy)","中医关于疾病发生原因和病理机制的学说","民俗事象","游艺民俗","民间医药",null],["四诊合参","四诊合参 (traditional remedy)","将望闻问切四种诊断方法综合运用以诊断疾病的临床原则","民俗事象","游艺民俗","民间医药","中医诊断学的——望闻问切的四大诊法。望——观气色和舌苔；闻——听声音和嗅气味；问——询问病史和症状；切——按脉象——四诊的合参是辨证论治的第一基础。"],["辨证论治","辨证论治 (traditional remedy)","中医通过分析证候确定治法并处方用药的诊疗体系核心","民俗事象","游 后的遗嘱的执行。"],["绝户","绝户 (social custom/organization)","无子嗣继承的家庭状态，家产按律由族亲或女儿继承，无后者由官府收管","民俗事象","社会民俗","宗族组织","一个家庭和房——没有生育男丁——在父系继嗣的宗族制度下——香火——在这一代——走到了尽头——绝户是农民最沉重的——对不起祖宗的——心理的死罪。"],["养老","养老 (social custom/organization)","子女对年老父母的赡养义务，包括物质供养、生活照料和精神慰藉","民俗事象","社会民俗","宗族组织","中国的传统——父母老了不能自食其力——所有的儿子——有不可推卸的——轮流或分摊地——供父母的衣食和照顾——养老是孝道的法治化——农村养老的问题在空心化的今天是日益严峻的社会的危机。"],["送终","送终 (social custom/organization)","子女守在临终父母身边送其最后一程的孝道行为","民俗事象","社会民俗","宗族组织",null],["摔老盆","摔老盆 (social custom/organization)","出殡时长子将瓦盆摔碎的仪式，象征继承家业和送别亡魂","民俗事象","社会民俗","宗族组织","中国的传统——在父母出殡——的长子——在起棺的瞬间——举起一只瓦盆——猛地往地上——摔得粉碎——摔老盆——象征——这一家——从今以后——永远不会再用这个盆了——以此向天地宣告——丧事的彻底的和不可挽回的终结。"],["抱灵牌","抱灵牌 (social custom/organization)","出殡时长子怀抱逝者灵牌的仪式，灵牌代表逝者灵魂的此世居所","民俗事象","社会民俗","宗族组织","丧礼——父母入殓——长子——跪在棺前——双手将——写着亡者名讳的——灵牌——紧紧地抱在胸前——以体温——一路护送到墓地——这是最后的——身体的陪伴。"],["扶灵","扶灵 (social custom/organization)","出殡时晚辈在棺椁两侧扶柩送行的仪式，表达最后的守护和送别","民俗事象","社会民俗","宗族组织","出殡的路上——子孙和近亲——披麻戴孝——以手扶着棺木的两侧——踏着纸钱和哭声——一步一步地——护送灵柩——走完亡者从阳间的居所——到阴间的归宿的——最后一程的路。"],["守制","守制 (social custom/organization)","子女为父母服丧守孝的制度，古代为官者需去官丁忧守制三年","民俗事象","社会民俗","宗族组织","中国传统的——父母和祖父母去世——官员必须离职——在家守丧——二十七个月——并在墓旁结庐——不饮酒不吃肉和不同房——守制（丁忧）是儒家以孝治国的——无可逃避的铁的法则。"],["丁忧","丁忧 (social custom/organization)","古代官吏为父母守丧的制度，需离职返乡守孝三年","民俗事象","社会民俗","宗族组织",null],["起复","起复 (social custom/organization)","丁忧期满后官吏恢复官职的制度","民俗事象","社会民俗","宗族组织",null],["夺情","夺情 (social custom/organization)","皇帝特许在丁忧期间留任或提前起复的特殊安排","民俗事象","社会民俗","宗族组织",null],["冲喜","冲喜 (life-cycle ritual/custom)","以婚事冲散厄运的习俗，多在新郎或其父母病重时仓促举行婚礼以求冲喜","民俗事象","社会民俗","婚姻家庭","旧时的——已定亲的男子——在重病——家人急忙将未婚妻——迎娶进门——以婚礼的大喜——来冲走缠绕新郎的病魔和晦气——冲喜——多少少女——在冲喜的当天夜里——抱着公鸡——和躺在病床上奄奄一息的陌生男子——成了名义上的新娘。"],["守节","守节 (life-cycle ritual/custom)","寡妇不再改嫁的贞节行为规范，宋以后受程朱理学的影响日益强化","民俗事象","社会民俗","婚姻家庭","儒家礼教对妇女——丈夫去世后——不得再嫁——终身守寡——为亡夫披麻戴孝——以一生的孤寂——换取一座——在村口的——冰冷的——贞节的牌坊。守节——是理学吃人——以女性的整个生命——为儒家道德的祭品的——最血腥的民俗。"],["殉节","殉节 (life-cycle ritual/custom)","寡妇为夫殉死的极端贞节行为，明清时期官方予以旌表","民俗事象","社会民俗","婚姻家庭",null],["望门寡","望门寡 (life-cycle ritual/custom)","未婚夫死 能听到社区的多元的有时是不可调和的声音的复调。"],["对话民族志","Dialogic Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","在民族志的书写文本中保留和呈现研究者和被研究者在田野现场的活生生的对话——包括问答、争论、互相学习——的形态和过程。对话民族志打破了传统民族志中研究者沉默地在幕后组织叙述的被掩盖的权力的不平。"],["合作民族志","Collaborative Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","研究者不是将田野资料带回大学关起门来独自进行写作——而是邀请田野合作者们共同参与民族志的写作甚至与他们共同署名——将知识生产的最终的最重要的写作环节也向社区的合作者们开放。"],["互惠民族志","Reciprocal Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","民族志的田野关系和书写的最高伦理——不是单向地从社区提取知识然后出版并只在学术圈内分享——而是将民族志的成果和利益回馈给原研究的社区——将发表的文章带回给村民们看将版税捐献给社区的发展项目——实践知恩图报的田野伦理。"],["本土民族志","Indigenous Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","由本土的人类学家和民俗学家（自己文化的局内人而不是外国/外族的人类学家）运用受过训练的学术概念和方法对自己所属的社区和文化进行的民族志的研究和书写。中国的家乡民俗学和本土人类学即属于本土民族志的大家族。"],["家乡民族志","Home Ethnography / Ethnography at Home","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","人类学和民俗学家在自己的家乡/本民族/本社区——而不是在遥远的异邦和异文化中——进行的田野研究和民族志书写。研究者具有天然的语言和对本土文化的深刻直觉和厚实的内部人脉——但挑战是如何在熟悉中发现学术惊奇。"],["多点民族志","Multi-sited Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","乔治·马库斯在1995年的一篇具有划时代意义的论文中提出的方法论革新——不再像传统的马林诺夫斯基式的田野那样将自己年复一年地固定锁在单一的田野地上，而是跟随人和物的流动轨迹跨越多个地点进行串联式的追踪田野。这将民族志的场所从单一地点的小世界变成了一个多节点的世界体系。"],["全球民族志线索","Global Ethnographic Threads","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","马库斯的多点田野概念中的一个策略——不要被行政性的地点界困住，而是去追踪和跟随一个具体的线索（如一个民间传说或一种苗族银饰）在全球范围内的多节点的传播和变异和跨国的再生产的全球的网络的田野线索的追踪。"],["移动民族志","Mobile Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","跟随被研究对象（如长途卡车司机/游牧的牧人和不断在不同城市之间流动的打工移民）在实际的空间移动中的移动轨迹——通过坐在移动的车中与流动的人在途中边走边聊——来收集流动中的群体在路上的第一手体验和叙述的民族志田野的移动的方法。"],["网络民族志","Netnography / Digital Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","罗伯特·科齐奈茨（Robert Kozinets）发展的将田野调查的地点从现实的物理村落转移至在线的网络社群/网络论坛/社交平台/和虚拟世界中以理解在线亚文化中的人们的日常互动方式的网络民族志的研究的方法和范式。在中国数字民俗的田野研究日益依赖网络民族志。"],["数字民族志","Digital Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","在网络和数字技术的时代以数字平台（微信朋友圈/抖音/快手/B站等）为田野地点和以数字数据（聊天记录/短视频/弹幕等）为民族志资料的民族志的田野工作的新的形态和分支。数字民俗正被中国当代民俗学热切地探索。"],["虚拟民族志","Virtual Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","以完全虚拟的网络的三维世界（多用户在线游戏如第二人生等的虚拟社群）为主要田野地点开展的沉浸式和avatar（化身）参与式的田野调查和民族志书写——研究者在虚拟世界中以一个虚拟的化身与虚拟世界的其他化身居民交流互动以收集关于虚拟世界的文化的数据。"],["感官民族志","Sensory Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","不以文字和口述的访谈为唯一的数据源——而是通过研究者在田野中开启其自身的所有感官——专注于当地人自己体验世界的声音景观气味世界触觉的世界和味觉的世界——来感受和书写民族志的感官人类学和民族志的新范式。例如研究寺庙的民族志必然包括庙里的香火的气味和钟声。"],["情感民族志","Affective Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","强调对田野遭遇中研究者和被研究者双方共同体验到的情感的复杂性——爱/恨/悲痛/共情/不适——不是被当做干扰学术客观性的噪音来排除，而是被当做最真实和最宝贵的理解他者生活的数据来拥抱和分析的田野研究的路径。"],["具身民族志","Embodied Ethnography","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","研究方法","民族志方法","民俗志类型","强调民族志研究者不只是作为旁观者和访谈者在田野中用眼睛看和用耳朵听——而是以自己的身体亲身地参与和投入当地人的日常和仪式性的身体实践——一起跳舞/一起干农活和一起做跪拜——从而通过身体的肌肉和感觉的共感而非仅通过脑中的概念来深刻地理解他者文化的民族志田野哲学。"],["汽锅鸡","汽锅鸡 (Material Folklore / 饮食民俗)","汽锅鸡，物质民俗中饮食民俗相关的传统饮食事象","民俗事象","物质民俗","饮食民俗",null],["宣威火腿","宣威火腿 (Material Folklore / 饮食民俗)","宣威火腿，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质民俗","饮食民俗",null],["金华火腿","金华火腿 (Material Folklore / 饮食民俗)","金华火腿，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质民俗","饮食民俗",null],["如皋火腿","如皋火腿 (Material Folklore / 饮食民俗)","如皋火腿，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质民俗","饮食民俗",null],["诺邓火腿","诺邓火腿 (Material Folklore / 饮食民俗)","诺邓火腿，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质民俗","饮食民俗",null],["豆腐乳","豆腐乳 (traditional Chinese food/drink)","以豆腐发酵腌制的传统调味佐餐食品","民俗事象","物质民俗","饮食民俗",null],["毛豆腐","毛豆腐 (traditional Chinese food/drink)","表面长有白色菌丝的徽州发酵豆腐","民俗事象","物质民俗","饮食民俗",null],["霉豆腐","霉豆腐 (traditional Chinese food/drink)","经发酵霉制而成的豆腐制品","民俗事象","物质民俗","饮食民俗",null],["腐竹","腐竹 (traditional Chinese food/drink)","豆浆煮沸后表面凝结的薄膜经干燥制成的豆制品","民俗事象","物质民俗","饮食民俗",null],["豆皮","豆皮 (Material Folklore / 饮食民俗)","豆皮，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质民俗","饮食民俗",null],["豆腐干","豆腐干 (traditional Chinese food/drink)","以豆腐压榨脱水制成的干制豆制品","民俗事象","物质民俗","饮食民俗",null],["千张","千张 (Material Folklore / 饮食民俗)","千张，物质民俗中饮食民俗相关的传统饮食民俗","民俗事象","物质 和娱乐，而是日常生活本身的周期性否定和更新。"],["生活世界理论","Theory of Lifeworld","胡塞尔现象学的核心理论，后被舒茨引入社会科学，指人们在其中生活、行动并赋予意义的经验世界，是民俗学日常生活转向的理论基础","理论术语","中国本土理论","本土方法论","埃德蒙德·胡塞尔后期哲学的核心理论体系，后经阿尔弗雷德·舒茨（Alfred Schütz）引入社会科学，指前科学和前反思的、人们在其中直接生活、感知和行动并'理所当然'地接受其真实性的日常经验世界。舒茨将生活世界理论与韦伯的社会行动理论整合，发展出一套精细的日常生活社会学。在民俗学中，生活世界理论为民俗学的根本认识论立场提供了哲学基础——民俗学者必须进入民众的生活世界，搁置自己的科学和学术预断（如'这个是封建迷信'），首先理解在民众自己的'自然态度'（对世界的理所当然的假设）中，这些民俗实践被如何体验和赋予意义的。高丙中将生活世界理论引入中国民俗学并以此作为日常生活转向的理论基石。"],["生活者","Lifeworld Dweller","日本民俗学概念，指日常生活中的普通民众作为民俗实践主体的定位","理论术语","中国本土理论","本土方法论","日本民俗学和日常生活研究中的本土概念，指在日常生活世界中生活着的、作为民俗实践主体的普通民众——不是被研究者从外部观察的'研究对象'，而是有血有肉的、在具体的生活情境中做着特定的事并赋予其以意义的'生活世界中的居民'。生活者概念承载的方法是研究者对研究对象的基本态度——不是冰冷的学术分析的对象（'他们'），而是同一个生活世界中的共同的生活者（'我们'中的一分子），二者之间是平等的理解对话关系。"],["日常性","Everydayness","日常生活理论的核心概念，指日常生活重复、琐碎、理所当然的性质，是民俗实践的基础特征","理论术语","中国本土理论","本土方法论","日常生活理论和民俗学校心分析概念，指日常生活的基本特征——重复性（日复一日重复的作息、饮食、劳作）、不引人注目性（日常被'当然如此'的自然态度包裹着，不被质疑和关注）、非反思性（日常行为的动机不需要被有意识地计算和权衡）和物质性（日常是通过身体实践而与物质世界互动的过程）。在民俗学中，日常性是民俗的最基本特征之一——民俗不是在节日和仪式等'非常时刻'才存在的文化活动，而是在日复一日地吃饭、睡觉、劳作、闲聊中持续地被生产和再生产的日常实践。"],["生活叙事","Life Narrative","以民众日常生活经历和体验为内容的个人化叙事形式","理论术语","中国本土理论","本土方法论","以民众的日常生活经历——从出生到长大的家庭生活、从事的工作和劳动、生儿育女、邻里瓜葛——为内容的个人口头叙事的类型，与'个人叙事'概念有显著的交叠但侧重更广的日常生活维度和更长的时间跨度。生活叙事的特征：纪实性宣称（'这些都是我亲身经历的真事，不是编的'）、日常性（内容不是什么惊天动地的传奇而是普通人的日常人生）、结构性（叙述者从自己整个生命的记忆库中选择了特定的经历事件并用特定的方式编排成一个具有内在连贯性的'人生故事'）。在民俗学中，生活叙事是最接近民众生活经验和自我理解的叙事类型。"],["日常生活的呈现","Presentation of Everyday Life","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","中国本土理论","本土方法论","社会生活学者戈夫曼在《日常生活中的自我呈现》（1956）中应用戏剧隐喻分析的日常社会互动的核心概念，指社会生活中的每一个互动情境都是个体在'前台'（根据社会脚本和观众预期）有意识或无意识地运用印象管理技术进行的自我形象和身份的表演性呈现。在民俗学中，此概念被用于分析——民俗活动中的角色扮演（如在婚礼中，新娘和新郎按照社会/文化的角色脚本对受邀宾客呈现自己的新郎/新娘身份）、民俗技艺的展示（民间艺人在展演技艺时是在'呈现'自己的民间艺术家的身份和技艺）。"],["生活世界民俗学","Lifeworld Folklore","胡塞尔现象学概念应用于民俗学","理论术语","中国本土理论","本土方法论","将胡塞尔-舒茨生活世界现象学理论系统地运用于民俗学研究和田野方法论的民俗学前沿取向，以高丙中、吕微等为代表。生活世界民俗学的核心主张：民俗学不是一门以'解释民俗的因果规律'为目标的科学（像自然科学那样），而是以'理解民众在生活世界中的民俗实践的意义'为目标的人文学科。具体而言：研究者进入田野后要暂时搁置自己的学术理论和价值判断（'搁置'操作），先尽力进入被研究者自身的经验世界中去感受、体验和理解民俗实践对他们的生活意义，然后才在理解的基础上开展学术分析。"],["现代日常","Modern Everyday Life","现代性条件下的日常生活形态，具有碎片化、媒介化和消费化的特征，区别于传统农业社会的日常生活","理论术语","中国本土理论","本土方法论","现代性的社会条件下日常生活的特有形态，与传统农业社会的日常生活构成系统性对比。现代日常的核心特征：碎片化（时间不再遵循自然的日夜/季节循环，而是在通勤、工作、消费的多节点碎片中被切割和拼凑）、媒介化（大量日常体验是通过手机屏幕中的影像和声音而非直接的面对面的互动来完成的）、消费化（越来越多的日常活动围绕着消费——吃饭是外卖平台上的选择而非自己做饭、休闲是商业娱乐场而非社区广场）。在民俗学中，现代日常对传统民俗提出了生存性挑战——当日常的形态根本性地不同于民俗产生和维系的日常生活形态时，民俗在当代如何存在？"],["生活样式","Life Style","民众在日常生活中形成和沿袭的有特定文化模式的行为方式","理论术语","中国本土理论","本土方法论","日本社会科学和民俗研究中的本土分析概念，指一个人在特定的社会文化环境中通过成长和日常实践形成的、具有该社会文化特质的日常行为模式、生活节奏和价值取向的总和——包括饮食、着装、居住、待人接物、时间安排和休闲方式等方方面面的模式化总和。在民俗学中，生活样式概念为民俗的当代消费主义转型提供了分析工具——今天人们'选择'过什么样的节、吃什么样的东西、穿什么样的衣服，这些不再是被传统强制决定的，而是个体在可选择的生活样式菜单中的'文化消费选择'。"],["活法","Way of Living","中国本土日常生活研究中的概念，指个体在特定生活情境中形成的应对方式和生活风格，强调生活的策略性与创造性","理论术语","中国本土理论","本土方法论","中国本土民俗学和日常生活研究中的概念，强调日常生活的策略性、创造性和情境应变性维度——'活法'不是被动地接受传统的安排（'按老一辈的方式活'），而是在具体的生活条件和限制下能动地建构自己的生活方式——是'怎么活过来'（how to get by）的日常生活智慧。在民俗学中，活法为民俗在当代不被全盘抛弃也不被完整保留的复杂现实提供了解释——在传统和现代的夹缝中，民众以自己的'活法'在二者之间进行着日复一日的创造性协商和实践。"],["生活方式","Way of Life","韦伯以降的社会学核心概念，指特定社会群体在消费、休闲和日常实践中的模式化行为系统","理论术语","中国本土理论","本土方法论","马克斯·韦伯以降社会学的核心分析概念之一，指特定社会群体的在消费、休闲、娱乐和日常生活的方方面面上具有内在一致性的模式化的行为方式和品味选择系统——一个人的生活方式是通过他的服装品牌、餐厅选择、假期安排、阅读习惯和文化消费等微观选择的总和来呈现的。在民俗学中，生活方式概念为民俗在21世纪的'从传统继承转向文化消费选择'的转型提供了理论语言——春节从全体必须过的节日变成一种可以在众多生活方式选项中自由选择的文化消费项目（可以全情投入、可以简化、也可以完全不过）。"],["小日子","Little Life / Everyday Living","当代中国民众日常生活的通俗表述，强调个体化、私密化和小确幸的生活追求，区别于宏大叙事","理论术语","中国本土理论","本土方法论","当代中国民众日常生活的通俗表述和自我叙事中的流行概念，指向以个体化、私密化和小而确定的幸福感（'小确幸'）为追求核心的日常生活取向——与宏大叙事的家国情怀（'为中华崛起而奋斗'）和传统民俗的集体责任感（'不过年是不孝不祖'）形成对比。在民俗学中，'小日子'为代表的生活观念为民俗参与在当代的'去义务化'——从社会强制转向个人选择——提供了一种本土化的社会学解释模型。"],["徐赣丽","Xu Ganli","华东师范大学教授，都市民俗与非物质文化遗产保护研究","学者与学术体制","中国学者","当代学者","中国当代民俗学者，华东师范大学教授。以都市民俗和当代日常生活的民俗学研究著称，推动了中国民俗学从乡村到城市的空间的拓展。"],["Lebenswelt","Lebenswelt / Lifeworld","胡塞尔现象学概念，德语'生活世界'，指前科学的人们直接经验的日常世界","理论术语","社会与群体理论","社会理论与民俗","德语'生活世界'，胡塞尔现象学和舒茨现象学社会学的核心术语。与中文译本'生活世界'同义，指前科学和前反思的、人们在其中直接经验、行动和生活的日常世界——不是被科学抽象和数理化的'客观世界'，而是活生生地被人的意识经验到的现象世界。在民俗学中，Lebenswelt概念的德语来源用来强调这一概念的现象学谱系和深层的哲学含义——研究者要进入的不是一个可以客观描述和测量的'田野地点'，而是一个充满人的主观经验和意义的'生活世界'。"],["生活形式","Form of Life","维特根斯坦晚期哲学概念，指语言和行动嵌入其中的社会生活方式，后为社会科学广泛借用","理论术语","社会与群体理论","社会理论与民俗","路德维希·维特根斯坦（Ludwig Wittgenstein）晚期哲学（《哲学研究》，1953）中的核心概念，指语言不是一套与现实对应的符号系统，而是人类生活实践的一个有机组成部分——'语言游戏'（language-game）——一种语言的意义不在于它在字典中的定义，而在于它在特定的生活形式（Form of Life）中被如何使用。在民俗学中，生活形式概念为民俗的语言民俗（方言、谚语、行话、隐语）的深度研究提供了哲学基础——一个地方谚语的意义不能通过与标准语的逐字翻译来理解，而得进入到使用该谚语的日常生活形式中去看它是被如何使用的。"],["生活实践","Life Practice","布尔迪厄实践理论的核心概念，指行动者在特定场域中依据惯习进行的日常实践活动","理论术语","社会与群体理论","社会理论与民俗","皮埃尔·布迪厄（Pierre Bourdieu）实践理论的核心概念，指行动者在特定的社会场域（field）中依据内化的惯习（habitus）展开的日常实践行为。布迪厄的核心分析贡献是揭示了实践的逻辑——一种不是经过理论反思和理性计算，而是作为身体的'感觉'（sens pratique/实践感）被进行的非反思性的策略性行动——正如一个熟练的网球手不是在脑子里计算球的角度和力度，而是'凭感觉'就能接住球。在民俗学中，生活实践概念为民俗实践的'身体性'和'非反思性'维度提供了分析基础——一个老练的民间工匠做活时不是在大脑里复述工序步骤，而是凭多年的身体实践感（实践感）完成的。"],["日常生活的发明","Invention of the Everyday","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","社会与群体理论","社会理论与民俗","米歇尔·德·塞托（Michel de Certeau）在《日常生活实践》第一卷的副标题极为一致的命题——日常生活不是被动地被既定秩序（统治阶级和资本）所生产和装备的商品和空间的消费者，而是每一个普通人在日常生活中通过对给定的文化商品和空间的主动的'使用'和'再编码'而进行的一种微观的、创造性的、日常的'发明'——对产品说明书的使用方式进行歪曲（如把手机拍视频代替打电话）就是在'发明'日常生活。在民俗学中，日常生活的发明为民俗在当代的'创造性转化'和'DIY传统文化'提供了理论语言——一个年轻人在抖音上用嘻哈风格翻唱陕北民歌不是对'真正民歌'的侮辱，而是对民歌在数字时代的日常生活层面上的创造性发明的实践。"],["日常生活社会学","Sociology of Everyday Life","以社会结构社会关系和社会行为为研究对象的现代社会科学","理论术语","社会与群体理论","社会理论与民俗","以日常社会生活中的日常互动、日常实践和日常意义建构为核心研究对象的社会学分支方向。其主要理论来源包括：舒茨的现象学社会学（日常生活世界的结构分析）、戈夫曼的拟剧论（日常生活中的自我呈现和仪式互动分析）、加芬克尔的常人方法学（日常生活中维持社会秩序的无言的微观方法）等。在民俗学中，日常生活社会学为民俗从'非常时刻'（节庆仪式）的文化研究转向'日常时刻'（购物、闲聊、通勤、刷手机）的文化分析提供了方法论工具包。"],["日常抵抗","Everyday Resistance","斯科特提出的概念，指弱势群体以隐晦、非对抗形式的日常行为进行的权力抵抗","理论术语","社会与群体理论","社会理论与民俗","詹姆斯·斯科特（James C.Scott）在《弱者的武器》（1985）通过对马来西亚农民日常生活中的抵抗行动的田野研究提出的政治人类学核心概念，指弱势群体（如农民、奴隶、底层劳动者）在进行公开的、组织性的政治抵抗代价过高而不可行的情况下，通过日常生活中的微观的、隐蔽的、看似非政治性的——怠工、偷懒、暗中偷窃、装傻、说闲话——方式对权力和剥削进行的不宣而战的'日常抵抗'。在民俗学中，日常抵抗为民俗的政治维度提供了分析工具——在'移风易俗'和官方文化管控的语境中，民俗可能成为底层民众日常抵抗权力的文化武器——农民在官方禁止烧香的禁令面前以隐蔽的方式继续进行祭祀活动，这种行为即是民俗又是日常抵抗。"],["日常生活的殖民化","Colonization of Everyday Life","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","社会与群体理论","社会理论与民俗","尤尔根·哈贝马斯（Jürgen Habermas）交往行为理论中的批判概念，指在现代资本主义社会中，以金钱和权力为媒介的'系统'（经济子系统和行政子系统）的逻辑——对效率、利润和管控的追求——入侵和殖民化了以相互理解的语言交往为媒介本应免受这些系统逻辑干预的'生活世界'（日常生活、家庭、亲密关系等领域）。在民俗学中，日常生活的殖民化为民俗在消费主义和旅游资本主义中面临被异化的过程提供了批判性的理论语言——当你家乡的村庙被改造为收门票的旅游景点、原住民为游客表演'原生态'婚礼时，金钱逻辑'殖民了'本应是社区内部成员自发的情感表达和生活实践的民俗领域。"],["日常交往","Everyday Interaction","戈夫曼等研究的日常生活中面对面的社会互动与意义建构过程","理论术语","社会与群体理论","社会理论与民俗","欧文·戈夫曼（Erving Goffman）、哈罗德·加芬克尔（Harold Garfinkel）等人研究的日常生活中面对面的社会互动和维持社会秩序的微观机制。日常交往的核心命题是：社会秩序不是在宏大的结构中运作的，而是由数以百万计的日常面对面互动中的人们在每一个互动时刻——一个眼神、一声招呼、一个肢体动作、一句话的措辞——中持续地生产和维持的。在民俗学中，日常交往为民俗学的最小分析单位——从宏大的节日体系下降到一次拜年、一次寒暄、一次饭桌交谈——提供了理论化工具，'微民俗'研究正是在日常交往理论的启发下展开的。"],["生活策略","Life Strategy","个体或群体在日常生活中应对结构性约束的行动方案和选择模式","理论术语","社会与群体理论","社会理论与民俗","个体或家庭在特定的结构限制（如贫困、低保政策、迁移就业机会）下能动地选择和实施的一套日常生活的行动方案和资源调配模式，以在限制性条件下尽可能地维持和提升生活质量。生活策略的分析方法：考察的不是'理想状态下人应当如何生活'，而是'在给定的困难和限制下人是如何用自己的方式应付过活'——如一个农村留守家庭通过老人种地供自食+儿女在城市打工寄钱回来+孩子由祖辈带的'三地家庭'安排来过日子。在民俗学中，生活策略为民俗在不理想的现实条件下的实践——如无法负担全套传统丧葬仪式的贫困家庭如何通过简化但仍有意义的替代仪式为亡者送终——提供了分析视角：这不是'传统在沦丧'，而是民众在限制下的能动的生活策略。"],["日常实践","Everyday Practice","德塞托等研究的普通人在日常生活中通过消费、行走、阅读等微观行动进行的创造性实践","理论术语","社会与群体理论","社会理论与民俗","米歇尔·德·塞托、皮埃尔·布迪厄等理论家关注的普通人在日常生活中——通过行走（不是按照城市规划师和建筑师的意图而是自己走捷径和踏出小径）、消费（不是按照广告的引导而是按自己的偏好进行选择和创造性改装产品）和言说（不是被动接受官方话语而是以幽默、反话、俚俗的方式消解官方话语的严肃性）等日常的微观活动——进行的具有创造性和策略性的实践。在民俗学中，日常实践为民俗的当代实践——如农村大妈在抖音中用山歌素材创造自己的短视频内容——提供了分析框架：这不是对传统民俗的'歪曲'，而是普通人在数字时代的日常实践中进行的民俗创造性再生产。"],["战术","Tactics (de Certeau)","德塞托概念，弱势者在既定空间和规则中使用计谋和临时手段进行的日常抵抗与挪用","理论术语","社会与群体理论","社会理论与民俗","米歇尔·德·塞托在《日常生活实践》中与策略构成对子关系的概念。战术是弱势者在既定的、由强者划定的空间和规则体系中灵活机遇性临时进行的算计性行动。战术的核心特征包括无自己的空间（在敌方的领域中进行）、依赖时机（临时抓住有利时机进行一次性操作）和不可见性（隐蔽的小动作不被强者注意到）。在民俗学中，战术为民俗在官方压力下的隐性生存提供了理论解释。"],["策略","Strategies (de Certeau)","德塞托概念，拥有权力和空间的主体制定的系统性行动方案，区别于弱者的战术","理论术语","社会与群体理论","社会理论与民俗","德·塞托提出的与战术构成对子关系的概念。策略是拥有自己领域和空间的权力主体制定的系统长期全局性的行动方案。策略的核心特征是拥有自主空间、系统长期性、可见合法。在民俗学中策略-战术对子为民俗与国家间的互动提供了精妙的分析框架。"],["日常生活实践理论","Theory of Everyday Practice","德·塞托理论中民众在日常消费和实践中进行创造性抵抗的策略","理论术语","社会与群体理论","社会理论与民俗","德·塞托的核心理论体系，革命性在于将焦点从产品生产者转向普通人——他们不是被动接纳和使用的傻瓜消费者，而是通过创造性的使用和再编码在消费中生产出自己的意义和生活方式。在民俗学中该理论为民俗在当代消费社会中的文化DIY式实践提供了理论语言。"],["空间的实践","Spatial Practice","列斐伏尔社会空间理论中日常生活行为的空间实践方式","理论术语","社会与群体理论","社会理论与民俗","列斐伏尔空间三元辩证法的第一维度，指人们日常生活中通过身体移动行为习惯和感知方式实际生产占有体验空间的实践方式，区别于建筑师设计的抽象空间。在民俗学中为民俗空间维度分析提供了关键概念。"],["空间的再现","Representations of Space","列斐伏尔空间生产理论概念，由规划者、科学家和专家构想的抽象空间","理论术语","社会与群体理论","社会理论与民俗","列斐伏尔空间三元辩证法的第二维度，指由规划师建筑师科学家政策制定者等专业人员的抽象表征所构想的理想空间。在民俗学中为民俗空间在现代化进程中被规训的过程提供了分析工具。"],["再现的空间","Spaces of Representation","列斐伏尔空间生产理论概念，使用者通过日常生活和象征实践直接体验和表达的生活空间","理论术语","社会与群体理论","社会理论与民俗","列斐伏尔空间三元辩证法的第三维度，指普通居民在日常生活中通过想象记忆情感和象征性实践直接体验和表达出来的生活空间。在民俗学中为民俗空间的保护提供了论证——被拆除的古戏台是再现的空间，承载着集体记忆。"],["日常生活节奏","Rhythms of Everyday Life","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","社会与群体理论","社会理论与民俗","列斐伏尔对日常分析中发展的概念，指日常生活被生产和再生产的规律性时间节奏和行为模式。在民俗学中为从静态的节日日期研究转向动态的节日节奏过程研究提供了框架。"],["仪式化日常","Ritualized Everyday","日常行为被赋予仪式特征和象征意义的过程","理论术语","社会与群体理论","社会理论与民俗","日常生活研究与仪式理论的交叉概念，指日常平凡行为被赋予超出纯实用性的仪式形式和意味的分析视角。在民俗学中为民俗研究的分析范围从大仪式扩展到日常微观民俗提供了理论合法性。"],["日常仪式","Everyday Ritual","日常生活中反复进行的程式化行为，虽非正式仪式但具有仪式性特征","理论术语","社会与群体理论","社会理论与民俗","日常生活中周期性重复的具有程式化形式和超出纯实用功能的情感维度的日常行为实践，具有仪式结构特征但未被社会正式界定为正式仪式。在民俗学中为微民俗研究提供了理论工具。"],["日常审美化","Aestheticization of Everyday Life","费瑟斯通等提出的概念，指审美维度渗透到日常消费和生活中的文化现象","理论术语","社会与群体理论","社会理论与民俗","费瑟斯通等提出的概念，指审美不再局限于艺术领域而是通过广告时尚产品设计和社交媒体渗透到日常消费生活的每个角落。在民俗学中为当代民俗中的审美消费取代功能消费提供了理论解释。"],["日常消费","Everyday Consumption","普通人在日常生活中进行的消费行为，包含着身份建构和文化意义的生产","理论术语","社会与群体理论","社会理论与民俗","普通人为满足需求并建构表达身份而进行的消费行为选择，不仅是经济行为更是文化实践。在民俗学中为民俗从生产民俗向消费民俗的转型提供了分析框架。"],["日常服饰","Everyday Dress","民众日常穿着的衣物及其蕴含的审美、身份和文化意义","理论术语","社会与群体理论","社会理论与民俗","民众日常穿着的衣物及附着于其上的文化意义如身份表达审美选择和社会规范。在民俗学中为民俗研究从传统服饰民俗扩展到当代日常服饰实践如汉服文化提供了延伸空间。"],["日常饮食","Everyday Food","民众日常的饮食行为和食物体系，是日常生活最基础的实践层面","理论术语","社会与群体理论","社会理论与民俗","民众日常饮食行为构成的整体性日常生活实践体系，是民俗研究中最基础也最易被忽略的领域。日常饮食不同于节庆饮食，它是每天发生的最基础的维系生命和家庭关系的日常民俗实践。"],["日常居住","Everyday Dwelling","民众日常的居住空间和居住方式，包含着空间实践和生活记忆","理论术语","社会与群体理论","社会理论与民俗","民众日常居住空间和生活方式及在居住空间中的日常行为。在民俗学中为民俗研究从传统民居类 们不说或说不太自然的日常生活中的真实的感受和叙述。"],["生活史访谈","Life History Interview","生活史访谈，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以被访者的整个生命历程——从出生被养育到老年——为主轴和框架，邀请被访者回溯和讲述贯穿其一生的民俗经历（如她童年时的过年、她的婚礼、她第一次做婆婆操办新年的体验）的访谈法。"],["日常叙事访谈","Everyday Narrative Interview","日常叙事访谈，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","聚焦于被访者日常生活中发生的、不是宏大历史而是个人化的关于日常的生活点滴的小叙事（如今天早上在菜市场的遭遇）的访谈。这些微叙事在传统的以采集核心民俗为目标的民俗学田野中往往被忽略但恰恰是理解日常生活的关键材料。"],["影子观察","Shadow Observation","影子观察，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","研究者像一个影子一样无声地紧跟在被研究者身边观察其在不被干预和不在被提问的自然状态下的日常行为和互动、而不干扰其自然流程的一种非参与式的贴身观察的技术。"],["陪伴式田野","Companion Fieldwork","陪伴式田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","超越纯粹的研究的工具性关系，以真诚的关怀和长期的陪伴——陪老人闲坐/陪孩童游戏/陪着一起应付生活中的琐事——来替代一次性的访谈提取信息的田野工作的哲学。陪伴的方式是创造深度信任的无可匹敌的粘合剂。"],["日常田野","Everyday Fieldwork","日常田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","不以参加特别的事件（大型的节庆和仪式）为焦点——而是以日复一日地融入当地人的普通的日常的节奏和作息安排中——跟着一起吃饭休息闲聊——去感受民俗在日常平凡的时间中的状态而非仅被突出的非日常时刻的田野工作。"],["居家田野","Home-based Fieldwork","居家田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","在私人居家空间——如被访者的家中——进行长期田野的方法。被访者在家中是最放松和本真的——在客厅和厨房里聊天的自然的程度是任何外部的会议室都无法复制的。核心的挑战是如何不成为家庭的负担。"],["日常摄影","Everyday Photography","日常摄影，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","将手机和简易数码相机作为田野的日记本的延伸——在日常的田野生活中拍摄看似最平淡和普通的日常场景（不是最具画面冲击力的节日）——的一套系统的日常影像记录研究和传播的方法。"],["日常录像","Everyday Videography","日常录像，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以短视频/长视频等影像的方式持续系统性地记录日常田野生活中的重复的琐碎的事件（日常的家务/务农/等人的片段)——作为分析日常生活节奏和潜流的后期的慢速分析的音像资料，而非仅为了剪辑成漂亮的短片的素材。"],["日常日记","Everyday Diary Method","日常日记，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","由研究者（关于自己的田野和生活）或由被研究者（关于他们自己的日常）按照日记的方式定时记录每日发生的——包括最普通和看似最不值得记的——日常的琐事心情和支出。日记能捕捉到访谈中丢失的每日的微观脉动。"],["日常账本","Everyday Account Book Method","日常账本，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","请被访者分享其家庭的日常的经济账本和消费记录的田野的研究的方法——通过一个看似最枯燥的数字记录来复原一个家庭的日常生活的经济的节奏、社会和亲戚的人情网的规模和开销。"],["日常空间测绘","Everyday Spatial Mapping","日常空间测绘，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","请被访者绘制或带着研究者实地走一遍并介绍——在其自家的日常生活空间（家和院子和菜地和工作地）——中日常行走和使用的空间的活动的心理的地图和生活动线，以捕捉从规划师的地图和卫星图 拳申遗 (Social Folklore / Seasonal Festivals)","传统拳术兼具武术健身哲学","民俗事象","社会民俗","岁时节日",null],["藏医药浴法申遗","藏医药浴法申遗 (Social Folklore / Seasonal Festivals)","2018年藏医药浴法被列入联合国教科文组织人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2018年——中国申报的藏医药浴法——藏民在每年的藏历的七月沐浴节——以采集的五味甘露的草药熬汤——浸泡全身以祛病和养生的知识和实践——列入联合国非遗代表作。"],["送王船申遗","送王船申遗 (Social Folklore / Seasonal Festivals)","2020年中国和马来西亚联合申报送王船仪式被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2020年——中国和马来西亚联合申报的送王船——有关人与海洋的可持续联系的仪式及相关实践——列入联合国非遗代表作。送王船是闽南沿海的王爷信仰的核心的烧王船送瘟神的宏大的海边的祭典。"],["妈祖信俗申遗","妈祖信俗申遗 (Social Folklore / Seasonal Festivals)","东南沿海信仰的海上保护女神","民俗事象","社会民俗","岁时节日",null],["赫哲族伊玛堪","赫哲族伊玛堪 (Social Folklore / Seasonal Festivals)","赫哲族无乐器伴奏的口头说唱艺术，2011年被列入联合国教科文组织急需保护的非遗名录","民俗事象","社会民俗","岁时节日","赫哲族——以渔猎为生的东北的极少数民族——的无乐器伴奏的口头说唱的长篇的英雄的叙事——伊玛堪——以诗体的唱和散文体的说的交替讲述英雄的莫日根的事迹。2011年列入联合国急需保护的非遗名录。"],["蒙古族长调","蒙古族长调 (Social Folklore / Seasonal Festivals)","蒙古族以悠长旋律为特征的民歌形式，2005年被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","中国和蒙古国——于2005年联合申报的——蒙古族的——以无伴奏的——在不同喉位发出双声的呼麦为特色——字少腔长的悠远的——草原的古老的长调——被列入联合国非遗代表作。"],["新疆维吾尔木卡姆","新疆维吾尔木卡姆 (Social Folklore / Seasonal Festivals)","维吾尔族大型传统音乐套曲","民俗事象","社会民俗","岁时节日",null],["中国剪纸","中国剪纸 (Social Folklore / Seasonal Festivals)","用剪刀在纸上剪刻花纹的民间艺术","民俗事象","社会民俗","岁时节日",null],["中国皮影","中国皮影 (Social Folklore / Seasonal Festivals)","以兽皮或纸板制成人物的投影戏剧，2011年被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2011年——中国的皮影戏被列入联合国非遗代表作名录。皮影戏——集刻纸、操纵和说唱为一体的古老的电影前的幻灯的表演——列入是对全中国各地的——唐山、陕西、湖南和环县等——不同流派的皮影的整体保护。"],["中国篆刻","中国篆刻 (Social Folklore / Seasonal Festivals)","以篆书刻制印章的传统艺术，2009年被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2009年——中国的篆刻——以刀在印石上刻制印章的——将书法的美和金的刀味和石的崩裂合为一体——列入联合国非遗代表作。"],["中国雕版印刷","中国雕版印刷 (Social Folklore / Seasonal Festivals)","以雕版印刷为核心的传统技艺，2009年被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2009年——中国雕版印刷技艺列入联合国非遗代表作。以梨木的版——反刻阳文——刷墨后覆纸——以棕刷的擦印——是活字印刷前——人类知识以手和木板批量复制的古老的手艺。"],["中国传统木结构建筑营造技艺","中国传统木结构建筑营造技艺 (Social Folklore / Seasonal Festivals)","以榫卯为核心的中国传统木构建筑的设计建造和维护知识体系，2009年被列入人类非遗代表作名录","民俗事象","社会民俗","岁时节日","2009年——中国传统木结构建筑营造技艺列入联合国非遗代表作。以榫卯——不用一根铁钉——将成千上万的木构件——精密地咬 c Memory","由历史上的创伤事件（战争、灾害、迫害等）形成的集体记忆，包含痛苦和修复的双重维度","理论术语","记忆与传承理论","文化记忆","由历史上巨大的集体创伤事件在群体的集体记忆中留下的深层情感伤痕。核心悖论在于同时存在的压抑回避与刻骨无法忘记。在民俗学中为仪式作为创伤修复机制提供了理解框架。"],["纪念记忆","Commemorative Memory","通过纪念碑、纪念仪式和纪念日等制度化形式保存和传递的集体记忆","理论术语","记忆与传承理论","文化记忆","通过纪念碑纪念雕塑纪念日和纪念仪式等制度化形式被刻意保存呈现和传承的集体记忆类型，是对忘记的制度性对抗。在民俗学中为民俗活动作为纪念仪式提供了分析框架。"],["遗忘记忆","Forgetting Memory","被社会选择性地遗忘或压抑的记忆，遗忘与记忆是同一过程的两面","理论术语","记忆与传承理论","文化记忆","记忆研究中的关键悖论性概念。社会选择性地遗忘某些历史事件与选择性记住其他事件是同一过程的两个方面。在民俗学中为民俗传承的背面——哪些民俗被继承哪些被遗忘——提供了理论工具。"],["记忆之场","Sites of Memory (Lieux de Mémoire)","皮埃尔·诺拉提出的承载集体记忆的物理或象征性场所概念","理论术语","记忆与传承理论","文化记忆","诺拉系统发展的概念。记忆之场是被历史选择和社会建构被不断重新阐释的承载集体记忆的有形物质场所象征符号和纪念仪式。在民俗学中为民俗的景观化和遗产化提供了理论视角。"],["记忆实践","Memory Practice","群体通过仪式叙事纪念等活动主动生产和再生产记忆的社会实践","理论术语","记忆与传承理论","文化记忆","群体通过具体的集体性实践——周期仪式祭祀共同叙事纪念活动——主动生产和再生产集体记忆的过程。在民俗学中记忆实践是民俗的核心功能之一——年俗的文化功能是通过系列民俗实践年复一年再生产关于家和团圆的集体情感记忆。"],["记忆政治","Politics of Memory","各方力量围绕记忆的选择保存和解释进行的权力角逐","理论术语","记忆与传承理论","文化记忆","多元社会力量围绕历史记忆的选择保存解释和再现进行的利益意识形态和认同的权力斗争。在民俗学中为民俗如谁的节日被纳入国家节日提供了政治分析维度。"],["记忆伦理","Ethics of Memory","关于记忆的责任、正义和边界的伦理规范，涉及谁有权利记忆、如何记忆","理论术语","记忆与传承理论","文化记忆","关于记忆道德责任正义和伦理边界的规范性讨论和思考。在民俗学中为民俗特别是创伤记忆民俗的研究提出了超越纯粹学术描述的价值规范维度。"],["记忆传承","Memory Transmission","记忆在代际之间传递的机制和过程，是民俗传承的重要维度","理论术语","记忆与传承理论","文化记忆","记忆在代际间传递和继承的过程机制，是民俗传承的基础性不可见维度。母亲边做年糕边讲她外婆的做法时传给女儿的不仅是年糕技术更是跨越三代女性的无形家族味觉和情感记忆。"],["记忆媒介","Memory Media","承载和传递记忆的物质与技术载体，包括文字、图像、建筑、仪式和数字媒介","理论术语","记忆与传承理论","文化记忆","承载储存传递和激发集体记忆的物质形式和技术载体。媒介不仅被动承载记忆更主动塑造着记忆的形式。在民俗学中为民俗传承的媒介条件分析提供了工具。"],["记忆技术","Memory Technology","记录、存储和再现记忆的手段和工具，从口传到书写到数字技术","理论术语","记忆与传承理论","文化记忆","记录储存组织和再现记忆的物质手段和操作方法总称。在民俗学中为民俗从口传到数字媒体的历史上的传承方式的连续和颠覆提供了技术维度分析。"],["记忆景观","Memoryscape","由记忆实践形塑的文化景观，空间中凝结着集体记忆的历史层次","理论术语","记忆与传承理论","文化记忆","被人类长期记忆实践所形塑和层层叠加的文化景观和有丰富历史厚度的场所。在民俗学中为古村落作为被代代村民集体记忆所层层书写的记忆景观提供了历史深度分析框架。"],["记忆叙事","Memory Narrative","通过叙事形式组织和传递的集体记忆，故事和传说是记忆叙事的重要体裁","理论术语","记忆与传承理论","文化记忆","通过故事传说史话和口述历史等叙事形式被组织传递和不断再创造的集体记忆。在民俗学中指向民俗口头传统作为集体记忆叙事化表达的记忆塑造和传承功能。"],["记忆认同","Memory Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","记忆与传承理论","文化记忆","个体或群体通过特定记忆来建构自我和集体认同感的过程。民俗中吃饺子不是因为生理需要而是因为它和关于吃它的家族记忆一起构成了文化认同。"],["记忆断层","Memory Rupture","集体记忆传承过程中出现的断裂和中断，常与社会剧变和代际断裂相关","理论术语","记忆与传承理论","文化记忆","集体记忆在代际传承链条中出现的突然中断断裂。通常因剧变的社会历史条件造成。在民俗学中是分析民俗传承中断的关键概念——文革破四旧对宗族祭祀的暴力中断刻下至今未弥合的记忆断层。"],["记忆重构","Memory Reconstruction","集体记忆在当下社会需要框架中被重新组织和解读的过程","理论术语","记忆与传承理论","文化记忆","集体记忆在当下社会需要和框架中被重新组织和解读的过程。在民俗学中为民俗传统如何在当下被重新解释和赋予新意义提供了分析工具。"],["记忆发明","Invention of Memory","为当下需要而创造或重构的看似传统的集体记忆，霍布斯鲍姆'传统的发明'概念在记忆领域的延伸","理论术语","记忆与传承理论","文化记忆","为当下需要而创造或重构的看似传统的集体记忆。霍布斯鲍姆传统的发明概念在记忆领域的延伸。在民俗学中为民俗本真性的建构分析提供了理论工具。"],["记忆竞争","Memory Contestation","不同群体围绕历史记忆的解释权和叙事权展开的角逐和博弈","理论术语","记忆与传承理论","文化记忆","不同群体围绕历史记忆的解释权和叙事权展开的角逐和博弈。在民俗学中为民俗如不同群体对同一地方传统节庆的不同版本的叙事争夺提供了分析框架。"],["记忆协商","Memory Negotiation","不同群体就历史记忆的解释和呈现进行的对话与调适","理论术语","记忆与传承理论","文化记忆","不同群体就历史记忆的解释和呈现进行的对话与调适。在民俗学中为民俗实践中多元主体如何通过协商达成共享记忆提供了分析工具。"],["田野调查法","Fieldwork Method","田野调查法，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","民俗学最根本的和不可替代的核心方法的完整的中文称谓。以研究者亲赴田野实地的第一手观察、访谈和身体参与为无法取代的资料获取渠道的整套研究操作的系统。"],["田野观察","Field Observation","田野观察，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","田野调查的最基本的和不可替代的核心技术——以研究者的眼耳鼻舌和全身的感知器为工具在民俗实践的自然现场进行的不介入的直接的持续的第一手观察。"],["田野记录","Field Documentation","田野记录，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","田野工作者将观察和访谈的内容/场景/感受即时地、有系统和不间断地进行写/录/拍/绘等形式的记录的整个工作过程及其产物的档案。是田野素材转换为学术成果的不可逆的单向管道——当时没记录的资料永远地流失。"],["学术田野","Academic Fieldwork","学术田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","与以应用和社会干预为导向的应用田野相对——以纯学术的目标——提出和回答学术的理论和学科的问题——为驱动田野工作的整个设计和运作的动机的核心田野类型。"],["应用田野","Applied Fieldwork","应用田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","与以纯学术探索为目的的学术田野相对——以解决现实中紧迫的具体的实际问题——如为非遗项目撰写濒危报告和制定保护方案——为直接的田野工作的动机和产出导向的田野类型。"],["行动田野","Action Fieldwork","行动田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","研究不仅仅是为了求知，更是与研究社区并肩采取集体的行动来推动社区的积极的变革和进步——在行动中持续性地研究和在研究的基础上调整行动的实践—研究融合的不割裂的模式。"],["合作田野","Collaborative Fieldwork","合作田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","不再将田野关系构为研究者单方向地从被研究者提取信息——而是在田野的全过程中从问题设计到数据搜集分析均与被研究者建立平等的合作和共创的知识生产的合作关系的田野工作理念和模式。"],["参与式田野","Participatory Fieldwork","参与式田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","当地社区的被研究者不再是研究的客体——而是以主人翁的角色自我参与到研究的全过程中来——用自己的语言来发出自己的真实的声音诉说自己的真实的关切——而研究者的角色则悄然转变为一个外来的服务的协调者和技术的支持者。"],["乡村田野","Rural Fieldwork","乡村田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以中国传统的社会和地理的基座单元——自然村落和行政村——为田野工作的经典的传统场所进行的乡村民俗的实地调查和研究活动。"],["都市田野","Urban Fieldwork","都市田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","在现代化的城市空间——住宅小区/街头广场/商业综合体/文身的店内/网络吧等——中寻找和研究都市民俗（都市的新传说/广场舞/城市社区的新习俗等）的田野调查活动。都市田野标志着民俗学的田野从固守乡村到拥抱整个社会。"],["线上田野","Online Fieldwork","线上田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以互数字联网的虚拟空间——如微信群/贴吧/短视频平台/和微博——为田野的主要场所进行的远程非面对面的观察和互动的田野工作的新型模式和技能。COVID-19封锁期极大地催化了线上田野的方法的发展。"],["虚拟田野","Virtual Fieldwork","虚拟田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以完全虚拟的电脑合成的三维世界——如大型多人在线游戏的庞大的虚拟社区和元宇宙——为田野工作驻在的非物理的虚拟空间进行沉浸式田野的新型田野模式。"],["多点田野","Multi-sited Fieldwork","多点田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","研究者不拘锁于单一定点的传统田野地点，而是在同一研究项目下沿着人或物的移动和关联轨迹在多点之间穿梭进行跟踪式的田野研究。是多点民族志和全球民族志线索的具体的田野操作形式。"],["短期田野","Short-term Fieldwork","短期田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","在时间资源和金费高度受限而无法进行经典的长期田野的客观制约下，以数周到一两个月为单位的紧凑高强度的田野窗口期进行的集中的田野调查。可能牺牲田野的深度但保证项目的执行的可行性。"],["回访田野","Revisit Fieldwork","回访田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","田野工作者在间隔一段时间后重新回到之前的调查地点进行后续跟踪的田野工作模式。核心价值在于时间维度的纵深对比——记录同一社区在不同时间的民俗实践的变迁和稳定。"],["追踪田野","Tracking Fieldwork","追踪田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","研究者跟随被研究对象的移动轨迹（如农民工的流动/艺人的巡演）跨越空间进行追踪式的田野研究。其核心特征是田野点随人动——田野边界不再是一个固定的地点。"],["重返田野","Return Fieldwork","重返田野，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","田野工作者在田野结束并离场较长时间后，再次重新返回那个田野社区，以重新激活和研究中断了一段时间后的田野关系的新动态和研究田野后的社区生活的新的阶段。这是长线跟踪研究的关键一环。"],["田野日志","Field Journal","田野日志，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","以日记的私密逐日形式，研究者个人在田野全程中持续记录的关于当天的田野经历、困境、情绪的日记体笔记。不同于事后整理的田野报告，日志保留着田野现场的毛边的温度和焦虑。"],["田野写作","Field Writing","田野写作，田野调查中的田野伙伴关系类田野调查方法","研究方法","田野调查","田野伙伴关系","在田野的现场——在驻地的书桌前或村口的大树下——与田野经历同步进行的写作，而不是回到城市大学的书斋后靠回忆整理。现场写作最大的优势是在记忆还温热和鲜活的时刻捕捉细节。"],["民俗学研究对象","Subject of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学学科的研究范围界定——即民众在日常生活中创造享用和传承的全部生活文化。钟敬文将其界定为物质民俗社会民俗精神民俗和语言民俗四大范畴。"],["民俗学研究方法","Folklore Research Methods","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学用以获取分析解释民俗资料的系统方法和技术的总称，核心是田野调查法（参与观察深度访谈）辅以文献研究法和比较研究法。"],["民俗学理论体系","Theoretical System of Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学作为独立学科的概念命题和理论框架的系统化集成。钟敬文为中国民俗学建构了以民俗文化学为顶层的多层理论体系。"],["民俗学学科史","History of Folklore Studies","民俗学作为独立学科的体制化存在","学科概念","学科元概念","学科属性与定位","民俗学作为独立学科从无到有的制度化发展历程的历史研究。中国的学科史从1918年北大歌谣研究会算起已逾百年。"],["民俗学学术史","Academic History of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学的学术研究实践本身作为历史对象的研究——研究历代学者做过哪些田野工作、写出过什么成果和提出过什么理论，是学科自我反思的学术史维度。"],["民俗学思想史","Intellectual History of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","追溯和分析民俗学在不同时期的背后指导思想和理论预设的历史流变与范式更替的学术思想史分支。"],["民俗学制度史","Institutional History of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","研究民俗学的学术机构学会刊物以及学科在高等教育体系中的行政和法律地位的制度化历程的制度史分支。"],["民俗学教育","Folklore Education","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","在高等院校和研究机构中以民俗学为专业的学位培养体系的总称，包括本科的通识课程和研究生的硕博培养。钟敬文为北师大民俗学教育的创建者。"],["民俗学教学","Folklore Pedagogy","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学教育的实践层面——如何教授田野方法如何训练学术写作和如何培养学生的民俗感悟力的教学方法论。"],["民俗学课程","Folklore Curriculum","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","高校民俗学教育的具体课程设置——如民俗学概论民间文学概论田野调查方法和民间信仰研究等核心课程的安排。"],["民俗学教材","Folklore Textbooks","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","用于民俗学高等教育的系统和规范的教材。钟敬文主编的《民俗学概论》（1998）是中国民俗学最权威和经典的教材。"],["民俗学学位","Folklore Degrees","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","国内外高等教育机构授予的民俗学专业学士硕士和博士各级学位的体系。中国民俗学学位授予早期长期没有独立的学科代码依赖挂靠。"],["民俗学学术共同体","Folklore Academic Community","共享特定文化传统情感纽带或社会认同的群体","学科概念","学科元概念","学科属性与定位","由民俗学领域的学者教师和学生组成的、共享学科知识范式和学术信念的专业社群。中国民俗学会及各高校民俗学学科点是其制度化的载体。"],["民俗学学术范式","Folklore Academic Paradigm","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学研究中共有的理论前提方法论标准和经典研究范例的系统集合。中国民俗学主要经历了文本搜集-田野民族志-表演过程-实践能动性等多次范式转换。"],["民俗学学术传统","Folklore Academic Tradition","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学在长期历史中积淀形成的学科特有的研究旨趣方法和学术风格的传统。中国民俗学的学术传统可追溯至五四时期的北大歌谣研究会。"],["民俗学学术规范","Academic Standards in Folklore","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","关于民俗学研究的学术质量标准和学术行为的基本规则——包括田野伦理引用规范和学术诚信等方面的约定。"],["民俗学田野规范","Folklore Fieldwork Standards","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","关于田野工作全过程的规范化要求——从田野准入伦理审查到知情同意的取得和互惠回报等环节的基本准则和操作规范。"],["民俗学写作规范","Folklore Writing Standards","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","关于民俗学论文和民族志书写的格式逻辑和表述质量的规范化要求。中国民俗学的中文写作规范有不同于西方英文规范的独特要求。"],["民俗学习引规范","Folklore Citation Standards","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学论文和研究著作中引用他人成果的标准格式规范。中国民俗学通常遵循GB/T 7714标准的顺序编码制。"],["民俗学伦理规范","Folklore Ethics Standards","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","关于民俗学研究者对被研究者被研究社区和学术共同体应负的道德责任和约束的规范化伦理准则体系。"],["民俗学社会功能","Social Function of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学学科在当代社会中应发挥的学术之外的积极作用——如为非遗保护和文化政策提供学术依据以及提升公众对本民族文化的认知和自信。"],["民俗学社会责任","Social Responsibility of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学学科对学术界之外的社会和民众——特别是对在田野中提供信息的社区和传承人——应承担的伦理和社会担当。"],["民俗学公共性","Public Nature of Folklore Studies","文化实践和空间面向公众开放共享的社会属性","学科概念","学科元概念","学科属性与定位","民俗学的研究成果和知识应向社会公众开放共享而非封闭在学院塔内的学科属性和价值立场。公共民俗学是这一理念的集中体现。"],["民俗学应用性","Applied Nature of Folklore Studies","民众创造享用和传承的生活文化和风俗习惯","学科概念","学科元概念","学科属性与定位","民俗学不仅为纯学术而存在更应将其知识和方法应用于非遗保护社区发展和文化政策等社会实际问题的学科特征和取向。"],["民俗学的学科认同","Disciplinary Identity of Folklore Studies","个体或群体对所属文化共同体和社会类别的归属意识","学科概念","学科元概念","学科属性与定位","民俗学研究者对本学科的独特性学术价值和在整个人文社会科学体系中的不可替代的独立地位的自我认知和集体确认。学科认同的强弱直接关系到学科的人才吸引力和学术话语权。"],["民俗学的学科焦虑","Disciplinary Anxiety in Folklore Studies","民俗学作为独立学科的体制化存在","学科概念","学科元概念","学科属性与定位","民俗学在当代人文学科格局中因学科边界模糊、学术市场萎缩和社会认知度低而对自身存在和未来产生的集体不安和生存的焦虑。"],["民俗学的学科危机","Disciplinary Crisis in Folkl 井和四角小天井组成的云南大型民居","民俗事象","物质民俗","居住建筑",null],["走马转角楼","走马转角楼 (Material Folklore / 居住建筑)","土家族以转角回廊连接各房的吊脚楼式建筑","民俗事象","物质民俗","居住建筑",null],["木楞房","木楞房 (Material Folklore / 居住建筑)","以圆木叠垒而成的井干式建筑，云南部分少数民族的传统民居","民俗事象","物质民俗","居住建筑","云南的——摩梭人和普米族——以圆木——层层水平叠成——四角的交叉处——以木榫咬合——整幢房不用一铁一钉——木楞房是高原的森林民族的木的积木。"],["土掌房","土掌房 (Material Folklore / 居住建筑)","以土筑平顶的彝族哈尼族传统住宅，房顶可做晒场","民俗事象","物质民俗","居住建筑",null],["抓周礼","抓周礼 (life-cycle ritual/custom)","婴儿满周岁抓取物品预测前途","民俗事象","社会民俗","人生礼仪",null],["开笔礼","开笔礼 (life-cycle ritual/custom)","儿童入学时举行的启蒙仪式，由师长为其开笔破蒙，标志正式进入学习阶段","民俗事象","社会民俗","人生礼仪","中国古代的儿童——在四至七岁——入私塾的第一天——由先生——握着孩子的小手——在描红的纸上——写下人生第一个——人字——开笔是破蒙的第一步。"],["成童礼","成童礼 (life-cycle ritual/custom)","儿童从童年过渡到少年的成长仪式，一般在十岁左右举行","民俗事象","社会民俗","人生礼仪","中国古代——男童在十岁左右——行成童礼——束发——改穿成童的服装——标志着从儿童——成长为少年——开始读《四书》。"],["志学礼","志学礼 (life-cycle ritual/custom)","古代十五岁的立志向学之礼，语出《论语》'吾十有五而志于学'","民俗事象","社会民俗","人生礼仪","见671冠礼。中国古代——男子十五岁——志学于《论语》的十五而志于学——行志学礼——标志着进入立志求学的少年的阶段。"],["弱冠礼","弱冠礼 (life-cycle ritual/custom)","二十岁的成年礼，语出《礼记》'二十曰弱，冠'，加冠取字","民俗事象","社会民俗","人生礼仪","见671冠礼。男子二十岁的成年的加冠的礼仪。"],["及笄礼","及笄礼 (life-cycle ritual/custom)","女子十五岁的成年礼，语出《礼记》'十有五年而笄'，以簪束发","民俗事象","社会民俗","人生礼仪","见885笄礼。女子十五岁——以簪束发的成年的礼仪。"],["上头礼","上头礼 (life-cycle ritual/custom)","婚礼前为新娘梳妆盘髻的礼仪，与开脸相伴，标志少女到妇人的身份转变","民俗事象","社会民俗","人生礼仪","见1576上头。出嫁前——将少女的发髻——改梳为妇人的高髻。"],["开脸礼","开脸礼 (life-cycle ritual/custom)","用线绞去新娘面部汗毛并修整眉毛的礼仪，是走向婚姻的标志性美容仪式","民俗事象","社会民俗","人生礼仪","见1575开脸。出嫁——以线绞去新娘脸上的汗毛——从少女的脸——蜕变为少妇的脸。"],["纹身礼","纹身礼 (life-cycle ritual/custom)","通过纹身完成身份转换的仪式，在部分民族中为成年和族群归属的必要标记","民俗事象","社会民俗","人生礼仪","见2902纹身。以针刺和颜料——在皮肤上留下终生的图腾和标记。"],["凿齿礼","凿齿礼 (life-cycle ritual/custom)","以凿齿为成人标志的仪式，凿去门齿或犬齿象征脱离童年进入成人社会","民俗事象","社会民俗","人生礼仪","见2905拔牙。在一些文化中以凿掉门齿为成人礼。"],["染齿礼","染齿礼 (life-cycle ritual/custom)","以染黑牙齿为成人标志的仪式，黑色牙齿被视为美的象征","民俗事象","社会民俗","人生礼仪","见2904染齿——以植物的汁液将牙齿染成黑色——作为美的标记。"],["文化认同","Cultural Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体或群体对所属文化传统价值和生活方式的认同感和归属感。文化认同通过语言习俗节日饮食和信仰等民俗实践的日常操演被持续建构和再生产。是民俗学中认同研究的核心概念。"],["国家认同","National Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属国家的政治法律和文化共同体的认同感和归属意识。国家认同与民俗实践高度相关——共享节庆和历史叙事是国家认同的核心文化资源。"],["地方认同","Place Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对特定地方如家乡的归属感和情感依附。地方认同通过在地民俗实践如参与地方节庆祭祀和地方口述历史分享被持续建构。"],["阶层认同","Class Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属社会阶层如工人阶层农民阶层的认同感。阶层认同通过体现特定阶层生活方式的民俗实践被表达和再生产。"],["职业认同","Professional Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属职业群体的认同感和归属意识。职业认同通过特定职业的民俗实践如师徒传承行话行业禁忌和专业节庆被持续操演和强化。"],["代际认同","Generational Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属世代如80后90后00后的认同感。代际认同通过世代间不同的民俗消费和表达方式如网络用语和怀旧文化被建构和区隔。"],["年龄认同","Age Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属年龄群体的认同感通常与生命周期民俗关联。儿童青少年和老年的民俗实践各有不同形成不同的年龄文化认同。不同年龄的民俗参与模式是年龄认同的操演场域。"],["地域认同","Regional Identity","个体或群体对所属文化共同体和社会类别的归属意识","理论术语","社会与群体理论","社会理论与民俗","个体对所属地域（省份、城市、村落等）的认同感和文化归属。地域认同通过特定的地方民俗实践——方言使用、地方节庆参与、地方饮食偏好——被持续建构和操演。在全球化同质化压力下地域认同正经历复兴。"],["静态传承","Static Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","与动态传承相对的概念，指民俗传承过程中传承的内容和形式保持高度不变不被创造性改编的理想化传承模式。非遗保护中原汁原味传承的话语即建立在静态传承的预设上。但当代研究批判指出绝对的静态传承在口头传统中是不存在的。"],["师徒传承","Master-Apprentice Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","以师徒关系为核心纽带通过师傅手把手传授徒弟身体模仿学习进行的民俗技艺传承方式。其核心特征包括：口传心授非文本化、长期性和嵌入式（徒弟住在师傅家多年在生活和劳作的全过程中学习和内化技艺）、严格的师徒伦理（尊师重道）。是戏曲曲艺手工艺等需要深度身体技能的民俗的核心传承机制。"],["家族传承","Family Transmission","在同一族群内部进行的非物质文化遗产传承方式","理论术语","记忆与传承理论","传统与传承","以家族和亲属关系为传承纽带在家族内部（如祖传绝技传男不传女的父系传承）进行的民俗文化传承方式。家族传承的核心特征是封闭性（技术不外传）和权威性（家族长辈即传承权威和守门人）。"],["社区传承","Community Transmission","在特定地域范围内具有共同纽带和社会互动关系的社会群体","理论术语","记忆与传承理论","传统与传承","以地域社区如村落街区为单位进行的民俗传承方式，不同于家族传承的封闭性——社区传承具有公共性和开放性（全社区成员均可参与和习得社区的共享民俗如全村的社火）。非遗保护中社区传承被提升为最受重视的活态传承方式。"],["学校传承","School-based Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","通过正式教育体系如中小学的非遗课程和大专院校的民俗学系科进行的制度化民俗传承方式。其优势是系统性和规模化，劣势是脱离日常生活语境的去嵌入化——在学校课堂上教的剪纸不同于跟着奶奶在灶台边学的剪纸。"],["社会传承","Social Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","以整个社会为传承场域和传承单位而非特定家族师徒或学校的更广义的民俗传承方式。典型案例如全民性的春节习俗通过全社会的周期同步实践被代代传承。"],["自然传承","Natural Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","民俗在日常生活中自发地非刻意安排地进行的传承方式——孩子跟着大人过年自然而然学会了年的习俗无需专门课堂。是非遗保护中最理想的活态传承形态但也最为脆弱。"],["制度传承","Institutional Transmission","传统和传承机制的理论概念","理论术语","记忆与传承理论","传统与传承","通过文化遗产法律非遗名录传承人认证等正式制度和行政法规保障和推进的民俗传承方式。其优势是提供了资金和合法性，副作用是可能将民俗传承从自发的社区实践转化为依赖于外部制度激励的被动行为。"],["田野录音","Field Audio Recording","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在取得知情同意后，使用专业录音笔或手机等设备，对田野访谈/民间艺人的演唱演奏/和仪式现场的声音进行全过程的实地录制保存田野现场完整的声音维度以备后期详细分析。"],["田野摄影","Field Photography","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在征得同意的条件下，运用照相机拍摄田野现场的人物肖像、仪式场景、物质文化（建筑、祭祀供品、手工艺品）的静态视觉档案，用以辅助和补充文字记录的不足并作为可视的证据和呈现。"],["田野摄像","Field Videography","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","运用摄像机持续不中断地录制动态的民俗活动——如一段舞蹈、一出社火的全过程——以完整保留民俗实践的时间轴和动态的身体的空间移动和变化的多维信息。"],["田野绘图","Field Drawing","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在现场快速手绘和素描记录特定民俗场景中不可被任何照片和文字完全替代的空间的布局人流动线和关键道具的形状和位置等的十分实用和有效的传统田野记录技术。"],["田野制图","Field Mapping","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在现场对田野地点（村落/庙会现场/仪式空间）的基本的建筑布局和道路网进行简易的实测和成图，为后期的分析和文本中的插图提供一手的高精度的空间数据。"],["田野测绘","Field Surveying","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","运用基本的测量工具（卷尺、GPS设备）在田野现场对村落的建筑物、仪式空间和墓地进行简单的测距和定位，以生产后续民俗志写作中需要的精确的空间关系的学术地图。"],["田野采样","Field Sampling","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在征得被研究者知情同意后，在田野现场进行非破坏性的小型的物质文化的样本的采集——如仪式中剩余香灰的小袋分装和节庆食品的样本——以便带回实验室中进行成分分析和长久保存于民俗文物档案。"],["田野问卷","Field Questionnaire","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","将预设的标准化结构化问卷通过面对面或在线的形式、在田野现场面向大基数的被访者进行发放回收和数据的初步统计的技术，适用于大规模的普查式的田野而非深度访谈。"],["田野统计","Field Statistics","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","在现场对收集上来的大批次的问卷和量化的田野数据（如某村的人口/经济/信仰的基本面上的百分比）利用简装的统计软件（如SPSS）进行快速的现场初步的统计和可视化以引导后续深访的决策。"],["田野分析","Field Analysis","田野调查记录方法或伦理规范","研究方法","田野调查","记录与伦理","不是回到大学书斋后才开始的迟延的分析，而是在田野进行期间就利用晚上的有限的时间和精力对当天的新的笔记进行及时的初步的编码分类和初步的概念化分析的工作以指导明天的田野方向。"],["国潮","Guochao / China Chic","以中国传统文化元素为核心融合现代设计和消费 ,null],["钟馗嫁妹","钟馗嫁妹 (Verbal Folklore / 传说)","钟馗死后不忘旧约将妹妹嫁与生前好友杜平的驱鬼大神传说","民俗事象","语言民俗","传说","中国民间——钟馗——以捉鬼为业——嫁给他的妹妹——以百鬼的抬轿和嫁妆——在除夕夜——轰轰烈烈——钟馗嫁妹——是中国的嫁妹的最鬼灵精怪的嫁娶的传说。"],["和合二仙","和合二仙 (Verbal Folklore / 传说)","寒山和拾得两位唐代高僧被奉为象征和睦好合的民间神祇","民俗事象","语言民俗","传说","寒山和拾得——两位唐代的疯僧——手持荷花和捧盒——他们是民间的——保佑夫妻的和睦和家庭的圆满的——和合二仙——年画和婚礼中——和合二仙是喜神。"],["张生与崔莺莺","张生与崔莺莺 (Verbal Folklore / 传说)","元稹《莺莺传》和王实甫《西厢记》中书生张珙与崔莺莺的爱情故事","民俗事象","语言民俗","传说","唐代——元稹的《莺莺传》——后经金代董解元——到元代王实甫的杂剧《西厢记》——穷书生张生和相国之女崔莺莺——在红娘的穿针引线下——突破重重礼教——终成眷属——西厢记是自由恋爱的永不落幕的最美的梦。"],["杜十娘","杜十娘 (Verbal Folklore / 传说)","明代话本京师名妓杜十娘怒沉百宝箱的爱情悲剧故事","民俗事象","语言民俗","传说",null],["苏小小","苏小小 (Verbal Folklore / 传说)","南齐钱塘名妓苏小小才貌双全红颜薄命的传奇","民俗事象","语言民俗","传说",null],["柳毅传书","柳毅传书 (Verbal Folklore / 传说)","书生柳毅为龙女传书最终结为夫妻的人神之恋故事","民俗事象","语言民俗","传说",null],["哪吒闹海","哪吒闹海 (Verbal Folklore / 传说)","哪吒七岁闹东海打死龙王三太子的神话故事","民俗事象","语言民俗","传说",null],["沉香救母","沉香救母 (Verbal Folklore / 传说)","沉香劈开华山救出被压在华山之下的母亲三圣母的孝义神话","民俗事象","语言民俗","传说","中国民间——沉香——劈开华山——救出了被二郎神镇压在山下的母亲三圣母——沉香的孝——劈开了神山——沉香救母是中国的孝——最惊天动地和最荡气回肠的神话。"],["中国民间文艺家协会","China Folk Literature and Art Association (CFLAA)","1950年成立（原名中国民间文艺研究会），全国性民间文艺专业团体，组织中国民间文学三套集成编纂","学者与学术体制","学术组织与刊物","学会组织","中国民间文艺家协会，简称中国民协，中国文联的团体会员之一。是全国性的民间文艺和民俗学专业的学术性人民团体，负责全国性的民间文艺和非遗的搜集整理和评审工作。"],["中国少数民族文学学会","Chinese Ethnic Minority Literature Society","研究中国少数民族文学的全国性学术团体，成立于1979年","学者与学术体制","学术组织与刊物","学会组织",null],["中国神话学会","China Mythology Society","研究中国神话与神话学的全国性学术团体，袁珂等学者创立","学者与学术体制","学术组织与刊物","学会组织",null],["中国傩戏学研究会","China Nuoxi Studies Association","研究傩戏与傩文化的全国性学术团体，致力于傩文化田野调查与保护","学者与学术体制","学术组织与刊物","学会组织",null],["中国俗文学学会","China Popular Literature Society","研究中国俗文学（民间通俗文学）的全国性学术团体","学者与学术体制","学术组织与刊物","学会组织",null],["中国民俗摄影协会","China Folklore Photography Association","以影像方式记录、研究和保护民俗文化的全国性社会团体","学者与学术体制","学术组织与刊物","学会组织",null],["国际民间叙事研究会","International Society for Folk Narrative Research (ISFNR)","International Society for Folk Narrative Research，国际民间叙事研究的权威学术组织，致力于口头叙事传统的跨国比较研究","学者与学术体制","学术组织与刊物","学会组织","国际民间叙 人等新文化人的主持下——创办《歌谣》周刊——向全国征集民歌——标志着中国现代民俗学的正式开端。"],["民俗周刊时期","Folklore Weekly Period (1920s-1930s)","1920年代末至1930年代，中山大学《民俗》周刊（原名《民间文艺》）发行期间的中国民俗学活跃期，顾颉刚、钟敬文等参与","学者与学术体制","学科建设","学科史事件","1927-1930年以广州中山大学的《民俗》周刊为中心的民俗学学术运动。在顾颉刚和钟敬文等的主持下——大量发表各地的民俗调查报告——使中国民俗学从歌谣扩展至全门类的民俗。"],["民俗学复办","Re-establishment of Folklore Studies (post-1978)","1978年后中国民俗学恢复重建的学科进程，包括恢复研究机构、重建学术团体、恢复招生培养","学者与学术体制","学科建设","学科史事件","1978年文革后——以钟敬文为主要推动者——中国民俗学经历的中断二十余年后——重新建立学术组织、恢复教学和创办刊物的学科恢复的时期。1983年中国民俗学会成立标志着复办的成功。"],["非遗保护运动兴起","Rise of the ICH Safeguarding Movement (2003-)","2003年联合国教科文组织《保护非物质文化遗产公约》通过后，中国全面开展非遗普查、申报与保护的社会文化运动，深刻影响了民俗学的学科定位与实践方向","学者与学术体制","学科建设","学科史事件","2004年中国加入联合国教科文组织非遗公约以来——非遗保护迅速上升为国家意志和社会热点的宏观的运动的时期。深刻地改变了民俗学的学科生态——从冷僻的学院研究走向了国家公共文化服务的核心。"],["中国民俗学会成立","Founding of China Folklore Society (1983)","1983年中国民俗学会在北京成立，钟敬文任首任理事长，标志着中国民俗学学科建制化的重要里程碑","学者与学术体制","学科建设","学科史事件","1983年5月——在钟敬文的主持和推动下——中国民俗学会在北京正式宣布成立——是由全国民俗学工作者自愿组成的全国性的学术性人民团体——是中国民俗学制度化的里程碑。"],["中国民俗学学科建设大讨论","Great Debate on Folklore Discipline Construction","1990年代末至21世纪初，围绕民俗学学科定位、研究对象、方法论展开的全国性学术讨论，涉及民俗学与人类学、社会学的关系","学者与学术体制","学科建设","学科史事件","1990年代后期至2000年代初期——中国民俗学界围绕着学科的性质（民俗学和民间文学的关系）、研究对象（民是谁和俗是啥）和学术方向（走向田野还是留守文本）等问题进行的一场深刻而长久的学科内部的自我反思和辩论——推动了民俗学的范式更新。"],["非遗学科的建立","Establishment of ICH as Academic Discipline","21世纪初中国高校设立非物质文化遗产学交叉学科，将非遗保护纳入高等教育体系","学者与学术体制","学科建设","学科史事件",null],["民俗学一级学科论证","First-level Discipline Argumentation for Folklore","民俗学界长期推动的学科升级论证，争取民俗学从二级学科升为一级学科，涉及学科边界与知识体系的重新界定","学者与学术体制","学科建设","学科史事件","2010年代以来——以民俗学争取在教育部学科目录中被认定为独立的一级学科（而非目前挂靠在社会学之下）为目标的持续的学科的行政和学术的论证和游说工作。目前仍在进行中。"],["写文化论争","Writing Culture Debate","1980年代受后现代人类学影响而引发的关于民族志写作权威性与表述方式的跨学科学术论争，詹姆斯·克利福德与乔治·马库斯编《写文化》为核心文本","学者与学术体制","学科建设","学科史事件","1980年代以詹姆斯·克利福德和乔治·马库斯主编的《写文化》为代表的后现代人类学的核心的立场——质疑民族志的文本的客观性和权威——揭示民族志文本是文学性的修辞而非透明的文化的再现。对民俗志的书写的方法论产生了深远的反思的影响。"],["实践民俗学转向","Practical Folklore Turn","21世纪初中国民俗学从以事象为中心的研究范式转向以民众实践和日常生活为中心的研究范式，吕微、户晓辉等学者推动","学者与学术体制","学科建设","学科史事件","2010年代以来以吕微和户晓辉等为代表的——将民俗学从经验描述的
