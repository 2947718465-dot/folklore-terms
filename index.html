事中'清官'和'皇帝'形象的建构）。张士闪的礼俗互动理论本质上是从民俗学视角对国家与社会关系分析的本土化理论建构。"],["圣秘性/神圣性","sacredness","奥托提出的宗教体验中神圣对象所具有的超凡神秘和敬畏特性","理论术语","信仰与观念体系","信仰根源与形态","鲁道夫·奥托（Rudolf Otto）在《论神圣》（1917）中提出的宗教现象学核心概念。奥托将神圣体验的本质界定为'mysterium tremendum et fascinans'（令人战栗又令人着迷的神秘）——神圣不仅是'善'和'道德'，更是一种既令人恐惧（tremendum）又令人向往（fascinans）的完全超越性的他者（wholly other）。在民俗学中，圣秘性解释了大量的民间信仰行为：为什么人们害怕鬼神却又主动拜鬼神？为什么禁忌越可怕越被严格遵守？——正是因为信仰对象兼具令人恐惧和令人向往的双重特质。涂尔干的'神圣/世俗'二分法是对奥托圣秘性概念的社会学转化。"],["在地化","localization / translocalization","外来文化在地方语境中适应和改造的过程","研究关键词","身份与权力","身份与权力","全球化和跨国流动的文化元素进入一个全新的地方的文化和社会的语境后被当地的民众主动地按照自己的需要——而不是外来者的意愿——进行选择性地吸收改造而融入本地的文化实践的适应性的过程和策略。"],["在野之学","field-based scholarship / in-the-wild learning","日本民俗学以民间社会为本立足田野的学术传统和学科定位","理论术语","中国本土理论","田野范式","日本民俗学以民间社会为本、立足田野实践的学术传统和学科定位，与以大学和研究所为基地的学院派学术相对。'在野'（zaiya）既指空间上的'在田野之中'——柳田国男终生在地方社会进行实地调查而不囿于大学书斋——也指学术立场上的'站在民众一边'——民俗学不是研究'他们'的学问，而是与'他们'站在一起理解'我们'的文化。中国民俗学的田野传统在很多方面与日本'在野之学'同构：钟敬文、顾颉刚等人的早期工作都具有强烈的'在野'色彩。近年来中国实践民俗学中'朝向民众'的呼声也是这一传统的当代回响。"],["地域民俗学","regional folklore","以特定地域民俗为研究对象的民俗学分支","学科概念","学科元概念","学科属性与定位","以中国某一特定的地区性地理文化单元（如华北的旱作平原、江南的千年水乡、岭南的山地客家的文化圈等）为不可分割的分析单元——强调地方的整体性——来系统研究该单元的总体民俗的特色的民俗学研究的分支和取向。"],["地方性","locality","特定地域孕育的文化独特性和在地性特征","研究关键词","全球化与地方","地方性议题","世界各个地域的社会文化因长久处于不同的地理历史的生态环境中而形成的独特的差异性的性质的总体。民俗在每一个具体的村落都有独特的属于这个村子的地方性。"],["地方性知识","local knowledge","格尔茨提出的特定文化语境中生成和有效的本土经验知识体系","研究关键词","全球化与地方","地方性议题","克利福德·格尔茨（Clifford Geertz）提出的文化人类学的核心的分析概念——与西方现代普世的科学知识不同，在特定的小规模的社会和社区中长期土生土长并只在该社区的语境中发挥效用的非普世的在地人民的经验的知识体系的总称。"],["壶形传说","pot-shaped legend","顾颉刚提出的传说围绕核心人物不断叠加扩增的结构形态理论","理论术语","叙事与口头传统","叙事类型与形态","顾颉刚在对孟姜女传说进行系统研究后提出的关于传说结构形态的经典概念。顾颉刚发现，一个著名的传说人物（如孟姜女）并非自始至终有一个完整固定的故事，而是在历史中如'积薪'般不断叠加新的情节、嫁接新的母题、附加新的解释——后人不断往这个人物身上添加新的故事元素，使得传说的'体量'不断增大，就像叠罗汉一样越来越丰富。该概念与顾颉刚另一核心概念'层累地造成的中国古史'一脉相承，共同揭示了口头传统和文献记载中历史记忆的建构性特征。"],["外价值","external value","非遗保护中外在于文化本身的经济社会价值","研究关键词","非遗与遗产","非遗保护","在非遗的保护和传承中从经济和社会的外部——如旅游收入和社区的凝聚力——去评估和推展非遗的保护价值的视角——区别于从文化自身内部的美学和历史的价值的内部视角的衡量。"],["多元性别","gender diversity","超越男/女二元框架、承认多种性别认知存在的观念","研究关键词","身份与权力","性别研究","超越社会长期默认的男女非此即彼的严格的二元的性别划分的架构——承认和尊重在男女之外还有跨性别和第三性等多元的非二元的性别认知和身份存在的理念和权利的运动。"],["女性主义","feminism","主张性别平等、批判性别压迫的理论立场与社会运动","研究关键词","身份与权力","性别研究","从18世纪启蒙到19-20世纪的妇女参政到当代的多元的女性主义流派——共同的核心是批判在历史和文化中被系统性地制度和自然化的女性的从属和压迫的秩序并为实现所有性别的平等的权利和尊严而奋斗的理论和运动。"],["女性主义立场","feminist standpoint","从女性生活经验出发构建知识体系的认识论立场","研究关键词","身份与权力","性别研究","女性主义的认识论的核心的立场——不是模仿男性的所谓的客观和科学的学术范式，而是站在女性自身在日常生活中的独特的生命经验和压迫体验的真诚的基石上重新建构新的非父权的知识体系和学术的立场。"],["女性研究","women's studies","以女性经验和女性主体为研究对象的学术领域","研究关键词","身份与权力","性别研究","在学术界将女性的经验历史和主体性从被传统学术的系统性忽略和矮化的边缘推至研究的中心的学术研究运动。在民俗学中女性研究将哭嫁歌和女红等从学术的边角料变为核心的课题。"],["存在规则","rules of existence","社会生活中被自然化和默认接受的基本规范和秩序原则","理论术语","社会与群体理论","社会理论与民俗","社会生活中被自然化和默认接受的基本规范和秩序原则，指人们'不言自明'地遵守的行为规则——这些规则不被质疑、不被讨论、不被打上问号，因为它们构成了日常生活的'当然如此'。例如在传统乡土社会中，'儿子必须为父母养老送终''女儿出嫁是理所当然的'等就是存在规则——不需要解释为什么，就是这样。存在规则是权力最隐蔽的运作方式：当一种规范成为'存在规则'，它就脱离了被讨论和批判的范围，成为'自然秩序'。民俗学通过揭示这些存在规则的历史性和建构性——'这是可以不一样的'——实现其解放性的学术价值。"],["学者与民众的视域融合","Horizon Fusion of Scholars and Folk","实践民俗学的核心方法论概念，指研究者的学术视域与民众的生活视域在田野互动中相互理解和融合","理论术语","中国本土理论","田野范式","实践民俗学的核心方法论概念，指在田野调查和研究过程中，研究者的学术视域与民众的生活视域通过深度互动达到相互理解、彼此扩展的认知融合。'视域融合'源自伽达默尔（Hans-Georg Gadamer）的哲学诠释学——理解不是一方'搞清楚'另一方，而是双方视域的融合产生出新的、更高的理解。在民俗学中，该概念的核心主张是：研究者不能把自己的学术框架强加于民众的文化实践之上（如用'迷信'来套民间信仰），而应在田野中首先搁置自己的先入之见，进入民众自身的视域去理解其行为的意义，然后将两种视域融合为一种更丰富的理解。"],["实证民俗学","empirical folklore studies","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","礼俗互动谱系","中国民俗学的重要分支取向，主张以经验、实证和可检验的方法研究民俗现象，强调从可观察的经验事实出发提出假设并通过系统的田野证据进行检验，反对纯粹的理论思辨和哲学推演。实证民俗学的方法论来源主要是现代社会科学的实证传统——定量调查、结构化访谈、统计分析、比较法等。与'实践民俗学'构成方法论对比：实证民俗学关注'是什么'（经验事实的描述和解释），实践民俗学关注'应该是什么'（民俗学的社会使命和文化责任）。"],["实践民俗学","practical folklore studies","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","礼俗互动谱系","当代中国民俗学中最具影响力的理论取向之一，以吕微、高丙中、户晓辉等学者为代表。其核心纲领为：民俗学不仅是一门描述和解释民俗现象的'学术科学'，更是一门以促进公民自由和社会解放为目的的'实践科学'。实践民俗学的三大理论来源：康德的实践哲学（'为自由而思'）、马克思的实践论（改造世界而不仅是解释世界）、现象学社会学（回到民众自身的生活世界）。其方法论核心是'学者与民众的视域融合'——尊重民众对自己生活的理解和解释权，而非以学术权威身份对民众生活进行单方面诊断和评判。实践民俗学在学界引起了广泛争论：支持者认为它为学科找到了社会使命和伦理根基，批评者认为它模糊了学术研究与价值倡导的边界。"],["家乡民俗学","hometown folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","田野范式","中国民俗学田野研究中一种独特的方法论传统，指研究者以自己的家乡为田野调查地点进行的民俗研究。其代表性实践包括费孝通的'江村经济'（以自己的家乡开弦弓村为研究对象）、刘铁梁的'标志性文化'研究（以自己成长和熟悉的北京村落为田野）、以及大量的本土民俗学家的家乡民族志。家乡民俗学的独特优势是：研究者天然具有语言能力、文化直觉和深厚的人脉网络，能够进入外来研究者难以深入的日常生活深层。其局限在于：'家乡'身份可能导致研究者对日常之奇视而不见，以及与研究对象过于亲近带来的伦理困境（如何取舍？如何保护？）。"],["层累地造成的中国古史","accumulated ancient history theory","顾颉刚提出的古史和传说在时间中层层累积叠加形成的理论","理论术语","叙事与口头传统","叙事类型与形态","顾颉刚提出的中国现代学术史上最具原创力的历史学假说之一。其核心命题为：中国上古史不是对过去事件的客观记录，而是在历史长河中'层累地造成的'——时代越后，传说中的古史期越长（如西周文献只追溯到禹，春秋战国文献追溯到尧舜，秦汉文献追溯到黄帝，再往后追溯到盘古）；时代越后，传说中的中心人物越被放大（尧舜禹从一个普通首领被放大为完美的圣王）。顾颉刚用此理论系统解释了上古传说的形成机制。该理论对民俗学特别是传说研究的意义是根本性的：传说不是'变形的历史'（历史记忆的讹误），而是'累积的文化建构'。此说至今仍是中国民俗学传说研究的核心方法论工具。"],["层累造史理论","stratified creation of history theory","顾颉刚提出的古史和传说在时间中层层累积叠加形成的理论","理论术语","叙事与口头传统","叙事类型与形态","顾颉刚'层累地造成的中国古史'理论的简称表达，指向口头传统和文献记载中历史叙事层层叠加、不断增饰、持续重构的机制。该理论对民俗学最重要的方法论启示是：不是先在'历史事实 vs 虚构'的二分中取舍传说的文本成分，而是考察传说文本自身的历史，即它的每一层是在什么时代、什么社会环境中、出于什么需要被叠加的——这正是民俗学的社会史研究路径。"],["巫术先行论","primacy of magic theory","弗雷泽提出的人类思维从巫术经宗教到科学的发展序列理论","理论术语","信仰与观念体系","象征与世界观","詹姆斯·弗雷泽在《金枝》（1890）中建构的人类思维三阶段进化序列的早期论断：巫术→宗教→科学。巫术先行论认为巫术是人类最早的'思维方式'——原始人相信通过模仿和接触就能直接控制自然力（交感巫术），当巫术反复失败后，人类转向祈求超自然存在（神）的帮助，即宗教阶段；当宗教也无法可靠控制自然时，人类转向科学——基于因果律和经验验证的方法。该理论的进化论假设已被当代人类学全面批判，但其对巫术逻辑（相似律、接触律）的分析框架至今仍为民俗学所使用。"],["差异性动力","differential dynamics","社会文化过程中推动差异生产和再生产的内在驱动力","理论术语","社会与群体理论","社会理论与民俗","社会文化变迁研究中的概念，指在社会文化过程中推动差异（而非趋同）生产和再生产的动力机制。与全球化理论中'趋同'（convergence）的主导叙事不同，差异性动力关注的是在相同的外部压力下不同群体为何做出不同的文化选择、产生不同的文化形态。在民俗学中，差异性动力分析回答了一个关键问题：在全中国都面临现代化和城镇化的情况下，为什么不同村落选择了截然不同的民俗保存和发展路径？——答案在于地方文化精英的决策、村落内部的社会权力结构、历史偶然事件等差异性因素。"],["帕里-洛德理论","Parry-Lord theory","研究口头史诗创作机制与程式化特征的核心理论","理论术语","叙事与口头传统","口头理论","见'口头程式理论'的详细释义。帕里-洛德理论是20世纪对口头文学研究的革命性理论突破，由米尔曼·帕里（Milman Parry）和他的学生阿尔伯特·洛德（Albert Lord）通过对南斯拉夫史诗歌手的田野调查共同创立，彻底改变了学界对荷马史诗等经典口头文学文本的理解方式。主要内容：口头史诗歌手并非记忆上万行固定文本，而是掌握了一套'程式'（formula）系统，在每次演唱中即时组装诗句。该理论最核心的方法论主张是：口头文学研究者不应以书面文学的标准（'原始文本''作者''讹误'）来评价口头文学，而应在口头表演自身的规则中来理解它。"],["广义民俗观","Broad Definition of Folklore","涵盖农村都市民俗、古今传统、物质精神组织等全方位的民俗概念","研究关键词","当代社会文化","城市与乡村","一种将民俗学的民和俗的外延推至极广——涵盖从农村的到城市的从远古的遗留到当代的网络从物质到言语的一切民众的文化——的反狭义化的民俗的包容性的概念界定取向。"],["应用民俗学","applied folklore","将民俗学知识和方法应用于社会公共实践的学术方向","学科概念","学科元概念","学科分支方向","以将民俗学的田野的发现和理论的研究的成果直接地应用于政府关于非物质文化遗产保护政策的制定、非遗的建档和展示、以及在当今的社会上解决诸如乡村振兴和社区文化复兴等公共的日常的实际问题的实用导向的民俗学的分支。"],["当时性","temporality / contemporaneity","文献记录者对其所处时代民俗状况的即时性记录特征","学科概念","学科元概念","学科属性与定位","文献民俗学在研究古代的文人笔记等民俗文献时的一个核心的概念——指古代某条史料是当时的作者以他同一个时代的人和近距离的观察者的身份对自己的同时代的活态的民俗的及时的即时的现场的目击记录（即第一手的时代史料），与此相对的是后人靠传抄转引的对前代民俗的隔代描述的不靠谱的记录。"],["形态分析","morphological analysis","民间叙事结构形态和类型的理论概念","理论术语","叙事与口头传统","叙事类型与形态","对研究对象进行结构分析的方法论传统，在民俗学中主要指对民间叙事（故事、传说、史诗等）的情节结构和构成要素进行系统分析的学术方法。民俗学形态分析的两大经典范式：一、普罗普（Propp）的《民间故事形态学》（1928）——将俄罗斯神奇故事分解为31种功能项，按不变的功能序列和可变的角色分配进行了严格的形态描述；二、列维-斯特劳斯（Lévi-Strauss）的神话素分析——将神话分解为最小意义单元（mytheme），通过对立关系揭示神话的深层结构。形态分析为民俗的分类研究和比较研究提供了精确的结构化工具。"],["影视民俗学","film and television folklore","研究影视媒介中的民俗呈现和应用的学科方向","研究关键词","当代社会文化","数字化与媒体","将影视和数字媒体中的从纪录片到影视剧和短视频中的民俗的视觉呈现作为核心的研究对象的民俗学与影视研究和传媒学交叉的新兴的学术方向。"],["微民俗","micro-folklore","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","田野范式","中国民俗学近年提出的方法论概念，与'大民俗'（节日、仪式、庙会等宏大规模民俗事象）相对，指关注民众日常生活中微小的、不起眼的、但同样承载文化意义和逻辑的民俗细节——一次饭桌上的座次安排、一句寒暄的措辞选择、一个敲门的方式、孩子自己发明的错别字游戏。微民俗的方法论意义在于：它拒绝'只有大规模的、古老的、典型的才是民俗'的先入之见，主张从日常生活最细碎处发现文化的运作逻辑。这一概念与德塞尔托的'日常生活实践'和微观史学有理论亲缘。"],["心理学","Psychology","研究心理现象及其规律的科学","理论术语","社会与群体理论","社会理论与民俗","研究心理现象及其规律的学科，与民俗学的交叉领域主要体现为心理民俗学（psychological folklore）分支。研究课题包括：民俗活动如何满足个体的心理需求（如仪式的焦虑缓解功能）、民间故事如何反映集体的深层心理结构（如弗洛伊德式神话分析）、民俗象征如何表达无意识的欲望和恐惧（如禁忌的心理动力学解释）。经典理论成果包括：弗洛伊德对俄狄浦斯神话的心理分析、荣格的原型理论对神话象征的解释、邓迪斯（Alan Dundes）以精神分析学方法对美国民俗的分析。"],["心理表征","mental representation","个体内心对外部世界和信息进行符号化和内在表征的认知过程","理论术语","信仰与观念体系","象征与世界观","个体内心对外部世界信息进行符号化内在表征的认知过程。在民俗学中，心理表征概念应用于理解民众人如何'在脑子里'储存和组织民俗知识——一个老故事家记忆上千个故事片段，不是逐字逐句地死记硬背，而是形成了故事结构的心理表征（如'故事骨架'），在讲述时通过心理表征即时重构出具体的故事文本。该概念连接了认知心理学和口头传统研究，是理解口头传承机制的关键认知概念。"],["性/社会性别体系","sex/gender system","卢宾提出的将生物性转化为社会文化产品的制度安排","研究关键词","身份与权力","性别研究","美国人类学家盖尔·卢宾（Gayle Rubin）在1975年提出的经典的女权人类学的概念——区分了生物学意义上的性（sex）和社会文化建构的性别（gender），并批判每个社会都有一套将生物性的人料加工为社会性的男女的性/社会性别制度的机器。"],["性别二元架构","gender binary","将性别严格划分为男/女二元对立的认知框架","研究关键词","身份与权力","性别研究","社会广泛默认为天的将全体的人类毫无例外地严格按照其出生时的生殖器被指派为男或女这两种互斥的和非此即彼的类别的深层的不被大多数人所反思的性的认知和分类的框架。"],["性别制度","gender system","将生物性差异转化为社会性别分工和文化安排的组织体系","研究关键词","身份与权力","性别研究","特定社会在历史中长期形成的关于如何将两性的生物的差异制度化地安排进社会分工权力结构婚配和文化领域的整套不成文和成文的规则和习俗的体系。中国传统的男主外女主内即是一套性别制度的民俗的体现。"],["性别刻板印象","gender stereotype","社会对特定性别固定化、简单化的期望和认知模式","研究关键词","身份与权力","性别研究","社会对男性和女性应当具有的行为方式性格角色甚至外表的不假思索的固定的简单化的和夸张化的集体的认知的模具。民俗中大量充斥着——女红属于女人而打猎属于男人——的性别的刻板印象。"],["性别化行动","gendered action","具有性别特征和性别区分意义的社会实践行为","研究关键词","身份与权力","性别研究","个体在日常的社会实践中所做出的被社会按照其性别的归属被解读和赋予特定的性别意义的行为——如同一个梳头的动作在男人和女人身上被社会赋予截然不同的性别化的含义和解读。"],["性别建构","gender construction","性别身份在社会互动和文化实践中被塑造的过程","研究关键词","身份与权力","性别研究","性别身份不是由出生的生物的构造所一锤定音地决定的不可更改的宿命——而是在人的一生的日常的社会互动和文化实践的岁月中不断地通过社会的肯定和责备、文化的模具、和个体的顺服和反抗被缓慢地不可逆转地建构而成。"],["性别操演性","gender performativity","巴特勒提出的性别通过重复表演和实践建构的机制理论","研究关键词","身份与权力","性别研究","朱迪斯·巴特勒（Judith Butler）在《性别麻烦》（1990）中提出的颠覆性的性别理论——性别不是一个静态的是（be），而是一个动态的做（do）——性别是通过日复一日的身体的像演员一样的重复的操演（如在镜前化妆和着装）被不断地生产和固化的一种社会的表演和展演。"],["性别研究","gender studies","以性别为分析范畴，研究性别身份、关系和差异的学术领域","研究关键词","身份与权力","性别研究","以性别——不是作为一个描述性的背景的人口统计变量——而是作为理论的和方法论的核心分析的范畴，来研究性别的身份关系和不平等如何在人类社会的各个领域被建构运作和可能被颠覆和改变的跨学科的学术领域。"],["性别社会建构论","social constructionism of gender","认为性别身份是由社会文化建构而非生物决定的理論立場","研究关键词","身份与权力","性别研究","与生物决定论截然对立的理论的立场——核心的命题是男人和女人之间的心理和行为的社会差异的绝大部分不是由荷尔蒙和基因的先天的生物学来决定而固定不动的——而是在后天的漫长的社会化的过程和社会制度的模具中被人为地社会性地建构和固化而成。"],["性别规范","gender norms","社会对特定性别应具有的行为、角色和特征的期待和规约","研究关键词","身份与权力","性别研究","在社会中不假思索地被绝大多数人当作理所当然的对两性——从玩具的颜色（蓝和粉）到职业的选择（护士和工程师）到在家庭和社会中的权力——的一整套的不成文的期待和约束的性别的模具。"],["性别认同","gender identity","个体对自身性别归属的内在认知和主观感受","研究关键词","身份与权力","性别研究","个体在不受外部的强制的条件下——对自己在性别的光谱上的内在的、深刻的、个人的归属感和自我认知——是男人、女人、两者之间的、两者之外的或不固定的。独立于出生时由医生指派的法律的性别。"],["情感能量","emotional energy","柯林斯互动仪式链理论中个体在成功仪式互动中获得的情感驱动力","理论术语","仪式与表演理论","仪式类型与机制","兰德尔·柯林斯（Randall Collins）互动仪式链理论的核心驱动力概念。情感能量不同于短暂的、爆发性的情绪（如愤怒、狂喜），而是一种持续的、可积累的正面社会驱动能量——成功参与一次互动仪式（如一场激动人心的演唱会、一次成功的团队会议、一次集体的宗教礼拜）后，个体会带有'高涨'的积极情感和自信，这种情感能量驱动个体下次继续主动参与类似的互动仪式。在民俗学中，情感能量解释了民俗参与的内驱力——为什么村民每年都期待庙会？为什么信徒千里迢迢去朝拜？——不是因为外部强制，而是民俗活动本身产生的强烈情感能量构成了参与的持续动力。"],["想象空间","imagined space","通过文化叙事和想象建构的主观性空间观念和意义","理论术语","叙事与口头传统","叙事类型与形态","通过文化叙事、象征符号和集体想象建构出的主观性空间观念和意义结构。'想象空间'不同于物理空间——一个乡村小庙的占地面积可能只有几十平方米，但在当地人的想象空间中，它是整个村落的宇宙中心、神灵的居所和世界的枢纽。民俗学的想象空间研究关注：民间传说如何赋予一个具体的地理空间（一座山、一条河、一块石头）以超物理空间的意义——'望夫石'不只是石头，而是承载了贞妇等待故事的文化想象空间。安德森（Benedict Anderson）的'想象的共同体'（imagined communities）概念的逻辑可以延伸至空间的想象维度。"],["扩布性","Diffusion","民俗文化在空间伸展上的蔓延性，横向传播过程","学科概念","学科元概念","学科属性与定位","民俗在空中的二维的地理面上的传播——如同水波的一圈圈向外扩散而不只是局限于一个封闭的地方孤岛——的横向的跨社区、跨地域的民族间乃至跨国界的空间的蔓延和流动的特性。"],["抢救性保护","rescue safeguarding","对濒危非遗项目采取的紧急记录和保护措施","研究关键词","非遗与遗产","保护理念","在非遗的濒危和传承链条即将或已经发生不可逆的断裂的超紧急的情势下——采取的最优先的行动——不是急于搞活而是先抢在传承人还在世的时间内用一切可用的文字录音和影像手段把他/她的全部的知识和技艺超完整地记录和档案化下来作为留给后人的火种。"],["故事学","study of folktales","以民间故事为研究对象的学科分支","理论术语","叙事与口头传统","叙事类型与形态","以民间故事（folktale，包括神奇故事、生活故事、动物故事、笑话等口头叙事类型）为专门研究对象的民俗学分支学科。故事学的核心研究问题包括：故事的结构和形态（普罗普的形态学分析）、故事的分类和索引（AT分类法——阿尔奈-汤普森分类体系）、故事的地域分布和历史流变（芬兰历史-地理学派的方法）、故事的讲述人和讲述语境（表演理论视角）、故事的社会功能和文化意义（象征分析和功能分析）。中国故事学的代表性学者包括刘守华（著有《中国民间故事史》）、刘魁立、林继富等。"],["故事形态学","morphology of folktale","普罗普创立的分析民间故事情节结构形态与共时关系的理论方法","理论术语","叙事与口头传统","叙事类型与形态","弗拉基米尔·普罗普（Vladimir Propp）在《民间故事形态学》（1928）中创立的民间故事情节结构分析方法。其核心发现：一百个俄罗斯神奇故事虽然在角色（王子、巫婆、恶龙）和情节的具体内容上千差万别，但其深层结构由31种固定顺序的'功能项'（如缺席、禁令、违禁、侦察、加害、出发……）构成，角色虽然可变但角色的'行动圈'（如反角、捐助者、助手、公主）是有限的。故事形态学的方法是'共时性'的——不关注故事的历史演变（历时性），而关注故事内部结构的系统关系（共时性），是结构主义方法论在民间叙事研究中的最早和最经典应用。"],["故事诗学","story poetics","以文化分析方法研究民间故事形态与传承机制的学派理论","理论术语","叙事与口头传统","叙事类型与形态","以文化分析方法研究民间故事的形态特征和传承机制的学术传统和理论体系。故事诗学与普罗普的纯结构分析不同，更关注故事的文化意义层面——故事不仅是形式结构，更是文化逻辑、价值观念和审美理想的载体。中国民俗学的故事诗学传统主要由刘守华、万建中等学者的研究构成，关注故事中的中国文化精神、民间智慧和审美特征，努力在西方故事理论之外构建中国本土的故事研究话语。"],["教化功能","Educational Function","民俗在个体社会化过程中所起的教育和模塑作用","理论术语","社会与群体理论","社会理论与民俗","民俗在个体社会化过程中所起的教育和模塑作用，是功能分析中最常讨论的功能之一。民俗的教化功能和正式教育的区别在于：非正式性（在吃饭、过节、祭祀等日常场景中自然发生）、寓教于乐（大量通过故事、游戏、歌谣的趣味形式传递道德规范）、终生性（从摇篮到坟墓持续不断地进行社会化）。经典案例分析：虎姑婆/狼外婆等恐怖故事教会儿童不要给陌生人开门（安全教育），'善有善报恶有恶报'的故事母题传递了基本的道德秩序观念。"],["整体性保护","holistic safeguarding","将非遗置于整体文化生态中进行全面保护的理念","研究关键词","非遗与遗产","保护理念","非遗保护的一种保护理念——不是将某项非遗像一位孤立的病人从它生存的整个社区的社会的和自然的大环境的有机的身体上切割下来单独地施救——而是将非遗和它赖以存活的老街、戏台、庙宇和整个保护区的人和自然作为一整个不可分割的大生命共同体来全面地保护。"],["文化中介","cultural intermediary","在文化生产和消费之间发挥连接和转化作用的角色","研究关键词","当代社会文化","当代转型","在社会生活的文化的生产（如传承人的手艺）和文化的大众消费（如消费者在网购的非遗文创）的两极之间发挥牵线搭桥的转换和再包装的中介的功能的社会角色——如非遗的策展人和文创公司的非遗设计师。"],["文化人类学","cultural anthropology","研究人类文化现象与文化多样性的学科，与民俗学在方法和研究对象上高度交叉","学科概念","文化与认同","文化概念","以人类文化现象与文化多样性为核心研究对象的学科，与民俗学在研究对象和研究方法上高度交叉。文化人类学为民俗学提供了田野调查、参与观察、文化整体论等核心方法论。"],["文化传播","cultural diffusion","文化特质和文化模式在空间上跨越社会和地理边界扩散的过程","理论术语","社会与群体理论","社会理论与民俗","文化特质和文化模式在空间上跨越社会和地理边界扩散、流动和传播的过程，是文化变迁分析的基本维度之一。民俗学关于传播的核心争论是'单源传播'（所有相似民俗源于一个共同起源地然后传播）和'多源独立发明'（不同社会在相似条件下可能独立创造出相似的民俗）之争。德奥传播学派的'文化圈学说'（Kulturkreislehre）是单源传播论的最系统表达。当代民俗学对传播的关注从'追寻起源'转向'理解传播中的本土化改编'——一则民间故事从一个文化传入另一个文化后，被如何改编以适应新的文化语境（如在中国的'灰姑娘'故事叶限中的中国文化元素）。"],["文化变迁","cultural change","文化内容和结构在时间过程中的变化和发展","理论术语","社会与群体理论","社会理论与民俗","文化的内容和结构在时间过程中的转变和重构，是民俗学和社会科学共享的核心分析概念。文化变迁的主要驱动力包括：技术变革（互联网对民俗传播方式的重塑）、经济转型（城镇化对村落民俗的冲击）、政治运动（文革时期的'破四旧'对民间信仰的压制）、文化接触（跨文化互动带来文化元素的借用和创新）。民俗学对文化变迁的核心研究张力是'传承与变迁'的关系——一种民俗要传承下去就必须适应变迁，但过度的变迁可能导致传承的断裂（变异为另一种不同的东西），二者之间的平衡点是民俗活力研究的关键问题。"],["文化圈学说","Kulturkreis theory","德奥传播学派提出的文化以地理圈层方式起源和扩散的理论","理论术语","信仰与观念体系","象征与世界观","德奥传播学派（以格雷布纳、施密特为代表）提出的文化史理论，主张人类文化是从少数几个'文化圈'中心起源后向周围扩散传播的，不同文化圈有各自独特的一组文化特质（如特定类型的工具、社会组织、宗教观念）。在民俗学中，文化圈学说被用于解释跨文化中的相似民俗现象——如全球洪水神话的广泛分布是否可以从一个共同的文化圈中心传播解释。虽然文化圈学说因方法论上的粗糙和过度推断而受到严厉批评，但它为民俗的地理分布研究提供了最早的系统的比较分析框架。"],["文化生产","cultural production","文化内容和产品在社会关系中被创造和再生产的过程","理论术语","社会与群体理论","社会理论与民俗","文化内容和产品在社会关系的网络中被创造（生产）、流通（分配）和接受（消费）的过程，是文化社会学和文化研究的核心概念。在民俗学中，文化生产概念打破了'民俗是自然地、自发地产生'的迷思——民俗不是从'民众'中自动冒出来的文化蒸汽，而是具体的个人或群体在特定社会条件下积极地生产和再生产出来的。庙会发生之前有组织者的精心策划，民歌的流传依赖歌手的选择性改编和听众的选择性接受，年俗的变迁反映了家庭经济的支撑能力和家庭审美的变迁。"],["文化生态","cultural ecology","文化与其生存环境之间的互动关系系统","研究关键词","全球化与地方","地方性议题","特定地域的民俗传统与其所扎根于和赖以生存的自然环境——山水气候动植物——和社会人文环境之间的多层的互动的环环相扣的系统性的关系的总和。国家级文化生态保护区的建设即是对非遗的文化生态实施区域性整体保护的直接实践。"],["文化疗愈","cultural healing","通过民俗文化实践实现心理和社会的治疗功能","理论术语","社会与群体理论","社会理论与民俗","通过民俗文化实践（仪式、民间信仰、民间艺术的参与和创作）实现心理调适和社会关系修复的功能取向研究概念。文化疗愈的运作机制包括：仪式疗愈——丧葬仪式帮助亲属有结构地表达和处理哀伤；叙事疗愈——通过讲述个人苦难经历（如'诉苦'）重新整合破碎的生命经验；艺术疗愈——参与民间音乐、舞蹈、手工艺活动带来的身心放松和社群连结。在灾害民俗学（如四川地震后的哀悼和重建仪式）、医学人类学和艺术治疗的交叉领域有丰富的研究积累。"],["文化研究","Cultural Studies","跨学科研究文化现象的学术领域","学科概念","文化与认同","文化概念","20世纪60年代以伯明翰学派为代表的跨学科研究领域，将日常生活中的文化实践与权力和意识形态议题结合分析。在民俗学中为当代民俗新形态提供了理论资源。"],["文化科学说","cultural science theory","将民俗学界定为以民众生活文化为对象的科学","理论术语","中国本土理论","礼俗互动谱系","中国民俗学学科定位的核心理论表述，由钟敬文系统提出和论证。其核心命题是：民俗学是一门以民众的生活文化为研究对象的、具有独立研究对象和方法论的科学学科——'民俗文化学'。钟敬文的文化科学说包含几个核心层次：一、民俗学的对象是文化（不是单纯的文学或历史）；二、它的独特性在于研究'民众的'文化（与精英的、官方的文化区分）；三、它是一门'科学'（要求系统性和方法论规范性，而非随感和杂谈）。这一学说为中国民俗学争取独立学科地位提供了最重要的理论基础，也是中国民俗学区别于西方folklore studies之文学传统的关键所在。"],["文化自觉","cultural self-awareness","费孝通提出的对自身文化的自知之明和文化担当","学科概念","文化与认同","文化概念","费孝通晚年提出的核心概念，指对自身文化的来龙去脉和优缺点有清醒的自知之明和对文化传承与创新的主动担当，非盲目自负也非丧失自信。"],["文化融合","cultural integration","不同文化交流汇合的过程","研究关键词","全球化与地方","全球化议题","两个以上之前在空间和文化上相对分隔的不同的文化系统经由长期的接触和交流后，它们之间的边界逐渐模糊，各自的文化中的一些核心的元素互相浸润入对方的体系的和平的和非强迫的文化合流的过程。"],["文化进化论","Cultural Evolutionism","以泰勒和弗雷泽为代表的早期人类学理论，主张文化由低级向高级单线进化","理论术语","信仰与观念体系","象征与世界观","十九世纪以泰勒（E.B.Tylor）、弗雷泽（J.G.Frazer）和摩尔根（L.H.Morgan）为代表的早期人类学理论范式，其核心假定为：人类文化遵循一条从'蒙昧'经'野蛮'到'文明'的单线进化路径，现存'原始民族'的文化是早期人类文化的活化石。该理论对民俗学产生了深远影响：民俗被视为'文化遗留物'（survivals）——从早期进化阶段残留在现代社会中的文化化石。文化进化论的学术遗产是双重的：积极的方面是建立了人类文化比较研究的科学框架，消极的方面是其欧洲中心主义和线性进步主义预设被后来的文化相对主义彻底颠覆。"],["文化遗留物说","Survival Theory","泰勒进化论学派的核心概念，指从早期文化阶段保留到后世的习俗和观念","理论术语","信仰与观念体系","象征与世界观","爱德华·泰勒（E.B.Tylor）在《原始文化》（1871）中提出的文化进化论核心概念，指从人类更早的文化发展阶段（'蒙昧''野蛮'阶段）残存、保留下来的风俗、观念和行为模式，它们已经失去了原初的功能和意义，却作为'文化化石'继续存在于更高级的社会形态中。泰勒以撒米喂鸟、向井里投币、葬礼上哭泣等欧洲民间风俗为例，论证它们都是从原始时代的牺牲献祭仪式'遗留'下来的残余形式。在中国的民俗学史上，'遗留物说'对早期中国民俗学产生了深刻影响——民俗被视为'活的化石'需要抢救性记录。当代民俗学已全面批判遗留物说的静态性——民俗不是'遗留物'而是'活态的实践'。"],["文物民俗学","folklore of cultural relics","研究文物中的民俗内涵和文化意涵的分支","学科概念","学科元概念","学科属性与定位","以历史遗存和出土文物所携带的民俗信息和内涵为分析对象的民俗学与文物博物馆学的交叉分支学科。从古代陶灶可读出当时的民间炊事和祭祀民俗。"],["文类间性","inter-genricity","不同民间文类之间相互渗透、交叉和转化的性质","理论术语","叙事与口头传统","叙事类型与形态","指不同民间文类（genre，如神话、传说、故事、歌谣、谚语等）之间相互渗透、交叉、借用和转化的现象和性质，是超越传统静态文类边界划分的动态研究视角。文类间性的具体表现：同一则叙事在村民口中有时被当作'传说'（有地点有年代）、有时被当作'故事'（'不知道什么时候的事了'），文类边界是流动的而非固定的；祭祀仪式中咒语的功能歌谣化——从神圣操作变为审美娱乐。文类间性的研究价值在于揭示了民俗文本和民俗实践的开放性和混杂性，挑战了研究者为便于分类而刻意切割出清晰文类的操作。"],["新在野之学","new field-based scholarship","日本民俗学以民间社会为本立足田野的学术传统和学科定位","理论术语","中国本土理论","田野范式","当代日本民俗学对传统'在野之学'传统的重新激活和学术创新，指在日本民俗学界复兴以民间社会为本的田野调查和知识生产模式。与'旧'在野之学（以柳田国男为代表的日本民俗学开创传统）不同，'新在野之学'吸收了后现代人类学、文化研究等新理论资源，对传统田野方法进行批判性反思，关注全球化时代日本民间社会的文化变迁、灾难记忆的民俗传承、少数群体的民俗权利等新议题。该概念与中国民俗学在方法论上有显著的对话空间，特别是在'田野伦理''民俗学的社会责任''研究者与被研究者的关系'等议题上。"],["新民俗主义","neo-folklorism","当代文化消费中新产生的民俗主义现象","研究关键词","当代社会文化","当代转型","在21世纪的传媒、互联网和消费主义的深度介入下的民俗主义的新阶段的新形态——不是对农民的真实民俗的第一次的借用，而是对已经被前人加工过的民俗的意象的第二次和第三次的进一步的商业和美学的再加工和再循环的后现代的消费民俗文化现象。"],["新进化论","neo-evolutionism","怀特等批判古典单线进化论基础上发展的多线文化进化理论","理论术语","信仰与观念体系","象征与世界观","以莱斯利·怀特（Leslie White）、朱利安·斯图尔德（Julian Steward）等人为代表的人类学理论流派，对19世纪的古典单线进化论进行根本性修正。新进化论的核心修正是：放弃'所有人类文化都走同一条路'的单线模型（泰勒和摩尔根的版本），提出'多线进化'（multilinear evolution）——不同社会由于不同的生态环境和历史文化条件，可以走出截然不同的发展路径。斯图尔德的'文化生态学'将生态环境作为解释文化差异的关键变量。新进化论为民俗的区域差异研究提供了理论基础——不是所有地方的民俗都'应该'走同一条路，不同生态区域、不同经济类型区的民俗进化路径是多样的。"],["方言周圈论","dialect circumference theory","柳田国男的方言分布反映文化传播方向的理论","学科概念","文化与认同","文化概念","柳田国男提出的方法假说，认为方言分布以文化中心为圆心呈同心圆扩散，距中心越远的外围方言保留越古老的文化底层，可据此逆向推论古代文化传播方向。"],["旅游民俗","tourism folklore","以旅游活动中的民俗文化展示消费和体验为研究对象的学术领域","研究关键词","当代社会文化","城市与乡村","在各地蓬勃发展的旅游产业中——村民在村口为游客表演的简化版的婚礼和夜市中贩售的被快速批量生产的所谓的手工纪念品——这些以游客为消费对象的被去语境化和再包装的民俗的事象和体验的道具。"],["日常生活取向","everyday life orientation","民俗学转向关注民众日常平凡生活实践的理论视角和研究取向","理论术语","中国本土理论","本土方法论","民俗学从仅关注'非常时刻'（节庆、仪式）转向同等关注民众的日常、平凡、重复性生活实践的研究视角转换。日常生活取向的核心主张是：民俗学长期以来对'惊奇的'民俗（盛大节日、复杂仪式、长篇史诗）的偏好，导致了对'日常的'民俗（一天三顿饭怎么吃、孩子怎么管、邻里怎么相处）的盲视。鲍辛格（Hermann Bausinger）的《技术世界中的民间文化》（1961）是日常生活取向的奠基之作。在中国民俗学中，高丙中、刘铁梁等人的研究代表了这一从'非常'到'日常'的转向。"],["时间化","temporalization","将空间和社会关系置于时间维度中加以理解和分析的方法","理论术语","社会与群体理论","社会理论与民俗","将社会关系、文化实践和空间放置于时间维度中加以理解和分析的方法论取向，指向对民俗的'过程性'和'历史性'的理解。时间化的核心主张是：任何民俗事象都不是一个无时间的静态'存在'，而是一个在时间中展开和变化的'过程'。一场婚礼不是婚礼仪轨的静止清单，而是从提亲到闹洞房的随着时间轴线逐步展开的过程连续体。时间化分析为民俗研究提供了动态的、过程性的视角，与静态的分类学视角互补。"],["普遍化检验","universalization test","检验知识或命题是否具有普遍有效性的标准","理论术语","社会与群体理论","社会理论与民俗","检验知识或命题是否具有普遍有效性的批判性方法论标准。在民俗学中，普遍化检验被引入为一种自我批判的工具——民俗学者提出的理论命题（如'一切仪式都具有凝聚功能'），是否能经受'在所有时空对所有仪式都成立'的普遍化检验？如果不能，说明该命题需要限定条件和范围。该方法论工具迫使民俗学研究者在提出理论概括时保持谦逊，不把自己基于有限田野经验得出的模式随意普遍化。"],["景观生产","landscape production","将文化空间作为景观进行设计和再生产的实践","研究关键词","全球化与地方","地方性议题","将地方的自然和文化的历史的空间——一座老村落的青石板路和村口的大榕树——以旅游消费的凝视和美学规划的设计被刻意地重新整理、美化和品牌化为可供游客观看、拍照和消费的文化景观的工程。"],["服务性","Service Function","民俗为民众生产生活和社会需要提供服务的实用功能","理论术语","社会与群体理论","社会理论与民俗","民俗为民众生产生活和社会需要提供实用的服务和功能性满足的特征。服务性是民俗功能论的核心概念——民俗不是无用的装饰，不是闲来的娱乐，而是为民众切实地'办事'的实用工具。民俗服务功能的典型案例：劳动号子为集体劳动提供节奏协调服务，禁忌为资源管理提供生态保护服务（如禁渔期），祭祀为农民提供心理安全感服务（在面对不确定的农业收成时）。功能论的局限在于它预设了'民俗存在必定因为有用'，忽视了民俗中大量非功能性的、纯粹审美或习惯性的成分。"],["本土化","Localization / Indigenization","外来理论适应本土文化语境的过程","研究关键词","身份与权力","身份与权力","西方的学术的概念和理论的框架在进入中国的政治的学术的和语言的不同的大语境之后——为了不至于水土不服——被中国的学者在引介和移植时有意识地过滤调整和再锻造以适配中国本土的特殊经验的本土化的学术操作。"],["本真性","authenticity","民俗和文化遗产是否具有原初性和真实性的判断标准和学术论争","研究关键词","非遗与遗产","保护理念","民俗学——特别是在非遗和文化遗产的领域——的最核心的也是最饱受争议的概念的战场。关于一件民俗的产品和实践是否为真实的原生态的、未经现代商业和政治的利益所扭曲和玷污的纯粹起源品的争论贯穿了整个民俗学的历史。"],["格式化","formalization / formulaization","施爱东提出的民间叙事被标准化和模式化的过程","研究关键词","身份与权力","身份与权力","施爱东在其对中国民间文学的系统的研究中提出的一个分析概念——指在无数次的重复的讲述和再讲述以及在从口头到书面的文本化的再加工的过程中，一个原本非常灵活多变的口头的民间叙事的好几个不同的异文被逐渐地磨去了那些突兀的创造性而趋向于一个被选定的标准的官方的单一的文本的格式化的单一化的过程。"],["概論教育","survey education","以学科概论为主导的、缺乏方法论训练的教育模式","学科概念","传承与变异","变异与创新","批评中国民俗学等学科教育长期停留在概论灌输而严重缺乏田野方法论系统教学和实操训练，学生毕业时只有模糊概论感而不会做田野。"],["概论思维","survey thinking","停留于面面俱到的概述而非深入问题研究的思维方式","理论术语","社会与群体理论","社会理论与民俗","中国民俗学界对一种研究思维习惯的批评性概念，指停留在面面俱到的宏大概述（如全国性的春节风俗概述、全省性的民间信仰面貌通览）而不深入具体问题的研究思维方式。概论思维的典型表现是：一本著作涵盖了某一地区民俗的方方面面，面面俱到但每方面都浅尝辄止，没有形成一个有深度的研究问题。与'概论思维'相对的理想研究范型是'问题导向'——先深入田野发现一个有学术价值的具体问题，然后围绕这个问题进行深入的调查和分析。"],["模式","pattern / model","民俗文化中反复出现的稳定结构形态和范型","理论术语","社会与群体理论","社会理论与民俗","民俗文化中反复出现、相对稳定的结构、形态和范型，是民俗学分类学和比较研究的核心概念。民俗模式的主要表现：一、创作模式——民间歌手在创编时使用的固定的程式系统（帕里-洛德的发现）；二、叙事模式——不同故事共享的核心情节结构（如'英雄离家→历险→归家'）；三、仪式模式——同类仪式共享的程序框架（如生命礼仪普遍包含分离→过渡→聚合三阶段）。模式研究为民俗学提供了'在千变万化中寻找不变规律'的科学路径，但过度依赖模式分析可能导致'削足适履'——忽视了不符合模式的特异案例。"],["歌谣学","study of folk songs","以民间歌谣为专门研究对象的学术分支","理论术语","叙事与口头传统","口头理论","以民间歌谣（包括劳动歌、仪式歌、情歌、儿歌、时政歌等）为专门研究对象的民俗学分支学科。歌谣学的核心研究问题包括：歌谣的创作和流传机制（在特定劳动和社会情境中的即兴生产和群体传播）、歌谣的格律和音乐结构分析（曲调类型、韵律模式）、歌谣的社会功能（劳动协调、情感表达、社会批评）、歌谣与地域文化认同的关系。中国歌谣学的第一个学术高峰是1918-1925年的北京大学歌谣研究会——以刘半农、周作人、顾颉刚为代表，开辟了中国现代民俗学的民间文学研究传统。"],["比较民俗学","comparative folklore","对不同民族和地区的民俗进行跨国跨文化比较研究的学术方向","理论术语","社会与群体理论","群体与认同","对不同民族、地区和文化的民俗传统进行系统的跨国跨文化比较研究的民俗学分支方向。比较民俗学的认知基础是：孤立的个案研究无法回答'这是普遍的还是特有的'的问题，只有通过系统比较才能识别出人类民俗的共性模式和文化特殊性。经典比较研究案例包括：全球洪水神话的比较（从西南少数民族到美索不达米亚），灰姑娘型故事的全球比较（从中国的叶限到欧洲的Cinderella），通过礼仪的跨文化比较（范热内普的《通过礼仪》）。比较方法的要求是高度的理论和方法自觉——不是简单列异同，而是以理论问题（如'为什么这个母题在这些文化中出现而在那些文化中不出现'）驱动的比较。"],["民俗主义","folklorism","民俗文化在当代社会中被去语境化地再利用展示和商品化的现象","理论术语","信仰与观念体系","观念与解释","德国民俗学家汉斯·莫泽（Hans Moser）在1962年提出的核心概念（德语Folklorismus），指传统民俗文化从其原有的生活语境中被抽离出来，在当代社会中被'二手使用'——作为旅游展演、政治宣传、商业产品、遗产展示等的文化素材——的现象。民俗主义的经典案例：在酒店舞台上为外国游客表演的'原生态婚礼'，不是真实的婚礼而是'提取了婚礼的美学元素重新包装为一个可消费的文化展演'。民俗主义的关键分析术语是'去语境化'（decontextualization）——民俗脱离了其生活土壤。但鲍辛格等人的批判指出，对民俗主义的批评本身暗含着一种'本真性'的假定，而'本真的民俗'可能本身就是一个幻象。"],["民俗主体论","folk subject theory","研究民俗创造者和传承者主体地位的理论","研究关键词","身份与权力","身份与权力","以民俗的活的承载者和操演者——普通的村民和手艺的传承人——的能动性创造性和主体性为研究重心的民俗研究的取向。民俗不再是脱离人的物，而是内在赋予了人的情感和意图的活生生的人的文化实践。"],["民俗传承论","theory of folklore transmission","民众创造享用和传承的生活文化和风俗习惯","理论术语","记忆与传承理论","传统与传承","中国民俗学关于民俗文化传承的理论分支，以刘魁立等学者为代表。民俗传承论系统关注传承的四大维度：一、传承主体（谁是传承人？传承人的遴选标准和培养机制？）；二、传承内容（传什么？核心技艺和外围知识如何区分和传递？）；三、传承方式（如何传？口传心授、行为示范还是制度化教学？传承方式变化对民俗质量的影响？）；四、传承动力（为什么传？信仰驱动、市场驱动还是政策驱动？传承动机的变迁对传承稳定性的影响？）。"],["民俗传播","folklore communication","民俗跨时空扩散和流动的过程","研究关键词","全球化与地方","全球化议题","民俗在广袤的空间——非时间——上跨越社区的行政的和文化的边界的横向的蔓延和扩散的社会过程。包括通过移民的携带和商贸的交流以及当代的互联网的大众传播——民俗的传播不断在空间上被加速和扩大。"],["民俗传播论","Folklore Diffusion Theory","民俗文化在空间上跨区域扩散和流动的过程","理论术语","记忆与传承理论","传统与传承","研究民俗文化在空间维度上跨区域扩散、流动和传播过程的理论分支。民俗传播论与分析民俗在时间维度传递的'民俗传承论'构成互补的理论对子。传播论的核心问题包括：传播路径——民俗通过什么路线和中介传播（商路、移民路线、行政体系）？传播变异——传播过程中民俗内容和形式如何被接受方选择性吸收和改造？传播的动力——什么因素驱动民俗从一个地区传播到另一个地区（人口流动、贸易交往、文化模仿）？在当代语境下，数字媒介（短视频、直播平台）使民俗的空间传播前所未有地加速和扩大化。"],["民俗关系","Folkloric Relations","从民俗事象到事件再到关系的范式升级关注民俗实践中的人际互动","理论术语","中国本土理论","礼俗互动谱系","当代中国民俗学方法论转向的关键概念，描述了民俗学分析框架的三次升级：从'民俗事象'（以孤立的文化元素为分析单位，关注文本和形式特征）到'民俗事件'（以活态的、具体的、情境性的民俗实践过程为分析单位）再到'民俗关系'（以民俗实践中的人际互动、权力关系和意义协商为分析单位）。民俗关系的范式主张是：一个民俗活动（如祭祖仪式）的本质不在于仪轨的文本，而在于在仪式中人们之间的关系——谁主祭谁从祭？谁出钱谁出力？谁被排挤？——这些关系才是民俗的深层意义所在。"],["民俗化","folklorization","文化事象被赋予民俗属性的过程","学科概念","学科元概念","学科属性与定位","原本非民俗的当代文化实践在社会中广泛接受并以固定周期重复操演，从而被赋予准民俗或新民俗文化属性的社会过程，如双十一购物和广场舞。"],["民俗变异论","theory of folklore variation","研究民俗在传承过程中发生内容和形式变异规律的理论","理论术语","记忆与传承理论","传统与传承","研究民俗在世代传承和空间传播过程中发生内容和形式变异的原因、机制和规律的理论分支。民俗变异论的核心问题包括：变异的成因——为何发生变异（地理环境差异、时代变迁、传承人的个人创造力）？变异的规律——变异是有方向的（如从复杂到简化、从神圣到世俗）还是随机的？变异的边界——变到什么程度就不再是'同一个民俗'（如变异的极限和'传承断裂'的界定）？变异与创新的关系——变异是'不自觉的讹误'还是'有意识的创造'？"],["民俗叙事","folk narrative","民众创造享用和传承的生活文化和风俗习惯","理论术语","叙事与口头传统","叙事类型与形态","民众以口头方式创作和传播的叙事文学的总称，包括神话、传说、民间故事（神奇故事、生活故事、动物故事、笑话）、史诗、叙事歌谣等口头叙事类型。民俗叙事研究关注的核心问题：叙事的结构形态（情节模式和母题分析）、叙事的传播和流变（AT分类法和历史-地理方法）、叙事的现场表演和创编（口头程式理论和表演理论）、叙事的社会功能（价值观传递、社会秩序维护、心理宣泄）。中国民俗学的叙事研究拥有极为丰富的本土文类资源——四大民间传说（牛郎织女、孟姜女、梁山伯与祝英台、白蛇传）的千年流传即是研究叙事变异与稳定性的最经典案例。"],["民俗叙事体","folk narrative form","民众创造享用和传承的生活文化和风俗习惯","理论术语","叙事与口头传统","叙事类型与形态","民俗叙事研究中关注叙事文本的整体结构形态的概念，区别于对单个母题、类型或版本的微观分析。民俗叙事体关注叙事的宏观架构——一部史诗如何将数百个母题组织进一个连贯的整体叙事架构中（如《格萨尔》的整体叙事框架）、一个地区的'传说群'（围绕一座山或一个人物形成的所有传说的集合）内部的结构关系。民俗叙事体的研究方法论是'整体论'的——不能只取出一个母题来分析，而要把母题放在整体的叙事架构中才能理解其位置和意义。"],["民俗叙事类型","folk narrative types","民众创造享用和传承的生活文化和风俗习惯","理论术语","叙事与口头传统","叙事类型与形态","民俗叙事研究中按照叙事的结构特征、主题内容和传播语境对口头叙事进行系统分类的类别体系。基本类型划分：神话——关于世界和人类起源的、被视为'真实发生'的神圣叙事；传说——附着于特定人物、地点和历史事件的、被视为'可能真实'的叙事；民间故事——不要求被信以为真的、主要为审美和娱乐的虚构叙事；笑话和逸闻——以逗笑为主要目的的短篇叙事。中国民俗学还细分出'四大传说''机智人物故事''工匠故事''动植物故事'等本土叙事类型。"],["民俗史","History of Folklore","对民俗事象的历史探究与描述，包括通史和断代史","学科概念","学科元概念","学科属性与定位","钟敬文学科体系中以文字记载和考古出土的民俗历史为主轴的纵深时轴研究分支。与民俗学史区别在于研究的是民俗实践本身的历史而非学术史。"],["民俗学","Folkloristics","民众创造享用和传承的生活文化和风俗习惯","理论术语","记忆与传承理论","传统与传承","以民众（folk，民）的生活文化和口头传统（lore，俗）为研究对象的独立人文学科。1846年英国学者威廉·汤姆斯（William Thoms）创造'Folklore'一词来替代'民间古俗'（Popular Antiquities）。中国民俗学经历了四个关键时期：1918-1925年北京大学歌谣研究会的发轫期（以搜集歌谣为主）、1927-1937年中山大学和杭州的学科建立期（创办《民俗》周刊）、1949年后钟敬文主导的学科体系化（1983年成立中国民俗学会）、1990年代至今的当代多元发展。当代学科定义趋势为：民俗学不是研究'过去'的旧俗学，而是研究'在场的日常文化实践'，其核心关切是理解民众如何通过日常文化实践来组织社会生活、赋予生命意义并应对社会变迁。"],["民俗学原理","Principles of Folkloristics","民众创造享用和传承的生活文化和风俗习惯","理论术语","社会与群体理论","社会理论与民俗","民俗学作为独立学科的基本理论、核心概念和方法论体系的总称。中国民俗学原理的系统建构始于钟敬文，其核心内容包括：民俗的定义和基本特征（集体性、传承性、扩布性、稳定性、变异性）、民俗的分类体系（物质民俗、社会民俗、精神民俗、语言民俗的四大类划分）、民俗的社会功能理论（教育功能、娱乐功能、凝聚功能、规范功能等）、民俗的研究方法论（田野调查、文献考证、比较研究的综合使用）。当代民俗学原理建构的努力致力于在钟敬文体系的基础上引入当代国际理论资源（如表演理论、实践理论、文化记忆理论）进行更新和扩展。"],["民俗学史","History of Folklore Studies","关于民俗问题的思想史、理论史，包括搜集整理运用史","学科概念","学科元概念","学科属性与定位","关于民俗学学科从古至今的思想史和学术史分支，研究什么人何时本着何种思想收集研究了哪些民俗得出过何种结论。顾颉刚和钟敬文的学术传记研究是核心。"],["民俗学学科体系","Disciplinary System of Folkloristics","民俗学作为独立学科的体制化存在","理论术语","中国本土理论","钟敬文学派","民俗学作为独立学科的体制化存在形式，包括涉及高校的民俗学学科点（硕博士培养）、学术组织（中国民俗学会及地方分会）、学术刊物（《民俗研究》《民间文化论坛》等）、学术会议（中国民俗学会年会等）、学术基金和项目体系（国家社科基金民俗学方向）等制度性要素。钟敬文将学科体系的建立视为比个人学术研究更重要的事业——没有健全的学科体系，学术成果无法制度性地传承。当前民俗学学科体系面临的两大挑战：一是学科归属的不确定（民俗学在教育部学科分类中的地位一度不明）；二是学科点的萎缩和学术就业市场的局限。"],["民俗学实践目的论","practical teleology of folklore","以实现公民自由为内在目的的民俗学理论取向","理论术语","中国本土理论","礼俗互动谱系","实践民俗学的理论内核——将民俗学重新界定为一门以实现公民自由和社会解放为内在目的之学，而不仅仅是以描述民俗现象为外在目的之学（目的论，teleology）。户晓辉在其系统论证中指出，民俗学必须回答'为什么研究民俗'这一根本性的目的论问题，他的回答是：研究民俗不是为了生产关于'他们'的'知识'供学术界内部消费，而是为了帮助所有人（包括'他们'和'我们'）更好地理解和实现自由。这一目的论的激进性在于：它将民俗学从一门'冷静的观察科学'转变为一门'有社会担当的实践科学'。"],["民俗学认识论","epistemological folklore","以认识民俗现象及其客观规律为目标的传统民俗学研究取向","理论术语","中国本土理论","礼俗互动谱系","在实践民俗学的二元分类中的一极——指以认识民俗现象的客观特征、规律和因果关系为目标的传统民俗学研究取向。认识论的民俗学关心的问题是：这个民俗是什么？它的结构和规律是什么？它为什么会存在和变迁？——这些问题属于'事实判断'（is）的范畴。实践民俗学的核心批判是：认识论的民俗学不能回答民俗学的'为什么干'（目的论问题），不能为社会提供关于民俗的价值引导。但认识论民俗学的捍卫者认为：学术的首要职责是理解和解释，价值倡导是学术之外的活动，将二者混淆会伤害学术的独立性和客观性。"],["民俗志","folk ethnography","民众创造享用和传承的生活文化和风俗习惯","研究方法","民族志方法","民俗志类型","以文字和多媒体形式对特定社区或群体的民俗文化进行系统性记录、描述和分析的学术文本体裁，是民俗学田野调查的核心成果形式。民俗志不同于人类学民族志之处在于其聚焦民俗事象与实践而非整体社会结构。中国民俗志传统可追溯至顾颉刚等人的早期田野记录，当代民俗志在刘铁梁标志性文化和村落民俗志方法论推动下走向深度描写和反思性书写。民俗志类型包括综合民俗志以县域或村落为单位的全面记述、专题民俗志聚焦单一民俗事象如庙会祭祀和实验民俗志引入多声部叙事和对话式书写等。"],["民俗性","Folkloricity","刘晓春提出的从日常生活实践理解民俗文化特性的理论路径","理论术语","中国本土理论","本土方法论","刘晓春提出的旨在从日常生活实践出发理解民俗文化特性的理论概念和分析路径。其核心命题是：民俗的'民俗性'不在于它被贴了什么标签（'这是传统的''这是古老的'），而在于它在民众日常生活中被如何使用、如何被赋予意义、如何被组织进生活实践——即民俗的实践维度。这一概念整合了布迪厄的实践理论和德塞尔托的日常生活理论，将民俗学从'什么是民俗'的本质主义追问转向'民俗如何被实践'的过程性分析。"],["民俗控制论","theory of folklore control","研究民俗对社会成员行为方式的规范和控制功能的理论","理论术语","社会与群体理论","社会理论与民俗","研究民俗作为社会控制机制对社会成员行为方式的规范和约束功能的理论分支。民俗控制的运作机制包括：禁忌系统（通过恐惧和禁忌约束个体行为）、舆论制裁（通过'别人说'的社会压力规范行为）、仪式规范（通过仪式的强制程序约束参与者行为）、惯习内化（通过从小到大的民俗实践将规范内化为'理所当然'的行为方式）。民俗控制与法律控制的根本区别在于：前者是内在的、自愿的、诉诸道德和情感的，后者是外在的、强制的、诉诸暴力和惩罚的。"],["民俗文化学","folkloristics","钟敬文提出的以民俗文化整体为研究对象的学科概念","理论术语","中国本土理论","钟敬文学派","钟敬文在20世纪80-90年代提出的学科概念和学术纲领，主张以民俗文化整体（而非仅是民间文学）为民俗学的研究对象，将民俗学定位为一门研究'民众生活文化'的独立文化科学。民俗文化学的三个核心层次：描述层——对民俗事象的全面搜集和系统整理；分析层——对民俗的结构特征、功能机制和变迁规律的学术研究；价值层——对民俗的当代价值的评估和为民俗保护提供学术依据。该概念体现钟敬文建设'大国之学'的学科抱负——民俗学不是小打小闹的'杂学'，而是能以文化整体为对象的系统性学科。"],["民俗文化研究","folk culture studies","以民俗文化整体为对象的多学科综合研究领域","理论术语","中国本土理论","钟敬文学派","以民俗文化的整体为研究对象的多学科交叉研究领域，以钟敬文等学者为核心。民俗文化研究与民俗学的关系不是替代关系而是互补关系——前者强调跨学科整合（民俗学、文化学、人类学、历史学的交叉），后者强调学科独立性和专门化。民俗文化研究的核心主张是：要理解任何一种民俗，都不能脱离其所在的文化整体——节日的意义要放在饮食、服饰、仪式、空间、社会关系的整体文化系统中才能理解。"],["民俗旅游","folklore tourism","以民俗文化资源为基础开发的旅游活动和产业形态","研究关键词","当代社会文化","城市与乡村","将本地的传统的民俗的节日、手工的技艺和歌舞等旅游资源作系统化的开发、商品化和包装——将其转化为可供游客消费和体验的文化旅游的产品的产业和行为。在带来经济收益的同时也暗藏着原生态民俗被同质化和空洞化的危机。"],["民俗构成论","theory of folklore constitution","探讨民俗的结构要素和构成规律的理论","理论术语","记忆与传承理论","传统与传承","探讨民俗的内在结构要素（如主体/承载者、内容/文化事象、形式/表达模式、功能/社会作用）及其构成关系的理论分支。民俗构成论的学术贡献在于提出了民俗不是混沌的整体而是有结构的系统——理解民俗不是笼统地说'春节很重要'，而是分析春节由什么要素构成（年夜饭+贴春联+放鞭炮+拜年+压岁钱）、这些要素之间是什么关系（时间先后、空间位置、社会角色分配）、任何一个要素的变化会如何影响整体的民俗结构。"],["民俗符号论","folk semiotics","将民俗事象作为文化符号系统研究其意义表达和解读的理论","理论术语","记忆与传承理论","传统与传承","将民俗事象作为文化符号系统进行研究、分析其意义表达和解读机制的理论分支，是符号学在民俗学中的应用。民俗符号论的核心命题是：民俗不是自然存在的物，而是被文化编码的符号——红色不是一种颜色，而是'吉祥'的民俗符号；叩拜不是一个身体动作，而是'表达服从和敬仰'的符号行为。该领域的主要理论来源：索绪尔的语言符号学（能指/所指）、皮尔斯的符号三分法（像似符/指示符/规约符）、洛特曼的文化符号学。"],["民俗融合","folklore integration","不同民俗文化相互吸收和整合","学科概念","学科元概念","学科属性与定位","两个以上不同地方或族群的民俗文化系统在长期地理和社会接触交融中边界逐渐模糊，各自民俗元素浸润穿插进对方系统的和平文化混血过程。"],["民俗认同","Folklore Identity / Folkloric Identity","张举文提出的以民俗实践为核心的认同建构理论","理论术语","社会与群体理论","社会理论与民俗","张举文提出的以民俗实践为核心理解和分析认同建构过程的理论框架。其核心主张是：认同不是抽象的认知或情感的附庸，而是通过具体的、身体性的民俗实践（做）被反复操演和再生产出来的——我是谁不是靠'想'出来的，而是靠'做'出来的（我过年吃饺子、贴春联、祭祖、走亲戚，所以我是中国人）。民俗认同理论的核心贡献在于：从认同研究的'本质论 vs 建构论'的二元争论中开辟出第三条路径——认同是在民俗实践中被持续实践出来的，既非先天本质也非随意建构。"],["民俗语言学","folk linguistics","综合运用语言学和民俗学方法研究语言习俗的交叉学科","学科概念","学科元概念","学科分支方向","综合运用语言学与民俗学方法研究语言习俗的交叉学科。关注民间口头语言的各种形态——方言俗语禁忌语隐语行话和仪式用语——背后的民俗文化信仰体系和社会心理原理。"],["民俗象征研究","symbolic folklore studies","民众创造享用和传承的生活文化和风俗习惯","理论术语","信仰与观念体系","象征与世界观","将民俗事象（仪式、节日、服饰、饮食、建筑、民间艺术等）作为象征系统来分析其文化意义表达和运作机制的研究领域，是象征人类学（以克利福德·格尔茨和维克多·特纳为代表）在民俗学中的应用。民俗象征研究区分两个层面：象征的语法——各个象征符号如何被组织进一个系统的意义结构（如庙会的空间布局中各个象征单元的位置关系）；象征的实践——在具体的民俗活动中象征符号如何被操演、被解释、被争议。经典学术作品如格尔茨对巴厘岛斗鸡的深描分析——一场斗鸡不仅是娱乐，而且是巴厘人关于地位、荣誉和男子气概的文化象征的浓缩表演。"],["民族学","Ethnology","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","理论术语","社会与群体理论","群体与认同","以特定民族（或族群）的文化特征和社会组织为研究对象的学科，在中文语境下侧重于对少数民族的研究，与侧重异文化研究的文化人类学和侧重本民族民俗研究的民俗学构成互补。民族学为民俗学提供的关键理论和方法包括：文化整体论（将个别民俗放在整个民族文化系统中理解）、比较方法（通过跨民族的比较揭示文化差异和共性）、参与观察和长期田野调查法。中国的民族学和民俗学在少数民族民俗研究领域存在广泛的学科交叉。"],["民族志诗学","ethnopoetics","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","理论术语","叙事与口头传统","口头理论","以丹尼斯·泰德洛克（Dennis Tedlock）和戴尔·海姆斯（Dell Hymes）等为代表的将口头叙事的声音维度（节奏、停顿、音量、音调变化等声学特征）纳入民族志分析的理论和方法。民族志诗学的核心发现是：口头叙事的'诗学'结构不仅存在于文本的字词层面，更存在于叙述者的声音运用——呼吸的停顿标记着诗歌的'分行'，音量的升高标记着高潮的到来，重复的音调模式形成口头诗歌的'押韵'规则。该方法要求研究者在田野中不仅要记录文本，更要录音录像以捕捉口头表演的完整声音维度。"],["民族民俗学","ethnic folklore studies","以特定民族或少数民族的民俗文化为研究对象","理论术语","社会与群体理论","群体与认同","以特定民族（尤其是少数民族）的民俗文化为专门研究对象的民俗学分支领域，在中国语境下与'少数民族民俗'研究高度重合。民族民俗学的核心理论和现实意义：五十六个民族的民俗多样性是中国民俗学独有的学术资源优势——研究彝族火把节、苗族芦笙节、蒙古族那达慕、藏族雪顿节等少数民族民俗，不仅是知识积累，更涉及国家民族政策中的'文化多样性保护''民族团结'与'非遗传承'等现实议题。该方法论的核心挑战是：外部研究者进入少数民族社区时如何避免文化误读和学术殖民？"],["民族自我意识","Ethnic Self-Consciousness","在历史上形成的具有共同语言地域经济生活和文化的稳定人群共同体","理论术语","社会与群体理论","群体与认同","一个民族或族群成员对其所属民族的文化特征、历史命运和集体身份的主观意识和自觉认知，是民族认同从自发走向自觉的标志。民族自我意识的觉醒通常发生在族群接触和比较的情境中——当一个相对封闭的族群开始系统地与其他族群互动时，'我们与他们不一样'的意识被激活。民俗学中，民俗活动（如民族节庆、服饰、饮食传统）是民族自我意识最重要的文化载体和操演场域——穿本民族服装不再只是为了保暖，而是为了表达'我是XX族人'。"],["民间文化整体语境观","holistic context of folk culture","民俗文本或实践所嵌入的具体社会文化情境和使用环境","理论术语","中国本土理论","礼俗互动谱系","中国民俗学田野研究的方法论原则之一，指任何民俗文本（一首歌谣、一则传说、一个仪式）都必须在其所嵌入的具体社会文化情境——地理环境、经济方式、社会结构、历史脉络、人际关系——的整体语境中进行理解，脱离整体语境的孤立分析必然导致误读和意义的丧失。整体语境观的基本要求：研究一首民歌，不能只记录歌词，而要同时记录：谁在唱、唱给谁听、在什么场合唱（田中插秧还是婚礼祝酒）、唱的过程中有什么伴随行为（动作/跳舞/饮酒）、听众如何回应。"],["民间文学说","Folk Literature Theory","民间信仰研究中认为民间文学源于原始信仰与仪式的学术观点，主张民间文学与信仰仪式共生","理论术语","信仰与观念体系","象征与世界观","民间信仰研究中关于民间文学起源的一种学术观点，主张民间文学（特别是神话和仪式歌谣）不是纯粹审美的娱乐创造，而是从原始信仰和祭祀仪式中派生出来的——最早的'故事'是对神的行为的描述（神话），最早的'歌谣'是对神的颂赞（祭歌），只是随着信仰的弱化才逐渐'世俗化'为审美的民间文学。该学说在解释民间文学中大量存在的超自然元素、仪式套语和重复结构时有较强的解释力，但其'泛仪式起源论'可能导致过度推断——并非所有民间文学都源于信仰仪式，劳动歌和情歌就有独立的起源路径。"],["民间文艺学","folk literature and art studies","以民间文学和民间艺术为对象的学科门类","学科概念","学科元概念","学科属性与定位","钟敬文建构的民俗学核心基石分支，以劳动人民集体口头创作的民间文学文本（神话传说故事民歌等）和民间表演艺术为专门研究对象。早期中国民俗学的最主体组成部分。"],["演述","performance / verbal art performance","口头文学在特定语境中动态表演和创编的完整过程","理论术语","仪式与表演理论","表演与展演理论","中国民俗学和口头传统研究中的本土化概念，指口头文学在特定语境中的完整的动态表演和创编过程，强调其同时涵盖言语行为（讲述/演唱）、身体实践（手势、表情、动作）和社会互动（表演者与听众的交流反馈）的综合性。与西文performance的简单对译不同，'演述'突出了中国口头传统的本土特色——重点不是'表演给别人看'的展示性（表演的娱乐和奇观维度），而是'将传统演述出来'的传承性（表演的传承和意义再生产维度）。"],["狂欢精神","carnival spirit","巴赫金提出的民间节庆中颠覆等级秩序的自由解放精神","理论术语","仪式与表演理论","表演与展演理论","米哈伊尔·巴赫金（Mikhail Bakhtin）在对拉伯雷《巨人传》的研究中提出的文化理论概念，指民间节庆（特别是中世纪欧洲的狂欢节）中人们通过戏仿、颠倒、放纵和放纵的笑声暂时颠覆和悬置日常社会等级秩序和官方意识形态的自由精神和解放力量。狂欢精神的核心操作是'颠倒'——小丑扮成国王、平民嘲弄贵族——这种象征性的世界颠倒不仅提供了社会'安全阀'（特纳观点的延伸），更是一种潜伏的、周期性的对官方秩序的文化挑战。该概念在解释中国庙会的'出格'和反秩序元素（如社火中的反串表演）时具有重要的理论启发。"],["环境可持续性","environmental sustainability","人类活动与自然环境保持平衡和长期共存的能力","研究关键词","非遗与遗产","可持续发展","人的社会经济活动不跨越地球的生态的承载力的红线的长期的平安的与支撑生命系统的自然环境的稳定的共存的可持续发展的底线和守则。在民俗中传统的类似禁渔期的生态禁忌即是朴素的原生的环境可持续性的民俗的智慧的结晶。"],["现代性的他者","other of modernity","被现代性话语所界定的对立面或差异项","研究关键词","当代社会文化","当代转型","现代性的宏大的关于进步理性和科学的自信的叙事界定自身时所必须树立的一个作为自己的落后的反面的对立面的虚构的他者的形象——即在现代性的眼光中被贴上前现代落后愚昧和等待被启蒙的标签的传统民俗。"],["现代性转向","modernity turn","学术研究向关注现代性问题的范式转变","研究关键词","当代社会文化","当代转型","在20世纪后期以来的人文和社会科学中以对现代性——它的启蒙理性、工业化和其非预期的灾难——进行批判和反思取代了对前现代的遗留物的抢救的议题的范式的转移。民俗学经历了一个从抢救传统到反思现代性的深刻的转向。"],["现代民俗学","modern folklore studies","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","相对于'传统民俗学'（以乡村传统民俗为主要研究对象的前现代民俗研究）的当代民俗学形态，其核心特征是：研究对象从乡村扩展到城市（都市民俗学）、从传统延展到当代（当代民俗学）、从遗留物转向活态实践。现代民俗学的方法论特征包括：反思性（对研究者立场的自觉反思）、跨学科性（与社会学、文化研究、传媒研究深度交叉）、关注民俗在当代条件下的新形态——网络民俗（如网络迷因、弹幕文化）、消费民俗（如双十一购物节作为新民俗）、文化创意产业中的民俗元素等。"],["理论范式","theoretical paradigm","群体认同和身份的理论概念","理论术语","社会与群体理论","群体与认同","科学研究中以一套公认的理论前提、核心概念和研究范例为骨架形成的研究纲领和思考框架，在民俗学中可辨识的主要理论范式包括五种：文本-历史范式（关注文本搜集和考证）、田野-民族志范式（关注田野调查和深度描述）、人类学结构-功能范式（关注民俗的社会功能和结构分析）、表演-过程范式（关注民俗的动态展演和创编过程）、实践-能动性范式（关注民众的文化创造和意义协商）。当代民俗学的多元化状态意味着不存在一个统一的绝对的范式，不同范式在不同问题域中各有所长。"],["琐事屏障","triviality barrier","成人因将儿童游戏活动视为无意义的琐事而拒绝严肃对待的认知障碍","理论术语","社会与群体理论","群体与认同","儿童民俗研究中的方法论警戒概念，指成人研究者因将儿童的游戏、歌谣、秘密社团等民俗活动视为'无意义的琐事'（与成人的'严肃文化'相对）而不愿投入学术注意力去严肃理解和研究的认知障碍。琐事屏障是成人中心主义在研究态度上的直接体现——同样的行为（如讲笑话）在成人之间是值得研究的'幽默文化'，在儿童之间却是'无意义的瞎玩'。破除琐事屏障的方法论要求是：研究者必须暂时搁置'什么重要什么不重要'的成人价值判断，进入儿童自身的意义世界去理解。"],["生产性保护","productive safeguarding","通过生产实践实现非遗活态传承的保护方式","研究关键词","非遗与遗产","保护理念","中国的非遗保护实践中最具特色的一条路径——不是像保护一个花瓶一样将非遗真空封存，而是鼓励和支持传承人在持续的生产的实践中——在继续做紫砂壶卖给客户的过程当中——来保证手艺不减损并持续地得到创新和传递的经济内生的保护模式。"],["生活世界","Lebenswelt / Life-World","胡塞尔现象学的核心概念，指前科学的、人们直接经验到的日常生活世界，是民俗学实践转向的理论基石之一","理论术语","中国本土理论","礼俗互动谱系","埃德蒙德·胡塞尔（Edmund Husserl）后期哲学的核心概念（德语Lebenswelt），指前科学和前反思的、人们在其中直接生活、感知和行动并理所当然地接受其真实性的日常经验世界。在民俗学中，生活世界概念为民俗研究的认识论转型提供了哲学基础：不是站在'科学'的外部立场去分析'民众的生活世界'（视之为等而下之的'常识世界'），而是承认民俗知识本身就是生活世界的内在构成部分——对村民来说，祖坟的方位影响家族风水不是一个'民俗信念'可以被打上问号，而是他们生活世界中的基本事实。高丙中将生活世界概念引入中国民俗学，推动了从'遗留物研究'向'日常生活研究'的范式转换。"],["生活革命","life revolution","现代化进程中民众生活方式的根本性变革","研究关键词","当代社会文化","当代转型","现代化——以工业化和城镇化为两翼——对以农业和宗族为基础的广大民众的传统的循环缓慢的日常生活的生产和再生产的方式的从根基上的彻底的、快速的并且是不可逆转的革命性的颠覆和重组的宏观的社会过程。"],["生理性别","sex","指向解剖学意义上两性区别的生物性分类标准","研究关键词","身份与权力","性别研究","在医学和法律中被用来在出生时根据观察到的外生殖器将婴儿指派为男性或女性的那一个与社会的和文化的性别（gender）严格区分的纯粹的生物学的解剖学的和染色体的两性的分类。"],["眼光向上","looking upward / gaze upward","王霄冰提出的民俗学主动与国家精英阶层进行学术对话的学科立场","理论术语","中国本土理论","礼俗互动谱系","王霄冰提出的民俗学学科政治立场选择概念，主张民俗学不是一门永远'向下'（研究底层民众）的学科，而应该主动与国家、精英和权力层进行学术对话，将自己的学术成果反馈到上层文化的建设中，即'眼光向上'。该主张的核心关切是：民俗学长期以来的'眼光向下'（研究草根）导致了学科在社会上影响力的边缘化和在国家文化政策制定中话语权的缺失。但也遭到批评——民俗学一旦过度向上看而忘了向下扎根，可能失去其作为底层民众文化代理人的学科本质和批判力量。"],["眼光向下","looking downward / gaze downward","传统民俗学以底层民众和民间文化为关注重心的学术视角和立场","理论术语","中国本土理论","礼俗互动谱系","传统民俗学以底层民众（folk）和民间文化（lore）为关注重心和学术立场的学科姿态和价值取向，是中国民俗学从北京大学歌谣研究会起的奠基性学术传统。眼光向下意味着：研究的对象是'民'而不是'官'，是'俗'而不是'雅'，是'常'（日常）而不是'非常'（精英创造的特殊事件）。这一学术立场在政治上是进步的——它把研究注意力投向了过去被正史和精英文化所忽视的无名民众的日常文化生活，具有一种朴素的文化民主倾向。但在当代反思中，'眼光向下'也被批评为可能隐含一种研究者对研究对象的优越俯视态度。"],["知识生产","knowledge production","学术知识在特定社会文化语境中被创造和建构的过程","研究关键词","当代社会文化","当代转型","知识——无论是科学的还是民俗的——不是在真空中被一个孤独的天才发现的无菌的真理，而是在特定的社会的历史的关系的权力场的场域中被人和制度有选择性地建构、合法化、并传递为常识的过程。"],["硬核","hard core","拉卡托斯科学研究纲领理论中指不可动摇的核心理论和信念","理论术语","社会与群体理论","社会理论与民俗","科学哲学家伊姆雷·拉卡托斯（Imre Lakatos）在'科学研究纲领方法论'中提出的概念，指在一个科学理论体系中不可动摇、不可放弃的核心理论和基本信念——如果在经验检验中遇到反例，被调整和修改的应该是保护带（auxiliary hypotheses，辅助假说）而不是硬核。在民俗学中，硬核概念可用来分析不同学术范式的深层差异——'变异是民俗生命力的表现'和'传承应当保持原汁原味'是不可调和的硬核分歧，导致民俗学家对同一个非遗保护政策持有截然相反的评价。"],["礼俗二事说","ritual-custom dualism","将礼与俗作为两个相关但独立领域进行分析的理论观点","理论术语","社会与群体理论","权力与治理","将礼（国家礼制规范和上层文化体系）与俗（民间风俗和生活传统）作为两个相关联但具有不同性质、不同运作逻辑的相对独立领域进行分析的理论观点。礼俗二事说不同于礼俗一元论（认为礼和俗本质上是同一事物的不同层面），它强调二者的'异质性'——礼依靠文本和官僚体系运作，俗依靠口头传承和日常实践运作；礼的权威来源是官方认证，俗的权威来源是社区共识。该学说提醒研究者不要在分析中将礼逻辑简单套用到俗的领域，或反之。"],["礼俗学","ritual-custom studies","以礼俗互动为核心研究对象和理论框架的民俗学分支领域","理论术语","社会与群体理论","权力与治理","以礼俗互动——官方礼制与民间风俗之间双向影响、相互转化和动态协商的复杂关系——为核心研究对象和分析框架的民俗学子领域，是礼俗互动理论的系统学术表达。礼俗学的方法论特征：历史分析（考察礼俗关系的长时段演变）、田野调查研究（考察当代中国的礼俗互动实践）、结构分析（分析礼与俗运作的不同制度逻辑）。该领域的核心理论框架是，认为中国传统社会的文化秩序是在礼与俗之间持续的张力、互动和协商中被动态建构的，而非由任何一方单独决定的。"],["礼化之俗","ritualization of custom","民间风俗经过礼制化改造后被赋予正统性和合法性","理论术语","社会与群体理论","权力与治理","礼俗互动理论的概念之一，指民间风俗在历史过程中被纳入官方的礼制框架，经过正统化改造和合法性赋予（朝廷的认可和旌表），从一个'民间的土俗'上升为一个'国家认可的正俗'的文化过程。典型案例包括：地方民间信仰中的英烈人物（如关公、妈祖）被朝廷追封为'正神'由国家定期致祭，民间婚丧习俗中的部分元素被儒家礼制所吸收和规范，民间草根起义的牺牲者被官方重新评价和祭祀（如各地义冢和忠烈祠的建立）。礼化之俗的标志是：俗获得了礼的背书和文本化记录，但同时也被礼的规范所规约和改造。"],["礼源于俗","ritual originates from custom","刘师培等提出的国家礼制起源于民间风俗的学术命题","理论术语","社会与群体理论","权力与治理","清末学者刘师培（字申叔）在《古政原始论》等著作中提出的重要学术命题，主张中国古代的国家礼制（如周礼中的祭祀体系和等级制度）并非儒家的凭空创造，而是从原始社会更早的民间风俗（如原始民族公社时期的祭祀习惯和等级秩序）中经过系统化和伦理化提炼、改造而来的。'礼源于俗'对民俗学的理论意义在于：它赋予了'俗'以时间上的先位和文化上的基底地位——不是礼向下教化俗（儒家传统叙事），而是俗向上提供礼的原料。该命题是礼俗互动理论的思想渊源之一。"],["礼野通变","ritual-field interchange","国家礼制与民间仪式之间双向互动、相互渗透和变通的关系","理论术语","社会与群体理论","权力与治理","描述国家礼制规范与民间仪式传统之间双向互动、相互渗透、在历史长河中不断变通和转化的动态关系的概念。'礼野通变'的四个维度：礼向下渗透——官方礼制在地方社会被简化和改编以适应民间条件；俗向上提升——民间仪式被官方收编和正统化；礼俗共变——二者在同一社会变迁中同步发生改变（如当代国家对春节的重新定义为'中华民族的传统佳节'，民间的过年方式也在同步变化中）；礼俗通约——二者在深层文化逻辑上的可通约性（共享的孝道、忠义等核心价值观）。"],["社会凝聚力","social cohesion","社会群体成员之间的团结、信任和归属感","研究关键词","非遗与遗产","可持续发展","整个社会的不同的阶层、民族和社区的成员之间不是一盘散沙，而是有深厚的相互的连接的纽带——如共享的民俗和民族的集体记忆——将他们紧密地凝结在一起的集体的信任归属感和团结的力量。"],["社会包容性","social inclusion","社会对多样化群体平等接纳和参与的程度","研究关键词","非遗与遗产","可持续发展","一个社会在面对其内部的大大小小的族群、文化和生活方式上的异质和差异时——不以消灭差异为目标，而是建立一种能够公平地容纳和尊重各种差异，并且保障每一个群体都能够平等的参与社会的公共生活的制度的能力和文化的气度。"],["社会史","social history","从社会结构社会生活角度研究历史的方法论取向","理论术语","社会与群体理论","社会理论与民俗","从社会结构、社会生活和底层民众的视角切入研究历史的史学方法论取向，是民俗学与历史学的核心交叉地带。社会史为民俗学提供的最重要方法论是'自下而上的历史'（history from below）——不研究帝王将相和重大政治事件，而研究农民、工匠、妇女等普通人的日常生活史。中国社会史的代表性学者赵世瑜将社会史的眼光与民俗学的方法结合，关注华北庙会、移民传说、地方信仰等议题。"],["社会学","Sociology","以社会结构社会关系和社会行为为研究对象的现代社会科学","理论术语","社会与群体理论","社会理论与民俗","以社会结构（阶级、群体、制度）、社会关系（权力、不平等、合作）和社会行为（社会化、集体行动、社会变迁）为研究对象的现代社会科学，是民俗学重要的理论和方法论来源学科之一。社会学为民俗学提供的关键概念工具：社区（community）、身份/认同（identity）、社会化（socialization）、社会控制（social control）、社会资本（social capital）、场域（field）等。然而民俗学与社会学在'如何处理田野材料'上存在重要分歧——社会学倾向于将田野材料整理为可量化和可概括的数据，民俗学则倾向于在个案的丰富性和语境性中保留其独特性。"],["社会性别","gender","社会、历史和政治对两性认同具有建构作用的文化范畴","研究关键词","身份与权力","性别研究","与生物的生理的性别（sex）严格区分的在人类的社会中被漫长而坚固的社会规范、文化和权力的运作所建构出来的两性在心理、行为和角色上的那整套看似自然的不平等的区分——如蓝和粉。"],["神圣与世俗","sacred and secular","涂尔干宗教社会学的核心二元分析框架，将世界划分为神圣（被禁忌隔离和崇拜的超凡领域）和世俗（日常生活凡俗领域）两个基本范畴，仪式和信仰体系围绕神圣事物组织社会秩序","理论术语","信仰与观念体系","宗教与民间信仰","涂尔干（Émile Durkheim）在《宗教生活的基本形式》（1912）中建立的宗教社会学核心二元分析框架。涂尔干认为，所有人类社会的宗教信念都根植于一个最基本的分类——将世界划分为两个绝对异质的领域：神圣（sacred）——被禁忌隔离和保护、被敬畏和崇拜的、超凡的、完满的领域；世俗（profane）——日常、凡俗、普通的、非宗教的社会生活领域。神圣不是事物的内在性质，而是社会贴在事物上的标签——一面旗帜、一个图腾、一座庙宇之所以神圣，是因为社会如此规定并严格通过禁忌和仪式来维护这种神圣性。仪式的作用正是管理这两个领域之间的过渡——将参与者从世俗世界带入神圣世界（如通过净身斋戒进入祭祀场），再将他们安全地送回世俗世界。该框架不仅是宗教社会的分析工具，更是整个社会科学对'社会何以凝聚'这一根本问题的经典回答——神圣代表社会的集体理想，崇拜神圣即是社会对自身的崇拜。"],["神圣性","sacredness","宗教和信仰对象所具有的超凡、权威和不可亵渎的神圣特征","理论术语","信仰与观念体系","信仰根源与形态","宗教和民间信仰对象所具有的超凡的、权威的、不可亵渎的和被严格禁忌保护的特征，是'神圣与世俗'二分框架中神圣领域的核心属性。在民俗学中，神圣性的分析关注以下问题：什么被赋予了神圣性？（祖先牌位、神像、特定的植物如桃木、山水如泰山）神圣性如何被维护？（通过禁忌——不可随意触碰神像、不可在祭祀时喧哗、不可在特定日子做特定事）神圣性如何丧失？（当禁忌被打破——被文革破四旧砸掉的神像对当地人的精神约束力是否还存在？）当代社会中神圣性不是消失了，而是被重新分配到新的对象上（如国族符号、明星偶像、消费品牌）。"],["神话主义","mythologism","神话在现代媒体和商业中的挪用与重构现象","研究关键词","当代社会文化","数字化与媒体","杨利慧等学者在中国民俗学中提出的概念——指神话在脱离了其原生的口传祭祀的古老语境之后在现代的电子游戏、奇幻大片、文旅的景点以及网络文学中被碎片化、重混和商业化的再利用和美学化的新世纪的挪用和再生的当代的文化现象。"],["神话学","mythology","以神话为研究对象的学科","理论术语","信仰与观念体系","信仰根源与形态","以神话（myth）——关于世界、人类和文化起源的、在特定文化中被视为'真实发生过'的神圣叙事——为研究对象的学科，是民俗学、宗教学和文学的交叉领域。神话学的主要研究进路：文本研究（对神话文本进行校勘、分类和比较）、结构研究（列维-斯特劳斯对神话背后深层二元对立结构的揭示）、功能研究（马林诺夫斯基认为神话是社会制度的'宪章'——论证现状为什么是这样）、心理分析（荣格对神话中'原型'的跨文化普遍性分析）。中国神话学的特殊性在于：中国上古神话（如盘古开天、女娲造人、共工怒触不周山）的文本极为零散，经历了严重的'历史化'加工（被儒家史官改造为上古帝王的本纪），因此'神话复原'（从历史文献中逆推出神话原型）是中国神话学的核心学术任务。"],["科学研究纲领","scientific research programme","拉卡托斯提出的由硬核、保护带和启发法组成的理论框架","研究关键词","非遗与遗产","保护理念","拉卡托斯的科学哲学的核心概念。一门成熟的学科的操作不是一群杂乱无章的假说的互不关联的堆叠而是一个有核心的坚硬的内核、可调整的保护带和一套明确的方法论的启发法的规则的系统的研究的纲领。"],["移风易俗","transforming social customs","国家通过政策和教化手段变革旧有风俗习惯倡导新风尚的社会工程","理论术语","社会与群体理论","权力与治理","国家通过行政和教化手段有目的地变革原有的社会风俗（旧俗）和倡导新的社会风尚（新风）的文化工程和社会治理策略。在中国历史上，移风易俗是儒家政治理想的核心要素之一——'移风易俗，莫善于乐'（《孝经》）。典型的历史案例包括：宋代朱熹推行《朱子家礼》以简化和规范民间丧葬奢靡之风；20世纪新文化运动中对'旧风俗'的批判；新中国成立后开展的爱国卫生运动（改变公共卫生习俗）、殡葬改革（从土葬到火葬）。民俗学对移风易俗的研究不限于评价其成败，更关注权力、知识和日常生活之间的复杂互动——谁有权力来判定什么风俗需要'移'、什么风俗需要'易'？"],["稳定性","Stability","民俗一旦形成就长期保持相对固定的特性和内在惯性","理论术语","中国本土理论","本土方法论","民俗文化一旦形成就长期保持相对固定不变的形态和内在惯性的特性。稳定性是民俗传承的前提条件——如果一种习俗每年都完全不同（今年吃饺子明年吃汉堡后年吃刺身），它就无法获得作为'这个节的习俗'的可辨识性和传承性。稳定性的社会基础：民俗惯习的内化（人们做某件事不是经过理性计算而是'本来就是这样的'的习惯性服从）、社会制裁对偏离的抑制（不遵守习俗被社区舆论惩罚）、民俗与深层文化结构的契合（民俗不是随机形成的，而是根植于社会的价值观体系）。当代民俗学研究也指出，民间的稳定性话语（'我们几百年来都是这样做的'）有时是被'发明'出来的——一种只有几十年历史的实践中用'自古以来'的语言来论证其稳定性和合法性。"],["空间实践","spatial practice","列斐伏尔社会空间理论中日常生活行为的空间实践方式","理论术语","社会与群体理论","社会理论与民俗","亨利·列斐伏尔（Henri Lefebvre）在《空间的生产》（1974）中提出的社会空间理论的三个维度之一（另两个为'空间的表征'和'表征的空间'），指人们在日常生活中通过身体移动、行为习惯和感知方式实际生产和占用空间的实践方式。在民俗学中，空间实践分析关注：庙会中人流怎样移动——哪些空间所有人可进入、哪些只允许特定人群（如只有男性可进主殿）——这种移动实践本身就是性别和权力秩序的再生产；节庆中如何'使用'空间——平时作为晒谷场使用的空间在节庆时转化为祭祀空间，空间的功能随民俗实践改变。"],["第二性","the Second Sex","波伏娃提出的女性作为相对于男性的第二性存在的经典命题","研究关键词","身份与权力","性别研究","西蒙娜·德·波伏娃（Simone de Beauvoir）在1949年的女性主义的奠基的圣经——《第二性》——中提出的最著名的命题。女性在世界的历史中被不是作为一个与男性平行的第一性来对待，而是被参照和相对于男性的标准被推入了附属的和次要的第二性的从属的社会的位置。"],["箭垛式人物","arrow-target figure / nodal figure","顾颉刚发现的不同时代故事不断附会到同一核心人物身上的文化现象","理论术语","叙事与口头传统","叙事类型与形态","顾颉刚在孟姜女传说研究中发现的关于传说人物形成规律的著名概念。他发现，某些历史人物或传说人物犹如'箭垛'（箭靶子）一样，不同时代的、不同来源的、本属于其他人物的故事和功绩，被后人不断地'射'（附会）到这个同一个人物身上，使其形象不断丰富、膨胀——如包公成为所有清官故事的箭垛式人物（所以民间故事和戏曲中包公断的案包括了从汉代到清代本来分别由不同清官审理的案件）。该概念与顾颉刚的'层累造成说'一脉相承，共同的学术价值在于揭示了历史记忆和口头传统的建构性特征——我们认知中的'历史人物'不是对历史事实的直接反映，而是长期、累积的集体文化建构的产物。"],["类型性/模式性","Typicality/Patterned Nature","民俗在内容和形式上具有稳定模式的特性和规律","理论术语","记忆与传承理论","传统与传承","见'类型性'和'模式性'的各自详细释义。类型性（typological nature）和模式性（patterned nature）是民俗的基本特征之一，指民俗在内容和形式上具有可被归类的相似性和稳定性。在民俗研究中，类型性通常指向跨文本的归类（如AT分类法下的故事类型），模式性通常指向同一民俗内部的固定结构（如婚礼仪式的固定程序）。二者共同构成民俗学分类研究和比较研究的认知基础。"],["精神文化说","Spiritual Culture Theory","英国人类学派将民俗限定为精神文化现象和遗留物的狭义民俗观","理论术语","信仰与观念体系","象征与世界观","早期西方民俗学（特别是以英国人类学派为代表）的一种狭义民俗观，将民俗限定为民间精神文化现象（神话、传说、故事、歌谣、信仰、习俗等非物质文化元素），而将物质文化（生产工具、建筑、服饰、饮食方式）排除在民俗的定义外。在中国的语境下，钟敬文提出的'大民俗'观突破了这种狭义界定，将物质民俗（居住、服饰、饮食、交通）、社会民俗（家族、村落、组织、节庆）、精神民俗（信仰、禁忌、观念）和语言民俗全部纳入民俗学的范畴，形成了中国民俗学的'四大类'体系。"],["经籍诗学","scriptural poetics","以文字经籍文本为对象的传统诗学分析范式，与口头诗学相对","理论术语","叙事与口头传统","口头理论","以书面的、固定的经籍文本（如《诗经》《楚辞》《荷马史诗》的写定版本）为对象的传统诗学分析范式，与以活态的口头表演为对象的'口头诗学'构成方法论的对立。经籍诗学的方法论特征：将文本当做固定的、已完成的审美对象进行静态分析（格律、修辞、意象、主题）；口头诗学的方法论特征：将文本当做在每次表演中动态生产的、未完成的、过程性的事件进行分析。帕里-洛德理论的革命性正是在于，它论证了以经籍诗学的方法去分析口头文学（如把《荷马史诗》当书面文学来分析）从根本上就是错误的。"],["结构","structure","社会中稳定的组织模式和关系系统","理论术语","社会与群体理论","社会理论与民俗","社会中相对稳定的组织模式、社会关系和制度系统，是社会学和人类学的核心分析概念。特纳将'结构'确立为与'反结构'（anti-structure）辩证对立的一极——结构提供社会秩序、角色分工和日常规范，反结构（仪式的阈限阶段）暂时解构这些以提供集体情感的释放和社会的弹性。结构分析在民俗学中的应用：分析一个民间组织（如庙会组织委员会）的内部职位结构如何反映村落社会的权力关系，分析节日中不同人群的结构位置（谁主祭谁从祭谁只能看）如何反映并再生产社会等级。"],["结构主义神话研究","structuralist myth analysis","列维-斯特劳斯以二元对立等深层结构分析神话的方法","理论术语","社会与群体理论","社会理论与民俗","克洛德·列维-斯特劳斯（Claude Lévi-Strauss）创立的神话分析方法论体系，核心理念是：世界各地的神话虽然表面上千差万别（不同的神、不同的情节），但在深层都遵循相同的人类思维结构的运作规律——以二元对立（生/死、自然/文化、男/女、生/熟等）为基本操作单元，通过在叙事中不断调解（mediate）这些对立来化解矛盾，处理人类思维中的根本认知困境。结构主义神话学的分析方法是通过将神话分解为最小意义单元（'神话素', mytheme），然后重组重构来揭示其深层结构。该方法彻底脱离了追问'神话的历史起源是什么'的历时性研究，转向'神话的思维结构是什么'的共时性研究。"],["结论先行原则","conclusion-first principle","在范式指导下预设结论再搜集证据的研究进路","理论术语","社会与群体理论","社会理论与民俗","对某种特定研究思维方式的批评性描述，指研究者在范式或理论预定的指引下，在走进田野和接触材料之前就已经预设了研究的结论（如'民间信仰都是封建迷信''民俗在城镇化中必然消亡'），然后在田野中'有选择地'搜集那些支持预设结论的证据，忽视或压制那些与预设结论矛盾的材料。结论先行是田野研究中必须高度警惕的方法论陷阱——它使人看不见实际情况的复杂性和反例的存在。克服的方法：进入田野前保持问题意识但悬置结论判断，让田野材料本身来推动和修正研究假设。"],["维系功能","Maintenance Function","社会文化现象在整体系统中发挥的作用和效能","理论术语","社会与群体理论","社会理论与民俗","民俗在保持特定社会文化秩序的稳定性和连续性方面所发挥的功能。维系功能是功能学派民俗学分析最多的一种民俗社会功能，它的具体表现包括：维系家族结构——宗族祭祀仪式通过定期聚集和共同仪式不断确认宗族成员之间的关系和等级秩序；维系性别秩序——大量的民俗实践（如婚嫁中的嫁妆和聘礼制度）在潜移默化中自然化和再生产性别不平等；维系村落社会关系——全村参与的共同节庆活动（如社火）维系和修复因日常摩擦而受损的村落人际关系。"],["考古学","Archaeology","通过物质遗存研究人类历史的学科","理论术语","社会与群体理论","社会理论与民俗","通过发掘和分析人类物质遗存（包括遗址、器物、艺术品、建筑等）来研究人类过去的历史和文化的人文学科。考古学对于民俗学的贡献主要在两个方面，一是为缺乏文字记载的早期民俗（史前民俗）提供物质证据——一个新石器时代遗址的祭祀遗迹可以帮助推断该时期的信仰形态；二是为民俗的'物质性'研究提供方法论工具——民间建筑、服饰、生产工具的形制演变分析可以借鉴考古学的类型学和年代学方法。"],["自主性","autonomy","行动主体自我决策和独立运作的能力","研究关键词","身份与权力","身份与权力","一个行动者——个人或社区——在没有外部的权力的强制和过度的干预下，能够完全根据自身的文化意愿和内部的需求来自由的决定其文化的走向和实践的方式的独立自主的和不依赖他人的能力和权利。在非遗保护中的社区的自主权是核心的原则。"],["自主知识体系建设","autonomous knowledge system construction","构建具有本土自主性的学术知识体系","研究关键词","当代社会文化","当代转型","在全球的知识生产的体系中——打破西方学术的垄断的话语权——由中国学者有意识地自觉地依托中国的深厚的经验的田野和本土的学术的脉络来建构的不依附和尾随于西方理论的具有中国的自主的文化主权和解释权的知识的话语和学术的体系。"],["艺术民俗学","art folklore studies","从民俗学角度阐释艺术活动及其与民俗整体内在关联的学科分支","学科概念","学科元概念","学科属性与定位","以民众日常和节庆的艺术实践——民歌戏曲社火剪纸刺绣等——为核心的民俗学与艺术学交叉分支。与传统精英艺术史论的区别在于将艺术放回其民俗土壤中理解。"],["范式转换","Paradigm Shift","学科研究框架和理论取向的根本性转变","学科概念","传承与变异","变异与创新","库恩科学哲学核心概念，指学科的基本世界观和方法论被全新竞争范式全盘取代的大地震式转换。民俗学中从文本搜集到田野民族志再到表演理论的转变均可视为范式转换。"],["荷马问题","Homeric Question","关于荷马史诗作者、创作时代和口头起源的经典学术论争","理论术语","叙事与口头传统","口头理论","西方古典学术史上最著名的学术论争之一，围绕荷马史诗（《伊利亚特》《奥德赛》）的三个核心问题：荷马是否真实存在？荷马史诗是由一个天才诗人独立创作还是整个口头传统长期积累的结果？荷马史诗是口头创编的产物还是文字创作的产物？帕里-洛德的理论给出了最具说服力的答案：荷马史诗不是某一个天才诗人的独立文字创作，而是在长期的口头史诗传统中通过程式系统被集体创编和改进的，荷马是在这个口头传统末端的一个集大成者，史诗的文本化可能发生在他的演唱被文字记录下来之时。"],["表征危机","crisis of representation","后现代人类学对研究者能否真实再现他者文化的质疑","研究关键词","身份与权力","性别研究","在1980年代后现代人类学的写文化的大讨论中被尖锐地提出的关于传统的民族志和民俗志的根本性的质疑——研究者这个外来的有特权的陌生人有何能力和权力能真实而不走样地代表（表征）与他们的文化和生活断裂的村民的内部的真实的声音？"],["表演","performance","民俗表演和展演的理论概念","理论术语","仪式与表演理论","表演与展演理论","民俗学和人类学中指向民俗活动的'事件性'和'过程性'维度的核心概念。理查德·鲍曼（Richard Bauman）在《作为表演的口头艺术》（1977）中将表演定义为'一种言说的模式，一种交流性展示的方式'——当一个人讲故事时，他不是单纯地传递信息，而是在'表演'：他在展示自己的口才、吸引观众的注意力、接受观众对其叙述能力的评价。表演的核心特征为：标定性（通过特定信号暗示进入表演状态）、新生性（每次表演是独特的、不可完全复制的）、对观众负责（表演者承担着展示能力的责任）。表演概念为民俗学提供了从静态文本分析转向动态事件分析的方法论革命。"],["表演理论","performance theory","鲍曼创立的关注口头演述中表演者与观众互动的民俗学理论","理论术语","仪式与表演理论","表演与展演理论","理查德·鲍曼（Richard Bauman）等在1970年代创立的民俗学理论流派，将口头叙事和其他民俗交流重新定义为'表演'（performance）——一种在特定情境中、表演者对观众承担着交流性展示责任的话语模式。表演理论的方法论革命从三个方面改变了民俗学：从'文本'到'事件'——研究重心从记录和分析文本转向分析活态的表演事件；从'物'到'人'——从关心文本的类型和版本转向关心表演者的策略、听众的反应和现场的社会互动；从'不变'到'新生'——强调每次表演的独特性和不可复制性（emergent quality），拒绝将表演视为'对固定脚本的复述'。该理论在中国民俗学中的系统引介始于1990年代，深刻影响了口头传统、仪式和节庆研究。"],["规范传说","normative legend","在地方知识体系中具有规范性和权威性的传说","研究关键词","全球化与地方","地方性议题","在地方的社会的传统的知识系统中——不是仅供娱乐的闲谈——而是负载着该社区的必须被遵守的关于世界、祖先和道德的不可撼动的核心的规范的权威的话语的传说——是当地的约束力的不成文的口头法。"],["规范功能","Normative Function","社会文化现象在整体系统中发挥的作用和效能","理论术语","社会与群体理论","社会理论与民俗","民俗作为社会规范体系对社会成员行为方式的内在约束和规范功能，是民俗控制力最温和、最日常、最深入的表现形式。规范功能的运作机制是'理所当然的自然化'——人们'自然地'在特定的节日做特定的事（春节吃饺子、清明祭祖、中秋吃月饼），当被问及'为什么'时往往回答'大家都这样'或'从来都是这样的'，规则的来源被隐匿于传统和习惯之中。规范功能的强制性不像法律那样依赖暴力，但可能比法律更有效——因为不遵守的人将面对的是全村/全族/全家人的无声压力而非一个可见的惩罚者。"],["解释民俗学","interpretive folklore studies","民众创造享用和传承的生活文化和风俗习惯","理论术语","信仰与观念体系","象征与世界观","民俗学中侧重对民俗现象的文化意义进行理解和解释（而非仅仅描述和分类）的学术取向和方法论传统。解释民俗学的核心主张是：民俗学研究不仅要回答'这是什么'（描述分类），更要回答'这意味着什么'（意义解释）——一种仪式活动的意义不仅在于仪轨步骤是什么，更在于对参与者来说这些步骤意味着什么、为什么这样做对他们是重要的。解释民俗学的方法论基础是格尔茨的'深描'（thick description）——通过多层次地挖掘一个看似简单的民俗行为背后层层嵌套的文化意义来完成对它的理解和解释。与实证民俗学相比，解释民俗学更侧重于意义的理解而非因果规律的发现。"],["解释项","interpretant","文化象征和世界观的理论概念","理论术语","信仰与观念体系","象征与世界观","皮尔斯（Charles Sanders Peirce）符号学三元结构中的关键概念——在符号（sign/representamen）、对象（object）和解释项（interpretant）的三元关系中，解释项是符号在解释者心中所产生的那个'效果'，即符号被理解为什么意义。举例来说，'烟'（符号）指向'火'（对象），在观察者心中产生'起火了'的认知和相应的应对准备（解释项）。在民俗学中，解释项概念提醒研究者：一个民俗符号（如红色）的意义不仅在于它指向什么对象（喜庆），更在于它在主体心中产生了什么理解效果和实践反应（贴红对联、穿红衣、发红包等一连串行为）。"],["认知空间","cognitive space","个体或群体在认知活动中建构的心智空间和知识结构","理论术语","社会与群体理论","群体与认同","个体或群体在认知活动中建构和运作的心智空间和知识架构，是理解民俗分类和民间知识体系的核心认知概念。民众对自己生活的世界的认知空间不是随机的，而是高度结构化的——一个村落的居民的心智空间中有一个清晰的'我们村vs邻村''山上vs山下''干净vs不干净'的二元空间分类，这些认知空间结构直接塑造了他们的民俗实践（哪里可以埋葬哪里不可以、哪条路在什么日子可以走什么日子不能走）。"],["话语霸权","discourse hegemony","特定话语在社会中占据主导统治地位的状态","研究关键词","身份与权力","身份与权力","福柯和葛兰西等理论中的核心批判概念，指特定的群体通过其在知识生产和媒体传播中的支配地位将自己的话语体系强制地提升为唯一合法的真理和常识——排斥和消灭其他异质话语的空间——的统治性的话语权力的操作。在民俗学中指学院派的话语对民间话语的霸权。"],["语境-场域","context-field","将民俗实践置于社会场域和文化语境中理解的综合分析框架","理论术语","社会与群体理论","社会理论与民俗","将民俗实践同时置于社会场域（布迪厄理论意义上权力关系和位置争夺的社会空间）和文化语境（特定事件的具体情境脉络）中的综合分析框架。\"语境-场域\"分析的核心主张：民俗事件不能只在'语境'层面（当时的什么人、什么时间、什么地点、说了什么话）理解，更要上升到'场域'层面——这个民俗活动在什么样的社会权力结构中运作？谁拥有定义和操演民俗的权力？谁被排除在外？仪式中的位置分配（主祭/陪祭/旁观）反映并再生产了什么样的社会关系？"],["语境中的民俗","Folklore in Context","民俗文本或实践所嵌入的具体社会文化情境和使用环境","理论术语","中国本土理论","礼俗互动谱系","民俗学从孤立文本和事项研究转向将民俗视为嵌入特定社会文化情境中的活态实践的整体性研究框架。'语境中的民俗'的核心方法论：一种民俗事象（如一首歌谣、一套祭祀程序）不能被从它的生活土壤中连根拔起单独分析——同一首情歌在田里唱和在嫁女的哭嫁仪式中唱具有完全不同的意义，脱离语境的分析必然导致严重的误读和意义丢失。这一框架是表演理论在中国民俗学中被接受和本土化的核心方法论收获。"],["语言学","Linguistics","以人类语言为研究对象的科学","理论术语","社会与群体理论","社会理论与民俗","以人类语言的结构、功能、历史演变和社会使用为研究对象的科学。语言学对民俗学的影响是双重的：一是方法论层面——结构主义语言学（索绪尔）为民俗的形态分析提供了范式模板（如普罗普的故事形态学就是语言学范式在叙事研究中的迁移）；二是对象层面——语言民俗（方言、谚语、谜语、咒语、民歌等口头传统）本身就是语言学分枝社会语言学的研究对象。在口头传统研究中，帕里-洛德理论从根本上依赖的是语言学的'程式'分析。"],["语言民俗学","linguistic folklore studies","以民俗研究为重心、运用语言学方法研究方言民俗词语的学科方向","学科概念","学科元概念","学科属性与定位","以民俗学问题为导向，以田野方言调查和语言风俗记录为主要方法，辨析中国民间方言俗语禁忌称谓体系中的深层民俗文化意义。与民俗语言学侧重有所不同——更偏民俗而非语言本体。"],["调和论","theory of reconciliation","在文化变迁中寻求传统与现代之间平衡和整合的理论取向","理论术语","社会与群体理论","权力与治理","在民俗学的应用研究（特别是现代化进程中传统文化的保护和发展）中主张不是在'全盘保留传统'和'全盘放弃传统'之间做二元选择，而是在传统与现代之间寻求平衡性、整合性和创造性转化的理论取向。调和论拒绝文化保守主义（'传统必须原汁原味'）和文化虚无主义（'传统都是落后的'），它关注的是：如何在保持传统核心价值的同时适应现代社会的条件？如何在现代化进程中不被同化而保持文化的可辨识性？——即'变中不失根'的实践路径。"],["谱系概念","genealogical concept","非物质文化遗产中关于传承谱系和源流的概念","研究关键词","非遗与遗产","非遗保护","在非遗的申报和保护的工作中——关于某项非遗的传承的历史的渊源的谱系（谁是第几代的传承人和师承的脉络）的梳理和认证的核心操作的概念。谱系的建构为非遗的历史合法性和正宗性提供关键的文本证据。"],["象征","symbol","文化象征和世界观的理论概念","理论术语","信仰与观念体系","象征与世界观","符号学和文化人类学的核心概念，指通过社会约定俗成的规则来代表另一事物或观念——不一定与所代表的事物有自然的相似或因果关联——的符号。民俗象征与一般符号的区别在于它是被一个群体共享而非个体独有，其意义不是个人的解码而是在民俗活动中的社会性激活。象征分析为民俗学提供了解释民俗深层文化意义的最重要方法论工具——特纳对恩登布人黑、红、白三色象征的分析，格尔茨对巴厘岛斗鸡的深描分析，均是象征分析的经典学术样本。"],["资料学","Documentation Studies","关于民俗资料获取、整理、保存和运用活动的探索论述","学科概念","学科元概念","学科属性与定位","民俗学的基础保障性分支——对散落在民间社会和档案中的各类民俗原生资料进行系统收集着录分类归档和长久保存的学科内部的图书馆与档案学分支。"],["跨性别","transgender","性别认同或表达与出生时被指定的生理性别不一致的群体","研究关键词","身份与权力","性别研究","个体的性别的认同与出生时根据其外生殖器被医生和法律指派的生理的性别不相符合的人群的全称。在民俗学中跨性别群体在传统的两性严格划界的民俗——如分性别的人生礼仪——中的位置的调整成为新课题。"],["身体在场","physical co-presence","互动仪式中参与者身体共同在场的必要条件","研究关键词","身份与权力","身份与权力","柯林斯的互动仪式链理论成立的四个关键的仪式条件中的最物理的一个——参与者的肉身的身体必须在同一个物理的时间和空间中真实地面对面共同在场——不能是通过屏幕和网络的虚拟的代表。"],["身体民俗","bodylore","民众创造享用和传承的生活文化和风俗习惯","理论术语","中国本土理论","本土方法论","以人的身体作为民俗知识储存、传递和操演的核心场域来开展研究的民俗学分支领域，其核心命题是：民俗不仅是'用嘴说的'和'用脑记的'，更是'用身体做的'——跳舞的步法、剪窗花的手势、祭祀的跪拜姿势、做年糕的和面力度——这些身体性的民俗知识储存在肌肉记忆和身体习惯中，无法通过语言和文字完整传递，只有通过身体的实操和模仿才能传承。\"身体民俗\"（bodylore）概念源于美国民俗学家凯瑟琳·扬（Katharine Young）的倡导，在国内彭牧等人推动了相关研究。"],["边缘礼仪","liminal ritual","过渡礼仪三阶段中处于阈限阶段的仪式，个体身份模糊","理论术语","仪式与表演理论","仪式类型与机制","范热内普'通过礼仪'（rites of passage）三阶段理论中的第二阶段——即阈限阶段（liminal phase）——的仪式。边缘礼仪的核心特征是个体的身份模糊性和不确定性：个体已经脱离了原有社会角色（如新娘已离开娘家），但尚未进入新角色（尚未正式成为夫家成员），在'不是这个也不是那个'的过渡状态中。这一阶段的仪式操作通常包括隔离和保护措施（新娘蒙红盖头、新房门口放火盆）以保护处于脆弱过渡状态中的个体不受邪恶力量的侵害。"],["边缘阈限","liminality","过渡礼仪中个体身份模糊的中间状态","研究关键词","身份与权力","身份与权力","范热内普的通过礼仪的过渡阶段——个体已经脱离了旧的身份（如在婚礼中已经离开了娘家并且尚未正式成为夫家成员）处在两个社会身份的模糊的交界的非此非彼的状态中。此阶段的人被视为高度脆弱和不洁的。"],["过渡礼仪","Rites of Passage","范热内普提出的人生阶段转换仪式理论，包含分离、阈限、聚合三阶段","理论术语","仪式与表演理论","仪式类型与机制","阿诺德·范热内普（Arnold van Gennep）在《通过礼仪》（1909）中提出的系统的仪式分析框架，后由维克多·特纳（Victor Turner）进一步发展和深化。通过礼仪认为，所有人生阶段转换仪式（出生仪式、成年礼、婚礼、丧礼等）都遵循一个普遍的三阶段结构：分离仪式（rites of separation）——个体从原有的社会身份和群体中脱离；阈限/过渡仪式（liminal rites）——个体处于'既不是这个也不是那个'的身份模糊过渡状态；聚合/融入仪式（rites of incorporation）——个体以新的身份被重新接纳入社会。该框架不仅仅是仪式分类学，更是理解'社会如何管理身份转变'的根本理论工具，至今仍是民俗学仪式分析的母体理论。"],["进化论","evolutionism","文化象征和世界观的理论概念","理论术语","信仰与观念体系","象征与世界观","以19世纪人类学（泰勒、弗雷泽、摩尔根等）为代表的、将人类文化假定为沿一条从'蒙昧'经'野蛮'到'文明'的单线进化路径发展的学术思潮。在民俗学中，进化论的核心遗产是'文化遗留物'（survivals）概念——民俗被视为早期文化阶段残留在现代社会中的'化石'。进化论为民俗学提供了第一个系统的理论分析框架，但其线性进步主义预设和欧洲中心主义已被当代学术全面批判和放弃。但进化论提出的核心问题'文化为什么会变化、变化有没有方向'至今仍是民俗学文化变迁研究的基本问题。"],["道教","Daoism","中国本土宗教，对民间信仰有深远影响","研究关键词","全球化与地方","地方性议题","起源于中国本土的以道为最高信仰追求长生久视的宗教体系。两千年来对中国的民间信仰的各个方面——从符箓的驱邪到法术和炼丹以及道教的很多神仙被民间吸纳为普世的保护神——进行了深到毛细血管的文化渗透。"],["遗产化","heritagization","文化事象通过制度性认定和申报被赋予遗产地位的社会文化过程","研究关键词","非遗与遗产","非遗保护","一个原在社区的日常生活中自然传承的民俗的实践通过被地方的政府和学者遴选、按照联合国教科文组织和国家的标准被文本和影像的申报材料重新打磨包装、并最终经官方的认证和公布被制度性地提升和转型为一个受到法律保护的官方的文化遗产的对象的全部政治的和社会的过程。"],["遗留物","survival","泰勒提出的从早期文化阶段留存下来的民俗事象和文化元素","理论术语","信仰与观念体系","象征与世界观","爱德华·泰勒（E.B.Tylor）在《原始文化》（1871）中提出的文化进化论核心概念，指从人类更早的文化发展阶段的信仰、习俗、仪式和行为模式中残存下来、保留下到更高发展阶段的社会中的文化元素。泰勒以欧洲各种民间习俗为例——如向井里投币许愿（古代祭井仪式的遗留）、丧葬后洗手（古代净化仪式）——论证它们都是从远古宗教仪式'遗留'至今的无意义残余。遗留物概念对中国早期民俗学影响深远——'抢救即将消失的民俗'的学术焦虑和紧迫感正是遗留物思维的直接产物。当代民俗学已全面批判遗留物概念，因为民俗不是'死的化石'而是'活态的文化实践'。"],["遗留物理论","survival theory","泰勒进化学派将民俗视为原始文化遗存和残余的理论主张","理论术语","信仰与观念体系","象征与世界观","见'文化遗留物说'(#299)，将民俗视为原始文化在文明社会中的残余和化石的理论。遗留物理论为民俗学提供了早期的研究对象界定——民俗之所以值得研究，是因为它们是理解人类远古文化的'活化石'。但遗留物理论的致命缺陷在于：它预先否定了民俗在当代社会中的价值和活力——如果民俗只是'遗留物'，那么它的合理归宿就是被记录归档然后静静地消亡。当代民俗学从遗留物研究转向活态实践研究正是对这一理论预设的根本性超越。"],["遗留物说","survival theory","泰勒提出的从早期文化阶段留存下来的民俗事象和文化元素","理论术语","信仰与观念体系","象征与世界观","同'遗留物理论'。泰勒在《原始文化》中提出的文化进化论概念框架，将民俗视为早期文化阶段在后续社会形态中的'文化遗产'——其存在方式如地层中的化石。在中国民俗学史上，一个有意思的知识社会学现象是：'遗留物说'在1980-1990年代被中国民俗学家大量引用和批判，成为建立中国本土民俗理论的'他者'——通过批判西方遗留物理论来证明钟敬文'民俗是活态的生活文化'理论的进步性。"],["都市民俗学","urban folklore studies","以城市民众民俗为研究对象的学科分支","研究关键词","当代社会文化","城市与乡村","以现代都市特有的——如地铁里的都市传说、写字楼的电梯禁忌和城中村的流动人口的夹杂着家乡和城市两种味道的混杂的新民俗——为专门的研究对象的当代民俗学在城市空间中的重要的分支。"],["铭心事件","imprinting event","在个体或群体记忆中留下深刻烙印的重大事件","理论术语","记忆与传承理论","文化记忆","在个体或群体的生命中留下深刻、持久且无法磨灭的心理烙印的重大事件，是理解集体记忆和个人叙事的核心心理学概念。在民俗学中，铭心事件是集体记忆和个人叙事形成的'锚点'——经历过唐山大地震的群体的个人叙事围绕地震的当天展开，经历过三年困难时期的老人的身体记忆围绕着'饿'展开。刘亚秋在'记忆的微光'研究中关注了铭心事件的最小化——日常的、非轰动性的但同样铭刻在个体记忆中的个人事件——拓宽了铭心事件在民俗学中的应用空间。"],["问题优先原则","problem-first principle","文化象征和世界观的理论概念","理论术语","信仰与观念体系","象征与世界观","研究方法论的核心原则之一，要求研究者以明确的研究问题（而非预设的理论结论）为起点进入田野和文献，让田野材料和研究证据来推动和回答研究问题，而不是拿着预设的理论答案去寻找'合适'的证据。问题优先与'结论优先'（#398）构成方法论的对立。在民俗学研究中贯彻问题优先原则的具体做法：进入田野前写下清晰的研究问题（不是'我去看看有什么民俗'，而是'我想理解这个村落的宗族祭祀实践如何重新定义他们与已拆村庄的关系'），然后让田野中的发现来回答、修正甚至重构你的初始问题。"],["集体性","Collectivism / Collective Nature","民俗在产生和流传中体现的群体创作和共有特征","理论术语","社会与群体理论","社会理论与民俗","民俗的最基本特征之一，指民俗不是个体的私人创造和行为，而是群体的集体创造、集体传承和集体共享的文化成果。集体性的三重含义：创作集体性——民俗作品的产生是众口相传、集体加工的结果而非某个署名的个体艺术家的创作；拥有集体性——民俗不是个人私产而是社区/族群的共有文化遗产（一首民歌没有'版权'）；参与集体性——民俗活动的操演需要群体的共同参与才得以实现（一个人的仪式不是仪式）。当代民俗学对集体性的复杂化思考在于：数字化时代个体的'发明'（如一个网络迷因被数百万用户转发改造）是否构成一种新型的集体性？"],["集体欢腾","collective effervescence","涂尔干提出的宗教仪式中群体聚集产生的情感亢奋与集体认同状态","理论术语","仪式与表演理论","仪式类型与机制","埃米尔·涂尔干（Émile Durkheim）在《宗教生活的基本形式》（1912）中提出的宗教社会学核心概念，指在集体性宗教仪式中，当大量人群密集聚拢在一起进行共同活动（集体歌唱、舞蹈、呼喊、仪式操演）时产生的一种强烈的、亢奋的、超出日常经验的情感共鸣和集体认同感的特殊精神状态。涂尔干的革命性论点是：集体欢腾中人们体验到的'超越性的神圣力量'其实不是来自神灵，而是社会自身的力量——被聚集放大到极致的集体情感被投射为'神'。该概念为理解民俗中集体性仪式活动（如庙会、狂欢节、演唱会、体育赛事）的强大凝聚力量提供了经典的理论解释。"],["静态文类观","static genre perspective","将文类视为稳定封闭的分类体系的研究视角","理论术语","叙事与口头传统","叙事类型与形态","与'动态文类观'相对，将民间文类（genre，如神话、传说、故事、民歌等）视为各自独立、边界清晰、静态固定的分类体系的传统研究视角。静态文类观的方法论习惯是：拿到一个民间叙事文本，第一步是判断它是神话还是传说还是故事，然后把它放进相应的'抽屉'中用该文类的理论工具去分析。动态文类观的核心批判是：在民众的口头实践中，文类边界是模糊的、流动的、可跨越的——同一个叙事在不同讲述情境中可以被处理为不同的文类，文类不是文本的固有属性。"],["非物质文化遗产学","ICH Studies","以非遗为对象的专门学科领域","研究关键词","非遗与遗产","非遗保护","以非遗的保护的理论方法和实践为专门的系统研究对象的具有强烈的应用导向的新兴的交叉的学科。在中国尚在草创阶段——学界就非遗学究竟应当是民俗学的子科还是独立的学科仍在持续争论中。"],["非物质文化遗产美学","ICH aesthetics","以非物质文化遗产为对象的审美研究","研究关键词","非遗与遗产","非遗保护","从美学的视角——非遗中的美的形式和独特的审美的体验——来考察非遗不是作为冷冰冰的被保护和抢救的濒死对象而是作为一个活的美学的生命体的专门的审美的研究的分支。关注传统手艺的匠心之美和仪式的庄重之美。"],["非遗化","intangible heritage-ization","民间文化被纳入非物质文化遗产保护体系经历制度性转化的过程","研究关键词","非遗与遗产","非遗保护","民间的原本自发的、不依赖于外部的认定的日常的文化的实践——如一个村的小庙的年度祭祀——在本地的文化官员和学者合力将其推向国家非遗的评审和认定系统的制度化的轨道中经历的被官方文本化、标准化和去地方化的为符合报批模板而被改造的异化的过程。"],["非遗立法","ICH legislation","有关非物质文化遗产保护的法律制度建设","研究关键词","非遗与遗产","非遗保护","国家和地方立法机关制定和颁布的专门针对非遗的保护、传承和管理的一系列的法律法规的建设。中国的《非物质文化遗产法》于2011年正式生效是非遗保护的法律基石。"],["预成图式","pre-formed schema","研究者带入田野的既有知识框架和认知模式","理论术语","社会与群体理论","社会理论与民俗","研究者在进入田野之前已经在学术训练中形成的既有的认知框架、理论和解释模式，这些预成图式构成了研究者理解田野现象的必要前提（没有理论框架无法'看到'任何现象），但同时也是研究者偏见和盲点的来源（'只看到理论让你看到的东西'）。民俗学田野研究中，预成图式与田野现实的辩证关系是'思'与'看'的循环——预成图式提供最初的问题意识，田野材料不断修正和丰富预成图式，修正后的图式又引导发现新的田野现象。"],["AT分类法","Aarne-Thompson Classification System","阿尔奈和汤普森创立的国际民间故事类型索引体系","研究方法","分析范式","形态与结构","安蒂·阿尔奈（Antti Aarne）1910年首创、斯蒂思·汤普森（Stith Thompson）1928年和1961年两次增订的国际民间故事类型索引体系。以AT编号将全球民间故事按情节结构分为动物故事、普通故事、笑话和程式故事等大类——每个类型有其专属的AT编号如AT510灰姑娘型。是民俗学跨文化比较的基础工具。"],["个体民俗志","individual ethnography","将自身学术经历作为民俗志书写对象的反思性体裁","研究方法","民族志方法","民俗志类型","一种反思性的民俗志书写实验体裁，研究者以自身的学术经历田野遭遇和个人学术成长历程为民俗志的书写对象。个体民俗志打破了传统民俗志中研究者是透明公正的客观记录者的虚构，诚实面对并书写研究者本人在民俗研究过程中的困惑错误成长和文化休克，以此揭示田野研究的实际过程而非只呈现被净化的研究结论。该体裁与人类学的反思民族志一脉相承。"],["个案选点","case site selection","田野调查前选择典型田野点的方法和技术","研究方法","田野调查","田野伙伴关系","田野调查开始前选择和确定调查地点调查对象和调查范围的关键方法论步骤。个案选点的核心考量因素包括典型性选点是否能代表该类别的一般特征、可进入性社区和关键个人是否接纳研究者、比较价值选点是否能与已有研究案例构成有意义的比较和可行性研究的资源条件是否能支撑调查的完成。选点不当将严重影响田野研究的质量和价值。"],["中介中心性","Betweenness Centrality","衡量节点在知识网络中桥梁作用的指标","研究方法","数字方法","数据分析","源自社会网络分析的计量指标，衡量一个节点在网络中充当其他节点间最短路径的桥梁的频率——高中介中心性的节点在网络中占据关键的信息流通和资源调配的中枢战略位置。在民俗学中用于分析关键个人如村落中的仪式主持者和民俗精英在社会关系网络中的信息中介和资源协调角色。"],["中介媒介","intermediary medium","连接民俗传统与现代表达的物质或符号载体","研究方法","田野调查","观察与访谈","连接民俗传统内容与现代表达形式之间的物质载体或符号元素。如抖音平台本身即是连接传统民歌与当代数字传播的中介媒介——它不是中性的管道而是深刻地重塑了民歌的表达方式时长和受众互动模式。该概念整合了媒介化理论强调媒介不是透明的传输工具而是主动参与塑造被传递内容的文化技术。"],["主位研究","emic approach","从文化内部持有者的视角进行研究的取向","研究方法","田野调查","田野伙伴关系","肯尼斯·派克（Kenneth Pike）从语言学引入人类学并扩展至整个社会科学的核心概念对子（emic/etic）。主位研究强调从文化内部持有者的视角和分类体系出发去理解和描述该文化——不是研究者用外部学术术语去定义村民的仪式行为，而是尽力进入村民自己的语言和分类体系去理解他们如何定义和体验自己的仪式行为。主位研究是民俗学田野方法论的基本原则之一。"],["乡村民俗志","Village Folklore Ethnography","以村落为单位的民俗志书写形式","研究方法","民族志方法","民俗志类型","以自然村落为基本单位进行的民俗志书写形式，是中国民俗学田野研究的经典体裁。村落作为中国传统社会的基本空间生产单位和社会生活共同体，其内部具有相对完整的民俗体系——从年节到人生礼仪到日常禁忌——使得以村落为单位的民俗志能够呈现一个微型但完整的民俗文化整体。刘铁梁倡导的村落民俗志特别强调不能只是民俗事象的目录式罗列而要抓住该村落的标志性文化进行深度描写。"],["事实洞察力","fact insight","在田野中依据范式快速识别有效事实的专业眼光","研究方法","分析范式","实证与假说","研究者在田野调查中快速识别和判断所观察到的现象中的哪些是有学术价值的事实、哪些是背景噪音的专业判断能力。事实洞察力不是天生的直觉而是通过大量田野经验的积累和深厚的理论素养训练出来的——如同一个有经验的侦探能在案发现场注意到旁人忽视的关键细节。该能力的核心是范式的内化——研究者不用有意识地推理而是范式在发挥着准直觉性的对事实的筛选和识别作用。"],["传承人/民俗传承人","Folklore Bearer/Transmitter","掌握和传承民俗知识、技艺的个体，田野调查的核心对象","研究方法","田野调查","田野伙伴关系","掌握着特定的民俗知识体系和实践技艺并在社区中被认可为民俗传统的活态承载者、操演者和传递者的个体。传承人是民俗学田野调查中最核心的研究对象和信息来源。中国的非遗代表性传承人认定制度使传承人的身份从社区内部的认可提升为国家的官方认证，但也带来了传承人从活态的民俗实践者向体制化的非遗展示者的身份张力。在田野中与传承人建立信任关系并理解其实践逻辑是田野工作的核心。"],["体化实践","incorporated practice","通过身体动作和行为习得的文化实践方式","研究方法","田野调查","观察与访谈","皮埃尔·布迪厄实践理论的核心概念，指以整个身体而非仅以大脑/语言为媒介进行的文化习得和实践方式——学一门手艺不是通过阅读说明书和听理论课而是通过手的重复操作将技能内化为身体的本能和肌肉记忆。在民俗学中体化实践为民俗技艺传承的身体维度提供了理论解释——老师傅教徒弟不是靠说而是靠做给徒弟看、徒弟跟着做、在反复的做中身体学会。"],["信息提供人","informant","在田野调查中提供信息的关键人物","研究方法","田野调查","田野伙伴关系","在田野调查中研究者与之建立研究关系并向其获取关于当地文化和民俗的信息和知识的本地人。当代民俗学对信息提供人概念进行了重要的批判性反思——信息提供人一词隐含了信息从被动的当地人单向流向主动的研究者的不平等权力关系，替代性概念如田野伙伴和合作研究者更强调田野关系的对等性和互惠性。"],["假设叙述","hypothetical narration","田野工作中基于假设进行推理论证的方法","研究方法","分析范式","实证与假说","田野工作中运用反事实推理进行推理论证的一种方法论策略——研究者在分析某个民俗现象的成因时不仅考察实际发生了什么的证据，还通过假设推理如果某个可能的因素不存在该民俗现象是否还会是现在这个样子——来检验该因素的因果权重。该方法源自社会科学中的反事实分析方法。"],["假说方法","hypothesis method","通过提出假说并经反复验证逼近真理的理论建设步骤","研究方法","分析范式","实证与假说","以提出假说为知识生产的起点的科学研究方法。其操作逻辑是提出假说在前（根据已有知识对新现象提出暂时的解释性假说）→检验假说在后（通过田野的新数据检验假说的真伪和调整假说）——不断反复此循环以逼近更可靠的知识。在民俗学中假说方法要求田野工作者不在进入田野前要求自己有完美的理论蓝图，而是以研究问题和初始假说为起点，在田野中根据发现灵活的修改和重塑假说。"],["儿童民俗记录","Children's Folklore Documentation","对儿童民俗活动的系统记述和收集","研究方法","田野调查","记录与伦理","对儿童群体的游戏歌谣秘密社团等民俗活动进行适合儿童特点的系统记录和收集的田野方法。儿童民俗记录的核心方法论挑战是成人－儿童之间的权力不对称——成人研究者需要放下权威以玩伴而非研究者的身份进入儿童的游戏世界才能记录到儿童自然状态下的民俗实践而非为成人表演的经过修饰的版本。录音和录像在征得儿童及监护人同意后是记录儿童民俗不可或缺的工具。"],["入户调查","household survey","研究者进入居民家庭进行的调查方式","研究方法","田野调查","观察与访谈","研究者进入被调查家庭住所进行的调查方式，是民俗学田野调查的基础方法之一。入户调查的核心优势是在日常生活的自然场域中进行访谈和观察——在被访者的厨房里可以看到实际的炊具和饮食方式在堂屋里可以看到神龛和家庭祭祀的空间安排。入户调查的关键伦理是尊重和感恩——研究者是被允许进入他人家中的外人应保持谦逊和感激的态度。"],["共创模式","co-creation model","研究者与民众共同参与民俗知识生产的研究模式","研究方法","田野调查","观察与访谈","研究者与社区成员不再扮演研究主体与研究对象的不对等角色，而是作为平等的知识共创的合作伙伴共同参与从确定研究问题到收集和分析资料到写作成果的全过程的田野研究模式。共创模式的核心是对知识生产民主化的坚持——不是研究者来提取当地人的知识，而是研究者与当地人共同创造关于他们文化的新知识。该模式在非遗保护的社区参与原则中有直接的应用价值。"],["共现分析","Co-occurrence Analysis","分析关键词在同一文献中共现频次的方法","研究方法","数字方法","数据分析","文献计量学和数字人文领域的基础分析方法，通过统计分析两个关键词在同一篇文献中同时出现的频次来揭示研究主题之间的关联强度和研究领域的内在知识结构。在民俗学中可用于分析某个时段内民俗学研究文献中频繁共现的关键词以描绘学科的研究热点和知识网络。"],["共被引分析","Co-citation Analysis","分析文献被共同引用关系的研究方法","研究方法","数字方法","数据分析","文献计量学的核心分析方法之一，通过统计两篇文献被同一篇后发表的文献同时引用的频次来揭示文献之间的学术关联和学科知识基础。共被引频次越高的两篇文献被认为是知识关联越紧密的基础文献。在民俗学中可用于分析学科的知识基础结构——哪些文献是民俗学界公认的基础文献。"],["关键个人","key individual","在文化传承和社区发展中起核心作用的个人","研究方法","田野调查","田野伙伴关系","在特定社区的文化传承社会组织和民俗实践中起到不可替代的核心推动和枢纽作用的关键人物。与一般的传承人和信息提供人不同关键个人的特征是其影响力超越了个体的技艺层面——他/她不仅在掌握和传递某项民俗技艺，而且在社区的民俗决策（如庙会如何办/节庆如何安排）中拥有不成文的但被广为认可的领导和协调地位。田野调查中识别和与关键个人建立信任关系是最重要的工作。"],["关键报道人","key informant","在田野调查中提供核心信息的重要人物","研究方法","田野调查","田野伙伴关系","在田野调查中能够提供最深广和最核心的关于当地文化和民俗的信息并与研究者建立深入长期的研究关系的当地核心人物。与一般信息提供人不同关键报道人通常具有极强的口头表达能力和反思能力，不仅能讲当地的民俗是什么还能在一定程度上帮助研究者分析为什么会这样。关键报道人与研究者的关系是田野工作成败的关键。"],["关键词替换法","keyword substitution method","检验学术命题是否具有特定对象意义的逻辑测试方法","研究方法","分析范式","语境与阐释","一种逻辑检验方法，用于判断一个学术命题是否具有其声称的特定研究对象的专属有效性和区分度。其操作方法是将命题中的关键词替换为另一个相似但不完全相同的词，检查命题是否仍然成立——如果替换后命题仍然成立，则说明原命题的专属性不足可能只是一个泛泛的普遍性论断而非对特定对象的专属发现。该方法对民俗学的理论建构具有批判性的自我检验价值。"],["减法原则","subtraction principle","以简化组织、聚焦核心事务为宗旨的学会管理原则","研究方法","分析范式","语境与阐释","以精简组织结构和聚焦核心学术事务为原则的学会和学术组织的管理哲学。其核心主张是不贪大求全不搞形式主义的不必要扩张，将有限的精力和资源集中在学术研究的最核心事务——田野调查/学术会议/刊物和出版的品质保障——上。该原则在民俗学界被作为学术组织健康运作的座右铭之一。"],["勘案能力","case investigation ability","像学术侦探般从材料中发现问题和线索的能力","研究方法","分析范式","实证与假说","研究者像侦探调查一个案件一样以敏锐的观察力逻辑推理能力和对细节的把控，从不成系统的零散的田野材料中发现意外的学术线索和深层问题的调查能力。勘案能力要求研究者既要有开放的心态（对预料之外的线索保持敏感）又要有理论素养（能将断片的线索整合进一个有解释力的分析框架中）。"],["半结构化访谈","semi-structured interview","有提纲但灵活调整的访谈方法","研究方法","田野调查","观察与访谈","田野调查中应用最广泛的定性访谈方法——访谈者事先准备了一个包含核心问题和主题的提纲以确保访谈覆盖所有关键议题，但在访谈进行中不机械地照念提纲而是灵活地根据被访者的叙述流向进行追问和调整问题的顺序和措辞。半结构化访谈在结构化和完全开放性访谈之间取得了实用的平衡——同时保证了各访谈之间的可比性和对意外话题的开放性。"],["历史演进法","historical-evolutionary method","追踪故事传说在时间和空间中演变的研究方法","研究方法","分析范式","历史与比较","民俗学芬兰历史-地理学派（以科隆父子/Kaarle Krohn为代表）的核心研究方法。其基本操作是尽可能地搜集同一民间故事类型在全球各地的所有异文（variants），通过精细地比较各个异文的细节在时间和空间上的分布来重构该故事的原始形态（原型/urform）并追溯其发源地和历史上的传播路线。该方法为民俗的历史比较研究提供了经典的方法论范式，但被批评为忽视了口头传承的创造性维度。"],["历史研究法","Historical Method","运用历史文献和考古资料追溯民俗起源演变的研究方法","研究方法","分析范式","历史与比较","运用历史文献档案方志和考古资料追溯和分析民俗事象的历史起源演变轨迹和变迁动因的系统研究方法。在民俗学中历史研究法是民俗学的历史维度的基本方法——要理解一种民俗在当代的形态必须考察它在历史上是如何形成的经历了怎样的变迁。顾颉刚的孟姜女故事研究是民俗学历史研究法的代表性经典。"],["参与观察法","Participant Observation","研究者融入被研究群体，在参与中观察记录民俗的方法","研究方法","田野调查","观察与访谈","马林诺夫斯基（Bronislaw Malinowski）在特罗布里恩群岛的田野工作中创立的、至今仍是人类学和民俗学核心的田野调查方法。其核心是研究者不仅在被研究的社区中作为一个外部的观察者，而是尽可能地参与当地人的日常活动——和他们一起劳作一起吃饭一起参加仪式——在参与的过程中体察和记录当地人的文化实践的逻辑。参与观察法打破了仅仅依赖访谈来获取知识的局限，使研究者能直接经验和理解民俗的操演性和身体性维度。"],["双窗口","double window","同时观察他者文化和反观自我的田野方法论","研究方法","分析范式","语境与阐释","田野工作者同时打开两扇视窗的方法论概念——一扇窗是对外的观察窗（观察和理解他者的文化实践），另一扇窗是对内的反射窗（反观和审视研究者本人的文化偏见和学术预断）。双窗口操作要求研究者不被单一的观察视角困住而是持续地在观察他者与反思自我之间来回移动，以在田野中达至更自觉和公正的理解。"],["反观叙述","reflexive narration","田野工作者对自身文化偏好的反思性表达","研究方法","分析范式","语境与阐释","田野工作者对其自身的文化位置理论承诺和个人偏见以及这些因素如何可能影响了田野观察和写作的诚实和批判性的自我分析和文字表达。反观叙述要求民俗志书写中不能抹去研究者的存在假装一个全知全能的客观叙述者，而应将研究者本人的困惑偏见和反思作为民俗志文本的有机组成部分呈现在读者面前以增强文本的诚实性和可信度。"],["反面启发法","negative heuristic","禁止学者误入歧途以免危及硬核的方法论约束","研究方法","分析范式","实证与假说","拉卡托斯科学研究纲领方法论中与正面启发法构成对子关系的概念。反面启发法是方法论中的禁令和禁忌——规定在研究纲领的硬核遇到反常的经验检验时，不接受将反常作为硬核为假的证据并将攻击指向硬核，而是要求将反常消化于保护带的调整中。在民俗学中反面启发法解释了为何当一个学术范式的基础信念遭到田野反例的挑战时该范式的追随者仍不放弃核心信念而坚持寻找辅助假说的调整。"],["口述史","Oral History","通过访谈获取个人或群体关于民俗历史的口述记忆","研究方法","田野调查","记录与伦理","通过系统的口述访谈记录具有特定历史经验的个人和群体关于过去的鲜活的第一手记忆和叙述的质性研究方法。在民俗学中口述史不仅是收集关于民俗的历史信息的方式更是通过访谈记录民众自身的民俗生活体验和感受——不是问当地的民俗是什么（这将获得标准化的民俗事象清单），而是请老人讲述他们自己从小的民俗生活经历（这将获得活的个人的民俗记忆和体验）。"],["可操作性原则","principle of operability","课题边界应以能够实际研究和检验为前提","研究方法","分析范式","实证与假说","研究者在选择和设计课题时必须以该课题是否能够通过实际的研究操作被检验为核心考量标准的方法论原则。可操作性原则要求不能选择那些无法通过可用的研究方法和资源来完成和检验的过于宏大的课题（如人类全部民俗的比较研究）——这样的课题虽在理论上宏伟气派但在操作上无法实际完成。"],["听话","listening skill in fieldwork","田野工作者倾听和理解访谈对象话语深层含义的技术","研究方法","田野调查","观察与访谈","田野访谈中研究者积极专注和深度理解访谈对象的话语——不仅是语言的表面内容，更是话语的深层含义情感色彩和言外之意——的关键访谈技术。听话不同于日常交谈中的听，它要求研究者放下自己的预判和回应的准备，全身心投入地进入对方的叙述世界去感受和体察叙述者的体验和意义。缺乏听话的技术是田野访谈失败的最常见原因。"],["启发法","heuristic","研究纲领的方法论规则，包括正面启发和反面启发","研究方法","分析范式","实证与假说","拉卡托斯科学研究纲领方法论中的术语，指一个研究纲领中的整体方法论规则体系——包括反面启发法（告诉你哪些路不能走——不能攻击硬核）和正面启发法（告诉你哪些路应该走——如何发展和优化保护带以解释更多的新事实）。在民俗学中启发法被视为规范和引导学术研究操作的方法论策略体系。"],["回访","revisit / follow-up","对原有调查地点进行再次访问","研究方法","田野调查","田野伙伴关系","田野研究者在首次调查结束一定时段后重新回到原调查地点和调查对象处进行的后续调查和追踪研究。回访的学术价值在于以时间的纵深为分析维度——通过对比首次调查和回访之间发生的民俗实践的变化，研究者可以捕捉到民俗的历时性变迁轨迹。回访也是田野伦理的体现——不回访一走了之是研究者对被研究社区的亏欠。"],["在场者","the one who is present","长期身处于研究现场并获得地方知识的田野工作者","研究方法","田野调查","田野伙伴关系","长期亲身居住在田野现场并通过日常生活的深度参与获得了内在于该社区的地方知识和文化直觉，而不再仅仅是一个外来的短访客的田野工作者。在场者的核心资质不是田野时间够长这个表面指标，而是在长期的在场的日常生活参与中获得了一套类似于当地人的对当地文化的感受力——能看懂当地人的一个眼神表情的细微含义。"],["地方合作","local collaboration","与当地社区合作开展田野工作的模式","研究方法","田野调查","田野伙伴关系","研究者在田野调查中与当地社区组织和居民建立合作和共同参与的田野工作关系模式。地方合作超越了单纯的工具性的信息提供人—研究者关系，而是基于互惠和相互尊重的长期合作关系——社区成员在研究的规划和实施中有真正的发言权和决定权，研究成果必须向社区反馈并有助于社区自身的文化保护和发展。是非遗保护的社区参与和事先知情同意伦理的直接体现。"],["多点田野调查","multi-sited fieldwork","同时或先后在多个田野点进行的调查研究","研究方法","田野调查","田野伙伴关系","乔治·马库斯在1995年系统论述的当代人类学田野方法创新——不再局限于单一长期的田野地点，而是顺着研究对象本身的移动轨迹跨越多点进行跟踪式的田野研究。多点田野调查适用于当今全球化和高流动性背景下的民俗研究——如跟随移民群体追踪其民俗实践从家乡到迁入地的跨地演变。对研究者的资源和方法要求远高于单点田野。"],["女性/性别视角","feminist/gender perspective","将女性和性别作为分析范畴引入学术研究的方法论立场","研究方法","田野调查","观察与访谈","将女性和性别不是作为描述性的背景变量而是作为理论和方法论的核心分析范畴来审视学术研究——不是研究女性的民俗这个实体，而是揭示民俗的知识生产本身是否存在系统性的男性中心偏见（如传统民俗志中女性的声音和民俗实践被系统性地忽略和矮化）的方法论立场。在民俗学中该视角的引入揭示了民俗研究在传承人认定等议题中的性别盲区。"],["女性生命史","women's life history","以女性个体生活经历为核心的口述史和生命历程研究","研究方法","田野调查","记录与伦理","以普通女性的个体生命历程——从她的出生被养育结婚生育到老年的整个生命经历——为核心叙事线索和框架的口述史和生命史研究。女性生命史在民俗学中的价值在于以普通女性的一手叙述来填补正史和男性中心民俗志中对女性民俗实践和体验的系统性空白——从她的口中了解她经历过的婚礼生育祭拜等民俗活动的主观体验。"],["学术生长点","academic growth point","能够吸引学者持续投入研究的、有价值的新问题领域","研究方法","分析范式","实证与假说","在特定研究领域或交叉地带新出现的、尚未被前人充分开拓的但已经展现出能够持续产出有价值的学术成果和吸引研究投入的潜力的新兴问题和研究方向。学术生长点的识别是研究者学术判断力的试金石——能在众多可能的题目中辨认出有生长潜力的课题。"],["学术眼光","academic vision","由研究范式决定的对研究对象的选择性和专业性视角","研究方法","分析范式","实证与假说","由研究者所接受的学术范式训练所塑造的一套决定研究者会关注什么现象忽略什么现象如何解读现象的前意识的专业的观察眼光和筛选机制。学术眼光不是主体的自由选择——接受不同范式训练的民俗学家在同一个庙会现场会看到不同的东西（一个看到了功能结构另一个看到了表演过程）。"],["定点调查","fixed-point survey","对固定地点进行长期反复的田野考察","研究方法","田野调查","田野伙伴关系","在固定的特定田野地点进行持续性的而非一次性的田野调查的方法，通常是与该社区建立长期的研究跟踪关系每隔一定周期返回并进行新数据的搜集和比较。定点调查的核心价值在于时间纵深——通过多年多轮的连续观察可以记录到民俗实践在长时段中的变迁和连续。"],["定点跟踪调查","Longitudinal Fixed-Point Survey","对同一社区或群体进行长期追踪的田野调查方法","研究方法","田野调查","田野伙伴关系","在固定地点和群体中进行长时段的系统跟踪回访的田野调查方法，是以时间为实验变量的近似纵向研究。定点跟踪调查要求研究者在较长的时间跨度内（数年甚至数十年）对同一定点社区和同一批关键个人进行周期的系统的重复访问和观察记录。庄孔韶的《银翅》对林耀华《金翼》的隔代重访是定点跟踪调查的经典范例。"],["实地观察","field observation","在自然情境中对民俗实践进行直接观察","研究方法","田野调查","观察与访谈","研究者在民俗实践的自然发生现场——不是实验室不是会议室——直接用自己的感官（眼看耳听鼻闻手触）观察和记录正在发生的民俗行为和事件的田野方法。实地观察法的核心优势是绕过了访谈中被访者的二次加工直接目击民俗实践的实际操作过程——被访者口头描述的仪式和执行时实际的操作常常有不小的出入。"],["实证研究","empirical research","发现和描述现象间一致关系及其规律的研究方式","研究方法","分析范式","实证与假说","以可观测和可验证的系统经验证据为基础进行知识生产和理论检验的科学研究范式。在民俗学中实证研究要求关于民俗的理论命题（如仪式具有凝聚功能）不能仅靠逻辑推演或经典引用来论证，而必须通过田野中系统收集的经验证据——对具体村落的实际仪式实践的多案例的观察比较和检验——来支持和验证。"],["客位研究","etic approach","从外部观察者的视角进行研究的取向","研究方法","田野调查","观察与访谈","肯尼斯·派克提出的与主位研究构成对子的概念。客位研究是从研究者的外部的学术理论框架和分类体系出发对文化现象进行跨文化的比较分析和解释——研究者不试图进入当地人的内部视角，而是运用人类学民俗学的通用理论概念（如功能/结构/象征）作为分析工具来研究任何文化。客位研究的优势是可进行跨文化的系统比较，劣势是可能强加研究者的框架于当地人的经验之上导致文化的误读。"],["客观事实","objective facts","物质世界的事件、现象和过程本身","研究方法","田野调查","观察与访谈","在哲学和科学哲学中与理论建构和主观解释相对的独立于观察者的意识存在的事件现象和事实。在田野研究中纯客观事实的概念受到了反思人类学和民俗学的根本性质疑——在田野现场研究者不是一个中性的录音机客观事实不是被接收入镜头的而是被研究者通过注意力的选择和学术范畴的应用主动建构出来的。"],["对象先行","object priority","以研究对象（如某村落）为导向而忽视问题意识的研究","研究方法","分析范式","实证与假说","选题中以某一特定对象（某村落某族群某传承人）为先决出发点——我先确定我要研究这个村落——然后再去找一个可以套在这个对象上的研究问题的倒置了的选题思路。对象先行的危险是缺乏驱动研究的问题意识，极易导致一个没有分析深度和学术贡献的百科全书式的浅表描述。问题优先是克服对象先行的药方。"],["局内人","insider / emic","属于被研究群体的文化内部成员视角","研究方法","田野调查","观察与访谈","在被研究群体内部出生和成长的、天然具有该群体的文化知识语言和分类体系的文化内部成员。在民俗学中局内人的视角被认为是理解一个文化的内部逻辑的最珍贵和最难以获取的资源——一个本村出生的人对自己村落的民俗的理解具有外来田野工作者永远无法企及的文化直觉和深度。当代民俗学提倡培养局内人成为土著学者由内部自己书写自己。"],["局内人/局外人视角","Emic/Etic Perspective","田野调查中研究者与被研究者文化位置的关系","研究方法","田野调查","田野伙伴关系","田野研究者与文化研究对象的相对文化位置关系的基本维度。局内人（emic）指的是从文化内部持分者/当地人的视角和分类体系出发的理解方式；局外人（etic）是从外来的研究者/分析者的学术理论框架和概念出发的分析方式。二者的理想关系不是非此即彼而是对话——研究者需要在局内人提供的第一手的内部经验与局外人带来的外部比较和分析视角之间进行持续的对译和整合。"],["局外人","outsider / etic","不属于被研究群体的文化外部观察者视角","研究方法","田野调查","观察与访谈","不属于被研究群体、对该群体的文化没有天然的直觉和外显的知识、作为一个文化上的外来者进入田野的研究者。局外人的认知优势是对当地文化保有一种缺乏想当然的陌生感——当地人视为理所当然的事情（如为什么大年初一不能动刀）在外人眼里是一个需要解释的文化现象。这正是局外人的研究资源——不被自然的日常态度所困。"],["庙","temple / shrine","祭祀神灵和祖先的民间宗教建筑场所","研究方法","田野调查","观察与访谈","中国民间宗教和民俗信仰中的核心实物空间载体——祭祀神灵和供奉祖先牌位的社区性宗教建筑。在民俗学的田野调查中庙宇不仅是观察民间信仰实践的首要现场也是深入村落社会关系的必由空间——庙会期间庙前广场上的人流方向和聚散位置即是村落社会网络的物理映射。田野工作者在庙中发现的不只是神像和香火还有村落的权力结构和社会历史。"],["异常现象","anomalous phenomena","既定范式无法解释、可能触发学术创新的反常案例","研究方法","分析范式","语境与阐释","在库恩的范式理论中指在现有范式的理论框架下无法被合理解释的与范式预测不一致的经验现象。异常现象的学术价值在于它是对既有范式的压力——持续的异常现象最终可能引发范式的危机并被新范式的革命所取代。在民俗学的田野调查中对异常现象——意料之外的反直觉的民俗行为——保持警觉是不被盲点遮蔽和作出新发现的关键。"],["归纳推理","inductive reasoning","从个别事实中归纳出一般规律或假说的推理方法","研究方法","分析范式","形态与结构","与演绎推理构成对子的逻辑和科学推理方法——从多个具体的个别观察和案例中通过识别其中的共性模式归纳出一条可能的普遍规则和概括（假说）。在民俗学中归纳推理是田野工作的基本逻辑——研究者在数月的田野中积累了成百上千的具体观察他们最终需要从这些散乱的碎片中归纳出一个有解释力的理论概括。"],["归纳法","inductive method","从个别事实中归纳出一般结论的研究方法","研究方法","分析范式","形态与结构","归纳法的系统方法论版本——以搜集整理和分析大量的具体个案和资料为起点，通过归纳寻找并总结其中规律的实证性研究方法和知识生产逻辑。在民俗学中归纳法是从田野走向理论的必经之路——但纯粹的归纳法也有局限，没有一个研究者在走进田野时是大脑一片空白的无理论状态，他总是在一定的理论预设（尽管可能自己未充分意识到）中进行归纳。"],["录像","video recording","田野调查中用影像记录民俗过程的操作","研究方法","田野调查","田野伙伴关系","田野调查中运用摄影机和摄像机持续记录动态变化的民俗活动和过程的视听文献制作和田野档案保存技术。录像在民俗学研究中的核心价值在于民俗的动态维度——一篇民族志文字永远无法传达一段舞蹈的步伐节奏和身体律动的全部信息而一段录像可以。但录像同样有它的主观性：镜头的选择和角度本身就是一种叙事和解读。"],["录音","audio recording","田野调查中用设备记录口头信息的操作","研究方法","田野调查","田野伙伴关系","田野调查的基础现场记录技术——用数字录音笔或手机等设备全程记录访谈的口头内容以备后续的精细转写和分析。录音在民俗学中的首要优势是完整保存了口头交流的声音维度——访谈者的音色音调停顿的节奏——这些是文字记录无法捕捉的。录音的伦理前提是每次录音前必须征得被访者的明确知情同意。"],["录音转写","transcription of recordings","将田野录音资料转写为文字文本的技术工作","研究方法","田野调查","田野伙伴关系","将田野中搜集的音频录音资料人工精细地一字一句地转为可供分析的文字文本的技术性和耗时的工作。录音转写不是中性的机械转录——转写者总是在做无数的微小的决定：要不要标注停顿的长度和语气的变化、方言词要不要转写为标准书面语、被访者的口误要不要被记录下来。这些微小的决定已然构成了对口头话语的第一次解读和编辑。"],["形态学","morphology","普罗普建立的民间故事结构分析方法","研究方法","分析范式","形态与结构","弗拉基米尔·普罗普（Vladimir Propp）在《民间故事形态学》（1928）中创立的民间故事情节结构的系统分析方法。从形态学的角度说形态学是共时性的，其不关心民间故事在历史上的起源和演变（历时性）而关心故事内在的不变结构——31种功能项的不变序列和角色行动圈的有限数量。这套方法是结构主义在民间叙事研究中的最早和最成功的应用。"],["报道人","informant / reporter","田野调查中提供民俗信息的地方知情人","研究方法","田野调查","田野伙伴关系","田野调查中研究者建立的主要的信息来源和研究合作关系的地方个人。报道人一词隐含的从报道者到研究者的单向信息流在当代反思性的民俗学中受到批评——更平等的称谓是田野伙伴或合作研究者——以强调田野中的信息交流和知识共创的双向平等关系。"],["拟亲属关系","fictive kinship","田野调查中建立的类似于亲属的信任关系","研究方法","田野调查","田野伙伴关系","研究者在田野工作中与信息提供人和社区成员通过长期的密切互动和互惠建立起来的拟似亲属关系的深度的情感和信任纽带。干爹干妈干兄弟姐妹的非正式亲属称谓在田野中不只是幽默也是信任深度和文化接纳的指标。拟亲属关系的建立是田野能够深入社区内部核心社会网络的关键通行证。"],["挂文化","hanging culture method","田野工作者将局部文化现象关联到整体文化框架的分析方法","研究方法","田野调查","田野伙伴关系","田野工作者面对一个孤立的、看似无意义的民俗细节（如某个特定日子不能洗头的地方禁忌）时，不是放弃分析而是努力将该细节挂靠和关联至该社区完整的社会结构信仰体系和世界观的整体文化框架中，从不相关的孤立碎片中发现其内在的文化逻辑的分析方法。挂文化操作体现的是文化整体论在田野实践中的运用。"],["排他性原则","principle of exclusivity","课题边界应排除无关因素以保持精确性的原则","研究方法","田野调查","观察与访谈","研究者在设计课题和确定边界时必须将不相关的因素和可能的混杂变量果断地排除在课题的分析框架之外以保持课题聚焦和分析精确性的基本原则。排他的反面是包罗万象的含糊的百科全书式的题目——什么都沾边什么都是但又什么都没说透。"],["整体方法","holistic approach","将各要素视为相互关联的整体进行综合分析的方法论","研究方法","田野调查","观察与访谈","与分析法相对的研究方法论——不将被研究对象拆解为一堆孤立的变量的集合进行逐个分析，而是强调将社会文化的全部要素视为一个相互关联相互作用的内在一体的整体系统来进行综合理解的研究取向。在民俗学中整体方法是文化整体论在方法论层面的体现和实践——不能把一个仪式中的音乐单独抽出来分析而不分析音乐在完整的仪式过程中和其他非音乐元素的关系。"],["整理田野笔记","field note organization","对田野笔记进行系统整理和分类的工作","研究方法","田野调查","记录与伦理","田野调查收尾后的一项繁重但关键的工作：将整个田野过程中积累的大量散乱的手写或电子田野笔记按照系统的分类体系进行重新阅读整理归类和索引化以便在后续的分析和书写中可以高效地检索使用。整理过程也是研究者对自己田野工作的第一次全面反思——在整理旧笔记中往往会发现当初在紧张和疲惫中漏过的重要线索。"],["文化残存分析法","Survival Analysis","通过当代民俗中的残留因素追溯其原始形态和历史演变","研究方法","分析范式","历史与比较","以泰勒的文化遗留物概念为理论基础的民俗学研究方法——通过对当代社会中的现存民俗实践中的被判断为从远古遗存下来的似乎不再具有当代实用功能的特定元素的文化残存的分析，来追溯和推演该民俗事象的原始形态和历史上更早阶段的功能和意义。例如通过分析当代婚俗中的抛洒谷物来分析其在古代农业社会中的丰产巫术的原始功能。该方法受到当代理论对遗留物概念的全面批判的冲击。"],["文化翻译","cultural translation","将一种文化的意义转译到另一种文化的理解系统中","研究方法","分析范式","语境与阐释","研究者将一种文化中特有的概念实践和符号——这些在被翻译的目标文化中没有现成的直接对应词和对应的实践——用目标文化和学术语言中能被理解的同族概念和解释来转译和传达，以便外部读者能够进入理解该文化的路径。文化翻译中的核心张力和损失永远是在翻译中被打包的微妙的文化感性在另一种语言和概念体系中无法被完全传输。"],["文学叙述","literary narration in fieldwork","以文学笔法表达田野经验和民俗现象的写作方法","研究方法","田野调查","田野伙伴关系","以文学性的语言和叙事技巧而非传统学术报告式的枯燥格式化语言来进行田野经验和民俗现象的书写和呈现的民俗志写作风格和路径。文学叙述并不否认田野学术的严谨性——田野笔记和录音转写的基本事实依然来自于系统的田野调查——而是在最终的写作中选择以更有可读性和感受性的文学笔法来将这些枯燥的事实复活为一段鲜活的现场叙事。"],["文本与田野","text and field","民间文学研究中文本分析与田野调查的关系论题","研究方法","田野调查","田野伙伴关系","民间文艺学和民俗学的核心方法论关系框架——文本（如从老人口中记录下来的民歌歌词和故事文字）和田野（如这首歌和这个故事被讲述和传唱的活态表演事件的两者的关系）。中国早期民间文艺学重文本轻田野——专注于搜集和比较各种版本的故事用文字和拼音记录下来放进档案馆；当代民俗学则主张文本必须在田野的表演事件的整体语境中理解否则不过是失去了鲜活生命的标本。"],["文献民俗志","documentary folklorography","以历史文献为主要资料来源撰写的民俗志形态","研究方法","民族志方法","民俗志类型","以历史文献——地方志文人笔记档案碑刻考古报告——而非田野调查的实地一手材料为主要的资料来源撰写的民俗志形态。在现代田野技术出现和普及之前的古典和近代时期的民俗志大多属于文献民俗志。文献民俗志在当代的学术价值不在于替代田野而在于辅助田野提供当地民俗的深度的历史时间的纵轴——今天的田野观察到的是今天，文献告诉我们五百年前这里的先人在做类似的或完全不同的民俗。"],["文献法","Documentary Research Method","利用历史文献、地方志等书面资料研究民俗的方法","研究方法","民族志方法","民俗志类型","利用历史文献档案地方志碑刻考古和出土文献等非田野的书面和实物资料对民俗的历史形态和变迁进行系统性研究的方法。在民俗学中文献法与田野法是不可偏废的一体两翼——没有田野的文献法是空的没有历史纵深的田野法是盲的。"],["文献计量","Bibliometrics","用定量方法对学术文献进行统计分析的方法","研究方法","数字方法","数据分析","用定量统计方法和数据分析技术对特定学术领域的研究文献进行系统的模式结构和发展趋势的量化分析的文献分析工具。在民俗学中可用于分析中国民俗学的核心期刊数十年来的发文主题引用情况和合作网络的宏观知识结构和历史变迁——哪几个关键词在哪个时段集中爆发代表了什么研究热点。"],["新民族志","new ethnography","董晓萍提出的超越传统民族志的民俗书写范式","研究方法","民族志方法","民俗志类型","董晓萍提出的超越传统静态的民俗事象民族志的理念和书写范式——不仅记录民俗是什么，更将研究者自身的田野经历/反思和与当地人的对话和共同的意义生产写进民族志文本中。新民族志继承了后现代人类学对民族志书写中权力关系的批判和反思并在中国民俗学的语境中进行了创造性的本土化落地。"],["方法论","methodology","研究方法的系统理论和原则","研究方法","田野调查","观察与访谈","关于用什么方法来研究什么对象——即整套研究程序技术和分析策略的理论基础和哲学论证的系统性学科。方法论和方法不一样——方法是具体的操作技术（如访谈的具体技术和技巧），方法论是这些操作技术背后的认识论理由（为什么这种访谈方法能帮我们获取可靠的知识）。"],["无效事实","ineffective facts","脱离理论指导、对学术问题无意义的客观材料","研究方法","分析范式","语境与阐释","在田野现场存在但不被任何有意义的学术问题和理论框架所激活的散乱的、永远不可能被纳入学术分析和写作中的客观材料。田野工作者的关键是识别和排除无效事实——不是田野中收集到的信息越多越好，而是被理论激活并服务于回答研究问题的有效事实越多越好。"],["时空坐落","time-space location","田野调查点特定的时空定位和文化坐标","研究方法","田野调查","田野伙伴关系","田野调查点在特定地理坐标和历史脉络中占据的不可替代的独特的时空文化位置和文化坐标——不只是GPS上的两个数字，而是数百年的历史积淀赋予此地的不可复制的文化厚度和位置的文化身份证。研究者必须在深入田野前充分地了解其田野点的时空坐落的文化基底和历史纵深才能定位自己将要进入的文化场域。"],["有效事实","effective facts","能够解答学术问题、具备学术功能的田野材料","研究方法","田野调查","田野伙伴关系","在田野现场的众多个别的经验材料中被研究者预先的研究问题和理论框架所激活、被研究者识别为能帮助回答研究问题的关键性的并且最终会被纳入田野分析的第一手资料。有效和无效事实的区别不是事实本身的客观区别而是由研究问题所决定的材料在不同问题中的被使用价值的不同。"],["有温度的田野","fieldwork with warmth","张士闪等提倡的以情感和人文关怀为核心的田野工作理念","研究方法","田野调查","田野伙伴关系","张士闪等中国民俗学者提出的以对田野中的民众和传承人的深切的情感尊重和人文关怀——而非将田野仅仅当做冷冰冰的科学数据收集现场——为田野工作的核心态度和伦理的理念和口号。有温度的田野反对研究者与当地人之间冷漠的提取信息式的研究关系，提倡在田野中建立真实的人际的情感纽带和互相关心。"],["本土概念","indigenous concept","在特定文化和语境中自然生成的本土性学术概念","研究方法","分析范式","语境与阐释","在特定文化和语言的土壤中自然地生长出来的本土的、不能被简单地翻译成西方学术概念的、承载着该文化的独特分类和体验方式的概念。在中国民俗学中过日子面子关系人情等都是典型的无法被简单的英文对应词完全捕获的本土概念。本土概念的发掘和理论化是中国民俗学建立自主知识体系的核心策略之一。"],["标志性文化统领式民俗志","Iconic Culture-Led Folklore Ethnography","刘铁梁提出的以标志性文化统领民俗志的方法","研究方法","民族志方法","民俗志类型","刘铁梁提出的中国民俗学田野书写的方法论创新——不是对一个村落进行百科全书式面面俱到但毫无重点的事物民俗志（每样民俗都平均笔力各占一页），而是先通过深入田野精准地识别出该村落的标志性文化——最能代表该村落的文化精神社会结构和历史记忆的一套核心民俗实践——然后以这个标志性文化为轴心统领组织所有的民俗志材料和叙述。"],["正面启发法","positive heuristic","鼓励学者沿特定道路完善保护带的方法论指导","研究方法","分析范式","实证与假说","拉卡托斯科学研究纲领方法论的概念——研究者按照保护带的逻辑主动地而非被动防卫地继续发展和优化理论的辅助假说和模型以正面的建设性的扩展理论可解释的新事实的范围。正面启发法的精神是主动的进攻性的科学进步——不是坐等旧理论的难题出现时才被动缝补而是主动开辟新的理论生长路径。"],["比较叙述","comparative narration","对不同田野点或多点调查资料进行比较的方法","研究方法","田野调查","田野伙伴关系","研究者将来自不同田野调查点或同一田野点在不同时期的调查资料和记录进行系统的对照比较的叙述和组织分析的方法。比较叙述的目的不在于简单地列出异同而是通过有控制有聚焦的比较讲述一个关于文化差异和共性的有分析深度和解释力的学术叙事——不只是A和B不一样，而是为什么不一样以及这个差异对理解两地的社会结构和历史有什么透露。"],["比较研究法","Comparative Method","通过跨民族、跨地区或跨时期的比较揭示民俗规律的方法","研究方法","分析范式","历史与比较","人类学和民俗学校心研究方法论的基石之一。通过对不同社会不同文化不同地区和不同历史时期的民俗事象进行有系统和有控制的比较分析来揭示民俗变异的人类共性模式和文化特殊性模式并检验关于民俗的一般性的理论命题。在应用中比较法的常见陷阱是伪比较——将不具可比性的不同层面的材料生硬地并列而不控制其它变量。"],["民俗传承人","folklore transmitter","承担民俗传承责任的个人或群体","研究方法","田野调查","记录与伦理","在社区中被公认的传承着某项特定的民俗传统并负责将其传递至下一代的个体或群体。传承人的核心特征包括掌握民俗的核心知识体系和技艺、被社区成员公认为有资格和权威传递该传统、在实际生活中仍在持续地实践和传递着这一民俗传统。非遗传承人的认定体系的建立对传承人的认定和保护起到了制度保障作用但也带来了传承人身份的政治化和行政化的批评。"],["民俗图像","folk image","记录和表现民俗的视觉图像","研究方法","田野调查","记录与伦理","田野工作者通过摄影摄像和手绘等视觉媒介技术生产并用于记录和呈现民俗文化现场和事象的视觉产物的总称——照片和影像中的一次庙会的一个祭祀动作一套民族服饰的穿搭。民俗图像不是对民俗现实的纯粹透明的镜像复制——每张照片的取景框角度和构图的选择都是摄影师的文化和技术选择的产物。"],["民俗图像叙事","folk image narrative","通过图像记录和阐释民俗的叙事方式","研究方法","田野调查","记录与伦理","不以文字而以图像和影像的序列和组合为主要媒介来记录和讲述民俗故事的叙事方式——一组关于某庙会的数十张精选的照片可以独立构成对该庙会的视觉叙事不需要文字的穿针引线。民俗图像叙事在数字时代的短视频和vlog中是民俗传播和记录的最有活力的新媒介。"],["民俗地图法","Folklore Mapping Method","将民俗事象的地理分布绘制成地图以研究传播规律的方法","研究方法","田野调查","观察与访谈","民俗学研究中的一个重要的空间分析方法——将特定民俗事象如某一故事类型某一禁忌和某一节庆的在不同地理区域中的分布情报标注在地图上，通过分析其在地图上的分布模式（连续的密集区、跳跃点和空白区）来推断该民俗事象的可能的传播路径历史和源头的地域。芬兰历史-地理学派的AT分类法正是建立在此方法论基础之上。"],["民俗学方法论","Methodology of Folkloristics","关于民俗事象观察研究和调查整理技术与方法的理论","研究方法","田野调查","观察与访谈","关于用什么方法——田野调查/文献学研究/比较分析等——来研究民俗的观点和规范的理论体系。钟敬文为中国民俗学建构的方法论体系是田野-文献-比较三法的有机结合——田野提供活的第一手民俗材料，文献提供历史纵深，比较提供跨文化视角——三法不可偏废地协同运作构成了中国民俗学的方法论特色。"],["民俗志书写","Folklore Ethnographic Writing","以田野材料为基础的民俗学写作实践","研究方法","民族志方法","民俗志类型","将田野调查中收集到的原始材料和研究者自身的田野经验通过文字的组织编排转化为一个具有学术质量的民俗学文本的专业写作实践。民俗志书写不是田野之后的一个机械的整理工序而是研究的不可分割的构成部分——当你在书写时决定什么材料入园、用什么顺序排列、给什么篇幅和关注和不给什么篇幅，你正在行使着对田野材料的终极解读权。"],["民俗感悟力","folklore sensibility","人情练达基础上对民俗现象的直觉洞察能力","研究方法","田野调查","观察与访谈","一个优秀田野工作者在人情冷暖世情的深厚生活阅历和大量的田野实践经验的基础上形成的对民俗现象的直觉性的敏锐感知和深刻洞察力的朴素的综合。民俗感悟力不是通过方法论课程的公式化的背诵获得的而是通过田野中的大量挫败和反思和深刻的人性阅历的积淀中慢慢被淬炼出的不可转让的经验智慧。"],["民俗摄影","Folklore Photography","运用摄影技术记录民俗事象的视觉形态和过程","研究方法","田野调查","记录与伦理","将摄影的技术和艺术自觉地应用于民俗学的田野记录和研究中的交叉实践领域。民俗摄影的核心目标是以高质量的影像技术在不干扰民俗活动的自然流程的前提下忠实地记录民俗事象在特定时空中的形态、过程和氛围。民俗摄影的主要挑战是如何在艺术表达的追求和学术记录的忠实性之间找到恰当的平衡。"],["民俗普查","General Folklore Survey","在较大范围内对民俗事象进行全面系统的摸底调查","研究方法","田野调查","观察与访谈","由国家或学术机构的行政力量主导在较大范围（通常为省或县一级的行政区划）内对当地的民俗资源的种类分布存续现状和传承情况进行拉网式的系统的摸底排查和全面登记的工作。中国的民间文学三套集成（故事/歌谣/谚语）和近年的全国性非遗普查是民俗普查制度化的大型实践。"],["民俗生态","Folklore Ecology","民俗事象与自然环境、社会环境相互依存的关系系统","研究方法","田野调查","观察与访谈","关于特定的民俗事象与其所赖以存在的难以分离的自然生态环境和人文社会环境之间的相互依存、互适和动态平衡的关系系统的总称。民俗生态的核心思想是任何民俗都不能从它的环境土壤中被连根拔起——干旱山区和江南水乡的求雨仪式的形态、频度和深度截然不同正是因为它们被不同的生态条件所深刻地塑造的结果。"],["民俗记录","Folklore Documentation","运用文字、录音、摄影等手段如实记录民俗活动的过程","研究方法","田野调查","记录与伦理","田野工作者通过文字书写、录音、摄影、摄像和绘图等多种记录媒介和手段，在民俗实践现场对其过程、内容和情境进行如实记录和档案保存的田野工作基本操作。民俗记录不是被动的镜头而是互动的选择——哪些场景被记录、从哪个角度记录、记录到什么详细度——这些都不只是技术问题而且是学术判断的问题。"],["民俗调查","Folklore Survey","对特定区域或民族的民俗事象进行系统观察和记录的工作","研究方法","田野调查","观察与访谈","对选定的特定区域的特定民俗项目或全方面的民俗资源，通过田野的实地走访观察访谈和基本的记录进行系统的摸底信息和材料的搜集的民俗学研究的基础性前期工作。民俗调查通常是大规模深度个案研究前的一个必要的侦察和摸底环节——让你在选点和扎深田野之前有一个初步的面上的认知。"],["民俗资料","folklore materials","用于民俗研究的原始记录和文献","研究方法","田野调查","记录与伦理","研究者通过田野调查文献搜集和公私渠道获取的可用于分析一个社区和项目的民俗的各种原始材料的总称——田野笔记录音录像照片地方志碑刻族谱家传手抄本等。民俗资料不仅是研究的推进器它是民俗学研究工作的全部食谱的主要原材料。"],["民俗资料学","Folklore Data Studies","对民俗资料的系统收集、整理和研究","研究方法","田野调查","观察与访谈","关于民俗研究的第一手原始材料——田野笔记录音录像照片文本和文献——的系统收集整理鉴定和研究的元学术和资料学分支领域。民俗资料学关注的不再是民俗本身，而是民俗的研究资料的历史现状完整性鉴定和保存——一套珍贵的五十年代的少数民族民俗的田野录音是否需要进行数字化的抢救和修复。"],["民俗资料归档","Folklore Data Archiving","将田野调查获取的民俗材料按科学方法分类保存","研究方法","田野调查","田野伙伴关系","将在田野调查和文献搜集中累积的大量散乱无序的民俗研究材料按照一套科学的分类编目和索引体系进行系统化的整理归档保存和入数据库的操作使得这批材料在研究者死后不至于丢失并方便后来的研究者检阅使用。资料归档是田野工作最缺乏魅惑力的基础工序但却是学术共同体不可或缺的良心底线。"],["民俗资料搜集整理","Collection and Collation of Folklore Data","对民俗材料进行系统采集、记录、分类和归档的方法","研究方法","田野调查","记录与伦理","对田野调查和文献搜集中所获的散乱的民俗原始材料进行系统的选拔整理分类编号索引和归档的方法论操作总称。这是民俗学后备力量最基础的非风光工序但直接决定研究成果的质量。"],["民俗采风","Folklore Collecting","深入民间搜集记录民俗事象和口头文学的工作方式","研究方法","田野调查","记录与伦理","中国民俗学早期田野工作的本土称谓不同于西方的纯学术田野调查。采风一词源自诗经时代的国风和汉乐府的采诗传统，其原意是国家派官员到民间搜集歌谣以观政风和民风。五四时期的北大歌谣研究会继承了采风的概念并赋予了现代学术含义。当代批评指出采风一词隐含一种自上而下搜集民间文化产品的官方姿态与非遗保护的社区参与原则相悖。"],["民族志","ethnography","对特定民族或群体的系统描述","研究方法","民族志方法","民俗志类型","人类学校心研究方法和成果形式的统称——既指以参与观察和深度访谈为核心的长期的田野调查过程，也指研究者就其所研究群体的文化和社会生活撰写的系统的描述性兼分析性的文本产品。在民俗学中民族志为民俗志提供了母体范式和方法论模板。"],["民间文学采录","Folk Literature Collection","对民间口头文学作品进行忠实记录和整理的方法","研究方法","田野调查","记录与伦理","对民间口头流传的民间文学文本（神话传说故事民歌谚语谜语等）通过田野访谈忠实完整地录音记录和转写整理为可出版和分析的文字文本的专业记录方法。采录的首要原则是忠实——尽量逐字逐句原汁原味地再现口头叙述而非以整理者的语言和审美进行篡改。"],["民间的方法","folk method","以民间文化本身的思维方式从事民间文学研究的方法","研究方法","田野调查","观察与访谈","以民间文化自身的思维方式和基本原则而非外来的西方学术理论和范畴去研究和理解民间文学的本土化方法论主张。民间的方法强调研究者要暂时搁置学院化的学术框架，学习像民间的讲述者一样去感受和理解民间文学的逻辑。"],["汪满田","Wangmantian","安徽歙县以嬉鱼灯仪式闻名的古村落","研究方法","田野调查","观察与访谈","安徽省黄山市歙县的一个以纯手工制作和元宵节期间在溪流中嬉（舞）巨大的鱼形灯为标志性民俗而闻名全国的古村落。汪满田嬉鱼灯是中国民间灯彩艺术的活化石和近年来民俗学田野调查的热门案例。"],["河湟地区","Hehuang region","黄河上游和湟水流域交汇的地区，花儿重要起源地","研究方法","田野调查","观察与访谈","黄河上游干流和其支流湟水流域的交汇地带，横跨甘肃青海两省，是中国多民族共居的区域和多民族共享的著名民间歌谣花儿的最重要的发源地和传承地。河湟地区是民俗学田野调查中跨民族和跨文化研究的经典田野点。"],["深度访谈","in-depth interview","对研究对象进行深入的开放式谈话的田野方法","研究方法","田野调查","观察与访谈","以开放式的和非指导性的深度谈话取代标准化问卷的定性访谈方法。其核心是不以预设的选项限制被访者的回答，而是通过开放的提问专心的倾听和灵活的追问让被访者在对研究者建立了足够信任的谈话氛围中主动地深入地敞开其生活世界的内层。"],["深描","Thick Description","格尔茨提出的文化意义深度阐释方法","研究方法","分析范式","语境与阐释","克利福德·格尔茨从英国哲学家吉尔伯特·赖尔借用的核心方法论概念。赖尔用抽搐和眨眼这一对动作举例说明浅描（生理动作的客观记录）和深描（区分出是生理抽搐/秘密信号/讽刺性模仿的动作的文化意义的层层解释）的区别。在民俗学中深描的方法要求民俗学者不能满足于民俗的外在行为的客观描述而必须层层深入地挖掘和呈现行为在文化中所承载的多层次的复杂意义。"],["焦点小组","focus group","组织多位受访者集体讨论的访谈方法","研究方法","田野调查","观察与访谈","由一位主持人引导多位被访者（通常为5-10人）围绕一个特定主题展开集体的讨论和相互激发的定性访谈方法。在民俗学中焦点小组适用于捕捉群体内部的关于某个共同民俗主题（如对某传统节庆的态度）的多元的有时甚至是矛盾的集体意见的互动现场。"],["熟人田野","acquaintance fieldwork","研究者回到熟悉社区进行的田野工作","研究方法","田野调查","田野伙伴关系","研究者在其自身已经熟悉和具有人脉的社区（如自己的家乡或长期居住的社区）中进行田野工作。熟人田野的优势是容易进入和沟通，挑战是过度熟悉导致对日常民俗的盲视和难以像外来者那样保持必要的学术距离和好奇。"],["特异性原则","principle of specificity","课题边界应聚焦于独特对象而非泛化领域的原则","研究方法","田野调查","观察与访谈","选题时课题边界的焦点必须聚拢于一个独特的具排他性的特定对象而不能是一个泛泛的什么都沾边但没有独特性和聚焦度的大领域的原则。"],["现场记录","on-site recording","在田野现场即时记录观察和访谈内容","研究方法","田野调查","观察与访谈","田野工作者在现场事件正在发生的当刻立即进行的快速潦草的笔记关键词语和行为动作的记录的技术——在仪式和表演的动态过程中没有时光倒流的录制和回放的机会。现场记录的原生态和即时性是它的不可替代的学术价值所在。"],["现场访谈","on-site interview","在田野现场进行的即时性访谈工作","研究方法","田野调查","观察与访谈","研究者在民俗实践的现场如庙会的现场节日的现场婚礼的现场利用与参与者的自然交谈而非专门预约的正式会议室访谈进行的即时性访谈。现场访谈的优势是受访者在
